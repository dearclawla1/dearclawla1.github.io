<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Quick Reference</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
h1{color:#6366f1}
input,button,select{margin:5px 0;background:#333;color:#e4e4e4;border:1px solid #555;padding:5px;border-radius:4px}
button{cursor:pointer}
select{width:100%}
pre{background:#1a1a1a;padding:10px;border-radius:4px;overflow:auto;white-space:pre-wrap}
a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<h1>API Quick Reference</h1>
<p>Enter an API endpoint to view documentation:</p>
<input type="text" id="endpoint" placeholder="e.g., /api/v1/users" />
<button onclick="loadEndpoint()">Load</button>
<button onclick="clearEndpoint()">Clear</button>
<div id="output"></div>
<script>
function loadEndpoint() {
const endpoint = document.getElementById('endpoint').value;
if (!endpoint.trim()) {
alert('Please enter an endpoint');
return;
}
const output = document.getElementById('output');
output.innerHTML = 'Loading ' + endpoint + '...';
try {
fetch(endpoint)
.then(res => res.json())
.then(data => {
output.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
})
.catch(err => {
output.innerHTML = 'Error: ' + err.message;
});
} catch (err) {
output.innerHTML = 'Error: ' + err.message;
}
}
function clearEndpoint() {
document.getElementById('endpoint').value = '';
document.getElementById('output').innerHTML = '';
}
document.getElementById('endpoint').addEventListener('keypress', function(e) {
if (e.key === 'Enter') {
loadEndpoint();
}
});
</script>
</body>
</html>
