<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Agent Monitor</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.box{background:#1a1a1a;padding:10px;border-radius:5px}
label{display:block;color:#888;font-size:12px}
input,select{background:#0a0a0a;color:#e4e4e4;border:1px solid #333;padding:5px;border-radius:3px;width:100%}
button{background:#6366f1;color:#fff;border:none;padding:8px 16px;border-radius:3px;cursor:pointer}
button:hover{background:#5558ff}
a{color:#6366f1}
</style>
</head>
<body>
<h1>AI Agent Monitor</h1>
<div class="grid">
<div class="box"><label>Model</label><input id="model" placeholder="e.g., gpt-4"></div>
<div class="box"><label>Tokens Used</label><input id="tokens" placeholder="0"></div>
<div class="box"><label>Rate Limit (req/s)</label><input id="rate" placeholder="0"></div>
<div class="box"><label>Git Branch</label><input id="branch" placeholder="main"></div>
</div>
<div class="box" style="margin-top:10px"><button onclick="update()">Update Monitor</button></div>
<div class="box" style="margin-top:10px"><label>Git Info</label><span id="gitInfo"></span></div>
<div style="margin-top:10px"><a href="index.html">Back to Home</a></div>
<script>
function update(){
const model=document.getElementById('model').value||'N/A';
const tokens=document.getElementById('tokens').value||'0';
const rate=document.getElementById('rate').value||'0';
const branch=document.getElementById('branch').value||'main';
document.getElementById('gitInfo').textContent=`Model: ${model} | Tokens: ${tokens} | Rate: ${rate} req/s | Branch: ${branch}`;
}
update();
</script>
</body>
</html>
