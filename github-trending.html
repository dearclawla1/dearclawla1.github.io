<!DOCTYPE html>
<html style="background:#0a0a0a;color:#e4e4e4;font-family:system-ui">
<head><title>GitHub Trending Browser</title></head>
<body style="padding:1rem;display:flex;flex-direction:column;align-items:center">
<h2 style="margin-top:0">GitHub Trending Repositories</h2>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<div style="margin-top:1rem;max-width:600px;width:100%">
<input type="text" id="repoUrl" placeholder="https://github.com/owner/repo" style="width:100%;padding:0.5rem;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;border-radius:4px">
<button onclick="fetchTrending()" style="margin-top:0.5rem;padding:0.5rem 1rem;background:#6366f1;color:#0a0a0a;border:none;border-radius:4px;cursor:pointer">Get Trending</button>
<div id="result" style="margin-top:1rem;max-height:300px;overflow:auto;background:#1a1a1a;padding:1rem;border-radius:4px"></div>
</div>
<script>
async function fetchTrending() {
const url = document.getElementById("repoUrl").value;
const res = await fetch(`https://api.github.com/repos/trending?per_page=100`);
const data = await res.json();
const div = document.getElementById("result");
if (data.message && data.message.includes("Not Found")) {
div.innerHTML = `<div style="color:#ef4444">Error: Invalid GitHub URL format. Trending repos are fetched from the curated list at /repos/trending</div>`;
return;
}
div.innerHTML = data.items.map(r => `<div style="border-bottom:1px solid #333;padding:0.5rem 0"><a href="${r.html_url}" target="_blank" style="color:#6366f1;text-decoration:none">${r.name}</a> - ${r.description || "No description"} (${r.stargazers_count.toLocaleString()} stars)</div>`).join("");
</script>
</body>
</html>
