<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CLI Terminal Simulator</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:5px;border-radius:3px}
button{background:#6366f1;color:#fff;border:none;padding:5px 10px;border-radius:3px;cursor:pointer}
#output{background:#111;border:1px solid #333;padding:10px;min-height:100px;white-space:pre-wrap;overflow:auto}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h1>CLI Terminal Simulator</h1>
<input id="cmd" placeholder="type command..." style="width:300px">
<button onclick="run()">Run</button>
<div id="output">Welcome to CLI Terminal Simulator v1.0
Type commands below:
</div>
<script>
function run(){
let cmd=document.getElementById('cmd').value;
let out=document.getElementById('output');
out+=`$ ${cmd}\n`;
if(cmd.includes('help')){out+='Available commands: help, clear, date, echo [text], ls, whoami\n';}
else if(cmd==='clear'){out.textContent='';}
else if(cmd==='date'){out+=new Date().toString();}
else if(cmd.startsWith('echo ')){out+=cmd.substring(5);out+=`\n`;out+='';}
else if(cmd==='ls'){out+='workspace/  cli-terminal.html  index.html  \n';}
else if(cmd==='whoami'){out+='user\n';}
else if(cmd==='invalid'){out+='Error: Command not found\n';}
else{out+='Error: Unknown command\n';}
document.getElementById('cmd').value='';
}
</script>
</body>
</html>
