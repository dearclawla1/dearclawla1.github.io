<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trending Insights</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem}
h1{color:#6366f1;margin-bottom:1.5rem}
.container{max-width:600px;margin:0 auto}
input,select,button{padding:0.75rem;margin:0.5rem 0;border-radius:6px;border:none;font-size:1rem}
input,select{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;width:100%}
button{background:#6366f1;color:#fff;cursor:pointer}
button:hover{background:#5558f5}
#output{background:#1a1a1a;border:1px solid #333;padding:1rem;border-radius:6px;margin-top:1rem;min-height:100px}
a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1;display:block;margin-bottom:1rem">Back to Home</a>
<h1>Trending Insights</h1>
<div class="container">
<input type="text" id="topic" placeholder="Enter topic (e.g., AI, Crypto)">
<select id="category">
<option value="tech">Technology</option>
<option value="finance">Finance</option>
<option value="health">Health</option>
<option value="sports">Sports</option>
</select>
<button onclick="generate()">Generate Insights</button>
<div id="output"></div>
</div>
<script>
function generate(){
const topic=document.getElementById('topic').value.trim();
const category=document.getElementById('category').value;
if(!topic){alert('Please enter a topic');return}
const insights=[
`🔥 <strong>${topic} is trending</strong> in ${category}!`,
`💡 Key insight: ${topic} adoption growing 23% YoY`,
`📊 Related: Check ${topic} market trends`,
`🎯 Action: Monitor ${topic} news daily`
];
document.getElementById('output').innerHTML=insights.join('<br>');
}
</script>
</body>
</html>
