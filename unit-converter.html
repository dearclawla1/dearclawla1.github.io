<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
a{color:#6366f1;text-decoration:none}
.container{max-width:600px;margin:0 auto}
section{margin:20px 0;background:#111;padding:15px;border-radius:8px;border:1px solid #333}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #444;background:#1a1a1a;color:#e4e4e4;border-radius:4px;font-size:14px}
button{background:#6366f1;color:#fff;border:none;padding:12px 20px;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold}
button:hover{background:#5558ff}
.result{font-size:24px;color:#6366f1;font-weight:bold;margin:10px 0}
.error{color:#ff6b6b;background:#2a1a1a;padding:10px;border-radius:4px;margin:10px 0}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1;display:block;margin-bottom:15px">Home</a>
<h1>Unit Converter</h1>
<section>
<h2>Length</h2>
<input id="lengthValue" type="number" placeholder="Enter value">
<select id="lengthFrom">
<option value="m">Meters</option><option value="km">Kilometers</option><option value="cm">Centimeters</option><option value="mm">Millimeters</option><option value="mi">Miles</option><option value="yd">Yards</option><option value="ft">Feet</option><option value="in">Inches</option>
</select>
<select id="lengthTo">
<option value="m">Meters</option><option value="km">Kilometers</option><option value="cm">Centimeters</option><option value="mm">Millimeters</option><option value="mi">Miles</option><option value="yd">Yards</option><option value="ft">Feet</option><option value="in">Inches</option>
</select>
<button onclick="convert('length')">Convert</button>
<div id="lengthResult" class="result"></div>
</section>
<section>
<h2>Weight</h2>
<input id="weightValue" type="number" placeholder="Enter value">
<select id="weightFrom">
<option value="kg">Kilograms</option><option value="g">Grams</option><option value="lb">Pounds</option><option value="oz">Ounces</option><option value="t">Metric Tons</option><option value="st">Stone</option>
</select>
<select id="weightTo">
<option value="kg">Kilograms</option><option value="g">Grams</option><option value="lb">Pounds</option><option value="oz">Ounces</option><option value="t">Metric Tons</option><option value="st">Stone</option>
</select>
<button onclick="convert('weight')">Convert</button>
<div id="weightResult" class="result"></div>
</section>
<section>
<h2>Temperature</h2>
<input id="tempValue" type="number" placeholder="Enter value">
<select id="tempFrom">
<option value="c">Celsius</option><option value="f">Fahrenheit</option><option value="k">Kelvin</option>
</select>
<select id="tempTo">
<option value="c">Celsius</option><option value="f">Fahrenheit</option><option value="k">Kelvin</option>
</select>
<button onclick="convert('temp')">Convert</button>
<div id="tempResult" class="result"></div>
</section>
<section>
<h2>Area</h2>
<input id="areaValue" type="number" placeholder="Enter value">
<select id="areaFrom">
<option value="m2">Square Meters</option><option value="km2">Square Kilometers</option><option value="ha">Hectares</option><option value="ac">Acres</option><option value="sqmi">Square Miles</option><option value="sqft">Square Feet</option><option value="sqyd">Square Yards</option>
</select>
<select id="areaTo">
<option value="m2">Square Meters</option><option value="km2">Square Kilometers</option><option value="ha">Hectares</option><option value="ac">Acres</option><option value="sqmi">Square Miles</option><option value="sqft">Square Feet</option><option value="sqyd">Square Yards</option>
</select>
<button onclick="convert('area')">Convert</button>
<div id="areaResult" class="result"></div>
</section>
<section>
<h2>Volume</h2>
<input id="volumeValue" type="number" placeholder="Enter value">
<select id="volumeFrom">
<option value="l">Liters</option><option value="ml">Milliliters</option><option value="gal">Gallons</option><option value="qt">Quarts</option><option value="pt">Pints</option><option value="fl_oz">Fluid Ounces</option><option value="m3">Cubic Meters</option>
</select>
<select id="volumeTo">
<option value="l">Liters</option><option value="ml">Milliliters</option><option value="gal">Gallons</option><option value="qt">Quarts</option><option value="pt">Pints</option><option value="fl_oz">Fluid Ounces</option><option value="m3">Cubic Meters</option>
</select>
<button onclick="convert('volume')">Convert</button>
<div id="volumeResult" class="result"></div>
</section>
</div>
<script>
const conversionRates = {
    length: { m: 1, km: 0.001, cm: 100, mm: 1000, mi: 1609.34, yd: 0.9144, ft: 0.3048, in: 0.0254 },
    weight: { kg: 1, g: 1000, lb: 2.20462, oz: 35.274, t: 1000, st: 6.35029 },
    temp: { c: 0, f: 32, k: 273.15 },
    area: { m2: 1, km2: 0.000001, ha: 0.0001, ac: 0.000247105, sqmi: 0.00000258999, sqft: 0.092903, sqyd: 0.836127 },
    volume: { l: 1, ml: 1000, gal: 0.264172, qt: 1.05669, pt: 2.11338, fl_oz: 9.46353, m3: 0.001 }
};

function convert(type) {
    const value = parseFloat(document.getElementById(type + 'Value').value);
    const from = document.getElementById(type + 'From').value;
    const to = document.getElementById(type + 'To').value;
    const resultDiv = document.getElementById(type + 'Result');
    
    if (isNaN(value)) {
        resultDiv.textContent = '';
        return;
    }
    
    let result;
    if (type === 'temp') {
        let celsius;
        if (from === 'c') celsius = value;
        else if (from === 'f') celsius = (value - 32) * 5/9;
        else if (from === 'k') celsius = value - 273.15;
        
        if (to === 'c') result = celsius;
        else if (to === 'f') result = celsius * 9/5 + 32;
        else if (to === 'k') result = celsius + 273.15;
    } else {
        const baseValue = value / conversionRates[type][from];
        result = baseValue * conversionRates[type][to];
    }
    
    resultDiv.textContent = result.toFixed(4);
}
</script>
</body>
</html>
