<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
a{color:#6366f1;text-decoration:none}
.container{max-width:600px;margin:0 auto}
section{margin:20px 0;background:#111;padding:15px;border-radius:8px;border:1px solid #333}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #444;background:#1a1a1a;color:#e4e4e4;border-radius:4px;font-size:14px}
button{background:#6366f1;color:#fff;border:none;padding:12px 20px;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold}
button:hover{background:#5558ff}
.result{font-size:24px;color:#6366f1;font-weight:bold;margin:10px 0}
.error{color:#ff6b6b;background:#2a1a1a;padding:10px;border-radius:4px;margin:10px 0}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1;display:block;margin-bottom:15px">Home</a>
<h1>Unit Converter</h1>
<section>
<h2>Length</h2>
<input id="lengthValue" type="number" placeholder="Enter value">
<select id="lengthFrom">
<option value="m">Meters</option><option value="km">Kilometers</option><option value="cm">Centimeters</option><option value="mm">Millimeters</option><option value="mi">Miles</option><option value="yd">Yards</option><option value="ft">Feet</option><option value="in">Inches</option>
</select>
<select id="lengthTo">
<option value="m">Meters</option><option value="km">Kilometers</option><option value="cm">Centimeters</option><option value="mm">Millimeters</option><option value="mi">Miles</option><option value="yd">Yards</option><option value="ft">Feet</option><option value="in">Inches</option>
</select>
<button onclick="convertLength()">Convert</button>
<div class="result" id="lengthResult"></div>
</section>
<section>
<h2>Temperature</h2>
<input id="tempValue" type="number" placeholder="Enter value">
<select id="tempFrom">
<option value="c">Celsius</option><option value="f">Fahrenheit</option><option value="k">Kelvin</option>
</select>
<select id="tempTo">
<option value="c">Celsius</option><option value="f">Fahrenheit</option><option value="k">Kelvin</option>
</select>
<button onclick="convertTemp()">Convert</button>
<div class="result" id="tempResult"></div>
</section>
<script>
function convertLength(){
const val=document.getElementById('lengthValue').value;
const from=document.getElementById('lengthFrom').value;
const to=document.getElementById('lengthTo').value;
let result=val;
if(from==='km')result=val/1000;
else if(from==='cm')result=val/100;
else if(from==='mm')result=val/10;
else if(from==='mi')result=val*1609.34;
else if(from==='yd')result=val*0.9144;
else if(from==='ft')result=val*0.3048;
else if(from==='in')result=val*0.0254;
if(to==='km')result=result*1000;
else if(to==='cm')result=result*100;
else if(to==='mm')result=result*10;
else if(to==='mi')result=result/1609.34;
else if(to==='yd')result=result/0.9144;
else if(to==='ft')result=result/0.3048;
else if(to==='in')result=result/0.0254;
document.getElementById('lengthResult').textContent=val+' '+from.toUpperCase()+' = '+result.toFixed(2)+' '+to.toUpperCase();
}
function convertTemp(){
const val=document.getElementById('tempValue').value;
const from=document.getElementById('tempFrom').value;
const to=document.getElementById('tempTo').value;
let celsius=val;
if(from==='f')celsius=(val-32)*5/9;
else if(from==='k')celsius=val-273.15;
if(to==='f')celsius=celsius*9/5+32;
else if(to==='k')celsius=celsius+273.15;
document.getElementById('tempResult').textContent=val+' '+from.toUpperCase()+' = '+celsius.toFixed(2)+' '+to.toUpperCase();
}
</script>
</body>
</html>
