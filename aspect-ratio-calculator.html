<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aspect Ratio Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,min(1.2rem)}
.container{max-width:600px;margin:40px auto;padding:20px}
h1{font-size:1.8rem;margin-bottom:20px;text-align:center}
form{background:#111;padding:20px;border-radius:12px}
input,select{width:100%;padding:12px;margin:8px 0 16px;border:1px solid #333;border-radius:8px;background:#222;color:#e4e4e4;font-size:1rem}
button{width:100%;padding:14px;margin:10px 0;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:1rem;cursor:pointer}
button:hover{background:#5558e6}
.result{background:#1a1a1a;padding:16px;margin-top:20px;border-radius:8px;display:none}
.result p{margin:8px 0;font-size:1rem}
</style>
</head>
<body>
<div class="container">
<h1>Aspect Ratio Calculator</h1>
<form id="calcForm">
<input type="number" id="width" placeholder="Width (px)" min="1">
<input type="number" id="height" placeholder="Height (px)" min="1">
<button type="submit">Calculate</button>
</form>
<div class="result" id="result"></div>
<a href="index.html" style="color:#6366f1;display:block;margin-top:20px;text-align:center">Back to Home</a>
</div>
<script>
document.getElementById('calcForm').addEventListener('submit',function(e){
e.preventDefault();
const w=parseFloat(document.getElementById('width').value)||1;
const h=parseFloat(document.getElementById('height').value)||1;
const ratio=(w/h).toFixed(4);
const commonDivisor=Math.gcd(w,h);
const simplifiedW=w/commonDivisor;
const simplifiedH=h/commonDivisor;
document.getElementById('result').style.display='block';
document.getElementById('result').innerHTML=`
<strong>Aspect Ratio:</strong> ${ratio}<br>
<strong>Simplified Ratio:</strong> ${simplifiedW}:${simplifiedH}<br>
<strong>Width:</strong> ${w}px | <strong>Height:</strong> ${h}px
`;
});
</script>
</body>
</html>
