<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gwen Game - Word Puzzle Challenge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #e4e4e4;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #111;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      color: #6366f1;
      margin-bottom: 10px;
      font-size: 2rem;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 25px;
      font-size: 0.95rem;
    }
    .game-area {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
    }
    .word-display {
      font-size: 1.8rem;
      letter-spacing: 8px;
      text-align: center;
      margin-bottom: 20px;
      color: #e4e4e4;
      font-family: 'Courier New', monospace;
    }
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      font-size: 1.1rem;
      border: 2px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #e4e4e4;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #6366f1;
    }
    input[type="text"]::placeholder {
      color: #666;
    }
    .btn {
      padding: 14px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover {
      background: #5558e6;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: #333;
      color: #e4e4e4;
    }
    .btn-secondary:hover {
      background: #444;
    }
    .message {
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-weight: 500;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .message.success {
      background: rgba(107, 196, 88, 0.2);
      color: #68d391;
    }
    .message.error {
      background: rgba(225, 80, 80, 0.2);
      color: #f87171;
    }
    .message.info {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #6366f1;
    }
    .stat-label {
      font-size: 0.85rem;
      color: #888;
      margin-top: 5px;
    }
    .history {
      max-height: 200px;
      overflow-y: auto;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }
    .history-item:last-child {
      border-bottom: none;
    }
    .history-item.correct {
      color: #68d391;
    }
    .history-item.incorrect {
      color: #f87171;
    }
    .history-word {
      font-family: 'Courier New', monospace;
      font-weight: 600;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #888;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      margin-left: 10px;
      border: 2px solid #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: #6366f1;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    .clear-btn {
      background: transparent;
      border: 1px solid #444;
      color: #666;
      padding: 8px 16px;
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    .clear-btn:hover {
      border-color: #666;
      color: #888;
    }
    .progress-bar {
      height: 6px;
      background: #222;
      border-radius: 3px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      width: 0%;
      transition: width 0.3s ease;
    }
    .level-indicator {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧩 Gwen Game</h1>
    <p class="subtitle">Word Puzzle Challenge - Guess the hidden word!</p>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    
    <div class="level-indicator" id="levelIndicator">Level 1</div>
    
    <div class="game-area">
      <div class="word-display" id="wordDisplay">_ _ _ _ _</div>
      <div class="message" id="message"></div>
      <div class="input-area">
        <input type="text" id="guessInput" placeholder="Type your guess..." autocomplete="off">
        <button class="btn btn-primary" id="guessBtn">Guess</button>
      </div>
      <div style="text-align: center;">
        <button class="btn btn-secondary" id="hintBtn">💡 Get Hint</button>
      </div>
    </div>
    
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="guesses">0</div>
        <div class="stat-label">Guesses</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="score">0</div>
        <div class="stat-label">Score</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Streak</div>
      </div>
    </div>
    
    <div class="history">
      <div style="color: #666; font-size: 0.85rem; margin-bottom: 10px;">Guess History:</div>
      <div id="historyList"></div>
    </div>
    
    <div style="text-align: center;">
      <button class="clear-btn" id="clearHistory">Clear History</button>
      <button class="clear-btn" id="resetGame">Reset Game</button>
    </div>
    
    <div class="back-link">
      <a href="index.html">Back to Home</a>
    </div>
  </div>
  
  <script>
    // Game state
    let currentWord = '';
    let guessedLetters = new Set();
    let maxGuesses = 6;
    let currentGuess = 0;
    let score = 0;
    let streak = 0;
    let level = 1;
    let gameActive = true;
    
    // Word bank (using randomuser for diverse names)
    const wordBank = [
      'python', 'javascript', 'html', 'css', 'react', 'node', 'vue', 'angular',
      'docker', 'kubernetes', 'git', 'github', 'aws', 'azure', 'linux', 'unix',
      'server', 'database', 'api', 'json', 'xml', 'yaml', 'dockerfile', 'nginx',
      'terminal', 'command', 'script', 'function', 'variable', 'constant', 'array',
      'object', 'string', 'number', 'boolean', 'null', 'undefined', 'promise',
      'async', 'await', 'callback', 'event', 'listener', 'handler', 'module',
      'package', 'import', 'export', 'require', 'include', 'filter', 'map',
      'reduce', 'forEach', 'loop', 'iteration', 'sequence', 'pattern', 'match',
      'search', 'replace', 'split', 'join', 'concat', 'slice', 'reverse',
      'sort', 'length', 'index', 'position', 'offset', 'buffer', 'stream',
      'socket', 'network', 'protocol', 'http', 'https', 'tcp', 'udp', 'ip',
      'address', 'domain', 'host', 'port', 'path', 'file', 'folder', 'dir',
      'root', 'home', 'user', 'admin', 'guest', 'system', 'kernel', 'process',
      'thread', 'memory', 'storage', 'cache', 'disk', 'ram', 'cpu', 'gpu',
      'hardware', 'software', 'application', 'program', 'tool', 'utility',
      'feature', 'bug', 'error', 'exception', 'warning', 'alert', 'notice',
      'info', 'debug', 'trace', 'log', 'console', 'browser', 'web', 'site',
      'page', 'link', 'button', 'input', 'output', 'screen', 'display',
      'monitor', 'keyboard', 'mouse', 'trackpad', 'touchscreen', 'tablet',
      'phone', 'smartphone', 'computer', 'laptop', 'desktop', 'server',
      'router', 'switch', 'firewall', 'gateway', 'bridge', 'hub', 'modem',
      'antenna', 'cable', 'wire', 'fiber', 'satellite', 'cloud', 'data',
      'cloud', 'server', 'cluster', 'grid', 'farm', 'pool', 'queue', 'stack',
      'heap', 'buffer', 'cache', 'memory', 'storage', 'database', 'db', 'sql',
      'nosql', 'mongodb', 'postgres', 'mysql', 'sqlite', 'redis', 'elasticsearch',
      'kafka', 'rabbitmq', 'zeromq', 'grpc', 'rest', 'graphql', 'soap', 'xmlrpc',
      'jsonrpc', 'api', 'endpoint', 'route', 'controller', 'model', 'view',
      'middleware', 'plugin', 'extension', 'addon', 'theme', 'skin', 'style',
      'template', 'layout', 'component', 'widget', 'element', 'node', 'tree',
      'graph', 'network', 'mesh', 'cluster', 'grid', 'array', 'list', 'set',
      'map', 'dictionary', 'hash', 'table', 'index', 'catalog', 'registry',
      'config', 'settings', 'preferences', 'options', 'parameters', 'args',
      'flags', 'switches', 'toggles', 'controls', 'inputs', 'outputs', 'ports'
    ];
    
    // DOM elements
    const wordDisplay = document.getElementById('wordDisplay');
    const message = document.getElementById('message');
    const guessInput = document.getElementById('guessInput');
    const guessBtn = document.getElementById('guessBtn');
    const hintBtn = document.getElementById('hintBtn');
    const guessesEl = document.getElementById('guesses');
    const scoreEl = document.getElementById('score');
    const streakEl = document.getElementById('streak');
    const historyList = document.getElementById('historyList');
    const progressFill = document.getElementById('progress');
    const levelIndicator = document.getElementById('levelIndicator');
    const clearHistoryBtn = document.getElementById('clearHistory');
    const resetGameBtn = document.getElementById('resetGame');
    
    // Initialize game
    function initGame() {
      currentWord = wordBank[Math.floor(Math.random() * wordBank.length)];
      guessedLetters.clear();
      currentGuess = 0;
      gameActive = true;
      currentWord = currentWord.toLowerCase();
      
      // Update UI
      renderWord();
      updateStats();
      updateProgress();
      clearHistory();
      showMessage('Guess the word!', 'info');
      guessInput.focus();
      
      // Load previous stats from localStorage
      const savedStats = localStorage.getItem('gwenGameStats');
      if (savedStats) {
        const stats = JSON.parse(savedStats);
        score = stats.score || 0;
        streak = stats.streak || 0;
        level = stats.level || 1;
        updateStats();
      }
    }
    
    // Render the word with underscores
    function renderWord() {
      const display = currentWord.split('').map(letter => {
        if (guessedLetters.has(letter)) {
          return letter;
        }
        return '_';
      }).join(' ');
      wordDisplay.textContent = display;
    }
    
    // Update statistics display
    function updateStats() {
      guessesEl.textContent = currentGuess;
      scoreEl.textContent = score;
      streakEl.textContent = streak;
      levelIndicator.textContent = `Level ${level}`;
    }
    
    // Update progress bar
    function updateProgress() {
      const progress = (currentGuess / maxGuesses) * 100;
      progressFill.style.width = `${progress}%`;
    }
    
    // Show message
    function showMessage(text, type) {
      message.textContent = text;
      message.className = 'message ' + type;
    }
    
    // Handle guess
    function handleGuess() {
      const guess = guessInput.value.trim().toLowerCase();
      
      if (!guess) {
        showMessage('Please enter a word!', 'error');
        return;
      }
      
      if (guess.length !== currentWord.length) {
        showMessage(`Word must be ${currentWord.length} letters!`, 'error');
        return;
      }
      
      // Check if word exists in bank
      if (!wordBank.includes(guess)) {
        showMessage('That word is not in our dictionary!', 'error');
        return;
      }
      
      // Check win/loss
      if (guess === currentWord) {
        handleWin();
        return;
      }
      
      // Check for letters
      let foundLetters = false;
      for (let i = 0; i < currentWord.length; i++) {
        if (currentWord[i] === guess[i]) {
          guessedLetters.add(guess[i]);
          foundLetters = true;
        }
      }
      
      if (foundLetters) {
        showMessage('Some letters are correct!', 'success');
      } else {
        showMessage('No correct letters!', 'error');
      }
      
      currentGuess++;
      updateStats();
      updateProgress();
      renderWord();
      guessInput.value = '';
      guessInput.focus();
      
      // Check if game over
      if (currentGuess >= maxGuesses) {
        handleLoss();
      }
    }
    
    // Handle win
    function handleWin() {
      gameActive = false;
      score += 100 + (streak * 10);
      streak = 0;
      level++;
      
      // Save progress
      const stats = {
        score,
        streak,
        level
      };
      localStorage.setItem('gwenGameStats', JSON.stringify(stats));
      
      showMessage(`🎉 Correct! Word was: ${currentWord}`, 'success');
      renderWord();
      
      // Show next word after delay
      setTimeout(() => {
        initGame();
      }, 2000);
    }
    
    // Handle loss
    function handleLoss() {
      gameActive = false;
      showMessage(`❌ Game Over! Word was: ${currentWord}`, 'error');
      renderWord();
      
      // Show next word after delay
      setTimeout(() => {
        initGame();
      }, 3000);
    }
    
    // Get hint
    function getHint() {
      const hint = currentWord.charAt(0);
      showMessage(`Hint: Word starts with "${hint}"`, 'info');
    }
    
    // Clear history
    function clearHistory() {
      historyList.innerHTML = '';
    }
    
    // Add history item
    function addHistoryItem(guess, correct) {
      const item = document.createElement('div');
      item.className = 'history-item ' + (correct ? 'correct' : 'incorrect');
      item.innerHTML = `
        <span class="history-word">${guess}</span>
        <span>${correct ? '✓' : '✗'}</span>
      `;
      historyList.appendChild(item);
    }
    
    // Event listeners
    guessBtn.addEventListener('click', handleGuess);
    hintBtn.addEventListener('click', getHint);
    clearHistoryBtn.addEventListener('click', clearHistory);
    resetGameBtn.addEventListener('click', () => {
      localStorage.removeItem('gwenGameStats');
      initGame();
    });
    
    guessInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handleGuess();
      }
    });
    
    // Initialize on load
    initGame();
    
    // Usage tracking
    fetch('https://gwen-api.dearclawla1.workers.dev/db/exec', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sql: 'INSERT INTO tool_usage (tool, action, timestamp) VALUES (?, ?, ?)',
        params: [location.pathname.split('/').pop(), 'load', new Date().toISOString()]
      })
    }).catch(() => {});
  </script>
</body>
</html>
