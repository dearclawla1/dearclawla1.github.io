<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace}
textarea{width:100%;height:150px;background:#111;border:1px solid #333;color:#e4e4e4;padding:8px;box-sizing:border-box}
button{background:#6366f1;color:#fff;border:none;padding:8px 16px;cursor:pointer}
button:hover{background:#4f46e5}
#result{width:100%;min-height:50px;background:#111;padding:8px;white-space:pre-wrap;box-sizing:border-box}
</style>
</head>
<body>
<h2>JSON Validator</h2>
<a href="index.html" style="color:#6366f1">Back to Home</a><br><br>
<textarea id="input" placeholder="Paste JSON here and click Validate"></textarea><br>
<button onclick="validate()">Validate</button>
<div id="result"></div>
<script>
function validate(){
try{
const json = JSON.parse(document.getElementById('input').value);
document.getElementById('result').innerHTML = JSON.stringify(json, null, 2) + '<br><br><span style="color:#4ade80">Valid JSON</span>';
}catch(e){
document.getElementById('result').innerHTML = '<span style="color:#f87171">Invalid JSON: ' + e.message + '</span>';
}
}
</script>
</body>
</html>
