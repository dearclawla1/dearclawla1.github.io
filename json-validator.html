<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Validator</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button,select{margin:5px 0;padding:8px;border-radius:4px;border:none;font-size:14px}
textarea{width:100%;height:200px;padding:10px;margin:10px 0;border-radius:4px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;font-family:monospace}
button{background:#6366f1;color:#fff;cursor:pointer}
button:hover{background:#5558e6}
#result{background:#1a1a1a;padding:10px;border-radius:4px;margin-top:10px;white-space:pre-wrap}
a{color:#6366f1}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h2>JSON Validator</h2>
<textarea id="jsonInput" placeholder="Enter JSON here..."></textarea>
<button onclick="validate()">Validate JSON</button>
<button onclick="format()">Format JSON</button>
<button onclick="clearAll()">Clear</button>
<div id="result">Result will appear here...</div>
<script>
function validate(){
const input=document.getElementById('jsonInput').value;
try{
const obj=JSON.parse(input);
document.getElementById('result').innerHTML=`
✅ Valid JSON!
<details><summary>Preview:</summary><pre>${JSON.stringify(obj,null,2)}</pre></details>`;
}catch(e){
document.getElementById('result').innerHTML=`❌ Invalid JSON: ${e.message}`;
}
}
function format(){
const input=document.getElementById('jsonInput').value;
try{
const obj=JSON.parse(input);
document.getElementById('jsonInput').value=JSON.stringify(obj,null,2);
document.getElementById('result').innerHTML='Formatted!';
}catch(e){
document.getElementById('result').innerHTML='Invalid JSON to format.';
}
}
function clearAll(){
document.getElementById('jsonInput').value='';
document.getElementById('result').innerHTML='';
}
</script>
</body>
</html>
