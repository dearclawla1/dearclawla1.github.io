<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cron Expression Builder</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:16px}
a{color:#e4e4e4}
input,select,button{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:6px;min-width:80px;margin:4px}
button:hover{background:#2a2a2a}
textarea{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:8px;width:100%;min-height:80px;resize:vertical}
label{display:block;margin:8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:4px}
h2{margin:16px 0 8px}
</style>
</head>
<body><a href="index.html">Home</a><h2>Cron Expression Builder</h2>
<label><textarea id="cronInput" placeholder="0 0 * * * ?"></textarea></label>
<label>Second</label><select id="secOpts"><option>every</option><option>none</option><option>every2</option><option>every5</option><option>every10</option><option>every15</option><option>every30</option><option>every60</option><option>every120</option></select><input id="secVal" type="number" min="0" max="59" value="0"><input id="secOff" type="number" min="0" max="59" value="0">
<label>Minute</label><select id="minOpts"><option>every</option><option>none</option><option>every2</option><option>every5</option><option>every10</option><option>every15</option><option>every30</option></select><input id="minVal" type="number" min="0" max="59" value="0"><input id="minOff" type="number" min="0" max="59" value="0">
<label>Hour</label><select id="hourOpts"><option>every</option><option>none</option><option>every2</option><option>every3</option><option>every6</option><option>every12</option></select><input id="hourVal" type="number" min="0" max="23" value="0"><input id="hourOff" type="number" min="0" max="23" value="0">
<label>Day</label><select id="dayOpts"><option>every</option><option>none</option><option>every2</option><option>weekdays</option><option>sunday</option><option>monday</option><option>tuesday</option><option>wednesday</option><option>thursday</option><option>friday</option><option>saturday</option></select><input id="dayVal" type="number" min="1" max="31" value="*"><input id="dayOff" type="number" min="1" max="31" value="0">
<label>Month</label><select id="monthOpts"><option>every</option><option>jan</option><option>feb</option><option>mar</option><option>apr</option><option>may</option><option>jun</option><option>jul</option><option>aug</option><option>sep</option><option>oct</option><option>nov</option><option>dec</option></select><input id="monthVal" type="number" min="1" max="12" value="*"><input id="monthOff" type="number" min="1" max="12" value="0">
<div style="display:flex;gap:4px;align-items:center">
<label><input type="checkbox" id="noDayOfWeek" checked> No Day of Week</label>
<label><input type="checkbox" id="noMonth" checked> No Month</label>
</div><br>
<button onclick="build()">Build</button><button onclick="validate()">Validate</button><button onclick="reset()">Reset</button>
<label><textarea id="output" readonly></textarea></label>
<script>
function getOpt(sel,def) {return sel.options[sel.selectedIndex].text.toLowerCase()}
function getNum(id) {return document.getElementById(id).value}
function toNum(v) {return parseInt(v)||0}
function build() {
const sec=getOpt(document.getElementById('secOpts'),0)+' '+(getNum('secVal')).toString().padStart(2,'0')
const min=getOpt(document.getElementById('minOpts'),0)+' '+(getNum('minVal')).toString().padStart(2,'0')
const hour=getOpt(document.getElementById('hourOpts'),0)+' '+(getNum('hourVal')).toString().padStart(2,'0')
const day=getOpt(document.getElementById('dayOpts'),0)+' '+(getNum('dayVal')).toString().padStart(2,'0')
const month=getOpt(document.getElementById('monthOpts'),0)+' '+(getNum('monthVal')).toString().padStart(2,'0')
const dayOff=toNum(getNum('dayOff')).toString()
const monthOff=toNum(getNum('monthOff')).toString()
const out=document.getElementById('output')
out.value=`${sec} ${min} ${hour} ${day} ${month} ${dayOff} ${monthOff} ${getNum('noDayOfWeek')?'?':'1'}`
document.getElementById('cronInput').value=out.value.trim()}
function reset() {
document.getElementById('cronInput').value='0 0 * * * ?'
document.getElementById('secVal').value=0;document.getElementById('secOff').value=0
document.getElementById('minVal').value=0;document.getElementById('minOff').value=0
document.getElementById('hourVal').value=0;document.getElementById('hourOff').value=0
document.getElementById('dayVal').value='*';document.getElementById('dayOff').value=0
document.getElementById('monthVal').value='*';document.getElementById('monthOff').value=0
document.getElementById('noDayOfWeek').checked=true;document.getElementById('noMonth').checked=true
document.getElementById('output').value=''
document.getElementById('secOpts').selectedIndex=0;document.getElementById('minOpts').selectedIndex=0
document.getElementById('hourOpts').selectedIndex=0;document.getElementById('dayOpts').selectedIndex=0
document.getElementById('monthOpts').selectedIndex=0}
function validate() {
const cron=document.getElementById('cronInput').value.trim().replace(/\s+/g,' ').split(' ')
const valid=cron.length===8
const out=document.getElementById('output')
if(valid) {
out.value='Valid cron expression. Parts:'
for(let i=0;i<cron.length;i++) {
const p=cron[i];const name=['second','minute','hour','day','month','dayOfWeek','monthOffset','yearOffset'][i]
out.value+=`\n  ${name.charAt(0).toUpperCase()}+${name.slice(1)}: ${p}`
}
} else {
out.value='Invalid cron expression (expected 8 parts). Got: ' + cron.join(' ')
}
document.getElementById('secVal').value=toNum(cron[1]||0);document.getElementById('minVal').value=toNum(cron[2]||0)
document.getElementById('hourVal').value=toNum(cron[3]||0);document.getElementById('dayVal').value=cron[4]||'*'
document.getElementById('monthVal').value=cron[5]||'*';document.getElementById('output').value=out.value.trim()}
</script>
</body>
</html>
