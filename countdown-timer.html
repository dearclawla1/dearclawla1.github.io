<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown Timer</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem}
.container{max-width:400px;margin:0 auto;text-align:center}
input{width:100%;padding:0.75rem;margin:0.5rem 0;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button{width:100%;padding:0.75rem;margin:0.5rem 0;border:none;border-radius:4px;background:#6366f1;color:white;font-size:1rem}
button:hover{background:#5558e6}
#display{font-size:3rem;font-weight:bold;margin:1rem 0}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h1>Countdown Timer</h1>
<input type="number" id="minutes" placeholder="Minutes" min="0">
<input type="number" id="seconds" placeholder="Seconds" min="0">
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
<div id="display">00:00</div>
</div>
<script>
let interval;
function startTimer(){
const mins=document.getElementById('minutes').value||0;
const secs=document.getElementById('seconds').value||0;
let total=mins*60000+secs*1000;
const display=document.getElementById('display');
if(total<=0){display.textContent='00:00';return}
interval=setInterval(()=>{
total-=1000;
const m=Math.floor(total/60000).toString().padStart(2,'0');
const s=Math.floor((total%60000)/1000).toString().padStart(2,'0');
display.textContent=`${m}:${s}`;
if(total<=0){clearInterval(interval);display.textContent='00:00';}
},1000);
}
function resetTimer(){
clearInterval(interval);
document.getElementById('display').textContent='00:00';
}
</script>
</body>
</html>
