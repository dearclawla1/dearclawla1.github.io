<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e4e4e4; padding: 2rem; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; }
header { margin-bottom: 1.5rem; }
h1 { font-size: 1.8rem; color: #6366f1; margin-bottom: 0.5rem; }
.back-link { display: inline-block; color: #6366f1; text-decoration: none; font-size: 0.9rem; margin-bottom: 0.5rem; }
.back-link:hover { text-decoration: underline; }
.panel { background: #1a1a20; border: 1px solid #2d2d35; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
button { background: #6366f1; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
button:hover { background: #5558e6; }
input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid #2d2d35; border-radius: 6px; background: #0f0f12; color: #e4e4e4; font-size: 0.95rem; }
input:focus, textarea:focus, select:focus { outline: 2px solid #6366f1; border-color: #6366f1; }
input::placeholder, textarea::placeholder { color: #6b7280; }
label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #e4e4e4; }
</style>
</head>
<body>
<div class="container">
<header>
<a href="/brain" class="back-link">← Back to Brain</a>
<h1>AI Workflow Builder</h1>
<p style="color: #6b7280; font-size: 0.9rem;">Build and customize AI workflows. Press <kbd>Enter</kbd> to submit.</p>
</header>
<main>
<form id="workflowForm" onsubmit="handleWorkflowSubmit(event)">
<div class="panel">
<label for="workflowName">Workflow Name</label>
<input type="text" id="workflowName" name="workflowName" placeholder="e.g., Data Analysis Pipeline" required>
</div>
<div class="panel">
<label for="workflowType">Workflow Type</label>
<select id="workflowType" name="workflowType" required>
<option value="">Select type...</option>
<option value="classification">Classification</option>
<option value="generation">Text Generation</option>
<option value="summarization">Summarization</option>
<option value="translation">Translation</option>
<option value="sentiment">Sentiment Analysis</option>
</select>
</div>
<div class="panel">
<label for="workflowPrompt">Prompt Configuration</label>
<textarea id="workflowPrompt" name="workflowPrompt" rows="4" placeholder="Enter your custom prompt instructions here..." required></textarea>
</div>
<div class="panel">
<label for="modelSelection">AI Model</label>
<select id="modelSelection" name="modelSelection" required>
<option value="">Select model...</option>
<option value="gpt-4">GPT-4</option>
<option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
<option value="claude-3">Claude 3</option>
<option value="claude-2">Claude 2</option>
<option value="mistral-large">Mistral Large</option>
</select>
</div>
<div class="panel">
<label for="temperature">Temperature (0-1)</label>
<input type="number" id="temperature" name="temperature" min="0" max="1" step="0.1" value="0.7" required>
</div>
<div class="panel">
<button type="submit">Save Workflow</button>
</div>
</form>
</main>
</div>
<script>
function handleWorkflowSubmit(event) {
event.preventDefault();
const workflowData = {
name: document.getElementById('workflowName').value,
type: document.getElementById('workflowType').value,
prompt: document.getElementById('workflowPrompt').value,
model: document.getElementById('modelSelection').value,
temperature: document.getElementById('temperature').value
};
console.log('Workflow submitted:', workflowData);
// TODO: Implement API call to save workflow
alert('Workflow saved successfully!');
}
// Keyboard shortcut: Enter to submit
document.addEventListener('keydown', function(event) {
if (event.key === 'Enter' && event.target.tagName !== 'BUTTON') {
event.preventDefault();
const form = document.getElementById('workflowForm');
form.dispatchEvent(new Event('submit'));
}
});
</script>
</body>
</html>
