<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e4e4e4; padding: 2rem; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; }
header { margin-bottom: 1.5rem; }
h1 { font-size: 1.8rem; color: #6366f1; margin-bottom: 0.5rem; }
.back-link { display: inline-block; color: #6366f1; text-decoration: none; font-size: 0.9rem; margin-bottom: 0.5rem; }
.back-link:hover { text-decoration: underline; }
.panel { background: #1a1a20; border: 1px solid #2d2d35; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
label { display: block; margin-bottom: 0.4rem; color: #ccc; font-size: 0.9rem; }
input, textarea, select { width: 100%; padding: 0.7rem; border: 1px solid #3d3d45; border-radius: 6px; background: #25252e; color: #e4e4e4; font-size: 1rem; }
input:focus, textarea:focus, select:focus { outline: none; border-color: #6366f1; }
input::placeholder, textarea::placeholder { color: #666; }
textarea { resize: vertical; min-height: 100px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem 1.5rem; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #5558e6; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.input-group { margin-bottom: 1.2rem; }
.input-group:last-child { margin-bottom: 0; }
.error-message { color: #ef4444; font-size: 0.85rem; margin-top: 0.4rem; min-height: 1.2rem; }
.loading-spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.success-message { color: #10b981; font-size: 0.85rem; margin-top: 0.4rem; min-height: 1.2rem; }
</style>
</head>
<body>
<div class="container">
<header>
<a href=".." class="back-link">← Back to Dashboard</a>
<h1>AI Workflow Builder</h1>
</header>

<div class="panel">
<h2>Create New Workflow</h2>
<form id="workflowForm" onsubmit="saveWorkflow(event)">
<div class="input-group">
<label for="name">Workflow Name</label>
<input type="text" id="name" name="name" placeholder="e.g., Document Classifier" required>
<div class="error-message" id="nameError"></div>
</div>

<div class="input-group">
<label for="description">Description</label>
<textarea id="description" name="description" placeholder="Describe what this workflow does..." required></textarea>
<div class="error-message" id="descriptionError"></div>
</div>

<div class="input-group">
<label for="model">AI Model</label>
<select id="model" name="model" required>
<option value="">Select a model</option>
<option value="llama-3.2">Llama 3.2 (8B)</option>
<option value="mistral-7b">Mistral 7B</option>
<option value="gemma-7b">Gemma 7B</option>
<option value="phi-3">Phi-3 Mini</option>
</select>
<div class="error-message" id="modelError"></div>
</div>

<div class="input-group">
<label for="prompt">System Prompt</label>
<textarea id="prompt" name="prompt" placeholder="You are a helpful assistant..." required></textarea>
<div class="error-message" id="promptError"></div>
</div>

<div class="input-group">
<label for="parameters">Parameters (JSON)</label>
<textarea id="parameters" name="parameters" placeholder='{"temperature": 0.7, "max_tokens": 512}' required></textarea>
<div class="error-message" id="parametersError"></div>
</div>

<button type="submit" class="btn btn-primary" id="saveBtn">
<span class="btn-text">Save Workflow</span>
</button>
<div id="statusMessage"></div>
</form>
</div>

<div class="panel">
<h2>Workflow Gallery</h2>
<div id="gallery" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:1rem; margin-top:1rem;">
<!-- Workflows will be loaded here -->
</div>
</div>
</div>

<script>
let workflows = [];

async function loadWorkflows() {
const gallery = document.getElementById('gallery');
if (workflows.length === 0) {
gallery.innerHTML = '<p style="color:#666;">No workflows yet. Create one above!</p>';
return;
}
gallery.innerHTML = workflows.map(w => `
<div class="workflow-card" style="background:#25252e;border:1px solid #3d3d45;border-radius:8px;padding:1rem;">
<div style="font-weight:600;color:#6366f1;margin-bottom:0.5rem;">${escapeHtml(w.name)}</div>
<div style="color:#999;font-size:0.85rem;margin-bottom:0.5rem;">${escapeHtml(w.description.substring(0, 80))}${w.description.length > 80 ? '...' : ''}</div>
<div style="font-size:0.8rem;color:#666;">${w.model || 'No model'}</div>
<button style="margin-top:0.8rem;width:100%;padding:0.5rem;border:none;border-radius:4px;background:#3d3d45;color:#e4e4e4;cursor:pointer;" onclick="editWorkflow('${w.id}')">Edit</button>
<button style="margin-top:0.4rem;width:100%;padding:0.4rem;border:none;border-radius:4px;background:#ef4444;color:#fff;cursor:pointer;" onclick="deleteWorkflow('${w.id}')">Delete</button>
</div>
`).join('');
}

function escapeHtml(text) {
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

async function saveWorkflow(event) {
event.preventDefault();
const btn = document.getElementById('saveBtn');
const btnText = btn.querySelector('.btn-text');
const statusMsg = document.getElementById('statusMessage');
const form = event.target;

// Reset errors
[
{id: 'name', el: document.getElementById('nameError')},
{id: 'description', el: document.getElementById('descriptionError')},
{id: 'model', el: document.getElementById('modelError')},
{id: 'prompt', el: document.getElementById('promptError')},
{id: 'parameters', el: document.getElementById('parametersError')}
].forEach(({id, el}) => {
el.textContent = '';
el.className = 'error-message';
});

let isValid = true;

// Validate name
const name = form.name.value.trim();
if (!name) {
document.getElementById('nameError').textContent = 'Name is required';
document.getElementById('nameError').className = 'error-message';
isValid = false;
}

// Validate description
const description = form.description.value.trim();
if (!description) {
document.getElementById('descriptionError').textContent = 'Description is required';
document.getElementById('descriptionError').className = 'error-message';
isValid = false;
}

// Validate model
const model = form.model.value;
if (!model) {
document.getElementById('modelError').textContent = 'Select a model';
document.getElementById('modelError').className = 'error-message';
isValid = false;
}

// Validate prompt
const prompt = form.prompt.value.trim();
if (!prompt) {
document.getElementById('promptError').textContent = 'System prompt is required';
document.getElementById('promptError').className = 'error-message';
isValid = false;
}

// Validate parameters (try JSON parse)
try {
const params = JSON.parse(form.parameters.value);
if (typeof params.temperature !== 'number' || isNaN(params.temperature)) {
throw new Error('temperature must be a number');
}
if (params.temperature < 0 || params.temperature > 1) {
throw new Error('temperature must be between 0 and 1');
}
} catch (e) {
document.getElementById('parametersError').textContent = e.message || 'Invalid JSON';
document.getElementById('parametersError').className = 'error-message';
isValid = false;
}

if (!isValid) {
return;
}

// Show loading
btn.disabled = true;
btnText.innerHTML = '<span class="loading-spinner"></span> Saving...';
statusMsg.textContent = '';

// Simulate API call (replace with actual fetch)
await new Promise(r => setTimeout(r, 800));

const workflow = {
id: Date.now().toString(),
name,
description,
model,
prompt,
parameters: form.parameters.value,
createdAt: new Date().toISOString()
};

workflows.unshift(workflow);
loadWorkflows();

// Success state
btnText.textContent = 'Saved!';
statusMsg.textContent = 'Workflow created successfully!';
statusMsg.className = 'success-message';
statusMsg.style.display = 'block';

// Reset form
form.reset();

// Disable save button for 3 seconds
setTimeout(() => {
btn.disabled = false;
btnText.textContent = 'Save Workflow';
statusMsg.style.display = 'none';
}, 3000);
}

async function editWorkflow(id) {
// TODO: Implement edit functionality
alert('Edit workflow not yet implemented');
}

async function deleteWorkflow(id) {
if (!confirm('Delete this workflow?')) return;
workflows = workflows.filter(w => w.id !== id);
loadWorkflows();
}

// Load workflows on init
loadWorkflows();

// Clear errors on input
const inputs = document.querySelectorAll('input, textarea');
inputs.forEach(input => {
input.addEventListener('input', (e) => {
const errorMsg = document.getElementById(e.name + 'Error');
if (errorMsg) errorMsg.textContent = '';
});
});
</script>
</body>
</html>
