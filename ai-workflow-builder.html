<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e4e4e4; padding: 2rem; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; }
header { margin-bottom: 1.5rem; }
h1 { font-size: 1.8rem; color: #6366f1; margin-bottom: 0.5rem; }
.back-link { display: inline-block; color: #6366f1; text-decoration: none; font-size: 0.9rem; margin-bottom: 0.5rem; }
.back-link:hover { text-decoration: underline; }
.panel { background: #1a1a20; border: 1px solid #2d2d35; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
input, textarea { width: 100%; padding: 0.75rem; background: #0f0f12; border: 1px solid #2d2d35; border-radius: 4px; color: #e4e4e4; font-size: 1rem; outline: none; }
input:focus, textarea:focus { border-color: #6366f1; }
input[disabled], textarea[disabled] { opacity: 0.6; cursor: not-allowed; }
button { padding: 0.75rem 1.5rem; background: #6366f1; border: none; border-radius: 4px; color: #fff; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
button:hover { background: #5558d6; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
button.action { background: #10b981; }
button.action:hover { background: #0d966f; }
.button-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
button.reset { background: #f59e0b; }
button.reset:hover { background: #d97706; }
#output { background: #1a1a20; border: 1px solid #2d2d35; border-radius: 4px; min-height: 100px; white-space: pre-wrap; font-family: monospace; font-size: 0.9rem; padding: 1rem; margin-top: 1rem; }
#output:empty { display: none; }
.loading { opacity: 0.6; pointer-events: none; }
.loading::after { content: ' ⏳ Loading...'; display: block; margin-top: 0.5rem; color: #6366f1; }
.error { background: #7f1d1d; border-color: #b91c1c; }
.success { background: #064e3b; border-color: #059669; }
.panel-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
</style>
</head>
<body>
<div class="container">
<header>
<a href="brain.html" class="back-link">← Back to Brain</a>
<h1>AI Workflow Builder</h1>
</header>

<div class="panel-group">
<div class="panel">
<h2>Input Configuration</h2>
<div style="margin-top: 0.5rem;">
<label for="prompt">Prompt:</label>
<textarea id="prompt" placeholder="Enter your AI prompt or question..." rows="3"></textarea>
</div>
<div style="margin-top: 1rem;">
<button id="generateBtn">Generate Workflow</button>
<button id="resetBtn" class="reset">Reset</button>
</div>
<div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
<label><input type="checkbox" id="streamCheckbox"> Stream output</label>
<label><input type="checkbox" id="verboseCheckbox" checked> Verbose</label>
<label><input type="checkbox" id="elevatedCheckbox"> Elevated</label>
</div>
</div>

<div class="panel">
<h2>Output</h2>
<div id="output"></div>
</div>

<div class="panel">
<h2>Settings</h2>
<div style="margin-top: 0.5rem;">
<div style="margin-bottom: 0.5rem;">
<label for="modelSelect">Model:</label>
<select id="modelSelect" style="padding: 0.75rem; width: 100%; background: #0f0f12; border: 1px solid #2d2d35; border-radius: 4px; color: #e4e4e4; font-size: 1rem;">
<option value="default">Default</option>
</select>
</div>
</div>
<div style="margin-top: 1rem;">
<label><input type="checkbox" id="threadCheckbox" checked> Thread-bound</label>
</div>
</div>
</div>
</div>

<script>
const outputEl = document.getElementById('output');
const promptEl = document.getElementById('prompt');
const generateBtn = document.getElementById('generateBtn');
const resetBtn = document.getElementById('resetBtn');
const modelSelect = document.getElementById('modelSelect');
const streamCheckbox = document.getElementById('streamCheckbox');
const verboseCheckbox = document.getElementById('verboseCheckbox');
const elevatedCheckbox = document.getElementById('elevatedCheckbox');
const threadCheckbox = document.getElementById('threadCheckbox');

let isLoading = false;

function updateLoadingState() {
    if (isLoading) {
        generateBtn.classList.add('loading');
        generateBtn.disabled = true;
    } else {
        generateBtn.classList.remove('loading');
        generateBtn.disabled = false;
    }
}

async function generateWorkflow() {
    if (!promptEl.value.trim()) {
        outputEl.textContent = 'Error: Please enter a prompt first.';
        outputEl.classList.add('error');
        return;
    }

    isLoading = true;
    updateLoadingState();
    outputEl.textContent = '';
    outputEl.classList.remove('error', 'success');

    try {
        const response = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text: promptEl.value.trim(),
                model: modelSelect.value,
                stream: streamCheckbox.checked,
                verbose: verboseCheckbox.checked,
                elevated: elevatedCheckbox.checked,
                thread: threadCheckbox.checked
            })
        });

        if (!response.ok) {
            throw new Error('Generation failed');
        }

        const data = await response.json();
        outputEl.textContent = data.message || JSON.stringify(data);
        outputEl.classList.add('success');

    } catch (error) {
        outputEl.textContent = 'Error: ' + error.message;
        outputEl.classList.add('error');
    } finally {
        isLoading = false;
        updateLoadingState();
    }
}

function resetForm() {
    promptEl.value = '';
    outputEl.textContent = '';
    outputEl.classList.remove('error', 'success');
}

generateBtn.addEventListener('click', generateWorkflow);
resetBtn.addEventListener('click', resetForm);

// Allow Enter key to submit (only if focused on prompt)
promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generateWorkflow();
    }
});

// Handle Ctrl/Cmd+Enter
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        generateWorkflow();
    }
});
</script>
</body>
</html>
