<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0}
.container{max-width:600px;margin:40px auto;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
a{color:#6366f1;font-size:12px}
input{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;width:100%;border-radius:4px;margin-bottom:10px;font-size:14px}
h2{margin:30px 0 15px;color:#949494;font-size:18px}
h3{margin:20px 0 10px;color:#a4a4a4;font-size:16px}
.btn{background:#6366f1;color:#0a0a0a;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;margin-right:10px}
.btn-group{margin-bottom:20px}
textarea{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;width:100%;border-radius:4px;margin-bottom:10px;font-size:14px;resize:vertical}
input[type="text"]{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;width:100%;border-radius:4px;margin-bottom:10px;font-size:14px}
label{display:block;margin-bottom:5px;color:#b4b4b4;font-size:14px}
#art-preview{background:#1a1a1a;padding:20px;border-radius:4px;margin-bottom:20px;overflow:auto;max-height:300px;white-space:pre;font-family:monospace;font-size:12px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>ASCII Art Image Generator</h1>

<label for="text-input">Enter your text:</label>
<input type="text" id="text-input" placeholder="Type something here...">

<button id="generate-btn" class="btn">Generate</button>
<button id="clear-btn" class="btn">Clear</button>

<div id="art-preview"></div>

<div id="ascii-art" class="hidden">
<h2>ASCII Art Result</h2>
<textarea id="ascii-output" readonly></textarea>
<button id="copy-btn" class="btn">Copy</button>
</div>

<div id="keyboard" class="hidden">
<h2>Keyboard Shortcuts</h2>
<h3>Enter</h3>
<p>Submit the form</p>
<h3>Ctrl+C</h3>
<p>Copy result</p>
</div>

</div>

<script>
(function(){
var textInput = document.getElementById('text-input');
var generateBtn = document.getElementById('generate-btn');
var clearBtn = document.getElementById('clear-btn');
var asciiArtDiv = document.getElementById('ascii-art');
var asciiOutput = document.getElementById('ascii-output');
var keyboardDiv = document.getElementById('keyboard');
var copyBtn = document.getElementById('copy-btn');

function generateAsciiArt(text){
var ascii = '';
var words = text.split(' ').filter(function(w){return w.length>0});
var lines = [];
var line = '';
var maxWidth = 60;

words.forEach(function(word, i){
var wordAscii = word.split('').map(function(char){
if(char >= 'a' && char <= 'z') return char;
if(char >= 'A' && char <= 'Z') return char;
if(char === ' ') return ' ';
return '.';
}).join('');
var lines = wordAscii.split('');
var currentLine = '';
lines.forEach(function(lineChar, j){
if(j % 3 === 0) currentLine += lineChar;
else currentLine += ' ';
});
ascii += currentLine + '\n';
});

return ascii;
}

function reset(){
textInput.value = '';
document.getElementById('art-preview').innerHTML = '';
asciiArtDiv.classList.add('hidden');
keyboardDiv.classList.add('hidden');
}

generateBtn.addEventListener('click', function(){
var text = textInput.value.trim();
if(text.length > 0){
var ascii = generateAsciiArt(text);
asciiOutput.value = ascii;
asciiArtDiv.classList.remove('hidden');
keyboardDiv.classList.remove('hidden');
}
});

clearBtn.addEventListener('click', reset);

copyBtn.addEventListener('click', function(){
var text = asciiOutput.value;
if(text){
navigator.clipboard.writeText(text).then(function(){
alert('ASCII art copied to clipboard!');
}).catch(function(err){
console.error('Failed to copy: ', err);
});
}
});

textInput.addEventListener('keydown', function(e){
if(e.key === 'Enter'){
e.preventDefault();
generateAsciiArt(textInput.value.trim());
}
});

reset();
})();
</script>
</body>
</html>
