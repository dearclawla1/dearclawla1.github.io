<!DOCTYPE html>
<html lang="en" theme="dark">
<head>
<meta charset="UTF-8"><title>Markdown Previewer</title>
<style>
:root{--bg:#1e1e1e;--fg:#c9c9c9;--muted:#858585;--accent:#61afef;--border:#3c3c3c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,sans-serif;background:var(--bg);color:var(--fg);padding:20px;min-height:100vh}
h1{font-size:1.5rem;margin-bottom:1rem;color:var(--accent)}
.container{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:1200px;margin:0 auto;@media(max-width:768px){grid-template-columns:1fr}}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:400px}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
button{padding:8px 16px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;font-size:14px}
button:hover{opacity:0.9}
button:disabled{opacity:0.5;cursor:not-allowed;background:var(--muted)}
select{padding:8px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-size:14px}
textarea{width:100%;height:100%;border:none;resize:none;font-family:Consolas,Monaco,monospace;font-size:14px;background:transparent;color:var(--fg);outline:none}
pre{white-space:pre-wrap;font-family:Consolas,Monaco,monospace;font-size:14px;background:var(--bg);padding:16px;border-radius:8px;min-height:400px;overflow:auto;max-height:600px}
.tag{display:inline-block;background:var(--accent);color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;text-transform:uppercase;vertical-align:top;margin-top:-6px}
.back{position:absolute;top:16px;left:16px}
@media(max-width:768px){.container{grid-template-columns:1fr}}
</style>
</head>
<body>
<a href="index.html" class="back">Home</a>
<h1>Markdown Previewer</h1>
<div class="container">
<div class="panel">
<div class="toolbar">
<button class="primary" onclick="saveFile()">Save File</button>
<button onclick="clearEditor()">Clear</button>
<select id="exportFmt"><option value="md">.md</option><option value="txt">.txt</option><option value="html">.html</option></select>
<button onclick="exportMarkdown()">Export</button>
</div>
<textarea id="editor" placeholder="Type your markdown here..."></textarea>
</div>
<div class="panel">
<pre id="preview"></pre>
</div>
</div>
<script>
const md=new MarkdownIt();
document.getElementById('editor').addEventListener('input',()=>renderPreview());
function renderPreview(){const editor=document.getElementById('editor');const content=editor.value||'# Markdown Previewer\n\nStart typing...';try{document.getElementById('preview').innerHTML=md.render(content);}catch(e){console.error('Render error:',e);}document.getElementById('preview').innerHTML+='<span class="tag">Preview</span>';}
renderPreview();
function saveFile(){const editor=document.getElementById('editor');const content=editor.value;if(!content.trim()){alert('Please enter some content before saving.');return;}const fmt=document.getElementById('exportFmt').value;const blob=new Blob([content],{type:'text/'+fmt});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='document.'+fmt;a.click();URL.revokeObjectURL(url);}
function clearEditor(){const editor=document.getElementById('editor');if(confirm('Clear editor?')){editor.value='';renderPreview();}}
function exportMarkdown(){const editor=document.getElementById('editor');const content=editor.value;if(!content.trim()){alert('Please enter some content before exporting.');return;}const fmt=document.getElementById('exportFmt').value;const blob=new Blob([content],{type:'text/'+fmt});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='document.'+fmt;a.click();URL.revokeObjectURL(url);}
</script>
</body>
</html>
