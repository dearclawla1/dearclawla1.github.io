<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem}
.container{max-width:800px;margin:0 auto}
h1{color:#6366f1}
input,select,button{display:block;width:100%;margin:1rem 0;padding:0.75rem;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;border-radius:4px}
button:hover{background:#6366f1;color:#0a0a0a}
.result{background:#1a1a1a;padding:1rem;border-radius:4px;margin-top:1rem}
.error{color:#ef4444;font-size:0.875rem;margin-top:0.5rem}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1;display:inline-block;margin-bottom:1rem">Back to Home</a>
<h1>Reading Time Estimator</h1>
<label>Word Count:</label><input type="number" id="words" placeholder="e.g. 500" min="0">
<label>Reading Speed (wpm):</label><select id="speed"><option value="200">200 wpm (Average)</option><option value="300">300 wpm (Fast)</option><option value="100">100 wpm (Slow)</option></select>
<button onclick="calculate()">Estimate</button>
<div class="error" id="error" style="display:none"></div>
<div class="result" id="result" style="display:none"></div>
</div>
<script>
function calculate(){
let words=document.getElementById('words').value;
let speed=parseInt(document.getElementById('speed').value);
let error=document.getElementById('error');
let result=document.getElementById('result');
error.style.display='none';
result.style.display='none';

// Validate input
if(words===null||words===''){
error.textContent='Please enter a word count';
error.style.display='block';
return;
}
words=parseFloat(words);
if(isNaN(words)||words<0){
error.textContent='Word count must be a non-negative number';
error.style.display='block';
return;
}
if(words===0){
error.textContent='Enter a positive word count to estimate reading time';
error.style.display='block';
return;
}

// Calculate reading time
let min=Math.ceil(words/speed);
let seconds=(words/speed)*60-min*60;
let hours=Math.floor(min/60);
let remainingMin=min%60;

result.innerHTML=`<strong>${hours}h ${remainingMin}m</strong> (${min} minutes ${Math.round(seconds)} seconds)</strong> to read this text`;
result.style.display='block';
}
</script>
</body>
</html>
