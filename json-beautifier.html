<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>JSON Beautifier</title>
<style>body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
a{color:#88cc88;text-decoration:none}a:hover{text-decoration:underline}
h1{margin:0 0 10px;font-size:1.5em}.nav{margin-bottom:15px}
textarea,input{width:100%;height:150px;font-family:monospace;font-size:12px;margin:5px 0;padding:5px;border:1px solid #333;background:#111;color:#e4e4e4;border-radius:3px}
button{background:#2a5a2a;color:#e4e4e4;border:none;padding:8px 15px;margin:5px 0 0 0;border-radius:3px;cursor:pointer}
button:hover{background:#3a6a3a}</style>
</head>
<body>
<div class="nav"><a href="index.html">Home</a></div>
<h1>JSON Beautifier</h1>
<p>Paste minified JSON and click Beautify to format it with custom indentation</p>
<textarea id="input" placeholder='{"key":"value"}'></textarea>
<select id="indent" style="width:100%;margin:5px 0"><option value="2">2 spaces</option><option value="4">4 spaces</option><option value="8">8 spaces</option></select>
<div class="nav"><button onclick="beautify()">Beautify JSON</button>
<button onclick="clearAll()">Clear All</button></div>
<p id="status" style="color:#88cc88"></p>
<script>
function beautify() {
var input=document.getElementById('input').value,indent=document.getElementById('indent').value;
try {
var obj=JSON.parse(input);
document.getElementById('input').value=JSON.stringify(obj,null,indent);
document.getElementById('status').innerText='Beautified successfully!';
} catch(e) {
document.getElementById('status').innerText='Error: Invalid JSON - ' + e.message;
}
}
function clearAll() {
document.getElementById('input').value='';
document.getElementById('status').innerText='';
}
</script>
</body>
</html>
