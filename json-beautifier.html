<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px;}
a{color:#4CAF50;text-decoration:none;}
.container{max-width:800px;margin:0 auto;}
h1{color:#4CAF50;}
input,select{width:100%;padding:10px;margin:10px 0;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:4px;}
button{background:#4CAF50;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;}
button:hover{background:#45a049;}
#output{background:#1a1a1a;padding:15px;margin-top:10px;border-radius:4px;font-family:monospace;white-space:pre-wrap;word-break:break-all;}
label{display:block;margin:5px 0 0;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<div class="container">
<h1>JSON Beautifier</h1>
<label>Paste your minified JSON here:</label>
<input type="text" id="input" placeholder='{"name":"test","value":123}'><label>Indentation size (spaces):</label>
<select id="indent"><option value="2">2</option><option value="4">4</option><option value="8">8</option></select><br>
<button onclick="beautify()">Beautify JSON</button><div id="output"></div>
<script>
function beautify(){
const input=document.getElementById('input').value;
const indent=document.getElementById('indent').value;
try{
const obj=JSON.parse(input);
document.getElementById('output').textContent=JSON.stringify(obj,null,indent);
}catch(e){
document.getElementById('output').textContent='Error: '+e.message;
}
}
</script>
</div>
</body>
</html>
