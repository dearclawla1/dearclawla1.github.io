<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Priority Sorter</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,select,button{margin:5px 0;padding:5px;background:#1a1a1a;border:1px solid #6366f1;color:#e4e4e4}
button{cursor:pointer}
a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<h1>Task Priority Sorter</h1>
<input id="task" placeholder="Enter task">
<select id="priority"><option value="1">High</option><option value="2">Medium</option><option value="3">Low</option></select>
<button onclick="addTask()">Add Task</button>
<button onclick="sortTasks()">Sort Tasks</button>
<ul id="taskList"></ul>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
function addTask(){
var task=document.getElementById('task').value;
var priority=document.getElementById('priority').value;
var list=document.getElementById('taskList');
if(task){
var li=document.createElement('li');
li.innerHTML='<span style="color:#6366f1">'+priority+'</span> '+task;
list.insertBefore(li,document.getElementById('taskList').firstChild);
document.getElementById('task').value='';
}
}
function sortTasks(){
var tasks=[];
var items=document.getElementById('taskList').children;
for(var i=0;i<items.length;i++){
var text=items[i].innerHTML;
var parts=text.split(' ');
var priority=parts[0];
var task=parts.slice(1).join(' ');
tasks.push({priority:parseInt(priority),task:task});
}
tasks.sort(function(a,b){return a.priority-b.priority});
document.getElementById('taskList').innerHTML='';
tasks.forEach(function(t){
var li=document.createElement('li');
li.innerHTML='<span style="color:#6366f1">'+t.priority+'</span> '+t.task;
document.getElementById('taskList').appendChild(li);
});
}
</script>
</body>
</html>
