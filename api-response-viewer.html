<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}.container{background:#111;padding:20px;border-radius:8px;max-width:800px;width:100%;}.input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:4px;background:#222;color:#e4e4e4;}.button{background:#6366f1;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;margin:5px 0;}.output{background:#1a1a1a;padding:10px;border-radius:4px;overflow:auto;max-height:300px;}</style></head><body><div class="container"><h2>API Response Viewer</h2><input type="text" class="input" id="apiUrl" placeholder="Enter API URL (e.g., https://jsonplaceholder.typicode.com/posts/1)"><button class="button" id="fetchBtn">Fetch Response</button><div class="output" id="output"></div></div><script>document.getElementById('fetchBtn').addEventListener('click', async () => {const apiUrl = document.getElementById('apiUrl').value;if(!apiUrl){document.getElementById('output').innerHTML = '<span style="color:#ff6b6b">Please enter an API URL!</span>';return;}try{const response = await fetch(apiUrl);const data = await response.json();const output = document.getElementById('output');output.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';catch(err){output.innerHTML = '<span style="color:#ff6b6b">Error: ' + err.message + '</span>';}});</script></body></html>
