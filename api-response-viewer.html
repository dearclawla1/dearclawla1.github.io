<!DOCTYPE html><html><head><style>body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}.container{background:#111;padding:20px;border-radius:8px;max-width:800px;width:100%;}.input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:4px;background:#222;color:#e4e4e4;}.button{background:#6366f1;color:#fff;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;margin:5px 0;}.output{background:#1a1a1a;padding:15px;border-radius:4px;min-height:100px;white-space:pre-wrap;margin:15px 0;font-size:13px;}.link{color:#6366f1;text-decoration:none;margin-top:10px;}</style></head><body><div class="container"><h2>API Response Viewer</h2><input type="text" class="input" id="url" placeholder="Enter API URL (e.g., https://api.example.com/data)" value="https://jsonplaceholder.typicode.com/posts/1"><button class="button" onclick="fetchData()">Fetch Data</button><button class="button" onclick="clearOutput()">Clear</button><div class="output" id="output"></div><a href="index.html" class="link" style="color:#6366f1">Back to Home</a></div><script>async function fetchData(){try{let url=document.getElementById("url").value;let resp=await fetch(url);let data=await resp.json();document.getElementById("output").innerText="Status: "+resp.status+"\n\nData:\n"+JSON.stringify(data,null,2);}catch(e){document.getElementById("output").innerText="Error: "+e.message;}}function clearOutput(){document.getElementById("output").innerText="";}}</script></body></html>
