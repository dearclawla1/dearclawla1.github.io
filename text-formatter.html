<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{font-family:sans-serif;margin:0;padding:2rem;background:#1a1a1a;color:#eee;}
a{color:#89cff0;text-decoration:none;}
h1{color:#89cff0;}
input{background:#333;border:1px solid #555;color:#fff;padding:0.5rem;margin:0.5rem;}
textarea{background:#333;border:1px solid #555;color:#fff;padding:0.5rem;margin:0.5rem;width:100%;}
button{background:#555;color:#fff;border:none;padding:0.5rem 1rem;margin:0.5rem;cursor:pointer;}
button:hover{background:#666;}
</style>
</head>
<body>
<h1>Text Formatter</h1>
<a href="index.html">Back to Home</a>
<p>Enter your text below:</p>
<textarea id="input" rows="5"></textarea>
<p>Choose format:</p>
<select id="format">
<option value="json">JSON</option>
<option value="yaml">YAML</option>
<option value="csv">CSV</option>
</select>
<p>Click to format:</p>
<button onclick="format()">Format</button>
<p id="output"></p>
<script>
function format() {
const input = document.getElementById('input').value;
const format = document.getElementById('format').value;
let output = '';
if (format === 'json') {
try {
const obj = JSON.parse(input);
output = JSON.stringify(obj, null, 2);
} catch (e) {
output = 'Invalid JSON';
}
} else if (format === 'yaml') {
try {
const obj = JSON.parse(input);
output = yamlToJson(obj);
} catch (e) {
output = 'Invalid YAML';
}
} else if (format === 'csv') {
try {
const arr = JSON.parse(input);
if (Array.isArray(arr) && arr.length > 0) {
const headers = Object.keys(arr[0]);
let csv = headers.join(',') + '\n';
arr.forEach(row => {
const values = headers.map(h => {
const v = row[h];
return v != null ? `"${v}"` : '';
});
csv += values.join(',') + '\n';
});
output = csv;
} else {
output = 'Invalid CSV structure';
}
} catch (e) {
output = 'Invalid CSV';
}
}
document.getElementById('output').innerText = output;
}
function yamlToJson(obj) {
return 'yaml:' + JSON.stringify(obj).replace(/"/g, "'").replace(/{/g, '{').replace(/}/g, '}').replace(/:/g, ':');
}
</script>
</body>
</html>
