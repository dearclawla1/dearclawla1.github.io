<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Response Validator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#1a1a2e;color:#eee;padding:20px}
.container{max-width:700px;margin:0 auto}
h1{margin-bottom:20px;color:#fff}
input,select,button{width:100%;padding:12px;margin:10px 0;border-radius:6px;border:none}
input:focus{outline:2px solid #54aaff}
textarea{width:100%;min-height:120px;padding:12px;margin:10px 0;border-radius:6px;border:1px solid #333;background:#16162a;color:#ddd}
#result{background:#16162a;padding:15px;border-radius:6px;margin-top:15px;border-left:4px solid #00ff88}
.error{border-left-color:#ff4444}
.success{border-left-color:#00ff88}
#schemaSelect option{background:#16162a;color:#fff}
label{display:block;margin:5px 0 5px}
</style>
</head>
<body>
<div class="container">
<h1>🔍 API Response Validator</h1>
<label>API Response:</label>
<textarea id="response" placeholder='{"status":"ok","data":{"id":1,"name":"Test"}}'></textarea>
<label>Select Schema:</label>
<select id="schemaSelect">
<option value="simple">Simple Object Schema</option>
<option value="nested">Nested Object Schema</option>
<option value="array">Array Schema</option>
</select>
<button id="validateBtn" style="background:#54aaff;color:#1a1a2e;font-weight:bold;">Validate Response</button>
<div id="result">Paste your API response and choose a schema to validate.</div>
</div>
<script>
const schemas = {
simple:{type:"object",properties:{status:{type:"string"},data:{type:"object",properties:{id:{type:"number"},name:{type:"string"}}}},required:["status","data"]},
nested:{type:"object",properties:{status:{type:"string"},data:{type:"object",properties:{id:{type:"number"},name:{type:"string"},count:{type:"number"}}}},required:["status","data"]},
array:{type:"array",items:{type:"object",properties:{id:{type:"number"},name:{type:"string"}}}},required:[]}
};
document.getElementById("validateBtn").addEventListener("click",async()=>{
const response=document.getElementById("response").value.trim();
const selectedType=document.getElementById("schemaSelect").value;
const result=document.getElementById("result");
try{
const data=JSON.parse(response);
const schema=schemas[selectedType];
const valid=validateAgainstSchema(data,schema);
result.className=valid?"success":"error";
result.innerHTML=valid?`✓ <strong>Valid</strong> against ${selectedType.toUpperCase()} schema`:`✗ <strong>Invalid</strong> - Missing required fields or type mismatch`;
}catch(e){
result.className="error";
result.innerHTML=`✗ <strong>Invalid JSON</strong>: ${e.message}`;
}
});
function validateAgainstSchema(data,schema){
try{
if(schema.type!=="any"&&typeof data!==(schema.type==="object"?[typeof Object.prototype.isPrototypeOf]:"string")) return false;
for(const req of schema.required){
if(!data.hasOwnProperty(req)) return false;
}
return true;
}catch{return false;
}
}
</script>
</body>
</html>
