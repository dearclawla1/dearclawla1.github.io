<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0}
.container{max-width:600px;margin:40px auto;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
a{color:#6366f1;font-size:12px}
input{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;width:100%;border-radius:4px;margin-bottom:10px;font-size:14px}
h2{margin:30px 0 15px;color:#949494;font-size:18px}
h3{margin:20px 0 10px;color:#a4a4a4;font-size:16px}
.btn{background:#6366f1;color:#e4e4e4;border:none;padding:10px 20px;border-radius:4px;cursor:pointer}
.btn:hover{background:#5558ff}
input::placeholder{color:#6366f1;opacity:0.6}
</style>
</head>
<body>
<div class="container">
<h1>ASCII Art Image Generator</h1>
<h2>Enter your text to generate ASCII art</h2>
<input type="text" id="textInput" placeholder="Type something here..." autocomplete="off">
<button class="btn" id="generateBtn">Generate</button>
<a href="#" id="clearBtn">Clear</a>
</div>
<script>
document.getElementById('generateBtn').addEventListener('click', function() {
    var text = document.getElementById('textInput').value;
    if (text.trim() === "") {
        alert("Please enter some text!");
        return;
    }
    console.log("Generating ASCII art for: " + text);
    // TODO: Implement ASCII art generation
    document.getElementById('textInput').value = "";
});
document.getElementById('clearBtn').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('textInput').value = "";
    document.getElementById('generateBtn').blur();
});
document.getElementById('textInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('generateBtn').click();
    }
});
</script>
</body>
</html>
