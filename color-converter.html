<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px;}
a{color:#e4e4e4;text-decoration:none;}
a:hover{text-decoration:underline;}
.container{max-width:800px;margin:0 auto;background:#1a1a1a;padding:20px;border-radius:8px;}
h1{margin:0 0 15px;font-size:24px;}
input,button{margin:5px 0;padding:8px 12px;border:1px solid #3a3a3a;border-radius:4px;background:#1a1a1a;color:#e4e4e4;font-size:14px;}
button:hover{background:#333;}
.hex-input{width:60px;}
.color-display{background:#222;border-radius:4px;}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:15px;}
.label{font-size:12px;color:#888;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<div class="container">
<h1>Color Converter</h1>
<input type="text" id="hexInput" placeholder="#FF0000" class="hex-input">
<button onclick="convert()">Convert</button>
<div id="error" style="color:#ff6b6b;font-size:12px;display:none;"></div>
<div id="result" class="result-grid" style="display:none;">
<div class="color-display"><input type="color" id="colorPicker" onchange="updateFromColor()" style="width:100%;height:40px;border:none;"></div>
<div><span class="label">HEX:</span><span id="hexOut"></span></div>
<div><span class="label">RGB:</span><span id="rgbOut"></span></div>
<div><span class="label">HSV:</span><span id="hsvOut"></span></div>
</div>
<script>
function hexToRgb(hex){let h=hex.replace('#','');let r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);return{r,g,b};}
function rgbToHsv(r,g,b){let cmax=Math.max(r,g,b),cmin=Math.min(r,g,b),delta=cmax-cmin;let h, s,v= cmax/255;if(delta===0){h=0;s=0;}else{const red=(g-b)/(cmax-cmin);const green=(b-r)/(cmax-cmin);const blue=(r-g)/(cmax-cmin);s= (cmax===r?blue:cmax===g?red:green);}v/=2;if(v===0){h=0;}else{h= s===0? 0: (cmax===r?(60*Math.acos(red))+120:(cmax===g?60*(Math.acos(red))-120:60*(-Math.acos(red))+240))/60;s=v*(delta/cmax);}return{h:Math.round(h*100), s:Math.round(s*100), v:Math.round(v*100)};}
function convert(){let hex=document.getElementById('hexInput').value.trim();let err=document.getElementById('error');let res=document.getElementById('result');let pick=document.getElementById('colorPicker');let hexO=document.getElementById('hexOut');let rgbO=document.getElementById('rgbOut');let hsvO=document.getElementById('hsvOut');if(hex!=='')try{let{r,g,b}=hexToRgb(hex);hexO.textContent=hex.toUpperCase();rgbO.textContent=`rgb(${r},${g},${b})`;let{h,s,v}=rgbToHsv(r,g,b);hsvO.textContent=`hsv(${h},${s},${v})`;res.style.display='grid';err.style.display='none';pick.value=`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}catch(e){err.textContent='Invalid hex color';err.style.display='block';res.style.display='none';}}
function updateFromColor(){let hex= document.getElementById('colorPicker').value;if(hex==='')return;try{let{r,g,b}=hexToRgb(hex);document.getElementById('hexInput').value='#'+hex.toUpperCase();convert();}catch(e){}}
document.getElementById('hexInput').addEventListener('keyup',convert);
</script>
</body>
</html>
