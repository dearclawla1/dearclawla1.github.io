<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;box-sizing:border-box;}
h1{margin:0 0 15px;font-size:1.4em;}
a{color:#8af;font-size:0.9em;}
.container{max-width:700px;margin:0 auto;}
.controls{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;}
input,button,select{padding:8px 12px;font-family:inherit;font-size:1em;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;}
button:hover{background:#333;}
#hexPreview{font-family:monospace;font-size:1.2em;}
.hexPreview{background:#2a2a2a;padding:10px;border-radius:4px;text-align:center;margin:10px 0;}
</style>
</head>
<body>
<div class="container">
<a href="index.html">Home</a>
<h1>Color Converter</h1>
<div class="controls">
<input type="text" id="hexInput" value="#FF5733" placeholder="Enter HEX color (e.g., #FF5733)">
<button onclick="convertToHex()">HEX</button>
<button onclick="convertToRgb()">RGB</button>
<button onclick="convertToHsv()">HSV</button>
</div>
<div class="hexPreview">
<span>HEX: <span id="hexDisplay">#FF5733</span></span>
</div>
<div class="hexPreview">
<span>RGB: <span id="rgbDisplay">255, 87, 51</span></span>
</div>
<div class="hexPreview">
<span>HSV: <span id="hsvDisplay">276°, 79%, 51%</span></span>
</div>
</div>
<script>
function rgbToHex(r,g,b){const c=(c)=>c.toString(16).padStart(2,'0');return'#'+c(r)+c(g)+c(b);}
function hexToRgb(hex){const hex=hex.slice(1);return{r:parseInt(hex.slice(0,2),16),g:parseInt(hex.slice(2,4),16),b:parseInt(hex.slice(4,6),16)};}
function hexToHsv(hex){const rgb=hexToRgb(hex);const r=rgb.r/255,g=rgb.g/255,b=rgb.b/255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;const h=d?((max===r?(g-b)/d:(max===g?(2+b-r)/d:(2+r-g)/d))):0;const s=d/max,v=max;return{h:Math.floor(h*360),s:Math.floor(s*100),v:Math.floor(v*100)};}
function hsvToRgb(hsv){const h=hsv.h/360,s=s/100,v=v/100;let r,g,b;if(s===0){r=g=b=v}else{const hh=h<1/6?h:hh<1/2?h+1/6:hh<2/3?h-1/6:hh-1/3;const p=v*(1-s);const q=v*(1-s*hh);const t=v*(1-s*(1-hh));r=s>=1?1:hh>=1/6?r:g>=1?g:1>=r?r:t}else{r=hsvToHex(hsv).slice(1).match(/.{1,2}/g).map(c=>parseInt(c,16));}}
function updateDisplay(){const hex=document.getElementById('hexInput').value.trim();let h='';let rgb='';let hsv='';if(/^#?[0-9A-F]{6}$/.test(hex)){const rgb=hexToRgb(hex);const hsv=hexToHsv(hex);h='#'+hex.slice(1);rgb=rgb.r+','+rgb.g+','+rgb.b;hsv=hsv.h+'° '+hsv.s+'% '+hsv.v+'%'}document.getElementById('hexDisplay').innerText=h;document.getElementById('rgbDisplay').innerText=rgb;document.getElementById('hsvDisplay').innerText=hsv;}
document.getElementById('hexInput').oninput=updateDisplay;
convertToHex();
function convertToHex(){const rgb=document.getElementById('rgbInput').value.trim();if(!rgb)return;const rgbParts=rgb.split(',').map(c=>parseInt(c.trim(),16));const hex=rgbToHex(rgbParts[0],rgbParts[1],rgbParts[2]);document.getElementById('hexInput').value=hex;updateDisplay();}
function convertToRgb(){const hsv=document.getElementById('hsvInput').value.trim();if(!hsv)return;const hsvParts=hsv.split(',').map(c=>parseInt(c.trim(),16));const rgb=hsvToRgb(hsvParts[0],hsvParts[1],hsvParts[2]);document.getElementById('rgbInput').value=rgb;updateDisplay();}
function convertToHsv(){const rgb=document.getElementById('rgbInput').value.trim();if(!rgb)return;const rgbParts=rgb.split(',').map(c=>parseInt(c.trim()));const hsv=hexToHsv(rgbToHex(rgbParts[0],rgbParts[1],rgbParts[2]));document.getElementById('hsvInput').value=hsv;updateDisplay();}
</script>
</body>
</html>
