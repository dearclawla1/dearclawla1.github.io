<!DOCTYPE html>
<html lang="en">
<head><title>Color Converter</title>
<meta charset="utf-8">
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,sans-serif;margin:0;padding:20px;}
a{color:#4ec9b0;text-decoration:none;}
a:hover{text-decoration:underline;}
h1{margin:0 0 10px;font-size:1.4em;color:#ff79c6;}
#result{font-size:1.2em;background:#232323;padding:10px;border-radius:5px;margin:15px 0;}
input,select{background:#1a1a1a;color:#e4e4e4;border:1px solid #444;padding:6px;margin:5px 10px;border-radius:4px;font-size:1em;}
button{background:#44475a;color:#f8f8f2;padding:6px 12px;border:none;border-radius:4px;cursor:pointer;}
button:hover{background:#6272a4;}
#hex,#rgb,#hsv{display:flex;align-items:center;gap:10px;}
label{color:#8be9fd;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h1>Color Converter</h1>
<div id="result"></div>
<label>Color:</label>
<input type="color" id="colorPicker" value="#ff0000">
<div id="hex"><input id="hexInput" value="#ff0000"></div>
<div id="rgb"><input id="rgbInput" value="255,0,0"></div>
<div id="hsv"><input id="hsvInput" value="0,100,100"></div>
<button onclick="convert()">Convert</button>
<button onclick="copy()">Copy HEX</button>
<script>
function h2i(h){return parseInt(h.slice(1),16);function c2n(c){return parseInt(c.slice(1),16);function c2n(c){return parseInt(c.slice(1),16);}function hex2rgb(hex){let h=hex.replace('#','').padEnd(6,'0');return[{r:parseInt(h.slice(0,2),16)},g:parseInt(h.slice(2,4),16)],b:parseInt(h.slice(4,6),16)]};function rgb2hex(r,g,b){return'#'+((r|0).toString(16).padStart(2,'0')+(g|0).toString(16).padStart(2,'0')+(b|0).toString(16).padStart(2,'0')).toUpperCase()};function rgb2hsv(r,g,b){r/=255;g/=255;b/=255;let max=Math.max(r,g,b);let min=Math.min(r,g,b);let h=0,s=0,v=Math.max(max,1);let d=max-min;v=+v;let l=(max+min)/2;if(d===0){h=0;s=0;}else{let rc=(max!==r && max!==g)?2*(min-r)/(max-min):((max!==r)?3*(min-g)/(max-min):4*(min-b)/(max-min));h=+rc;switch(max){case r:h/=6;s=1-l;}else{case g:h+=2;s=1-l}h=+h;s=+s;h=Math.round(h*100);s=Math.round(s*100);v=Math.round(v*100)}};function hsv2rgb(h,s,v){h/=100;s/=100;v/=100;let c=v*s;let x=c*(1-((h%60)/60));let m=v-c;let r=0,g=0,b=0;let ih=Math.floor(h/60);switch(ih){case 0:r=+c;g=+x;b=+0;case 1:r=+x;g=+c;b=+0;case 2:r=+0;g=+c;b=+x;case 3:r=+0;g=+x;b=+c;case 4:r=+x;g=+0;b=+c;case 5:r=+c;g=+0;b=+x}};function parseColor(s){s=s.trim();if(!s){return null}if(s.startsWith('#')){return hex2rgb(s.slice(1))}if(/^(\d{1,3},\s?\d{1,3},\s?\d{1,3})$/.test(s)){let p=s.split(',').map(Number);return{r:p[0],g:p[1],b:p[2]}}if(/^(\d{1,2},\s?\d{1,2},\s?\d{1,2})$/.test(s)){let p=s.split(',').map(Number);return{r:p[0],g:p[1],b:p[2]}}}function convertColor(hex){let rgb=parseColor(hex);if(!rgb){return null}let hsl=rgb2hsv(rgb.r,rgb.g,rgb.b);return`HSL(${hsl.h},${hsl.s}%,${hsl.v}%)`}}let colorPicker=document.getElementById('colorPicker');let hexInput=document.getElementById('hexInput');let rgbInput=document.getElementById('rgbInput');let hsvInput=document.getElementById('hsvInput');let result=document.getElementById('result');function updateDisplay(){let hex=colorPicker.value;hexInput.value=hex;let rgb=parseColor(hex);if(rgb){rgbInput.value=`${rgb.r},${rgb.g},${rgb.b}`;let hsv=rgb2hsv(rgb.r,rgb.g,rgb.b);hsvInput.value=`${hsv.h},${hsv.s},${hsv.v}`}}colorPicker.addEventListener('input',updateDisplay);hexInput.addEventListener('input',function(){let h=this.value;let rgb=parseColor(h);if(rgb){colorPicker.value=rgb2hex(rgb.r,rgb.g,rgb.b)}else{colorPicker.value='#ff0000'}});rgbInput.addEventListener('input',function(){let rgb=this.value.split(',').map(Number);if(rgb.length===3){let hex=rgb2hex(rgb[0],rgb[1],rgb[2]);colorPicker.value=hex}});hsvInput.addEventListener('input',function(){let hsv=this.value.split(',').map(Number);if(hsv.length===3){let rgb=hsv2rgb(hsv[0],hsv[1],hsv[2]);let hex=rgb2hex(rgb.r,rgb.g,rgb.b);colorPicker.value=hex}});updateDisplay();function convert(){let h=hexInput.value;let hsl=convertColor(h);if(hsl){result.innerHTML=`HSL(${hsl})`}else{result.innerHTML='Invalid color'}}function copy(){let hex=hexInput.value;navigator.clipboard.writeText(hex).then(()=>alert('Copied to clipboard!'))}</script>
</body>
</html>
