<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#e4e4e4;text-decoration:none;}
h1{color:#4caf50;}
#search{margin-top:20px;}
input{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:8px;border-radius:3px;}
button{background:#4caf50;border:none;color:#0a0a0a;padding:10px 20px;border-radius:3px;cursor:pointer;font-weight:bold;}
#repos{margin-top:20px;}
.repo{background:#1a1a1a;border:1px solid #333;padding:15px;margin:10px 0;border-radius:5px;}
.repo a{color:#4caf50;}
</style>
</head>
<body>
<a href="index.html">Home</a><h1>GitHub Topic Repos</h1>
<div id="search"></div>
<div id="repos"></div>
<script>
async function searchTopics() {
try{
let topic = document.getElementById('topicInput').value;
if(!topic)return;
let res = await fetch('https://api.github.com/search/repositories?q=top:' + topic + '&sort=created&order=desc&per_page=5');
let data = await res.json();
data.items.forEach(r => {
let div = document.createElement('div');
div.className = 'repo';
div.innerHTML = '<strong>' + r.name + '</strong><br><small>' + r.description + '</small><br><a href="' + r.html_url + '" target="_blank">View on GitHub</a>';
document.getElementById('repos').appendChild(div);
});
}catch(e){console.error(e);}
}
</script>
<div id="topicInput"></div>
<button onclick="searchTopics()">Search Repos</button>
<input id="topicInput" type="text" placeholder="Enter topic (e.g. javascript)">
</body>
</html>
