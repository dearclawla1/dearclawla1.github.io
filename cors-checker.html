<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORS Checker</title>
<style>
*{box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:'Segoe UI',system-ui,sans-serif;margin:0;padding:2rem;min-height:100vh;display:flex;flex-direction:column;gap:1rem}
.container{max-width:800px;margin:0 auto;width:100%}
h2{margin:0;color:#6366f1;font-size:1.5rem;text-align:center}
.form-group{display:flex;flex-direction:column;gap:0.5rem;margin:0.5rem 0}
label{font-weight:600;color:#a3a3a3;font-size:0.9rem}
input,select,button{background:#1a1a1a;border:1px solid #6366f1;color:#e4e4e4;padding:0.75rem 1rem;margin:0;font-size:1rem;border-radius:6px;transition:all 0.2s}
input,select,button:hover{border-color:#8b8cf9;box-shadow:0 0 10px rgba(99,102,241,0.3)}
input,select,button:focus{outline:2px solid #6366f1;outline-offset:2px}
button{cursor:pointer;font-weight:600}
button:disabled{opacity:0.5;cursor:not-allowed}
#status{background:#1a1a1a;border:1px solid #6366f1;padding:0.75rem;border-radius:6px;font-weight:600}
#headers{background:#1a1a1a;border:1px solid #6366f1;padding:0.75rem;border-radius:6px;white-space:pre-wrap;font-family:monospace;font-size:0.85rem;max-height:300px;overflow-y:auto}
.copy-btn{background:#6366f1;color:#0a0a0a;border:none;padding:0.5rem 1rem;border-radius:6px;font-weight:600;cursor:pointer;margin-top:0.5rem;transition:all 0.2s}
.copy-btn:hover{background:#8b8cf9}
.copy-btn:active{transform:scale(0.98)}
.copy-btn.copied{background:#10b981}
.link{color:#6366f1;text-decoration:none;font-size:0.9rem}
.link:hover{text-decoration:underline}
.error{color:#ef4444;background:#1a1a1a;border:1px solid #ef4444;padding:0.75rem;border-radius:6px;font-weight:600}
.success{color:#10b981;background:#1a1a1a;border:1px solid #10b981;padding:0.75rem;border-radius:6px;font-weight:600}
@media(max-width:600px){body{padding:1rem}h2{font-size:1.25rem}input,select,button{padding:0.6rem 0.8rem;font-size:0.9rem}}
</style>
</head>
<body>
<div class="container">
<h2>CORS Checker</h2>
<div class="form-group">
<label>Origin:</label>
<input type="text" id="origin" placeholder="https://example.com" autocomplete="off">
</div>
<div class="form-group">
<label>Method:</label>
<select id="method">
<option>GET</option>
<option>POST</option>
<option>PUT</option>
<option>DELETE</option>
<option>OPTIONS</option>
</select>
</div>
<button onclick="check()" id="check-btn">Check</button>
<div class="form-group">
<label>Status:</label>
<span id="status">Ready</span>
</div>
<div class="form-group">
<label>Headers:</label>
<pre id="headers">Click "Check" to fetch headers...</pre>
<button class="copy-btn" onclick="copyHeaders()" id="copy-btn" style="display:none">Copy Headers</button>
</div>
<a href="index.html" class="link">Back to Home</a>
</div>
<script>
let headersData = '';
async function check() {
const origin = document.getElementById('origin').value;
const method = document.getElementById('method').value;
const statusEl = document.getElementById('status');
const headersEl = document.getElementById('headers');
const copyBtn = document.getElementById('copy-btn');
if(!origin) {
statusEl.innerHTML = '<span class="error">Enter origin URL</span>';
return
}
statusEl.innerHTML = '<span style="color:#f59e0b">Loading...</span>';
headersEl.innerHTML = '';
copyBtn.style.display = 'none';
try {
const res = await fetch(origin, {
method,
headers:{'Origin':origin}
});
headersData = Object.fromEntries(res.headers.entries());
statusEl.innerHTML = `<span class="success">Status: ${res.status} ${res.statusText}</span>`;
headersEl.textContent = JSON.stringify(headersData,null,2);
copyBtn.style.display = 'block';
} catch(e) {
statusEl.innerHTML = `<span class="error">Error: ${e.message}</span>`;
headersEl.textContent = '';
}
}
function copyHeaders() {
if(!headersData) return;
navigator.clipboard.writeText(JSON.stringify(headersData,null,2)).then(() => {
const btn = document.getElementById('copy-btn');
btn.textContent = 'Copied!';
btn.classList.add('copied');
setTimeout(() => {
btn.textContent = 'Copy Headers';
btn.classList.remove('copied');
}, 2000);
}).catch(err => {
statusEl.innerHTML = '<span class="error">Failed to copy headers</span>';
});
}
document.getElementById('origin').addEventListener('keydown', (e) => {
if(e.key === 'Enter') check();
});
document.getElementById('method').addEventListener('change', (e) => {
if(e.target.value) check();
});
</script>
</body>
</html>
