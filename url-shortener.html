<!DOCTYPE html>
<html>
<head><style>
body{margin:0;background:#0a0a0a;color:#e4e4e4;font-family:sans-serif}
.container{max-width:600px;margin:0 auto;padding:20px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:4px;border:none}
input{background:#1a1a1a;color:#e4e4e4;border:1px solid #333}
button{background:#6366f1;color:#fff;font-weight:600}
button:hover{background:#5558f3}
#result{margin-top:20px;padding:15px;background:#1a1a1a;border-radius:4px;display:none}
a{color:#6366f1;text-decoration:none;font-size:12px}
</style></head>
<body>
<div class="container">
<h2>URL Shortener</h2>
<input type="url" id="url" placeholder="Enter URL (e.g., https://example.com)" required>
<button onclick="shorten()">Shorten URL</button>
<div id="result"></div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
</div>
<script>
function shorten(){
const url=document.getElementById('url').value;
if(!url){alert('Please enter a URL');return}
const shortUrl=btoa(url).substring(0,20)+'?'+Date.now();
document.getElementById('result').style.display='block';
document.getElementById('result').innerHTML='<strong>Shortened URL:</strong> '+shortUrl+'<br><a href="'+shortUrl+'" target="_blank">Open Short URL</a>';
}
</script>
</body>
</html>
