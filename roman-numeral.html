<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px;}
.container{max-width:600px;margin:0 auto;}
h1{text-align:center;font-size:1.5em;}
nav{margin-bottom:20px;text-align:center;}
a{color:#6366f1;text-decoration:none;}
.input-group{margin:15px 0;}
label{display:block;margin-bottom:5px;}
input,select{width:100%;padding:10px;font-size:1em;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:4px;}
button{width:100%;padding:12px;font-size:1em;background:#6366f1;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-top:10px;}
button:hover{background:#5558ff;}
#result{background:#1a1a1a;padding:15px;border-radius:4px;margin-top:15px;min-height:50px;font-family:monospace;font-size:1.1em;}
#error{background:#8a1c1c;color:#fff;padding:10px;border-radius:4px;margin-top:10px;display:none;}
</style>
</head>
<body>
<div class="container">
<nav><a href="index.html">Home</a></nav>
<h1>Roman Numeral Converter</h1>
<div class="input-group">
<label>Enter Arabic Number:</label>
<input type="number" id="arabic" placeholder="e.g., 99" min="1" max="3999">
</div>
<div class="input-group">
<label>Or Enter Roman Numeral:</label>
<input type="text" id="roman" placeholder="e.g., MCMLXXXIX" maxlength="15">
</div>
<button onclick="convert()" id="convertBtn">Convert</button>
<div id="result"></div>
<div id="error"></div>
</div>
<script>
function toRoman(num){
const vals=[1000,900,500,400,100,90,50,40,10,9,5,4,1];
const syms=["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"];
let roman="",i=0;
while(num>0){
while(num>=vals[i]){
roman+=syms[i];
num-=vals[i];
}
i++;
}
return roman;
}
function toArabic(str){
const map={"I":1,"V":5,"X":10,"L":50,"C":100,"D":500,"M":1000};
let roman=str.toUpperCase().replace(/[^IVXLCDM]/g,""), arabic=0, prev=0, num=0;
for(let i=roman.length-1;i>=0;i--){
let curr=map[roman[i]];
if(curr>=prev){
num+=curr;
}
else{
num-=curr;
}
prev=curr;
}
return num;
}
function convert(){
let arabicEl=document.getElementById("arabic");
let romanEl=document.getElementById("roman");
let resultEl=document.getElementById("result");
let errorEl=document.getElementById("error");
let result="";
if(arabicEl.value){
let num=parseInt(arabicEl.value);
if(num<1||num>3999){
errorEl.textContent="Please enter a number between 1 and 3999";
errorEl.style.display="block";
resultEl.textContent="";
errorEl.style.display="block";
return;
}
errorEl.style.display="none";
resultEl.textContent="Roman Numeral: " + toRoman(num);
}
else if(romanEl.value){
let str=romanEl.value.replace(/[^IVXLCDM]/g,"");
if(!str){
errorEl.textContent="Please enter a valid Roman numeral";
errorEl.style.display="block";
resultEl.textContent="";
return;
}
try{
let num=toArabic(str);
errorEl.style.display="none";
resultEl.textContent="Arabic Number: " + num;
}
catch{
errorEl.textContent="Invalid Roman numeral. Use uppercase I,V,X,L,C,D,M";
errorEl.style.display="block";
resultEl.textContent="";
}
}
else{
errorEl.textContent="Please enter a number or Roman numeral";
errorEl.style.display="block";
resultEl.textContent="";
}
}
</script>
</body>
</html>
