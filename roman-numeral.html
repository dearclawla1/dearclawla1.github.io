<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roman Numeral Converter</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
a{color:#6366f1;text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto}
h1{margin-top:0}
input{width:100%;padding:12px;font-size:16px;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#e4e4e4}
button{width:100%;padding:12px;font-size:16px;background:#6366f1;border:none;border-radius:6px;color:#fff;margin:10px 0 cursor:pointer}
button:hover{background:#5558ff}
.result{background:#1a1a1a;padding:15px;border-radius:6px;border:1px solid #333;font-size:18px}
input[type="number"]{text-align:center}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Home</a>
<div class="container">
<h1>Roman Numeral Converter</h1>
<input type="number" id="inputNum" placeholder="Enter Arabic number">
<button onclick="convert()">Convert to Roman</button>
<input type="text" id="inputRoman" placeholder="Enter Roman numeral">
<button onclick="convertReverse()">Convert to Arabic</button>
<div class="result" id="result"></div>
</div>
<script>
function toRoman(num){
if(num<=0||num>3999)return"Invalid range (1-3999)";
let m=[1000,900,500,400,100,90,50,40,10,9,5,4,1],n=["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"];
let res="",i=0;
while(num>0){
while(num>=m[i]){res+=n[i];num-=m[i]}i++}
return res
}
function toArabic(str){
let valid=/^M?C?D?C?XL?X?IX?V?IV?I?$/;
if(!valid.test(str))return"Invalid Roman numeral";
let val={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
let sum=0,prev=0;
for(let i=str.length-1;i>=0;i--){sum+=val[str[i]];if(sum>prev*9)sum-=prev*10;prev=val[str[i]]}
return sum
}
function convert(){let r=document.getElementById("result");r.innerText="Roman: "+toRoman(parseInt(document.getElementById("inputNum").value||"0"))}
function convertReverse(){let r=document.getElementById("result");r.innerText="Arabic: "+toArabic(document.getElementById("inputRoman").value||"")}</script>
</body>
</html>
