<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Font-Manager</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
h1{color:#6366f1;margin:0 0 15px}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
input,select,button{padding:8px 12px;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button{cursor:pointer;border-color:#6366f1}
button:hover{background:#2a2a2a}
.preview{border:1px solid #333;border-radius:8px;padding:15px;background:#111;min-height:100px}
.back{color:#6366f1;text-decoration:none;font-size:12px}
</style>
</head>
<body>
<h1>Font-Manager</h1>
<a href="index.html" class="back">Back to Home</a>
<div class="controls">
<select id="fontSelect"><option value="Arial">Arial</option><option value="Times New Roman">Times New Roman</option><option value="Courier New">Courier New</option><option value="Verdana">Verdana</option><option value="Georgia">Georgia</option><option value="Palatino Linotype">Palatino Linotype</option><option value="Bookman Old Style">Bookman Old Style</option><option value="Comic Sans MS">Comic Sans MS</option><option value="Trebuchet MS">Trebuchet MS</option><option value="Impact">Impact</option><option value="Lucida Console">Lucida Console</option><option value="Lucida Sans Unicode">Lucida Sans Unicode</option><option value="MS Gothic">MS Gothic</option><option value="MS Mincho">MS Mincho</option><option value="SimSun">SimSun</option><option value="SimHei">SimHei</option><option value="SimKai">SimKai</option></select>
<input type="text" id="textInput" placeholder="Enter text to preview..." value="Font Preview">
<button onclick="updatePreview()">Preview</button>
<button onclick="copyFont()">Copy Font</button>
</div>
<div class="preview" id="preview">
<span id="fontDisplay">Arial</span>
</div>
<script>
function updatePreview(){
const font=document.getElementById('fontSelect').value;
const text=document.getElementById('textInput').value;
document.getElementById('fontDisplay').innerHTML=`<span style="font-family:${font}">${text}</span>`;
}
function copyFont(){
const font=document.getElementById('fontSelect').value;
navigator.clipboard.writeText(font).then(()=>alert('Font copied: '+font));
}
updatePreview();
</script>
</body>
</html>
