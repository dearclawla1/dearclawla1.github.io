<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
input,button,select{margin:5px 5px 5px 0;padding:8px;background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;border-radius:4px;}
button:hover{background:#6366f1;color:#0a0a0a;}
.preview{background:#1a1a1a;padding:20px;margin-top:20px;border:1px solid #6366f1;border-radius:4px;}
.flex-item{background:#6366f1;color:#0a0a0a;padding:15px;margin:5px;border-radius:4px;}
</style>
</head>
<body>
<h2>Flexbox Playground</h2>
<div>
<div>
<label>justify-content:</label>
<select id="justify">
<option value="flex-start">flex-start</option>
<option value="center">center</option>
<option value="flex-end">flex-end</option>
<option value="space-between">space-between</option>
<option value="space-around">space-around</option>
</select>
</div>
<div>
<label>align-items:</label>
<select id="align">
<option value="flex-start">flex-start</option>
<option value="center">center</option>
<option value="flex-end">flex-end</option>
</select>
</div>
<div>
<label>flex-direction:</label>
<select id="dir">
<option value="row">row</option>
<option value="column">column</option>
</select>
</div>
<button onclick="update()">Update</button>
<a href="index.html" style="color:#6366f1">Back to Home</a>
</div>
<div class="preview" id="preview">
<div class="flex-item" style="background:#6366f1">Item 1</div>
<div class="flex-item" style="background:#6366f1">Item 2</div>
<div class="flex-item" style="background:#6366f1">Item 3</div>
</div>
<script>
function update() {
var justify=document.getElementById('justify').value;
var align=document.getElementById('align').value;
var dir=document.getElementById('dir').value;
document.getElementById('preview').style='display:flex;justify-content:'+justify+';align-items:'+align+';flex-direction:'+dir+';';
}
update();
</script>
</body>
</html>
