<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GitHub Repo Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#e4e4e4;padding:2rem}
.container{max-width:800px;margin:0 auto}h1{font-size:1.5rem;margin-bottom:1rem}
input,button,select{width:100%;padding:0.75rem;margin-bottom:1rem;border:1px solid #333;border-radius:6px;font-size:1rem}
button{background:#6366f1;color:#fff;border:none;cursor:pointer;font-weight:600}button:hover{background:#5558e6}
#results{margin-top:1rem}
.repo{background:#1a1a1a;padding:1rem;border-radius:8px;margin-bottom:0.5rem;border:1px solid #333}
.repo h3{color:#6366f1;margin-bottom:0.5rem}
.repo p{color:#aaa;font-size:0.9rem;margin:0.25rem 0}
.repo a{color:#6366f1}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1;display:block;margin-bottom:1rem">Back to Home</a>
<h1>GitHub Repo Explorer</h1>
<input type="text" id="query" placeholder="Search GitHub repositories...">
<select id="sort"><option value="name">Sort by Name</option><option value="stars">Sort by Stars</option><option value="updated">Sort by Updated</option></select>
<button onclick="search()">Search</button>
<div id="results"></div>
</div>
<script>
async function search(){
const query=document.getElementById('query').value.trim();
const sort=document.getElementById('sort').value;
if(!query)return alert('Please enter a search term');
try{
const res=await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&sort=${sort}&order=desc&per_page=10`);
const data=await res.json();
const container=document.getElementById('results');
container.innerHTML='';
data.items.forEach(repo=>{
const div=document.createElement('div');
div.className='repo';
div.innerHTML=`<h3><a href="${repo.html_url}" target="_blank">${repo.name}</a></h3>
<p><strong>Stars:</strong> ${repo.stargazers_count}</p>
<p><strong>Language:</strong> ${repo.language || 'None'}</p>
<p><strong>Updated:</strong> ${new Date(repo.updated_at).toLocaleDateString()}</p>`;
container.appendChild(div);
});
}catch(e){
container.innerHTML='<p style="color:#ff6b6b">Error: '+e.message+'</p>';
}
}
</script>
</body>
</html>
