<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #e4e4e4;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #e4e4e4;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .nav-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #6366f1;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .nav-link:hover {
            text-decoration: underline;
        }
        .project-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .input-group label {
            font-size: 0.8rem;
            color: #888;
            font-weight: 500;
        }
        .input-group input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e4e4e4;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .input-group input::placeholder {
            color: #555;
        }
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .project-card {
            background: #141414;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            position: relative;
        }
        .project-card.active {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .project-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #e4e4e4;
        }
        .project-status {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            background: #2a2a2a;
            color: #888;
        }
        .project-status.active {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
        }
        .progress-container {
            margin-bottom: 0.75rem;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.25rem;
        }
        .progress-bar {
            background: #2a2a2a;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            height: 100%;
            transition: width 0.3s ease;
        }
        .project-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary {
            background: #6366f1;
            color: #fff;
        }
        .btn-primary:hover {
            background: #5558e6;
        }
        .btn-secondary {
            background: #2a2a2a;
            color: #e4e4e4;
            border: 1px solid #333;
        }
        .btn-secondary:hover {
            background: #333;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .history-section {
            background: #141414;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.5rem;
        }
        .history-section h2 {
            font-size: 1rem;
            color: #e4e4e4;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            background: #1a1a1a;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover {
            background: #222;
        }
        .history-time {
            color: #666;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-style: italic;
        }
        .copy-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }
        .copy-btn:hover {
            transform: scale(1.1);
        }
        .copy-btn.show {
            display: flex;
        }
        .copy-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            right: 70px;
            background: #333;
            color: #e4e4e4;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .copy-btn:hover::after {
            opacity: 1;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }
        .tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
            border-radius: 6px 6px 0 0;
            transition: all 0.2s;
        }
        .tab.active {
            background: #1a1a1a;
            color: #e4e4e4;
        }
        .tab:hover:not(.active) {
            color: #e4e4e4;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e4e4e4;
            padding: 0.75rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
        }
        textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .project-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .detail-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .detail-label {
            font-size: 0.75rem;
            color: #888;
        }
        .detail-value {
            font-size: 0.9rem;
            color: #e4e4e4;
        }
        .add-project-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }
        .add-project-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .add-project-btn:active {
            transform: translateY(0);
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #e4e4e4;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: rgba(99, 102, 241, 0.9);
        }
        .toast.error {
            background: rgba(220, 38, 38, 0.9);
        }
        @media (max-width: 600px) {
            .project-inputs {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.5rem;
            }
            .project-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color:#6366f1">Back to Home</a>
        <h1>Project Tracker</h1>
        <p class="subtitle">Track and switch between multiple development projects with persistent state, progress bars, and session history</p>
        
        <div class="add-project-btn" id="addProjectBtn">+ Add New Project</div>
        
        <div class="project-inputs" id="projectInputs">
            <div class="input-group">
                <label for="projectName">Project Name</label>
                <input type="text" id="projectName" placeholder="e.g., My Awesome App">
            </div>
            <div class="input-group">
                <label for="projectDescription">Description</label>
                <input type="text" id="projectDescription" placeholder="Brief description of the project">
            </div>
            <div class="input-group">
                <label for="projectProgress">Progress (%)</label>
                <input type="number" id="projectProgress" placeholder="0-100" min="0" max="100">
            </div>
            <div class="input-group">
                <label for="projectStatus">Status</label>
                <input type="text" id="projectStatus" placeholder="In Progress / Completed / On Hold">
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="projects">Projects</button>
            <button class="tab" data-tab="history">Session History</button>
        </div>
        
        <div class="tab-content active" id="projectsTab">
            <div class="project-list" id="projectList">
                <div class="empty-state">No projects yet. Add a project above to get started!</div>
            </div>
        </div>
        
        <div class="tab-content" id="historyTab">
            <div class="history-section">
                <h2>📜 Session History</h2>
                <div class="history-list" id="historyList">
                    <div class="empty-state">No session history yet. Your activity will appear here.</div>
                </div>
            </div>
        </div>
    </div>
    
    <button class="copy-btn" id="copyBtn" data-tooltip="Copy to Clipboard">📋</button>
    <div class="toast" id="toast"></div>
    
    <script>
        (function() {
            const STORAGE_KEY = 'projectTrackerData';
            const HISTORY_KEY = 'projectTrackerHistory';
            
            let projects = [];
            let history = [];
            let nextId = 1;
            
            function loadState() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        projects = data.projects || [];
                        nextId = data.nextId || 1;
                    }
                } catch (e) {
                    console.error('Failed to load state:', e);
                }
                
                try {
                    const savedHistory = localStorage.getItem(HISTORY_KEY);
                    if (savedHistory) {
                        history = JSON.parse(savedHistory);
                    }
                } catch (e) {
                    console.error('Failed to load history:', e);
                }
            }
            
            function saveState() {
                try {
                    const data = {
                        projects: projects,
                        nextId: nextId
                    };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {
                    console.error('Failed to save state:', e);
                }
            }
            
            function saveHistory() {
                try {
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                } catch (e) {
                    console.error('Failed to save history:', e);
                }
            }
            
            function addHistoryItem(action, details) {
                const item = {
                    action: action,
                    details: details,
                    timestamp: new Date().toISOString()
                };
                history.unshift(item);
                saveHistory();
                renderHistory();
            }
            
            function renderProjects() {
                const list = document.getElementById('projectList');
                
                if (projects.length === 0) {
                    list.innerHTML = '<div class="empty-state">No projects yet. Add a project above to get started!</div>';
                    return;
                }
                
                list.innerHTML = projects.map((project, index) => `
                    <div class="project-card ${project.active ? 'active' : ''}" id="project-${project.id}">
                        <div class="project-header">
                            <span class="project-name">${escapeHtml(project.name)}</span>
                            <span class="project-status ${project.active ? 'active' : ''}">${escapeHtml(project.status || 'No Status')}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>Progress</span>
                                <span>${project.progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${project.progress}%"></div>
                            </div>
                        </div>
                        <div class="project-actions">
                            <button class="btn btn-primary" onclick="activateProject(${project.id})">Activate</button>
                            <button class="btn btn-secondary" onclick="editProject(${project.id})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProject(${project.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
            
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function renderHistory() {
                const list = document.getElementById('historyList');
                
                if (history.length === 0) {
                    list.innerHTML = '<div class="empty-state">No session history yet. Your activity will appear here.</div>';
                    return;
                }
                
                list.innerHTML = history.slice(0, 50).map(item => `
                    <div class="history-item">
                        <span>${escapeHtml(item.action)}</span>
                        <span class="history-time">${formatTime(item.timestamp)}</span>
                    </div>
                `).join('');
            }
            
            function formatTime(isoString) {
                const date = new Date(isoString);
                return date.toLocaleTimeString();
            }
            
            function showProjectsTab() {
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.tab === 'projects');
                });
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.toggle('active', content.id === 'projectsTab');
                });
            }
            
            function showHistoryTab() {
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.tab === 'history');
                });
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.toggle('active', content.id === 'historyTab');
                });
            }
            
            function addProject() {
                const name = document.getElementById('projectName').value.trim();
                const description = document.getElementById('projectDescription').value.trim();
                const progress = parseInt(document.getElementById('projectProgress').value) || 0;
                const status = document.getElementById('projectStatus').value.trim();
                
                if (!name) {
                    showToast('Please enter a project name', 'error');
                    return;
                }
                
                if (progress < 0 || progress > 100) {
                    showToast('Progress must be between 0 and 100', 'error');
                    return;
                }
                
                const project = {
                    id: nextId++,
                    name: name,
                    description: description,
                    progress: progress,
                    status: status || 'In Progress',
                    active: false
                };
                
                projects.push(project);
                saveState();
                
                // Clear inputs
                document.getElementById('projectName').value = '';
                document.getElementById('projectDescription').value = '';
                document.getElementById('projectProgress').value = '';
                document.getElementById('projectStatus').value = '';
                
                renderProjects();
                addHistoryItem('Added Project', `Project "${name}" created`);
                showToast('Project added successfully!', 'success');
            }
            
            function activateProject(id) {
                const project = projects.find(p => p.id === id);
                if (project) {
                    project.active = true;
                    saveState();
                    renderProjects();
                    addHistoryItem('Activated Project', `Project "${project.name}" is now active`);
                    showToast('Project activated!', 'success');
                }
            }
            
            function editProject(id) {
                const project = projects.find(p => p.id === id);
                if (!project) return;
                
                document.getElementById('projectName').value = project.name;
                document.getElementById('projectDescription').value = project.description;
                document.getElementById('projectProgress').value = project.progress;
                document.getElementById('projectStatus').value = project.status;
                
                renderProjects();
                addHistoryItem('Opened Project for Edit', `Project "${project.name}" opened for editing`);
                showToast('Project opened for editing', 'success');
            }
            
            function deleteProject(id) {
                const project = projects.find(p => p.id === id);
                if (!project) return;
                
                if (confirm(`Are you sure you want to delete "${project.name}"? This action cannot be undone.`)) {
                    projects = projects.filter(p => p.id !== id);
                    saveState();
                    renderProjects();
                    addHistoryItem('Deleted Project', `Project "${project.name}" deleted`);
                    showToast('Project deleted', 'success');
                }
            }
            
            function showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = 'toast show ' + type;
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
            
            function toggleCopyBtn(show) {
                const btn = document.getElementById('copyBtn');
                if (show) {
                    btn.classList.add('show');
                } else {
                    btn.classList.remove('show');
                }
            }
            
            document.getElementById('addProjectBtn').addEventListener('click', addProject);
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    showProjectsTab();
                    showHistoryTab();
                });
            });
            
            document.getElementById('copyBtn').addEventListener('click', () => {
                const text = `Projects: ${projects.length}\nActive: ${projects.filter(p => p.active).length}\nTotal Progress: ${projects.reduce((sum, p) => sum + p.progress, 0)}%`;
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard!', 'success');
                    toggleCopyBtn(false);
                }).catch(err => {
                    console.error('Failed to copy:', err);
                    showToast('Failed to copy', 'error');
                });
            });
            
            loadState();
            renderProjects();
            renderHistory();
            
            // Auto-save on input changes
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('change', () => {
                    saveState();
                });
            });
            
            // Handle tab switching
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    const contentId = tab.dataset.tab + 'Tab';
                    const content = document.getElementById(contentId);
                    if (content) {
                        content.classList.add('active');
                    }
                });
            });
            
        })();
    </script>
</body>
</html>
