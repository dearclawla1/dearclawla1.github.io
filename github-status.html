<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GitHub Status Checker</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,Segoe UI,sans-serif;background:#0d1117;color:#c9d1d9;padding:24px}
    .container{max-width:640px;margin:0 auto}
    h1{color:#58a6ff;margin-bottom:16px;font-size:24px}
    input{width:100%;padding:12px;border:1px solid #303636;border-radius:6px;font-size:14px;background:#161b22;color:#c9d1d9}
    button{width:100%;padding:12px;margin-top:10px;border:1px solid #303636;border-radius:6px;font-size:14px;background:#238636;color:#fff;cursor:pointer}
    button:hover{background:#2ea043}
    .card{margin-top:20px;padding:16px;background:#161b22;border-radius:8px;border:1px solid #303636}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}
    .stat{background:#0d1117;padding:8px;border-radius:4px;font-size:12px}
    .stat span{color:#7ee787;font-weight:600;display:block}
    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
    .tag repo{background:#1f6feb40;color:#58a6ff}
    .tag trending{background:#d2992240;color:#f2cc60}
    .tag tool{background:#23863640;color:#3fb950}
    a{color:#58a6ff;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" style="display:block;margin-bottom:12px;color:#8b949e;font-size:12px">← Back to Home</a>
    <h1>GitHub Status Checker</h1>
    <input type="text" id="repo" placeholder="https://github.com/owner/repo or owner/repo"><br>
    <button id="check">Check Repo</button>
    <div id="result" class="card" style="display:none"></div>
    <script>
      document.getElementById('check').addEventListener('click',async()=>{
        const val=document.getElementById('repo').value.trim();
        const res=document.getElementById('result');
        const url=val.includes('https')?val:(`https://api.github.com/repos/${val.replace('@','')}`);
        res.style.display='none';res.innerHTML='<div style="padding:12px;color:#7ee787">Loading...</div>';
        try{
          const data=await fetch(url).then(r=>r.json());
          const type=typeof data;
          if(type!=='object'||data.message) throw new Error(data.message||'Invalid repo');
          const title=data.name||'N/A';const desc=data.description||'No description';
          const stars=data.stargazers_count||0;const forks=data.forks_count||0;
          const watchers=data.subscribers_count||0;const htmlUrl=data.html_url;
          const language=data.language||'Unknown';
          res.innerHTML=`
            <h2 style="margin-bottom:8px;color:#fff">${data.owner?.login?/'@'+data.owner.login+'':''}<span style="color:#7ee787">${title}</span></h2>
            <p style="color:#8b949e;font-size:13px;margin-bottom:12px">${desc||'No description'}</p>
            <div class="stats">
              <div class="stat"><span style="color:#2ea043">⭐ Stars:</span>${stars}</div>
              <div class="stat"><span style="color:#f2cc60">🔀 Forks:</span>${forks}</div>
              <div class="stat"><span style="color:#79c0ff">👁 Watchers:</span>${watchers}</div>
              <div class="stat"><span style="color:#ff7b72">🌐 Lang:</span>${language}</div>
            </div>
            <div style="margin-top:12px">
              <a href="${htmlUrl}" target="_blank" class="tag repo">View Repo</a>
              <a href="https://github.com/${val}" target="_blank" class="tag trending">Trending</a>
            </div>`;
        }catch(e){
          res.innerHTML='<div style="padding:12px;color:#ff7b72">Error: '+e.message+'</div>';
        }
        res.style.display='block';
      });
    </script>
  </div>
</body>
</html>
