<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,sans-serif;margin:0;padding:20px}
.container{max-width:500px;margin:0 auto}
h1{color:#6366f1;text-align:center}
.link{display:block;text-align:center;margin:20px 0}
a{color:#6366f1}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin:10px 0}
label{display:block;margin:8px 0}
input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:4px;font-size:14px}
input{background:#2a2a2a;color:#e4e4e4;border:1px solid #444}
button{background:#6366f1;color:#fff;cursor:pointer;font-weight:bold}
button:hover{background:#5558f6}
.result{background:#1a1a1a;border-radius:4px;padding:12px;margin:10px 0}
.result h3{margin:0 0 8px;color:#6366f1}
.result p{margin:4px 0;color:#a4a4a4}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="link" style="color:#6366f1">Home</a>
<h1>Tip Calculator</h1>
<div class="card">
<label>Bill Amount ($): <input type="number" id="bill" placeholder="50.00" step="0.01" oninput="calc()"></label>
<label>Tip Percentage: <select id="percent" onchange="calc()">
<option value="10">10%</option>
<option value="15">15%</option>
<option value="18" selected>18%</option>
<option value="20">20%</option>
<option value="25">25%</option>
</select></label>
<div class="result" id="result"></div>
</div>
<script>
function calc(){
const bill = parseFloat(document.getElementById('bill').value) || 0;
const percent = parseFloat(document.getElementById('percent').value) || 18;
const tip = bill * percent / 100;
const total = bill + tip;
document.getElementById('result').innerHTML = `
<h3>Tip Calculator Results</h3>
<p>Bill: $${bill.toFixed(2)}</p>
<p>Tip (${percent}%): $${tip.toFixed(2)}</p>
<p>Total: $${total.toFixed(2)}</p>
`;
}
calc();
</script>
</div>
</body>
</html>
