<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e4e4e4; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; }
    a { color: #6366f1; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    label { display: flex; flex-direction: column; gap: 5px; font-size: 14px; }
    select, input { background: #1a1a1a; border: 1px solid #333; color: #e4e4e4; padding: 10px; border-radius: 6px; font-size: 14px; }
    button { background: #6366f1; color: #0a0a0a; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    button:hover { background: #7c7dff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #output { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; min-height: 150px; font-family: inherit; white-space: pre-wrap; line-height: 1.6; }
    .info { color: #666; font-size: 12px; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Lorem Ipsum Generator</h1>
    <a href="index.html" style="color:#6366f1; display: inline-block; margin-bottom: 15px;">Home</a>
    <div class="controls">
      <label>
        Words per paragraph:
        <select id="wordsPerPara">
          <option value="3">3 words</option>
          <option value="5" selected>5 words</option>
          <option value="10">10 words</option>
          <option value="20">20 words</option>
          <option value="50">50 words</option>
        </select>
      </label>
      <label>
        Number of paragraphs:
        <input type="number" id="numPara" value="3" min="1" max="20">
      </label>
      <button id="generateBtn">Generate Lorem Ipsum</button>
      <button id="copyBtn" disabled>Copy</button>
      <button id="clearBtn" disabled style="background:#dc2626">Clear</button>
    </div>
    <div id="output"></div>
    <div class="info" id="status"></div>
  </div>
  <script>
    const loremWords = ['Lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'ut', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'dolore', 'eu', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'nostrud', 'excepteur', 'molestiae', 'anim', 'id', 'est', 'laborum', 'tempora', 'iniciidunt', 'nemo', 'enim', 'iam', 'quidem', 'tamen', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'nemo', 'enim', 'quam', 'quam', 'laborum', 'quis', 'aut', 'vel', 'veritatis', 'quasi', 'et', 'quia', 'consequuntur', 'magnam', 'dolorem', 'eos', 'quas', 'molestias', 'quia', 'sunt', 'quibusdam', 'necessitatibus', 'sunt', 'sapiente', 'delectus', 'aut', 'reprehenderit', 'voluptatem', 'voluptas', 'illum', 'quod', 'maxime', 'quaerat', 'explicabo', 'vel', 'iure', 'veritatis', 'quas', 'nam', 'quam', 'laborum', 'quis', 'aut', 'vel', 'veritatis', 'quasi', 'et', 'quia', 'consequuntur', 'magnam', 'dolorem', 'eos', 'quas', 'molestias', 'quia', 'sunt', 'quibusdam', 'necessitatibus', 'sunt', 'sapiente', 'delectus', 'aut', 'reprehenderit', 'voluptatem', 'voluptas', 'illum', 'quod', 'maxime', 'quaerat', 'explicabo'];

    function getRandomParagraph(words) {
      const wordsArray = [];
      for (let i = 0; i < words; i++) {
        wordsArray.push(loremWords[Math.floor(Math.random() * loremWords.length)]);
      }
      return wordsArray.join(' ');
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      const wordsPerPara = parseInt(document.getElementById('wordsPerPara').value);
      const numPara = parseInt(document.getElementById('numPara').value);
      const paragraphs = [];
      for (let i = 0; i < numPara; i++) {
        paragraphs.push(getRandomParagraph(wordsPerPara));
      }
      const output = paragraphs.join('\n\n');
      document.getElementById('output').textContent = output;
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('copyBtn').disabled = false;
      document.getElementById('clearBtn').disabled = false;
      document.getElementById('status').textContent = `Generated ${numPara} paragraphs with ${wordsPerPara} words each.`;
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('status').textContent = 'Copied to clipboard!';
        setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000);
      });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('output').textContent = '';
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('copyBtn').disabled = true;
      document.getElementById('clearBtn').disabled = true;
      document.getElementById('status').textContent = '';
    });
  </script>
</body>
</html>
