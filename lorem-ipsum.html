<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px;}
.container{max-width:600px;margin:0 auto;}
h1{text-align:center;color:#6366f1;margin-bottom:20px;}
a{color:#6366f1;text-decoration:none;}
input,select{width:100%;padding:10px;margin:10px 0;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:5px;}
button{width:100%;padding:12px;margin:10px 0;border:none;background:#6366f1;color:#fff;border-radius:5px;cursor:pointer;font-weight:bold;}
button:hover{background:#5558ff;}
#output{background:#1a1a1a;padding:15px;border-radius:5px;min-height:100px;font-size:14px;margin:10px 0;}
.controls{display:flex;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1;display:block;text-align:center">Home</a>
<h1>✍️ Lorem Ipsum Generator</h1>
<div class="controls">
<select id="paragraphs">
<option value="1">1 Paragraph</option>
<option value="3">3 Paragraphs</option>
<option value="5">5 Paragraphs</option>
</select>
<select id="wordCount">
<option value="20">20 words/line</option>
<option value="40">40 words/line</option>
<option value="60">60 words/line</option>
</select>
</div>
<button onclick="generate()">Generate Lorem Ipsum</button>
<div id="output"></div>
</div>
<script>
const lorem = ["Lorem ipsum dolor sit amet", "consectetur adipiscing elit", "sed do eiusmod tempor incididunt", "ut labore et dolore magna aliqua", "ut enim ad minim veniam", "quis nostrud exercitation ullamco", "laboris nisi ut aliquip ex ea commodo", "consequat", "Duis aute irure dolor", "in reprehenderit in voluptate", "velit esse cillum dolore eu fugiat nulla pariatur", "Excepteur sint occaecat cupidatat non proident", "sunt in culpa qui officia deserunt mollit anim", "id est laborum"];
function generate(){
let text = "";
let lines = parseInt(document.getElementById('wordCount').value);
let paragraphs = parseInt(document.getElementById('paragraphs').value);
for(let i=0;i<paragraphs;i++){
for(let j=0;j<lines;j++){
let line = "";
let words = 20;
for(let k=0;k<words;k++){
let idx = Math.floor(Math.random()*lorem.length);
line += lorem[idx] + " ";
}
text += line + "\n";
}
if(i<paragraphs-1)text += "\n\n";
}
document.getElementById('output').innerHTML = text;
}
generate();
</script>
</body>
</html>
