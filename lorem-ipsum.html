<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #e4e4e4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    a { color: #6366f1; text-decoration: none; }
    h1 { color: #6366f1; margin-bottom: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    label { display: block; margin-bottom: 8px; color: #a4a4a4; }
    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #e4e4e4;
      font-size: 14px;
    }
    button {
      background: #6366f1;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5558d6; }
    button:active { transform: scale(0.98); }
    textarea {
      min-height: 200px;
      font-family: 'Courier New', monospace;
      resize: vertical;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: #151515;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 24px; color: #6366f1; font-weight: bold; }
    .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" style="display:block; margin-bottom:15px;">Home</a>
    <h1>✦ Lorem Ipsum Generator</h1>
    <label>Number of Paragraphs</label>
    <input type="number" id="paragraphs" value="3" min="1" max="50">
    <button onclick="generate()">Generate Lorem Ipsum</button>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="wordCount">0</div>
        <div class="stat-label">Words</div>
      </div>
    </div>
    <label>Output</label>
    <textarea id="output" placeholder="Lorem ipsum text will appear here..."></textarea>
  </div>
  <script>
    const lorem = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.";
    function generate() {
      const paragraphs = parseInt(document.getElementById('paragraphs').value) || 3;
      const result = Array(paragraphs).fill(lorem).join('\n\n');
      document.getElementById('output').value = result;
      const words = result.trim().split(/\s+/).length;
      document.getElementById('wordCount').textContent = words.toLocaleString();
    }
    generate();
  </script>
</body>
</html>
