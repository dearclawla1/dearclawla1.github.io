<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>URL Encoder/Decoder</title>
<style>body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px;display:flex;justify-content:center;min-height:100vh;font-size:14px}
a{color:#4ec4e8;text-decoration:none}a:hover{text-decoration:underline}
.container{width:100%;max-width:800px}
.header{text-align:center;margin-bottom:10px}
.input-row{margin:15px 0;display:flex;gap:10px}
input,select,button{border:1px solid #444;border-radius:4px;padding:8px 12px;font-size:13px;background:#1a1a1a;color:#e4e4e4}
input:focus,select:focus{outline:2px solid #4ec4e8;outline-offset:2px}
textarea{width:100%;height:120px;background:#1a1a1a;color:#e4e4e4;border:1px solid #444;border-radius:4px;font-family:monospace;font-size:13px;resize:vertical}
button{cursor:pointer}
button:hover{background:#2a2a2a;border-color:#6ec4e8}
button:active{background:#3a3a3a}
.result-box{background:#141414;padding:10px;border-radius:4px;min-height:50px;margin-top:5px;overflow:auto;max-height:100px}
label{display:block;margin:5px 0 5px;cursor:pointer}
.controls{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0}
.error-message{color:#ff6b6b;background:#3a1a1a;padding:8px;border-radius:4px;margin-top:10px;display:none}
</style></head>
<body>
<div class="container">
<div class="header"><a href="index.html" style="display:inline-block;margin-bottom:10px;">Home</a>URL Encoder/Decoder</div>
<div class="controls">
<button onclick="encodeUrl()">Encode URL</button>
<button onclick="decodeUrl()">Decode URL</button>
<button onclick="encodeBase64()">Encode Base64</button>
<button onclick="decodeBase64()">Decode Base64</button>
<button onclick="encodeHtml()">Encode HTML</button>
<button onclick="decodeHtml()">Decode HTML</button>
<button onclick="encodeUnicode()">Encode Unicode</button>
<button onclick="decodeUnicode()">Decode Unicode</button>
</div>
<div class="input-row">
<textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
</div>
<div class="result-box" id="result"></div>
<div class="error-message" id="error"></div>
</div>
<script>
function showError(msg) {
    const errorEl = document.getElementById('error');
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
}
function clearError() {
    const errorEl = document.getElementById('error');
    errorEl.style.display = 'none';
}
function encodeUrl() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const encoded = encodeURIComponent(input);
        document.getElementById('result').textContent = encoded;
    } catch (e) {
        showError('Error encoding URL. Please try again.');
    }
}
function decodeUrl() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const decoded = decodeURIComponent(input);
        document.getElementById('result').textContent = decoded;
    } catch (e) {
        showError('Error decoding URL. Invalid characters detected.');
    }
}
function encodeBase64() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const encoded = btoa(input);
        document.getElementById('result').textContent = encoded;
    } catch (e) {
        showError('Error encoding Base64. Input may contain invalid characters.');
    }
}
function decodeBase64() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const decoded = atob(input);
        document.getElementById('result').textContent = decoded;
    } catch (e) {
        showError('Error decoding Base64. Invalid Base64 string.');
    }
}
function encodeHtml() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const encoded = input.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
        document.getElementById('result').textContent = encoded;
    } catch (e) {
        showError('Error encoding HTML. Please try again.');
    }
}
function decodeHtml() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const decoded = input.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#x27;/g, "'");
        document.getElementById('result').textContent = decoded;
    } catch (e) {
        showError('Error decoding HTML. Invalid HTML entities detected.');
    }
}
function encodeUnicode() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const encoded = input.split('').map(char => {
            const code = char.charCodeAt(0).toString(16);
            return '&#x' + code + ';';
        }).join('');
        document.getElementById('result').textContent = encoded;
    } catch (e) {
        showError('Error encoding Unicode. Please try again.');
    }
}
function decodeUnicode() {
    const input = document.getElementById('input').value;
    clearError();
    try {
        const decoded = input.replace(/&#x([0-9a-fA-F]+);/g, (_, hex) => {
            return String.fromCharCode(parseInt(hex, 16));
        });
        document.getElementById('result').textContent = decoded;
    } catch (e) {
        showError('Error decoding Unicode. Invalid Unicode entities detected.');
    }
}
</script>
</body>
</html>
