<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cURL Playground</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:10px}
input,button,select{margin:5px 0;padding:8px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;border-radius:4px}
input{width:70%}
button{background:#6366f1;color:#fff;border:none;cursor:pointer}
button:hover{background:#5558f5}
#response{background:#1a1a1a;border:1px solid #333;padding:10px;margin-top:10px;min-height:50px;white-space:pre-wrap}
a{color:#6366f1}
</style>
</head>
<body>
<h1>cURL Playground</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<input id="url" placeholder="https://api.github.com/repos/octocat/Hello-World">
<select id="method">
<option value="GET">GET</option>
<option value="POST">POST</option>
<option value="PUT">PUT</option>
<option value="DELETE">DELETE</option>
</select>
<input id="body" placeholder="Request body (JSON)">
<button onclick="run()">Run</button>
<div id="response">Response will appear here...</div>
<script>
async function run() {
const url = document.getElementById('url').value;
const method = document.getElementById('method').value;
const body = document.getElementById('body').value;
let options = {method};
if(body) options.body = body;
try {
const res = await fetch(url, options);
const text = await res.text();
document.getElementById('response').innerText = text;
} catch(e) {
document.getElementById('response').innerText = 'Error: ' + e.message;
}
}
</script>
</body>
</html>
