<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GitHub Trending Explorer</title>
<style>
:root{--bg:#0a0a0a;--text:#e4e4e4;--primary:#6366f1;--card:#111111;--border:#333333}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:900px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
a{color:var(--primary);text-decoration:none}
.grid{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:15px}
select,input{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text)}
button{padding:10px 20px;border:none;border-radius:6px;background:var(--primary);color:white;cursor:pointer;font-weight:600}
button:hover{opacity:0.9}
button.download-btn{background:#333333;color:#e4e4e4;font-size:12px;padding:6px 12px}
button.download-btn:hover{background:#444444}
#results{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8;padding:15px;transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(99,102,241,0.2)}
.card h3{color:var(--primary);margin-bottom:8px}
.card p{font-size:14px;color:#aaa}
.loading{display:flex;justify-content:center;align-items:center;padding:40px}
.error{background:#333333;border:1px solid #666;border-radius:8;padding:15px;margin-bottom:15px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn 0.3s ease-out}
</style>
</head>
<body>
<div class="container">
<header>
<h1>GitHub Trending Explorer</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
</header>
<div class="grid">
<select id="lang">
<option value="">All Languages</option>
<option value="JavaScript">JavaScript</option>
<option value="Python">Python</option>
<option value="Java">Java</option>
<option value="TypeScript">TypeScript</option>
<option value="Go">Go</option>
<option value="C">C</option>
<option value="C++">C++</option>
<option value="Rust">Rust</option>
</select>
<button id="fetchBtn">Fetch Trending</button>
</div>
<div id="status"></div>
<div id="results"></div>
</div>
<script>
document.getElementById('fetchBtn').addEventListener('click', async () => {
  const lang = document.getElementById('lang').value;
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  
  results.innerHTML = '';
  status.innerHTML = '<div class="loading">Loading...</div>';
  
  try {
    const url = lang ? `https://api.github.com/search/repositories?q=trending:yes&sort=stars&order=desc&per_page=50&language=${lang}` : 'https://api.github.com/search/repositories?q=trending:yes&sort=stars&order=desc&per_page=50';
    
    const response = await fetch(url);
    
    if (!response.ok) {
      throw new Error('Failed to fetch data');
    }
    
    const data = await response.json();
    
    if (data.items && data.items.length > 0) {
      data.items.forEach(repo => {
        const card = document.createElement('div');
        card.className = 'card';
        
        const description = repo.description || 'No description available';
        const language = repo.language || 'Unknown';
        const stars = repo.stargazers_count || 0;
        const htmlUrl = repo.html_url || '#';
        const name = repo.name || '';
        
        card.innerHTML = `
          <h3>
            <a href="${htmlUrl}" target="_blank" style="color:inherit;text-decoration:none">
              ${name}
            </a>
          </h3>
          <p>${description}</p>
          <p style="margin-top:8px;font-size:12px;color:#888;">
            Language: ${language} | Stars: ${stars.toLocaleString()}
          </p>
          <button class="download-btn" onclick="downloadRepo('${name}', '${description}', '${language}', ${stars}, '${htmlUrl}')">
            Download Info
          </button>
        `;
        
        results.appendChild(card);
      });
    } else {
      status.innerHTML = '<div class="error">No trending repositories found.</div>';
    }
  } catch (error) {
    console.error('Error:', error);
    status.innerHTML = `<div class="error">Error: ${error.message}</div>`;
  }
});

// Save language selection to localStorage
document.getElementById('lang').addEventListener('change', () => {
  localStorage.setItem('github-trending-lang', document.getElementById('lang').value);
});

// Load saved language selection on page load
window.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('github-trending-lang');
  if (savedLang) {
    document.getElementById('lang').value = savedLang;
  }
});

// Keyboard shortcut: Ctrl+Enter to fetch
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('fetchBtn').click();
  }
});

// Download repository info
window.downloadRepo = function(name, description, language, stars, htmlUrl) {
  const content = `Repository: ${name}\n\nDescription: ${description}\nLanguage: ${language}\nStars: ${stars.toLocaleString()}\nURL: ${htmlUrl}\n\nGenerated by GitHub Trending Explorer`;
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${name.replace(/[^a-z0-9]/gi, '_')}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
</script>
</body>
</html>
