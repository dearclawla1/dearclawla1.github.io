<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GitHub Trending Explorer</title>
<style>
:root{--bg:#0a0a0a;--text:#e4e4e4;--primary:#6366f1;--card:#111111;--border:#333333}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:900px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
a{color:var(--primary);text-decoration:none}
.grid{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:15px}
select,input{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text)}
button{padding:10px 20px;border:none;border-radius:6px;background:var(--primary);color:white;cursor:pointer;font-weight:600}
button:hover{opacity:0.9}
#results{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8;padding:15px}
.card h3{color:var(--primary);margin-bottom:8px}
.card p{font-size:14px;color:#aaa}
</style>
</head>
<body>
<div class="container">
<header>
<h1>GitHub Trending Explorer</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
</header>
<div class="grid">
<select id="lang">
<option value="">All Languages</option>
<option value="JavaScript">JavaScript</option>
<option value="Python">Python</option>
<option value="Java">Java</option>
<option value="TypeScript">TypeScript</option>
<option value="C">C</option>
<option value="C++">C++</option>
<option value="C#">C#</option>
<option value="Go">Go</option>
<option value="Ruby">Ruby</option>
<option value="PHP">PHP</option>
<option value="Swift">Swift</option>
<option value="Kotlin">Kotlin</option>
<option value="Rust">Rust</option>
</select>
<select id="sort">
<option value="updated">Updated</option>
<option value="pushed">Pushed</option>
<option value="starred">Starred</option>
</select>
<button onclick="fetchTrending()">Explore</button>
</div>
<div id="results"></div>
</div>
<script>
async function fetchTrending() {
const lang = document.getElementById('lang').value;
const sort = document.getElementById('sort').value;
const res = document.getElementById('results');
res.innerHTML = 'Loading...';
try {
const url = `https://api.github.com/repositories?per_page=100&sort=${sort}&direction=desc`;
if(lang) url += `&language=${lang}`;
const data = await fetch(url).then(r=>r.json());
res.innerHTML = '';
data.forEach(repo=>{
const card = document.createElement('div');
card.className = 'card';
card.innerHTML = `<h3>${repo.name}</h3><p>${repo.description||'No description'}</p><p style="color:#6366f1">Stars: ${repo.stargazers_count}</p><p>Language: ${repo.language||'Mixed'}</p><p style="font-size:12px;color:#666">Updated: ${new Date(repo.updated_at).toLocaleDateString()}</p>`;
res.appendChild(card);
});
} catch(e) { res.innerHTML = 'Error: ' + e.message; }
}
</script>
</body>
</html>
