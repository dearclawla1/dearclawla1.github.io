<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GitHub Trending Explorer</title>
<style>
:root{--bg:#0a0a0a;--text:#e4e4e4;--primary:#6366f1;--card:#111111;--border:#333333}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:900px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
a{color:var(--primary);text-decoration:none}
.grid{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:15px}
select,input{padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text)}
button{padding:10px 20px;border:none;border-radius:6px;background:var(--primary);color:white;cursor:pointer;font-weight:600}
button:hover{opacity:0.9}
#results{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8;padding:15px}
.card h3{color:var(--primary);margin-bottom:8px}
.card p{font-size:14px;color:#aaa}
.loading{display:flex;justify-content:center;align-items:center;padding:40px}
.error{background:#333333;border:1px solid #666;border-radius:8;padding:15px;margin-bottom:15px}
</style>
</head>
<body>
<div class="container">
<header>
<h1>GitHub Trending Explorer</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
</header>
<div class="grid">
<select id="lang">
<option value="">All Languages</option>
<option value="JavaScript">JavaScript</option>
<option value="Python">Python</option>
<option value="Java">Java</option>
<option value="TypeScript">TypeScript</option>
<option value="Go">Go</option>
<option value="C">C</option>
<option value="C++">C++</option>
<option value="Rust">Rust</option>
</select>
<button id="fetchBtn">Fetch Trending</button>
</div>
<div id="status"></div>
<div id="results"></div>
</div>
<script>
document.getElementById('fetchBtn').addEventListener('click', async () => {
  const lang = document.getElementById('lang').value;
  const status = document.getElementById('status');
  const results = document.getElementById('results');
  
  results.innerHTML = '';
  status.innerHTML = '<div class="loading">Loading...</div>';
  
  try {
    const url = lang ? `https://api.github.com/search/repositories?q=trending:yes&sort=stars&order=desc&per_page=50&language=${lang}` : 'https://api.github.com/search/repositories?q=trending:yes&sort=stars&order=desc&per_page=50';
    
    const response = await fetch(url);
    
    if (!response.ok) {
      throw new Error('Failed to fetch data');
    }
    
    const data = await response.json();
    
    if (data.items && data.items.length > 0) {
      data.items.forEach(repo => {
        const card = document.createElement('div');
        card.className = 'card';
        
        const description = repo.description || 'No description available';
        const language = repo.language || 'Unknown';
        const stars = repo.stargazers_count || 0;
        const htmlUrl = repo.html_url || '#';
        
        card.innerHTML = `
          <h3>
            <a href="${htmlUrl}" target="_blank" style="color:inherit;text-decoration:none">
              ${repo.name}
            </a>
          </h3>
          <p>${description}</p>
          <p style="margin-top:8px;font-size:12px;color:#888;">
            Language: ${language} | Stars: ${stars.toLocaleString()}
          </p>
        `;
        
        results.appendChild(card);
      });
    } else {
      status.innerHTML = '<div class="error">No trending repositories found.</div>';
    }
  } catch (error) {
    console.error('Error:', error);
    status.innerHTML = `<div class="error">Error: ${error.message}</div>`;
  }
});
</script>
</body>
</html>
