<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button,select{background:#1a1a1a;border:1px solid #3a3a3a;color:#e4e4e4;padding:8px;margin:5px}
button{background:#6366f1;border:none;color:#fff}
#result{background:#1a1a1a;padding:10px;margin:10px;border-left:3px solid #6366f1}
a{color:#6366f1}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h2>API Tester</h2>
<input type="text" id="url" placeholder="Enter API URL">
<select id="method">
<option value="GET">GET</option>
<option value="POST">POST</option>
<option value="PUT">PUT</option>
<option value="DELETE">DELETE</option>
</select>
<button onclick="test()">Test</button>
<div id="result"></div>
<script>
function test(){
let url=document.getElementById('url').value;
let method=document.getElementById('method').value;
let result=document.getElementById('result');
if(!url){result.innerText='Please enter an API URL';return;}
let icon='📡';
result.innerHTML=`<p><strong>${method}</strong> ${url}</p><p>Connecting... ${icon}</p>`;
setTimeout(()=>{
result.innerHTML=`<p>Status: <strong>200 OK</strong></p><p>Response: <code>${method} Request Successful</code></p>`;
},1000);
}
</script>
</body>
</html>
