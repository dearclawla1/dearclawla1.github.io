ÿþ<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cron Expression Builder</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Monaco,Consolas,Courier New,monospace}body{background:#0a0a0a;color:#e4e4e4;padding:20px}a{color:#4ec9b0;text-decoration:none}a:hover{text-decoration:underline}h1{color:#4ec9b0;margin-bottom:20px}.container{max-width:800px;margin:0 auto}.fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,fr));gap:15px;margin-bottom:20px}.field{display:flex:flex-direction:column}label{font-size:12px;color:#888;margin-bottom:5px}input,select{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;border-radius:4px;font-size:12px}input:focus,select:focus{outline:none;border-color:#4ec9b0}#expression{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;border-radius:4px;font-size:13px;width:100%;margin-bottom:15px;display:block}button{background:#4ec9b0;border:none;color:#0a0a0a;padding:10px 20px;border-radius:4px;font-size:12px;cursor:pointer;margin-right:10px}button:hover{background:#46b09e}#validate{background:#ff6b6b}#validate:hover{background:#e55a5a}#output{background:#1a1a1a;padding:15px;border-radius:4px;margin-top:15px;font-size:12px;white-space:pre-wrap;min-height:40px}#output.error{border:1px solid #ff6b6b}#download{background:#4ec9b0;margin-right:10px}#download:hover{background:#46b09e}</style></head><body><a href="index.html">Home</a><div class="container"><h1>Cron Expression Builder</h1><div class="fields"><div class="field"><label>Minute (0-59)</label><input type="number" id="minute" min="0" max="59" value="*"></div><div class="field"><label>Hour (0-23)</label><input type="number" id="hour" min="0" max="23" value="*"></div><div class="field"><label>Day of Month (1-31)</label><input type="number" id="day" min="1" max="31" value="*"></div><div class="field"><label>Month (1-12)</label><input type="number" id="month" min="1" max="12" value="*"></div><div class="field"><label>Day of Week (0-7)</label><input type="number" id="dow" min="0" max="7" value="*"></div></div><input type="text" id="expression" placeholder="CRON Expression" readonly><button onclick="validate()">Validate</button><button id="validate" onclick="validate()">Validate</button><button id="download" onclick="download()">Download</button><div id="output"></div></div><script>function generate(){const m=document.getElementById('minute').value||'*';const h=document.getElementById('hour').value||'*';const d=document.getElementById('day').value||'*';const mo=document.getElementById('month').value||'*';const doo=document.getElementById('dow').value||'*';const expr=`${m} ${h} ${d} ${mo} ${doo}`;document.getElementById('expression').value=expr;return expr;}function validate(){try{const m=document.getElementById('minute').value||'*';const h=document.getElementById('hour').value||'*';const d=document.getElementById('day').value||'*';const mo=document.getElementById('month').value||'*';const doo=document.getElementById('dow').value||'*';const expr=generate();const errors=[];if(m!=='*'){const minNum=parseInt(m,10);if(minNum<0||minNum>59){errors.push('Minute must be between 0 and 59');}}if(h!=='*'){const hourNum=parseInt(h,10);if(hourNum<0||hourNum>23){errors.push('Hour must be between 0 and 23');}}if(d!=='*'){const dayNum=parseInt(d,10);if(dayNum<1||dayNum>31){errors.push('Day of month must be between 1 and 31');}}if(mo!=='*'){const monthNum=parseInt(mo,10);if(monthNum<1||monthNum>12){errors.push('Month must be between 1 and 12');}}if(doo!=='*'){const dowNum=parseInt(doo,10);if(dowNum<0||dowNum>7){errors.push('Day of week must be between 0 and 7');}}if(errors.length===0){document.getElementById('output').innerHTML=`Valid CRON Expression: ${expr}`;document.getElementById('output').classList.remove('error');}else{document.getElementById('output').innerHTML=`Invalid CRON Expression:<br><br>${errors.join('<br>')}`;document.getElementById('output').classList.add('error');}}catch(e){document.getElementById('output').innerHTML=`Error: ${e.message}`;document.getElementById('output').classList.add('error');}}function download(){const expr=document.getElementById('expression').value;if(expr){const blob=new Blob([expr],{type:'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cron-expression.txt';a.click();URL.revokeObjectURL(url);}}document.addEventListener('DOMContentLoaded',function(){document.getElementById('minute').addEventListener('change',generate);document.getElementById('hour').addEventListener('change',generate);document.getElementById('day').addEventListener('change',generate);document.getElementById('month').addEventListener('change',generate);document.getElementById('dow').addEventListener('change',generate);generate();try{const savedMinute=localStorage.getItem('cron_minute');const savedHour=localStorage.getItem('cron_hour');const savedDay=localStorage.getItem('cron_day');const savedMonth=localStorage.getItem('cron_month');const savedDow=localStorage.getItem('cron_dow');if(savedMinute){document.getElementById('minute').value=savedMinute;generate();}if(savedHour){document.getElementById('hour').value=savedHour;generate();}if(savedDay){document.getElementById('day').value=savedDay;generate();}if(savedMonth){document.getElementById('month').value=savedMonth;generate();}if(savedDow){document.getElementById('dow').value=savedDow;generate();}}catch(e){console.log('localStorage error:',e.message);}document.getElementById('minute').addEventListener('change',function(){localStorage.setItem('cron_minute',this.value);});document.getElementById('hour').addEventListener('change',function(){localStorage.setItem('cron_hour',this.value);});document.getElementById('day').addEventListener('change',function(){localStorage.setItem('cron_day',this.value);});document.getElementById('month').addEventListener('change',function(){localStorage.setItem('cron_month',this.value);});document.getElementById('dow').addEventListener('change',function(){localStorage.setItem('cron_dow',this.value);});document.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();validate();}if(e.key==='Escape'){document.getElementById('minute').value='*';document.getElementById('hour').value='*';document.getElementById('day').value='*';document.getElementById('month').value='*';document.getElementById('dow').value='*';generate();}});});</script></body></html>
