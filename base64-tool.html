<!DOCTYPE html>
<html>
<head>
<title>Base64 Encoder/Decoder</title>
<style>
*{margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#0a0a0a;color:#e4e4e4;padding:20px}
a{color:#8b5cf6;text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto}
h1{margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}
input,select{width:100%;padding:10px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:5px}
button{width:100%;padding:12px;border:none;background:#8b5cf6;color:#fff;border-radius:5px;cursor:pointer;margin:5px 0}
button:hover{background:#7c3aed}
textarea{width:100%;min-height:150px;padding:12px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:5px;font-family:monospace;font-size:13px}
#error{color:#ef4444;margin-top:10px;font-size:14px;display:none}
</style>
</head>
<body>
<a href="index.html">Home</a>
<div class="container">
<h1>Base64 Encoder/Decoder</h1>
<div class="grid">
<input id="inputText" placeholder="Enter text to encode/decode">
<div>
<select id="mode">
<option value="encode">Encode to Base64</option>
<option value="decode">Decode from Base64</option>
<option value="auto">Auto-Detect</option>
</select>
</div>
</div>
<button id="btn">Convert</button>
<textarea id="output" readonly></textarea>
<div id="error"></div>
</div>
<script>
document.getElementById('btn').addEventListener('click',convert);
function convert(){
const input=document.getElementById('inputText').value.trim();
const mode=document.getElementById('mode').value;
const output=document.getElementById('output');
const error=document.getElementById('error');
error.style.display='none';output.value='';
if(!input)return;
try{
if(mode==='encode')output.value=btoa(input);
else if(mode==='decode'){
try{output.value=atob(input);}catch{throw new Error('Invalid Base64');}
}
else{
if(isBase64(input))output.value=btoa(input);
else output.value=atob(input);
}
}catch(e){error.innerText=e.message;error.style.display='block';}
}
function isBase64(s){
try{atob(s);return!/[\s+=]/.test(s);return false;}catch{return false;}
}
</script>
</body>
</html>
