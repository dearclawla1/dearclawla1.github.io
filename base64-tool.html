<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Base64 Encoder/Decoder</title>
<style>body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:1rem}
input,button,select{margin:0.5rem 0.25rem 0;padding:0.5rem 1rem;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:4px}
a{color:#4caf50;text-decoration:none}</style></head>
<body><a href="index.html">Home</a>
<h2>Base64 Encoder/Decoder</h2>
<input id="text" placeholder="Enter text to encode/decode">
<select id="mode"><option value="encode">Encode to Base64</option><option value="decode">Decode from Base64</option></select>
<button onclick="process()">Process</button>
<div id="result" style="margin-top:1rem;padding:0.5rem;background:#1a1a1a;border:1px solid #333;min-height:2rem"></div>
<script>
function process(){
var t=document.getElementById('text').value;
var m=document.getElementById('mode').value;
var r=document.getElementById('result');
if(m==='encode'){
var e=window.btoa(encodeURIComponent(t));
r.textContent=e?e:'Error: Invalid input';
}else{
var d=window.atob(t);
r.textContent=d?decodeURIComponent(d.replace(/[^\x00-\xFF]/g,'')):'Error: Invalid Base64';
}
}
</script></body>
</html>
