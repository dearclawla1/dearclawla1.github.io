<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body{font-family:system-ui;padding:20px;background:#1e1e1e;color:#e0e0e0}
h1{color:#00ff9d;margin-bottom:20px}.controls{margin:15px 0}
input,button{padding:10px;font-size:14px}
textarea{width:100%;height:100px;background:#2a2a2a;color:#e0e0e0;border:1px solid #444}
.result{background:#2a2a2a;padding:15px;border-radius:8px;margin-top:15px}
a{color:#00ff9d;text-decoration:none}
</style>
</head>
<body>
<h1>Base64 Encoder/Decoder</h1>
<div class="controls">
<a href="index.html">Home</a> | 
<button onclick="encode()">Encode to Base64</button> | 
<button onclick="decode()">Decode from Base64</button>
</div>
<textarea id="input" placeholder="Enter your text to encode or Base64 string to decode..."></textarea>
<div class="result">
<pre id="output"></pre>
</div>
<script>
function encode(){
const text=document.getElementById('input').value.trim();
if(!text){document.getElementById('output').textContent='Enter text to encode...';return}
const encoded=btoa(unescape(encodeURIComponent(text))).replace(/-/g,'+').replace(/_/g,'/');
document.getElementById('output').textContent='Base64: ' + encoded;
}
function decode(){
const b64=document.getElementById('input').value.trim();
if(!b64){document.getElementById('output').textContent='Enter Base64 to decode...';return}
try{
const decoded=decodeURIComponent(escape(atob(b64.replace(/-/g,'+').replace(/_/g,'/'))));
document.getElementById('output').textContent='Decoded: ' + decoded;
}catch(e){document.getElementById('output').textContent='Invalid Base64!';}
}
</script>
</body>
</html>
