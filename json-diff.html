<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Diff Tool - Compare JSON Files</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            background: #0a0a0a;
            color: #e4e4e4;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #61dafb;
            margin-bottom: 20px;
            font-size: 2em;
        }
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .editor-box {
            position: relative;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 2px solid #3c3c3c;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            resize: vertical;
            min-width: 200px;
        }
        textarea:focus {
            outline: none;
            border-color: #61dafb;
        }
        .placeholder {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #666;
            pointer-events: none;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #61dafb;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            min-width: 120px;
        }
        button:hover {
            background: #4fa8c7;
        }
        button:disabled {
            background: #3c3c3c;
            cursor: not-allowed;
        }
        button.clear {
            background: #c74fa8;
        }
        button.clear:hover {
            background: #a84fa8;
        }
        #diffResult {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            border-left: 4px solid #61dafb;
            min-height: 100px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #61dafb;
        }
        .loading.visible {
            display: block;
        }
        .error {
            color: #ff6b6b;
            background: #2d1e1e;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
            .actions {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
        .shortcut-hint {
            color: #666;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JSON Diff Tool</h1>
        <p style="color:#888;margin-bottom:20px;">Compare two JSON objects or arrays. Paste JSON on the left and right, then click "Compare JSON" to see the differences.</p>
        
        <div class="loading" id="loading">
            Processing JSON...
        </div>
        
        <div class="editor-container">
            <div class="editor-box">
                <textarea id="json1" placeholder="Paste first JSON here..."></textarea>
                <div class="shortcut-hint">Press Enter to clear, or use Ctrl+Enter to compare</div>
            </div>
            <div class="editor-box">
                <textarea id="json2" placeholder="Paste second JSON here..."></textarea>
                <div class="shortcut-hint">Press Enter to clear</div>
            </div>
        </div>
        
        <div class="actions">
            <button id="compareBtn">Compare JSON</button>
            <button id="minifyBtn">Minify JSON</button>
            <button id="validateBtn" class="clear">Validate JSON</button>
            <button id="clearBtn" class="clear">Clear All</button>
        </div>
        
        <div id="diffResult"></div>
        
        <div id="errorMessage" class="error" style="display:none;"></div>
    </div>
    
    <script>
        const json1 = document.getElementById('json1');
        const json2 = document.getElementById('json2');
        const diffResult = document.getElementById('diffResult');
        const compareBtn = document.getElementById('compareBtn');
        const minifyBtn = document.getElementById('minifyBtn');
        const validateBtn = document.getElementById('validateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        
        let prevJson1 = '';
        let prevJson2 = '';
        
        function showLoading(show) {
            loading.classList.toggle('visible', show);
        }
        
        function hideError() {
            errorMessage.style.display = 'none';
            diffResult.innerHTML = '';
        }
        
        function showShortcuts(event) {
            if (event.key === 'Enter' && event.target === json1) {
                hideError();
                json1.value = '';
            }
        }
        
        function validateJson(jsonStr) {
            try {
                JSON.parse(jsonStr);
                return true;
            } catch (e) {
                return false;
            }
        }
        
        function minifyJson(jsonStr) {
            if (!validateJson(jsonStr)) {
                throw new Error('Invalid JSON');
            }
            return JSON.stringify(JSON.parse(jsonStr), null, 2);
        }
        
        function compareJson(json1, json2) {
            const obj1 = JSON.parse(json1);
            const obj2 = JSON.parse(json2);
            let changes = [];
            
            function getChanges(current, original, path = '') {
                if (typeof current !== typeof original) {
                    changes.push(path ? `${path}: Type changed from ${typeof original} to ${typeof current}` : 'Type changed');
                    return;
                }
                
                if (Array.isArray(current)) {
                    for (let i = 0; i < Math.max(current.length, original.length); i++) {
                        const newPath = path ? `${path}[${i}]` : `[${i}]`;
                        if (i >= current.length) {
                            changes.push(`${newPath}: Deleted`);
                        } else if (i >= original.length) {
                            changes.push(`${newPath}: Added`);
                        } else if (current[i] !== original[i]) {
                            getChanges(current[i], original[i], newPath);
                        }
                    }
                } else {
                    const keys = new Set([...Object.keys(current), ...Object.keys(original)]);
                    for (const key of keys) {
                        const newPath = path ? `${path}.${key}` : key;
                        if (!current.hasOwnProperty(key) && original.hasOwnProperty(key)) {
                            changes.push(`${newPath}: Deleted`);
                        } else if (current.hasOwnProperty(key) && !original.hasOwnProperty(key)) {
                            changes.push(`${newPath}: Added`);
                        } else if (current[key] !== original[key]) {
                            getChanges(current[key], original[key], newPath);
                        }
                    }
                }
            }
            
            getChanges(obj2, obj1);
            return changes;
        }
        
        function formatChanges(changes) {
            if (changes.length === 0) {
                return 'No changes detected. The JSON objects are identical.';
            }
            const grouped = {};
            for (const change of changes) {
                const match = change.match(/^(.+):\s+(.+)$/) || { groups: [change] };
                const before = match.groups[0] || change;
                const after = match.groups[1] || change;
                const type = after.toLowerCase();
                if (!grouped[type]) grouped[type] = [];
                grouped[type].push(before);
            }
            let result = 'Detected the following changes:\n';
            for (const [type, items] of Object.entries(grouped)) {
                result += `\n=== ${type.toUpperCase()} (${items.length}) ===\n`;
                items.forEach(item => result += `  - ${item}\n`);
            }
            return result;
        }
        
        function checkEqual(json1, json2) {
            const obj1 = JSON.parse(json1);
            const obj2 = JSON.parse(json2);
            return JSON.stringify(obj1) === JSON.stringify(obj2);
        }
        
        compareBtn.addEventListener('click', () => {
            hideError();
            hideError();
            if (!json1.value || !json2.value) {
                errorMessage.textContent = 'Please enter JSON in both boxes.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (!validateJson(json1.value)) {
                errorMessage.textContent = 'Invalid JSON in first box.';
                errorMessage.style.display = 'block';
                return;
            }
            if (!validateJson(json2.value)) {
                errorMessage.textContent = 'Invalid JSON in second box.';
                errorMessage.style.display = 'block';
                return;
            }
            
            if (json1.value === json2.value) {
                diffResult.textContent = 'JSON values are identical.';
                return;
            }
            
            showLoading(true);
            setTimeout(() => {
                try {
                    const changes = compareJson(json1.value, json2.value);
                    diffResult.textContent = formatChanges(changes);
                } catch (e) {
                    errorMessage.textContent = 'Error comparing JSON: ' + e.message;
                    errorMessage.style.display = 'block';
                }
                showLoading(false);
            }, 50);
        });
        
        minifyBtn.addEventListener('click', () => {
            if (!json1.value || !json2.value) {
                return;
            }
            if (!validateJson(json1.value)) {
                errorMessage.textContent = 'Invalid JSON in first box.';
                errorMessage.style.display = 'block';
                return;
            }
            if (!validateJson(json2.value)) {
                errorMessage.textContent = 'Invalid JSON in second box.';
                errorMessage.style.display = 'block';
                return;
            }
            showLoading(true);
            setTimeout(() => {
                const minified = minifyJson(json1.value);
                json1.value = minified;
                showLoading(false);
            }, 50);
        });
        
        validateBtn.addEventListener('click', () => {
            if (!json1.value && !json2.value) {
                errorMessage.textContent = 'Please enter JSON to validate.';
                errorMessage.style.display = 'block';
                return;
            }
            showLoading(true);
            setTimeout(() => {
                const valid1 = validateJson(json1.value);
                const valid2 = validateJson(json2.value);
                if (valid1 && valid2) {
                    diffResult.textContent = 'Both JSON values are valid!';
                } else if (valid1) {
                    diffResult.textContent = 'First JSON is valid.\n' + (valid2 ? '' : 'Second JSON is invalid.');
                } else {
                    diffResult.textContent = 'First JSON is invalid.' + (valid2 ? '\n' : '') + 'Second JSON is valid.';
                }
                showLoading(false);
            }, 50);
        });
        
        clearBtn.addEventListener('click', () => {
            hideError();
            json1.value = '';
            json2.value = '';
        });
        
        json1.addEventListener('input', (e) => {
            prevJson1 = json1.value;
        });
        json2.addEventListener('input', (e) => {
            prevJson2 = json2.value;
        });
        
        json1.addEventListener('keydown', showShortcuts);
        json2.addEventListener('keydown', () => {
            if (event.key === 'Enter' && event.target === json2) {
                json2.value = '';
            }
        });
        
        compareBtn.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                compareBtn.click();
            }
        });
    </script>
</body>
</html>
