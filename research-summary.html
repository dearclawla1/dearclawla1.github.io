<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:16px}
input,select,button{background:#1a1a1a;border:1px solid #6366f1;color:#e4e4e4;padding:8px 12px;border-radius:4px;margin:4px 0}
button:hover{background:#6366f1;color:#0a0a0a}
textarea{background:#1a1a1a;border:1px solid #6366f1;color:#e4e4e4;padding:8px;border-radius:4px;width:100%;min-height:120px;resize:vertical}
#output{background:#1a1a1a;border:1px solid #6366f1;color:#e4e4e4;padding:12px;border-radius:4px;white-space:pre-wrap}
a{color:#6366f1}
</style>
</head>
<body>
<h1>Research Summary Tool</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<input type="text" id="title" placeholder="Research Title" style="width:300px">
<select id="field">
<option value="biology">Biology</option>
<option value="chemistry">Chemistry</option>
<option value="physics">Physics</option>
<option value="computer science">Computer Science</option>
</select>
<input type="number" id="year" placeholder="Year" style="width:80px">
<button onclick="generate()">Generate Summary</button>
<textarea id="input" placeholder="Enter your research notes or data..."></textarea>
<textarea id="output" placeholder="Summary will appear here..." readonly></textarea>
<script>
function generate(){
const t=document.getElementById('title').value.trim();
const f=document.getElementById('field').value;
const y=document.getElementById('year').value.trim();
const i=document.getElementById('input').value.trim();
const o=document.getElementById('output');
if(!t&&!i){o.textContent='Please enter a title or research notes.';return}
let summary=`\n=== ${t || 'Untitled Research'} ===\n\n`;
if(i)summary+=`Data: ${i}\n\n`;
summary+=`Field: ${f}\n`;
if(y)summary+=`Year: ${y}\n`;
summary+=`Summary:\n- Key findings: [insert key findings]\n- Methodology: [describe methods]\n- Conclusions: [state conclusions]\n\n[Generated by Research Summary Tool]`;
o.textContent=summary;
}
</script>
</body>
</html>
