<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Research Summary Tool</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}
input,select,button{display:block;margin:10px 0;padding:8px;border-radius:4px;border:none;font-size:14px}
button{background:#6366f1;color:#fff;cursor:pointer}
button:hover{background:#5558e6}
#output{background:#111;padding:15px;border-radius:4px;margin-top:15px;min-height:100px;white-space:pre-wrap}
</style>
</head>
<body>
<h1>Research Summary Tool</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<input type="text" id="title" placeholder="Research Title" required>
<textarea id="content" placeholder="Enter your research content..." rows="5" required></textarea>
<select id="category">
<option value="">Select Category</option>
<option value="AI">Artificial Intelligence</option>
<option value="Web">Web Development</option>
<option value="Data">Data Science</option>
<option value="Security">Cybersecurity</option>
</select>
<button onclick="summarize()">Generate Summary</button>
<div id="output"></div>
<script>
function summarize(){
const title=document.getElementById('title').value;
const content=document.getElementById('content').value;
const category=document.getElementById('category').value;
if(!title||!content){alert('Please fill all fields');return}
let summary=`📄 <strong>Summary:</strong> ${content.substring(0,100)}${content.length>100?'...':''}`;
if(category)summary+`\n\n🏷️ <strong>Category:</strong> ${category}`;
if(title)summary+`\n\n📝 <strong>Title:</strong> ${title}`;
document.getElementById('output').innerHTML=summary;
}
</script>
</body>
</html>
