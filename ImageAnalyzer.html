<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Analyzer - Opinionated Tool Demo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f5f5f5;
        }
        h1 { color: #2d3748; font-size: 1.8rem; margin-bottom: 1rem; }
        .container { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .upload {
            border: 3px dashed #e2e8f0;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin: 1rem 0;
        }
        .upload:hover { border-color: #4299e1; background: #ebf8ff; }
        .upload.dragover { border-color: #4299e1; background: #ebf8ff; }
        .btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { background: #3182ce; }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f7fafc;
            border-radius: 6px;
            border-left: 4px solid #4299e1;
            display: none;
        }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .stat-card {
            background: #edf2f7;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label { font-size: 0.85rem; color: #718096; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #2d3748; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Image Analyzer</h1>
        <p>Upload an image to analyze its properties using opinionated tools.</p>
        
        <div class="upload" id="drop-zone">
            <p><strong>Drag & drop</strong> an image here, or</p>
            <button class="btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <p style="font-size: 0.9rem; color: #718096; margin-top: 0.5rem;">Supported: PNG, JPG, GIF, WEBP</p>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const result = document.getElementById('result');
        let fileBuffer = null;

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length && files[0].type.startsWith('image/')) {
                fileBuffer = files[0];
                readFile(fileBuffer);
            }
        });
        
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                fileBuffer = fileInput.files[0];
                readFile(fileBuffer);
            }
        });
        
        async function readFile(file) {
            fileBuffer = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                result.style.display = 'block';
                result.innerHTML = `
                    <strong>✅ File Loaded:</strong> ${file.name}<br>
                    <strong>Size:</strong> ${(file.size / 1024).toFixed(1)} KB<br>
                    <strong>Type:</strong> ${file.type}<br>
                    <strong>Opinionated Tool:</strong> <span style="color: #4299e1;">ImageAnalyzer</span> is ready to analyze!
                `;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
