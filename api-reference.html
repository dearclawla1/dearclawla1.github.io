<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Quick Reference</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
h1{color:#6366f1}
input,button,select{margin:5px 0;background:#333;color:#e4e4e4;border:1px solid #555;padding:5px;border-radius:4px}
button{cursor:pointer}
select{width:100%}
pre{background:#1a1a1a;padding:10px;border-radius:4px;overflow:auto}
</style>
</head>
<body>
<h1>API Quick Reference</h1>

<p>Welcome to the API Quick Reference. This page allows you to quickly look up API endpoints and their parameters.</p>

<div class="api-section">
    <h2>Available Endpoints</h2>
    <select id="endpoint-select">
        <option value="users">/api/users</option>
        <option value="posts">/api/posts</option>
        <option value="comments">/api/comments</option>
        <option value="auth">/api/auth</option>
    </select>

    <input type="text" id="endpoint-param" placeholder="Enter parameter name (e.g., limit, offset)">
    <button id="get-endpoint">Get Endpoint Info</button>

    <pre id="endpoint-output"></pre>
</div>

<div class="api-section">
    <h2>Quick Actions</h2>
    <button id="reset-btn">Reset All</button>
    <button id="load-all">Load All Endpoints</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const endpointSelect = document.getElementById('endpoint-select');
    const endpointParam = document.getElementById('endpoint-param');
    const getEndpointBtn = document.getElementById('get-endpoint');
    const endpointOutput = document.getElementById('endpoint-output');
    const resetBtn = document.getElementById('reset-btn');
    const loadAllBtn = document.getElementById('load-all');

    // API data mock
    const apiData = {
        '/api/users': {
            methods: ['GET', 'POST'],
            params: ['limit', 'offset', 'filter', 'sort'],
            description: 'Manage user accounts and profiles'
        },
        '/api/posts': {
            methods: ['GET', 'POST', 'PUT', 'DELETE'],
            params: ['limit', 'offset', 'author_id', 'status'],
            description: 'Create and manage blog posts'
        },
        '/api/comments': {
            methods: ['GET', 'POST'],
            params: ['post_id', 'user_id', 'limit', 'offset'],
            description: 'Add comments to posts'
        },
        '/api/auth': {
            methods: ['GET', 'POST', 'PUT'],
            params: ['token', 'refresh_token', 'verify'],
            description: 'Authentication and authorization endpoints'
        }
    };

    getEndpointBtn.addEventListener('click', function() {
        const endpoint = endpointSelect.value;
        const param = endpointParam.value.trim();
        
        if (!param) {
            endpointOutput.textContent = 'Please enter a parameter name.';
            return;
        }

        const endpointInfo = apiData[endpoint];
        if (endpointInfo && endpointInfo.params.includes(param)) {
            endpointOutput.textContent = `Parameter "${param}" is valid for ${endpoint}.`;
            endpointOutput.style.color = '#6366f1';
        } else if (endpointInfo) {
            endpointOutput.textContent = `Available parameters for ${endpoint}: ${endpointInfo.params.join(', ')}`;
            endpointOutput.style.color = '#e4e4e4';
        } else {
            endpointOutput.textContent = 'Endpoint not found.';
            endpointOutput.style.color = '#ff6b6b';
        }
    });

    resetBtn.addEventListener('click', function() {
        endpointSelect.value = '/api/users';
        endpointParam.value = '';
        endpointOutput.textContent = '';
        endpointOutput.style.color = '#e4e4e4';
    });

    loadAllBtn.addEventListener('click', function() {
        const output = endpointOutput;
        output.textContent = 'Loading all endpoints...\n\n' + 
            Object.entries(apiData).map(([ep, info]) => 
                `${ep} - Methods: ${info.methods.join(', ')}\n` +
                `Description: ${info.description}\n` +
                `Params: ${info.params.join(', ')}`
            ).join('\n\n');
    });

    // Keyboard shortcut: Enter to submit
    endpointParam.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            getEndpointBtn.click();
        }
    });
});
</script>
</body>
</html>
