<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Markdown Live Previewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.2/markdown-it.min.js"></script>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
.container{max-width:1200px;margin:0 auto;display:flex;gap:20px}
.editor-panel{flex:1}
.preview-panel{flex:1;background:#1a1a1a;padding:20px;border-radius:8px;overflow:auto;min-height:400px}
textarea{width:100%;height:300px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:12px;font-size:14px;resize:vertical;border-radius:4px;font-family:inherit}
button{background:#6366f1;color:white;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;font-size:14px;margin-top:10px}
button:hover{background:#4f46e5}
button:active{transform:scale(0.98)}
a{color:#6366f1;text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3{margin-top:0}
code{background:#2a2a2a;padding:2px 6px;border-radius:3px;font-size:0.9em}
pre{background:#2a2a2a;padding:12px;border-radius:4px;overflow-x:auto;margin:10px 0}
pre code{background:transparent;padding:0}
blockquote{border-left:4px solid #6366f1;padding-left:15px;margin:10px 0;color:#aaa}
ul,ol{padding-left:20px}
img{max-width:100%;border-radius:4px}
table{border-collapse:collapse;width:100%;margin:10px 0}
th,td{border:1px solid #444;padding:8px;text-align:left}
th{background:#2a2a2a}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h1>Markdown Live Previewer</h1>
<div class="container">
<div class="editor-panel">
<textarea id="input" placeholder="Type markdown here..."></textarea>
<button onclick="update()">Update Preview</button>
</div>
<div class="preview-panel" id="output"></div>
</div>
<script>
const md = window.markdownit({html:true,typographer:true});

function update() {
let input=document.getElementById('input').value;
let output=document.getElementById('output');
let html=md.render(input);
output.innerHTML=html;
output.querySelectorAll('pre code').forEach((block)=>{hljs.highlightElement(block)});
}

// Auto-update on input
document.getElementById('input').addEventListener('input', update);

// Initial render
update();
</script>
</body>
</html>
