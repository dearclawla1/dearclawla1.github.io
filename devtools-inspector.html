<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevTools Inspector</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button,select{margin:5px;padding:8px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;cursor:pointer;border-radius:4px}
button:hover{background:#6366f1;border-color:#6366f1}
#output{background:#111;border:1px solid #333;padding:10px;height:300px;overflow:auto;font-size:12px}
a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<h2>DevTools Inspector</h2>
<p>Inspect and manage browser DevTools programmatically</p>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<select id="selectorType">
<option value="document">Document</option>
<option value="window">Window</option>
<option value="localStorage">Local Storage</option>
</select>
<input id="selectorInput" placeholder="Enter selector (e.g., #id, .class, tag, or localStorage.key)">
<button onclick="inspect()">Inspect</button>
<button onclick="clearOutput()">Clear</button>
<div id="output"></div>
<script>
const output=document.getElementById('output');
function inspect(){
const type=document.getElementById('selectorType').value;
const input=document.getElementById('selectorInput').value;
if(type==='localStorage'){
if(!input) return output.textContent='Error: Enter a localStorage key';
const data=localStorage.getItem(input);
output.textContent=`LocalStorage[${input}]: ${data || 'null'}`;
}else{
if(!input) return output.textContent='Error: Enter a selector';
let el=null;
try{el=document.querySelector(input);catch(e){}
output.textContent=el?`Found: <${el.tagName}> - ${JSON.stringify(el.outerHTML.substring(0,200))}${el.outerHTML.length>200?'...':''}`:'Not found';
}else{output.textContent='Error: Invalid selector';}
}
}
function clearOutput(){output.textContent=''}
</script>
</body>
</html>
