<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Hash Generator</title><style>body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;min-height:100vh;display:flex;flex-direction:column;align-items:center;}a{color:#00ff88;white-space:nowrap;}input,button{margin:10px 0;padding:10px;font-size:14px;min-width:150px;}button{background:#333;color:#e4e4e4;border:1px solid #555;cursor:pointer;}button:hover{background:#444;}textarea{width:95%;height:150px;margin-top:10px;padding:10px;background:#1a1a1a;border:1px solid #555;color:#e4e4e4;font-family:monospace;}h1{margin:0 0 10px 0;font-size:18px;}</style></head><body><a href="index.html">Home</a><h1>Hash Generator</h1><input type="text" id="inputText" placeholder="Enter text or paste content here..."><button onclick="hashContent()">Generate Hash</button><textarea id="output"></textarea><script>function hashContent(){const input=document.getElementById('inputText').value;const text=input.trim()||'input';const hash=window.btoa(text).replace(/=/g,'');document.getElementById('output').value='MD5-like: '+hash+' (Base64: '+window.btoa(text)+')';}</script></body></html>
