<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Script Playground</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:10px}
input,button,select{margin:5px 0;background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;padding:8px;border-radius:4px}
button{cursor:pointer}
textarea{width:100%;height:150px;background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;padding:8px;border-radius:4px;resize:vertical}
#output{background:#1a1a1a;color:#e4e4e4;padding:10px;border-radius:4px;margin-top:10px;font-family:monospace;min-height:100px}
#history{background:#1a1a1a;color:#e4e4e4;padding:10px;border-radius:4px;margin-top:10px;font-family:monospace;min-height:100px}
a{color:#6366f1;text-decoration:none}
.history-item{margin:5px 0;padding:5px;background:#1a1a1a;border:1px solid #6366f1;border-radius:3px}
.history-item button{margin-left:5px;font-size:12px;padding:4px}
</style>
</head>
<body>
<h1>Script Playground</h1>
<div id="controls">
<label>Input JS:</label><textarea id="input" placeholder="Type JavaScript here..."></textarea><br>
<button onclick="run()">Run Script</button>
<button onclick="clear()">Clear</button>
<button onclick="clearHistory()">Clear History</button>
</div>
<div id="output">Output will appear here...</div>
<div id="history">Execution History</div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
let history = [];
function run(){
var input=document.getElementById('input').value;
try{
var result=(0,eval)(input);
var output='Result: '+JSON.stringify(result,null,2);
document.getElementById('output').innerHTML=output;
var timestamp=new Date().toLocaleTimeString();
var historyItem={timestamp:timestamp,result:output};
history.push(historyItem);
updateHistory();
}catch(e){
var output='Error: '+e.message;
document.getElementById('output').innerHTML=output;
var timestamp=new Date().toLocaleTimeString();
var historyItem={timestamp:timestamp,result:output,error:true};
history.push(historyItem);
updateHistory();
}
}
function clear(){
document.getElementById('input').value='';
document.getElementById('output').innerHTML='';
}
function clearHistory(){
history=[];
updateHistory();
}
function updateHistory(){
var historyDiv=document.getElementById('history');
var html='';
if(history.length===0){
html='No executions yet...';
}else{
html='<div style="margin-bottom:5px;font-weight:bold;">Previous Executions ('+history.length+')</div>';
history.forEach(function(item){
html+='<div class="history-item"><span style="color:#6366f1;font-size:12px;">'+item.timestamp+'</span> '+item.result.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
});
}
historyDiv.innerHTML=html;
}
</script>
</body>
</html>
