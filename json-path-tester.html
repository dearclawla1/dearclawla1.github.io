<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>JSON Path Tester</title>
<style>body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}
.container{max-width:800px;margin:0 auto}
input,select,button{padding:8px 12px;margin:5px 0;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;font-size:14px}
input,select{width:100%;box-sizing:border-box}
button{background:#6366f1;color:white;border:none;cursor:pointer}
button:hover{background:#5558e6}
#json-input{min-height:150px;font-family:monospace;font-size:13px;padding:10px;background:#111;border:1px solid #333}
#result{min-height:100px;font-family:monospace;font-size:13px;background:#111;padding:10px;white-space:pre-wrap}
label{display:block;margin:10px 0 5px;font-weight:bold}</style>
</head>
<body><a href="index.html" style="color:#6366f1">Back to Home</a><br>
<h2>JSON Path Tester</h2>
<div class="container">
<label>Enter JSON:</label>
<input id="json-input"><br>
<label>Select Path:</label>
<select id="path-select">
<option value=".">.</option><option value="$.">$.</option><option value="$..">$..</option>
<option value="$.name">$.name</option><option value="$.store.address">$.store.address</option>
<option value="$.address">$.address</option><option value="$.books">$.books</option>
</select><br>
<button onclick="evaluate()">Test</button><br>
<label>Result:</label>
<div id="result"></div>
</div>
<script>
const jsonExample = '{\n  "name": "John",\n  "age": 30,\n  "store": {\n    "address": "123 Main St"\n  },\n  "books": ["Book1", "Book2"]\n}';
document.getElementById('json-input').value = jsonExample;
function evaluate() {
  const jsonStr = document.getElementById('json-input').value;
  const path = document.getElementById('path-select').value;
  try {
    const obj = JSON.parse(jsonStr);
    const result = eval(path);
    document.getElementById('result').textContent = JSON.stringify(result, null, 2);
  } catch (e) {
    document.getElementById('result').textContent = 'Error: ' + e.message;
  }
}
eval('evaluate');
</script>
</body>
</html>
