<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Path Tester</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;padding:20px}
input,button,select{background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;padding:8px;margin:5px 0;border-radius:4px}
textarea{background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;width:100%;height:150px;padding:8px;font-family:monospace}
button{background:#6366f1;color:#0a0a0a;font-weight:bold;cursor:pointer}
button:hover{background:#4f46e5}
#output{background:#1a1a1a;padding:10px;border:1px solid #6366f1;min-height:50px;white-space:pre-wrap}
a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a><br><br>
<h2>JSON Path Tester</h2>
<textarea id="jsonInput"></textarea><br>
<input type="text" id="pathInput" placeholder="Enter JSON path (e.g., $.store.banks[0].accounts[0].balance)">
<button onclick="evaluatePath()">Test Path</button>
<div id="output">Output will appear here...</div>
<script>
function evaluatePath(){
const json=document.getElementById('jsonInput').value.trim();
const path=document.getElementById('pathInput').value.trim();
const output=document.getElementById('output');
try{
if(!json)throw new Error("No JSON provided");
const obj=JSON.parse(json);
if(!path)throw new Error("No path provided");
const result=getPath(obj,path);
if(result===undefined)output.textContent="Result: undefined (path not found)";
else if(Array.isArray(result)){
let str="Result (Array): [";
result.forEach((r,i)=>str+=r+",".slice(0,-1));
output.textContent="Result (Array): "+str.substring(0,str.length-1);
}else{
output.textContent="Result: "+JSON.stringify(result);
}
}catch(e){
output.textContent="Error: "+e.message;
}
}
function getPath(obj,path){
let result=obj;
const segments=path.split('.').filter(s=>s);
for(let i=0;i<segments.length;i++){
const seg=segments[i];
if(!result)break;
if(seg.startsWith('$')||seg.startsWith('['))throw new Error("Invalid path: "+path);
if(seg.includes('[')){
const parts=seg.match(/^(.+)\[(\d+)\]$/);
if(!parts)throw new Error("Invalid path: "+path);
result=result[parts[1]][parts[2]];
}else{
result=result[seg];
}
}
return result;
}
</script>
</body>
</html>
