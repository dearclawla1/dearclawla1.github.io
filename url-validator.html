<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Validator</title>
<style>
body{font-family:system-ui;margin:0;background:#0a0a0a;color:#e4e4e4;padding:2rem}
input,select,button{padding:0.5rem;margin:0.5rem 0;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;border-radius:4px;outline:none}
button{cursor:pointer}
a{font-size:0.9rem}
</style>
</head>
<body>
<h1>URL Validator</h1>
<input id="urlInput" placeholder="Enter URL (e.g., https://example.com)">
<button onclick="validate()">Validate</button>
<div id="result"></div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
function validate(){
const url=document.getElementById('urlInput').value;
const res=document.getElementById('result');
try{
new URL(url);
res.innerHTML='<span style="color:#4ade80">Valid URL</span>';
}catch(e){
res.innerHTML='<span style="color:#f87171">Invalid URL</span>';
}
}
</script>
</body>
</html>
