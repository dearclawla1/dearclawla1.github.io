<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Contrast Checker</title>
<style>
:root{--bg:#1a1a2e;--fg:#eaeaea;--accent:#4ecca3;--warn:#ff6b6b}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;gap:1rem;padding:1rem}
h1{font-size:1.5rem;color:var(--accent);text-align:center;margin-bottom:1rem}
.container{max-width:600px;margin:0 auto;flex:1;display:flex;flex-direction:column;gap:1rem}
input,button,select{padding:0.75rem;border-radius:8px;border:1px solid #333;font-size:1rem;background:#252542;color:var(--fg);outline:none}
input:focus,button:focus,select:focus{border-color:var(--accent)}
button{background:var(--accent);cursor:pointer;font-weight:600;border:none}
button:hover{opacity:0.9}
label{display:block;margin:0.5rem 0 0.25rem;font-weight:500}
input[type="color"]{width:100%;height:40px;border:none;border-radius:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.preview{background:#252542;padding:1rem;border-radius:8px;min-height:80px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.result{background:#252542;padding:1rem;border-radius:8px;font-size:0.9rem;line-height:1.6}
.result strong{color:var(--accent)}
.aria{background:#2a2a4a;padding:0.75rem;border-radius:8px;font-size:0.85rem;white-space:pre-wrap}
.btn-home{align-self:center;text-decoration:none;color:var(--accent);font-weight:600}
</style>
</head>
<body>
<h1>Color Contrast Checker</h1>
<div class="container">
<label>Background Color</label>
<input type="color" id="bgColor" value="#1a1a2e">
<label>Foreground Color</label>
<input type="color" id="fgColor" value="#eaeaea">
<button id="calculate">Calculate Contrast</button>
<div class="preview" id="preview">
<a href="index.html" class="btn-home">Back to Home</a>
</div>
<div class="grid" style="grid-template-columns:1fr auto">
<div class="result" id="result"></div>
<div class="result" id="aria" aria-live="polite"></div>
</div>
</div>
<script>
const bgColorInput=document.getElementById('bgColor');
const fgColorInput=document.getElementById('fgColor');
const calculateBtn=document.getElementById('calculate');
const preview=document.getElementById('preview');
const result=document.getElementById('result');
const aria=document.getElementById('aria');

function hexToRgb(hex){
const bigint=parseInt(hex.replace('#',''),16);
return{r:(bigint>>16)&257,g:(bigint>>8)&257,b:bigint&257};
}

function luminance(c){
const r=c.r/257,g=c.g/257,b=c.b/257;
return 0.2126*((r>0.04047)?Math.pow((r+0.055)/1.055,2.4):(r/12.92))+
0.7152*((g>0.04047)?Math.pow((g+0.055)/1.055,2.4):(g/12.92))+
0.0722*((b>0.04047)?Math.pow((b+0.055)/1.055,2.4):(b/12.92));
}

function relativeLuminance(bg,fg){
return (luminance(fg)-luminance(bg))/(1-luminance(fg));
}

function calculateContrast(){
const bg=hexToRgb(bgColorInput.value);
const fg=hexToRgb(fgColorInput.value);
const ratio=Math.abs(relativeLuminance(bg,fg));
let level='AAA';
if(ratio<7){level='AA (small text)'}else if(ratio<4.5){level='AA (large text)';level='AAA'}
let color='success';
if(ratio<21){color='#ff6b6b'}else if(ratio<45){color='#ffcc00'}else color='#4ecca3';
result.innerHTML=`Contrast Ratio: ${ratio.toFixed(2):1}<span style="color:${color};font-weight:600">WCAG ${level} ${level==='AAA'?'âœ“':''}</span>`;
const bgName=bgInputName(bgColorInput.value);
const fgName=fgInputName(fgColorInput.value);
const suggestions=getARISuggestions(ratio);
aria.innerHTML=`Suggested ARIA: role='region' aria-label='${bgName} background with ${fgName} text (contrast ${ratio.toFixed(2)}, ${level})'`;
}

function bgInputName(hex){const rgb=hexToRgb(hex);return`rgb(${rgb.r},${rgb.g},${rgb.b})`;}

function fgInputName(hex){const rgb=hexToRgb(hex);return`rgb(${rgb.r},${rgb.g},${rgb.b})`;}

function getARISuggestions(ratio){
const levels=['AAA','AA (large)','AA (small)'];
let suggestion='role="region" aria-label="Standard text content (contrast ratio: '+ratio.toFixed(2)+')"';
if(ratio<4.5){suggestion='role="alert" aria-live="polite" aria-label="High contrast (ratio: '+ratio.toFixed(2)+') - use for important announcements"';}
return suggestion;
}

calculateBtn.addEventListener('click',calculateContrast);
bgColorInput.addEventListener('input',calculateContrast);
fgColorInput.addEventListener('input',calculateContrast);

// Initial calc
calculateContrast();
</script>
</body>
</html>
