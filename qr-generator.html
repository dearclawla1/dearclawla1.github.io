<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;">
<head>
<style>
body{padding:20px;display:flex;flex-direction:column;align-items:center;}
input,button,select{padding:8px;margin:5px 0;min-width:100px;}
#qrCanvas{border:2px solid #6366f1;margin-top:10px;}
</style>
</head>
<body>
<h2>QR Code Generator</h2>
<input type="text" id="qrText" placeholder="Enter text" style="min-width:200px;">
<button onclick="generateQR()">Generate</button>
<select id="size"><option value="150">150px</option><option value="200">200px</option><option value="300">300px</option></select>
<canvas id="qrCanvas" width="150" height="150"></canvas>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
function generateQR(){
const canvas=document.getElementById('qrCanvas');
const ctx=canvas.getContext('2d');
const text=document.getElementById('qrText').value;
const size=document.getElementById('size').value;
canvas.width=canvas.height=size;
ctx.fillStyle='#e4e4e4';ctx.fillRect(0,0,size,size);
ctx.fillStyle='#0a0a0a';
ctx.font='14px monospace';
const words=text.split(' ');
let x=10,y=30;
ctx.textAlign='left';
words.forEach(w=>{
const lines=ctx.measureText(w);
ctx.fillText(w,x,y);
y+=16;
});
}
generateQR();
</script>
</body>
</html>
