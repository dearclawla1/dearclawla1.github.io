<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
input,button{padding:10px;margin:5px 0;font-family:monospace;border:1px solid #6366f1;border-radius:4px;}
button{background:#6366f1;color:#0a0a0a;}
.output{background:#1a1a1a;padding:15px;margin:15px 0;border-radius:4px;}
.history{background:#1a1a1a;padding:15px;margin:15px 0;border-radius:4px;}
.history-title{color:#6366f1;margin-bottom:10px;}
.history-item{display:flex;justify-content:space-between;padding:5px;border-bottom:1px solid #333;}
.history-item:last-child{border-bottom:none;}
.history-item .num{color:#e4e4e4;font-weight:bold;}
.history-item .time{color:#888;font-size:0.8em;}
a{color:#6366f1;text-decoration:none;}
</style>
</head>
<body>
<h1>Random Number Generator</h1>
<div>
<label>Min:</label><input type="number" id="min" value="1">
<label>Max:</label><input type="number" id="max" value="100">
<button onclick="generate()">Generate</button>
</div>
<div class="output" id="output"></div>
<div class="history" id="history">
<div class="history-title">Generated Numbers:</div>
<div id="history-items"></div>
</div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
let history = [];

function generate(){
const min = parseInt(document.getElementById('min').value);
const max = parseInt(document.getElementById('max').value);
const num = Math.floor(Math.random()*(max-min+1))+min;
const timestamp = new Date().toLocaleTimeString();
document.getElementById('output').innerHTML = `<strong>Random Number:</strong> ${num}`;
history.unshift({num, time: timestamp});
if(history.length > 50) history.pop();
renderHistory();
}

function renderHistory(){
const container = document.getElementById('history-items');
container.innerHTML = history.map(item => 
`<div class="history-item">
<span class="num">${item.num}</span>
<span class="time">${item.time}</span>
</div>`
).join('');
}
</script>
</body>
</html>
