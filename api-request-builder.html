<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
input,select,textarea{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:8px;margin:5px 0;width:100%}
button{background:#6366f1;border:none;color:#fff;padding:10px 20px;cursor:pointer}
button:hover{background:#5558ff}
#output{background:#1a1a1a;border:1px solid #333;padding:15px;min-height:100px;white-space:pre-wrap;overflow:auto}
#output.error{border-color:#ef4444}
#output.success{border-color:#22c55e}
#output.result{border-color:#6366f1}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
input,select,textarea,button{animation:fadeIn 0.3s ease-out}
input:focus,select:focus,textarea:focus{border-color:#6366f1;outline:none;box-shadow:0 0 0 2px rgba(99,102,241,0.2)}
</style>
</head>
<body>
<h1>API Request Builder</h1>
<div style="max-width:600px;margin:0 auto">
<p>Build and test API requests. Press <strong>Enter</strong> to submit.</p>
<form id="request-form">
<div style="margin-bottom:15px">
<label>Method:</label>
<select id="method" name="method">
<option value="GET">GET</option>
<option value="POST">POST</option>
<option value="PUT">PUT</option>
<option value="DELETE">DELETE</option>
</select>
</div>
<div style="margin-bottom:15px">
<label>URL:</label>
<input type="text" id="url" name="url" placeholder="https://api.example.com/endpoint" required>
</div>
<div style="margin-bottom:15px">
<label>Headers (JSON):</label>
<textarea id="headers" name="headers" placeholder='{"Content-Type": "application/json"}' style="height:80px"></textarea>
</div>
<div style="margin-bottom:15px">
<label>Body (JSON):</label>
<textarea id="body" name="body" placeholder='{"name": "value"}' style="height:100px"></textarea>
</div>
<div style="margin-bottom:15px">
<label>Query Params:</label>
<input type="text" id="query" name="query" placeholder="param1=value1&param2=value2">
</div>
<button type="submit">Build Request</button>
<button type="button" id="clear-btn">Clear</button>
<button type="button" id="download-btn">Download Result</button>
</form>
<h2>Output:</h2>
<div id="output" aria-live="polite"></div>
</div>
<script>
(function(){
const form=document.getElementById('request-form');
const urlInput=document.getElementById('url');
const output=document.getElementById('output');
const clearBtn=document.getElementById('clear-btn');
const downloadBtn=document.getElementById('download-btn');

function showError(message){
output.textContent=message;
output.className='error';
}

function showSuccess(message){
output.textContent=message;
output.className='success';
}

function showResult(message){
output.textContent=message;
output.className='result';
}

function buildUrl(url,query){
if(query){
const separator=url.includes('?')?'&':'?';
return url+separator+query;
}
return url;
}

function parseJSON(str,field){
if(!str.trim()){
return null;
}
try{
return JSON.parse(str);
}catch(e){
showError(`Invalid ${field} JSON: ${e.message}`);
return null;
}
}

function downloadResult(){
const result=output.textContent;
if(!result){
showError('No result to download');
return;
}
const blob=new Blob([result],{type:'text/plain'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download='api-request.txt';
a.click();
URL.revokeObjectURL(url);
}

async function handleSubmit(e){
e.preventDefault();
const method=document.getElementById('method').value;
let url=document.getElementById('url').value.trim();
const headersStr=document.getElementById('headers').value;
const bodyStr=document.getElementById('body').value;
const query=document.getElementById('query').value.trim();

if(!url){
showError('URL is required');
return;
}

const headers=parseJSON(headersStr,'Headers')||{};
const body=parseJSON(bodyStr,'Body');

let fullUrl=buildUrl(url,query);

try{
let requestText='';
if(method!=='GET' && method!=='DELETE'){
const body=body||{};
requestText=JSON.stringify(body,null,2);
}else{
requestText=null;
}

requestText='\n\n'+'Request Body: '+JSON.stringify(body,null,2);

showSuccess('Request built successfully!');
showResult('Method: ' + method + '\n' + 'URL: ' + fullUrl + requestText);
}catch(e){
showError('Error: ' + e.message);
}
}

form.addEventListener('submit',handleSubmit);
clearBtn.addEventListener('click',()=>{
form.reset();
showResult('Form cleared');
});
downloadBtn.addEventListener('click',downloadResult);

// Keyboard shortcuts: Enter to submit, Ctrl+Enter to submit, Escape to clear
document.addEventListener('keydown',(e)=>{
if(e.key==='Enter'&&!e.target.matches('textarea')){
form.dispatchEvent(new Event('submit',{cancelable:true}));
}
if(e.ctrlKey && e.key==='Enter'&&!e.target.matches('textarea')){
form.dispatchEvent(new Event('submit',{cancelable:true}));
}
if(e.key==='Escape'){
form.reset();
showResult('Form cleared');
}
});

// Load saved data from localStorage
try{
const savedData=localStorage.getItem('api-request-builder');
if(savedData){
const data=JSON.parse(savedData);
if(data.method){
document.getElementById('method').value=data.method;
}
if(data.url){
document.getElementById('url').value=data.url;
}
if(data.headers){
document.getElementById('headers').value=data.headers;
}
if(data.body){
document.getElementById('body').value=data.body;
}
if(data.query){
document.getElementById('query').value=data.query;
}
}
}catch(e){
console.error('Failed to load saved data:',e);
}

// Save data to localStorage on input change
const inputs=[urlInput,document.getElementById('method'),document.getElementById('headers'),document.getElementById('body'),document.getElementById('query')];
inputs.forEach(input=>{
input.addEventListener('input',()=>{
const data={
method:document.getElementById('method').value,
url:document.getElementById('url').value,
headers:document.getElementById('headers').value,
body:document.getElementById('body').value,
query:document.getElementById('query').value
};
localStorage.setItem('api-request-builder',JSON.stringify(data));
});
});

// Show initial message
showResult('Fill the form and press Enter or click "Build Request"');
})();
</script>
</body>
</html>
