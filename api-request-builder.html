<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
input,select,textarea{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:8px;margin:5px 0;width:100%}
button{background:#6366f1;border:none;color:#fff;padding:10px 20px;cursor:pointer}
button:hover{background:#5558ff}
#output{background:#1a1a1a;border:1px solid #333;padding:15px;margin-top:10px;min-height:100px}
a{color:#6366f1}
</style>
</head>
<body>
<h1>API Request Builder</h1>

<div style="margin-bottom:10px">
  <label for="method">Method:</label>
  <input type="text" id="method" name="method" placeholder="GET, POST, PUT, DELETE...">
</div>

<div style="margin-bottom:10px">
  <label for="url">URL:</label>
  <input type="text" id="url" name="url" placeholder="https://api.example.com/endpoint">
</div>

<div style="margin-bottom:10px">
  <label for="headers">Headers:</label>
  <textarea id="headers" name="headers" placeholder="Content-Type: application/json&#10;Authorization: Bearer token" rows="4"></textarea>
</div>

<div style="margin-bottom:10px">
  <label for="body">Body:</label>
  <textarea id="body" name="body" placeholder='{"key": "value"}' rows="6"></textarea>
</div>

<div style="margin-bottom:10px">
  <button id="build">Build Request</button>
  <button id="clear">Clear</button>
</div>

<div id="output"></div>

<script>
document.getElementById('build').addEventListener('click', function() {
  var method = document.getElementById('method').value;
  var url = document.getElementById('url').value;
  var headers = document.getElementById('headers').value;
  var body = document.getElementById('body').value;

  try {
    var output = '<p><strong>Method:</strong> ' + method + '</p>';
    output += '<p><strong>URL:</strong> ' + url + '</p>';
    output += '<p><strong>Headers:</strong> ' + headers + '</p>';
    output += '<p><strong>Body:</strong> ' + body + '</p>';
    document.getElementById('output').innerHTML = output;
  } catch(e) {
    document.getElementById('output').innerHTML = '<p style="color:#ff6b6b">Error: ' + e.message + '</p>';
  }
});

document.getElementById('clear').addEventListener('click', function() {
  document.getElementById('method').value = '';
  document.getElementById('url').value = '';
  document.getElementById('headers').value = '';
  document.getElementById('body').value = '';
  document.getElementById('output').innerHTML = '';
});
</script>
</body>
</html>
