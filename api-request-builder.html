<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
input,select,textarea{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:8px;margin:5px 0;width:100%}
button{background:#6366f1;border:none;color:#fff;padding:10px 20px;cursor:pointer}
button:hover{background:#5558ff}
#output{background:#1a1a1a;border:1px solid #333;padding:15px;margin-top:10px;min-height:100px}
a{color:#6366f1}
</style>
</head>
<body>
<h1>API Request Builder</h1>
<label>Method:</label>
<select id="method"><option value="GET">GET</option><option value="POST">POST</option><option value="PUT">PUT</option><option value="DELETE">DELETE</option></select>
<label>URL:</label>
<input id="url" placeholder="https://api.example.com/endpoint">
<label>Headers (JSON):</label>
<textarea id="headers" placeholder='{"Authorization":"Bearer token"}'></textarea>
<label>Body (JSON):</label>
<textarea id="body" placeholder='{"key":"value"}'></textarea>
<button onclick="build()">Build Request</button>
<div id="output"></div>
<a href="index.html">Back to Home</a>
<script>
function build(){
let method=document.getElementById('method').value;
let url=document.getElementById('url').value;
let headers=document.getElementById('headers').value;
let body=document.getElementById('body').value;
let out=document.getElementById('output');
let req=`{
  "method": "${method}",
  "url": "${url}",
  "headers": ${headers ? JSON.parse(headers) : {}},
  "body": ${body ? JSON.parse(body) : null}
}`;
out.innerHTML="<h3>Generated Request</h3><pre>"+req+"</pre>";
}
</script>
</body>
</html>
