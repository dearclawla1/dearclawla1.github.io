<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewport Resizer</title>
<style>
*{box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,-apple-system,sans-serif;margin:0;padding:20px;line-height:1.6}
.container{max-width:700px;margin:0 auto}
header{margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
h1{color:#6366f1;font-size:1.75rem;margin:0}
.back-link{color:#6366f1;text-decoration:none;font-size:0.9rem}
.back-link:hover{text-decoration:underline}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
input,button,select{padding:12px 14px;border-radius:8px;border:1px solid #333;font-size:0.95rem;transition:all 0.2s}
input:focus,select:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.2)}
button{background:#6366f1;color:#fff;cursor:pointer;font-weight:500}
button:hover{background:#5558f5;transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.secondary{background:#1a1a1a;color:#e4e4e4}
button.secondary:hover{background:#2a2a2a}
input{background:#1a1a1a;color:#e4e4e4;width:100%}
select{background:#1a1a1a;color:#e4e4e4;width:100%}
.output-box{background:#1a1a1a;padding:16px;border-radius:8px;font-family:monospace;font-size:0.9rem;border:1px solid #333}
.output-box code{color:#a3a3a3}
.info-section{background:#1a1a1a;padding:16px;border-radius:8px;font-family:monospace;font-size:0.9rem;border:1px solid #333}
#width,#height,#scale{background:#1a1a1a;color:#e4e4e4;border:1px solid #333}
#aspectRatio{background:#1a1a1a;color:#e4e4e4;border:1px solid #333}
#applyBtn{background:#6366f1;color:#fff;border:none}
#scaleBtn{background:#6366f1;color:#fff;border:none}
#resetBtn{background:#1a1a1a;color:#e4e4e4;border:1px solid #333}
#fullscreenBtn{background:#1a1a1a;color:#e4e4e4;border:1px solid #333}
#copyInfoBtn{background:#1a1a1a;color:#e4e4e4;border:1px solid #333}
#currentViewport{background:#1a1a1a;color:#e4e4e4;font-family:monospace;border:1px solid #333}
#output{background:#1a1a1a;color:#e4e4e4;font-family:monospace;border:1px solid #333}
.copied{background:#10b981;color:#fff}
</style>
</head>
<body>
<div class="container">
<header>
<h1>Viewport Resizer</h1>
<a href="#" class="back-link">← Back</a>
</header>
<div class="grid">
<input type="number" id="width" placeholder="Width" value="1920">
<input type="number" id="height" placeholder="Height" value="1080">
<select id="aspectRatio">
<option value="">No aspect ratio</option>
<option value="16/9">16:9</option>
<option value="4/3">4:3</option>
<option value="1/1">1:1</option>
<option value="21/9">21:9</option>
</select>
<button id="applyBtn">Apply Aspect Ratio</button>
</div>
<div class="grid">
<input type="number" id="scale" placeholder="Scale" value="1">
<button id="scaleBtn">Apply Scale</button>
<button id="resetBtn">Reset</button>
<button id="fullscreenBtn">Fullscreen</button>
<button id="copyInfoBtn">Copy Info</button>
</div>
<div class="output-box">
<div id="infoText">Enter dimensions or aspect ratio.</div>
</div>
<div class="output-box">
<div id="output">Viewport: 1920 A- 1080</div>
</div>
<div class="output-box">
<div id="currentViewport">Viewport: -- A- --</div>
</div>
</div>
<script>
const widthInput=document.getElementById('width');
const heightInput=document.getElementById('height');
const aspectRatioSelect=document.getElementById('aspectRatio');
const applyBtn=document.getElementById('applyBtn');
const scaleInput=document.getElementById('scale');
const scaleBtn=document.getElementById('scaleBtn');
const resetBtn=document.getElementById('resetBtn');
const fullscreenBtn=document.getElementById('fullscreenBtn');
const copyInfoBtn=document.getElementById('copyInfoBtn');
const infoText=document.getElementById('infoText');
const output=document.getElementById('output');
const currentViewport=document.getElementById('currentViewport');

// Get current viewport dimensions
function getCurrentViewport(){
const width=window.innerWidth;
const height=window.innerHeight;
return `${width} A- ${height}`;
}

// Update current viewport display
function updateCurrentViewport(){
currentViewport.textContent=getCurrentViewport();
}

// Apply aspect ratio
function applyAspectRatio(){
const ratio=aspectRatioSelect.value;
if(!ratio){
infoText.textContent='No aspect ratio constraint applied.';
return;
}
const [w,h]=ratio.split('/').map(Number);
const currentW=parseInt(widthInput.value)||1920;
const currentH=parseInt(heightInput.value)||1080;
const newW=currentW;
const newH=Math.round((currentW/w)*h);
heightInput.value=newH;
infoText.textContent={`Applied ${ratio} aspect ratio. Height adjusted to ${newH}px.`};
output.textContent=`Viewport: ${currentW} A- ${newH}`;
}
else{
infoText.textContent='Invalid dimensions. Please enter valid numbers.';
}
}

// Apply scale
function applyScale(){
const scale=parseFloat(scaleInput.value)||1;
if(scale>0){
const currentW=parseInt(widthInput.value)||1920;
const currentH=parseInt(heightInput.value)||1080;
const newW=Math.round(currentW*scale);
const newH=Math.round(currentH*scale);
widthInput.value=newW;
heightInput.value=newH;
infoText.textContent={`Applied scale ${scale}. New dimensions: ${newW} A- ${newH}px`};
output.textContent=`Viewport: ${newW} A- ${newH}`;
}
else{
infoText.textContent='Invalid scale. Please enter a positive number.';
}
}

// Reset to default
function resetDefaults(){
widthInput.value='1920';
heightInput.value='1080';
aspectRatioSelect.value='';
scaleInput.value='1';
infoText.textContent='Reset to default dimensions: 1920 A- 1080';
output.textContent='Viewport: 1920 A- 1080';
}

// Toggle fullscreen
function toggleFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen().catch(err=>{
infoText.textContent='Fullscreen not supported or blocked.';
});
}
else{
if(document.exitFullscreen){
document.exitFullscreen();
}
}
}

// Copy info to clipboard
function copyInfo(){
const text=output.textContent;
navigator.clipboard.writeText(text).then(()=>{
copyInfoBtn.textContent='Copied!';
copyInfoBtn.classList.add('copied');
setTimeout(()=>{
copyInfoBtn.textContent='Copy Info';
copyInfoBtn.classList.remove('copied');
},2000);
});
}

// Event listeners
applyBtn.addEventListener('click',applyAspectRatio);
scaleBtn.addEventListener('click',applyScale);
resetBtn.addEventListener('click',resetDefaults);
fullscreenBtn.addEventListener('click',toggleFullscreen);
copyInfoBtn.addEventListener('click',copyInfo);

// Update on resize
window.addEventListener('resize',updateCurrentViewport);

// Initialize
updateCurrentViewport();
</script>
</body>
</html>
