<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewport Resizer</title>
<style>
*{box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,-apple-system,sans-serif;margin:0;padding:20px;line-height:1.6}
.container{max-width:700px;margin:0 auto}
header{margin-bottom:30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
h1{color:#6366f1;font-size:1.75rem;margin:0}
.back-link{color:#6366f1;text-decoration:none;font-size:0.9rem}
.back-link:hover{text-decoration:underline}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
input,button,select{padding:12px 14px;border-radius:8px;border:1px solid #333;font-size:0.95rem;transition:all 0.2s}
input:focus,select:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.2)}
button{background:#6366f1;color:#fff;cursor:pointer;font-weight:500}
button:hover{background:#5558f5;transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.secondary{background:#1a1a1a;color:#e4e4e4}
button.secondary:hover{background:#2a2a2a}
input{background:#1a1a1a;color:#e4e4e4;width:100%}
select{background:#1a1a1a;color:#e4e4e4;width:100%}
.output-box{background:#1a1a1a;padding:16px;border-radius:8px;font-family:monospace;font-size:0.9rem;border:1px solid #333}
.output-box code{color:#a3a3a3}
</style>
</head>
<body>
<div class="container">
<header>
<h1>Viewport Resizer</h1>
<a href="#" class="back-link">← Back</a>
</header>
<div class="grid">
<input type="number" id="width" placeholder="Width (px)">
<input type="number" id="height" placeholder="Height (px)">
<select id="ratio">
<option value="16/9">16:9</option>
<option value="4/3">4:3</option>
<option value="3/2">3:2</option>
<option value="2/1">2:1</option>
</select>
</div>
<div class="output-box">
<code id="info">Enter dimensions and select ratio</code>
</div>
</div>
<script>
const widthInput = document.getElementById('width');
const heightInput = document.getElementById('height');
const ratioSelect = document.getElementById('ratio');
const infoText = document.getElementById('info');

function parseRatio(ratio) {
  const [num, den] = ratio.split('/').map(Number);
  return { num, den };
}

function adjustHeight(width, ratio) {
  const { num, den } = parseRatio(ratio);
  const newH = Math.round(width * den / num);
  return newH;
}

function adjustWidth(height, ratio) {
  const { num, den } = parseRatio(ratio);
  const newW = Math.round(height * num / den);
  return newW;
}

function updateInfo() {
  const width = parseInt(widthInput.value) || 0;
  const height = parseInt(heightInput.value) || 0;
  const ratio = ratioSelect.value;
  
  if (width > 0 && height > 0) {
    const newH = adjustHeight(width, ratio);
    infoText.textContent = `Applied ${ratio} aspect ratio. Height adjusted to ${newH}px.`;
  } else if (width > 0) {
    const newH = adjustHeight(width, ratio);
    infoText.textContent = `Width: ${width}px. Suggested height: ${newH}px for ${ratio} ratio.`;
  } else if (height > 0) {
    const newW = adjustWidth(height, ratio);
    infoText.textContent = `Height: ${height}px. Suggested width: ${newW}px for ${ratio} ratio.`;
  } else {
    infoText.textContent = 'Enter dimensions and select ratio';
  }
}

widthInput.addEventListener('input', updateInfo);
heightInput.addEventListener('input', updateInfo);
ratioSelect.addEventListener('change', updateInfo);

updateInfo();
</script>
</body>
</html>
