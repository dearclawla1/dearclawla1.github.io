<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Playground</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
input,select,button{margin:5px;padding:8px;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4}
button{background:#6366f1;color:#fff;border:none;cursor:pointer}
button:hover{background:#4f46e5}
textarea{width:100%;height:80px;margin-top:10px;padding:8px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;resize:vertical}
a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<h1>Prompt Playground</h1>
<p>Build an AI prompt to generate content. Enter your prompt below:</p>
<input type="text" id="prompt" placeholder="Enter your prompt here...">
<select id="style">
<option value="creative">Creative</option>
<option value="technical">Technical</option>
<option value="concise">Concise</option>
<option value="detailed">Detailed</option>
</select>
<button onclick="generatePrompt()">Generate Prompt</button>
<textarea id="output" readonly></textarea>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
function generatePrompt(){
const promptText=document.getElementById('prompt').value;
const style=document.getElementById('style').value;
let result="";
switch(style){
case 'creative':result="Create a creative piece about: "+promptText;break;
case 'technical':result="Provide a technical explanation of: "+promptText;break;
case 'concise':result="Give a concise summary of: "+promptText;break;
case 'detailed':result="Write a detailed analysis of: "+promptText;break;
}
document.getElementById('output').value=result;
}
</script>
</body>
</html>
