<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a;color:#e4e4e4;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dice Roller</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:20px;font-family:sans-serif;background:#0a0a0a;color:#e4e4e4}
h1{margin:0 0 20px;color:#6366f1}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
input,select,button{padding:10px 15px;font-size:14px;border:1px solid #6366f1;border-radius:5px;background:#0a0a0a;color:#e4e4e4}
button:hover{background:#6366f1;color:#0a0a0a}
button:active{transform:scale(0.98)}
#result{padding:20px;background:#111;border:2px solid #6366f1;border-radius:5px;margin-bottom:20px}
.back{display:block;margin-bottom:10px}
.back a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<h1>🎲 Dice Roller</h1>
<a href="index.html" class="back" style="color:#6366f1">Back to Home</a>
<div class="controls">
<input type="number" id="sides" value="6" min="2" max="100" placeholder="Dice sides">
<input type="number" id="count" value="1" min="1" max="50" placeholder="Number of dice">
<button onclick="roll()">Roll Dice</button>
</div>
<div id="result">Roll the dice to see results!</div>
<script>
let currentRolls=[];
function roll(){
const sides=Math.min(100,Math.max(2,parseInt(document.getElementById('sides').value||6)));
const count=Math.min(50,Math.max(1,parseInt(document.getElementById('count').value||1)));
currentRolls=[];
let sum=0;
for(let i=0;i<count;i++){
const roll=Math.floor(Math.random()*sides)+1;
currentRolls.push(roll);
sum+=roll;
}
const resultEl=document.getElementById('result');
resultEl.innerHTML=`<div style="margin-bottom:10px">🎲 ${currentRolls.join(', ')} = <strong style="color:#6366f1;font-size:20px">${sum}</strong></div>
<div style="font-size:12px;color:#aaa">Each die has ${sides} sides</div>`;
}
roll();
</script>
</body>
</html>
