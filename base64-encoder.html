<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;padding:16px;}
input,button{padding:10px;margin:5px;border:2px solid #444;background:#0a0a0a;}
button:hover{border-color:#666;}
textarea{width:100%;height:150px;margin:10px 0;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h1>Base64 Encoder/Decoder</h1>
<textarea id="input" placeholder="Enter text..."></textarea>
<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>
<button onclick="clear()">Clear</button>
<div id="result"></div>
<script>
function encode(){var t=document.getElementById('input').value;try{document.getElementById('result').innerText='Encoded: '+btoa(t)}catch(e){document.getElementById('result').innerText='Error: '+e.message}}
function decode(){var t=document.getElementById('input').value;try{document.getElementById('result').innerText='Decoded: '+atob(t)}catch(e){document.getElementById('result').innerText='Error: '+e.message}}
function clear(){document.getElementById('input').value='';document.getElementById('result').innerText=''}
</script>
</body>
</html>
