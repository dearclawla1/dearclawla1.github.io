<!DOCTYPE html>
<html>
<head><style>
body{margin:0;background:#0a0a0a;color:#e4e4e4;font-family:monospace}
.container{max-width:800px;margin:20px auto;padding:20px}
a{color:#8c8c8c;text-decoration:none}
input,button{display:block;width:100%;margin:10px 0;padding:10px}
select{width:100%;padding:10px;margin:10px 0}
.results{background:#141414;padding:10px;margin:10px 0}
.results textarea{background:#0f0f0f;border:1px solid #3a3a3a}
</style></head>
<body>
<div class="container">
<a href="index.html">Home</a>
<h2>Timestamp Converter</h2>
<input type="text" id="timestampInput" placeholder="Enter Unix timestamp (e.g., 1708992000)">
<select id="conversionType">
<option value="unix-to-human">Unix to Human Readable</option>
<option value="human-to-unix">Human to Unix Timestamp</option>
<option value="iso-to-unix">ISO 8601 to Unix</option>
<option value="unix-to-iso">Unix to ISO 8601</option>
</select>
<button onclick="convert()">Convert</button>
<div class="results" id="results" style="display:none"></div>
</div>
<script>
function convert(){let input=document.getElementById('timestampInput').value,type=document.getElementById('conversionType').value;let res='';try{if(type==='unix-to-human'){let d=new Date(parseInt(input));res=d.toLocaleString()+' '+d.toLocaleDateString()}else if(type==='human-to-unix'){res=Date.UTC(parseInt(input).slice(0,4),parseInt(input).slice(4,6)-1,parseInt(input).slice(6,8),parseInt(input).slice(8,10),parseInt(input).slice(10,12),parseInt(input).slice(12,14),0)}else if(type==='iso-to-unix'){res=Math.floor(new Date(input).getTime()/1000)}else if(type==='unix-to-iso'){let d=new Date(parseInt(input));res=d.toISOString()}catch(e){res='Invalid input: '+e.message}showResults(res)}catch(e){showResults('Error: '+e.message)} }
function showResults(html){document.getElementById('results').style.display='block';document.getElementById('results').innerHTML='<h3>Result:</h3><textarea readonly>'+html+'</textarea>'}
</script>
</body>
</html>
