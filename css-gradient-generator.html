<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Gradient Generator</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,select,button{margin:5px 0;padding:8px 12px;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1}
.preview{margin-top:20px;padding:20px;border:2px solid #333;border-radius:8px;background:#111;min-height:100px}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a><br><br>
<h2>CSS Gradient Generator</h2>
<div>
<label>Type: <select id="type"><option value="linear">Linear</option><option value="radial">Radial</option></select></label>
<label>Direction: <select id="direction"><option value="to bottom">to bottom</option><option value="to right">to right</option><option value="45deg">45deg</option></select></label>
</div>
<div>
<label>Start Color: <input id="startColor" type="color" value="#6366f1"></label>
<label>End Color: <input id="endColor" type="color" value="#e4e4e4"></label>
<button onclick="update()">Generate</button>
</div>
<div id="output"></div>
<div class="preview" id="preview"></div>
<script>
function update(){
const type=document.getElementById('type').value;
const dir=document.getElementById('direction').value;
const start=document.getElementById('startColor').value;
const end=document.getElementById('endColor').value;
let css;
if(type==='linear'){
css=`background:linear-gradient(${dir},${start},${end});`;
}
else{
css=`background:radial-gradient(circle,${start},${end});`;
}
document.getElementById('output').innerHTML=`<strong>CSS:</strong><br><code>${css}</code>`;
document.getElementById('preview').style.background=css;
}
update();
</script>
</body>
</html>
