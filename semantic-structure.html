<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semantic Structure Analyzer</title>
<style>
*{box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,-apple-system,sans-serif;margin:0;padding:20px;min-height:100vh}
.container{max-width:1200px;margin:0 auto}
h1{color:#6366f1;margin:0 0 15px;font-size:1.8rem}
.subtitle{color:#888;font-size:0.9rem;margin-bottom:20px}
input,button{margin:5px 5px 5px 0;padding:10px 14px;border-radius:6px;border:1px solid #333;font-size:0.95rem;transition:all 0.2s}
input:focus{outline:2px solid #6366f1;outline-offset:2px}
input::placeholder{color:#555}
button{background:#6366f1;color:#fff;cursor:pointer;font-weight:500}
button:hover{background:#5558ff;transform:translateY(-1px)}
button:active{transform:translateY(0)}
#url{width:100%;max-width:800px;background:#111;color:#e4e4e4;border:1px solid #333;padding:12px;border-radius:6px;font-family:inherit}
#output{background:#111;padding:20px;border-radius:6px;margin-top:20px;min-height:200px;white-space:pre-wrap;font-family:monospace;font-size:0.9rem;line-height:1.6;overflow:auto;max-height:60vh;border:1px solid #333}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #222}
.output-title{color:#6366f1;font-weight:600;font-size:1.1rem}
.output-actions{display:flex;gap:8px}
.action-btn{background:#222;color:#e4e4e4;border:1px solid #333;cursor:pointer;font-weight:500}
.action-btn.primary{background:#6366f1;color:#fff}
.action-btn:hover{background:#4f4f4f}
.action-btn.primary:hover{background:#5558ff}
#url{font-family:inherit}
</style>
</head>
<body>
<div class="container">
<h1>Semantic Structure Analyzer</h1>
<div class="subtitle">Analyze HTML semantic structure and identify best practices</div>
<input type="text" id="url" placeholder="Paste HTML content here...">
<button class="action-btn primary" onclick="analyze()">Analyze</button>
<button class="action-btn" onclick="copyToClipboard()">Copy</button>
<div id="output"></div>
</div>
<script>
let currentAnalysis = null;

function analyze(){
const url = document.getElementById('url').value;
if(!url.trim()){
document.getElementById('output').innerHTML = 'Please enter HTML content to analyze.';
return;
}

try{
const parser = new DOMParser();
const doc = parser.parseFromString(url, 'text/html');
const tags = Array.from(doc.querySelectorAll('*')).map(el => el.tagName.toLowerCase());
const tagCounts = {};
tags.forEach(tag => {
tagCounts[tag] = (tagCounts[tag] || 0) + 1;
});

const semanticTags = ['header', 'nav', 'main', 'article', 'section', 'aside', 'footer', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'ul', 'ol', 'table', 'form', 'button', 'a'];
const foundSemantic = semanticTags.filter(tag => tagCounts[tag] > 0);
const missingSemantic = semanticTags.filter(tag => tagCounts[tag] === 0);

const wordCount = url.split(/\s+/).filter(w => w.length > 0).length;
const charCount = url.length;

const hierarchy = doc.querySelector('html') ? 'HTML structure detected' : 'No HTML root';

const output = `
dY"` SEMANTIC FLOW:
${hierarchy || 'No tags detected'}

dY"? CONTENT METRICS:
<div class="stats">
<div class="stat"><span class="stat-label">Words:</span><span class="stat-value">${wordCount}</span></div>
<div class="stat"><span class="stat-label">Characters:</span><span class="stat-value">${charCount}</span></div>
</div>

dYZ_ KEY SECTIONS FOUND:
${foundSemantic.length > 0 ? `�o. ${foundSemantic.join(', ')}` : '�s��,? No major semantic elements detected'}

dY'� RECOMMENDATIONS:
${missingSemantic.length > 0 ? `Consider adding: ${missingSemantic.slice(0, 3).join(', ')}` : 'Structure looks good!'}
`;

document.getElementById('output').innerHTML = output;
currentAnalysis = {tags, tagCounts, semanticTags, foundSemantic, missingSemantic};
} catch(e){
document.getElementById('output').innerHTML = 'Error parsing HTML: ' + e.message;
}
}

function copyToClipboard(){
if(currentAnalysis){
const text = document.getElementById('output').textContent;
navigator.clipboard.writeText(text).then(() => {
const btn = document.querySelector('.action-btn');
const originalText = btn.textContent;
btn.textContent = 'Copied!';
setTimeout(() => btn.textContent = originalText, 2000);
});
}
}

document.addEventListener('keydown', (e) => {
if(e.ctrlKey && e.key === 'Enter'){
analyze();
}
if(e.ctrlKey && e.key === 'c' && currentAnalysis){
copyToClipboard();
}
});

document.getElementById('url').addEventListener('keydown', (e) => {
if(e.ctrlKey && e.key === 'Enter'){
analyze();
}
});
</script>
</body>
</html>
