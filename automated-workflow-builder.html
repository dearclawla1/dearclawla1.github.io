<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Workflow Builder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a1a2e; 
            color: #eee; 
            padding: 2rem; 
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #4fc3f7; margin-bottom: 1.5rem; }
        label { display: block; margin: 1rem 0 0.5rem; color: #a0a0a0; font-size: 0.9rem; }
        input, select, textarea { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid #333; 
            border-radius: 6px; 
            background: #16213e; 
            color: #eee; 
            font-size: 1rem;
        }
        button { 
            background: #4fc3f7; 
            color: #1a1a2e; 
            border: none; 
            padding: 0.75rem 1.5rem; 
            border-radius: 6px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 0.5rem 0.5rem 0 0;
        }
        button:hover { background: #29b6f6; }
        button.secondary { background: #3949ab; color: #fff; }
        button.secondary:hover { background: #5c6bc0; }
        output { 
            background: #16213e; 
            border: 1px solid #333; 
            border-radius: 6px; 
            padding: 1rem; 
            margin-top: 1rem; 
            white-space: pre-wrap; 
            font-family: 'Consolas', monospace;
        }
        .back-link { 
            display: inline-block; 
            margin-bottom: 1rem; 
            color: #81d4fa; 
            text-decoration: none; 
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; Back to Home</a>
        <h1>🤖 Automated Workflow Builder</h1>
        
        <label for="toolType">Select a tool type:</label>
        <select id="toolType">
            <option value="n8n">n8n Workflow Automation</option>
            <option value="dify">Dify AI Workflow</option>
            <option value="puppeteer">Puppeteer Browser Automation</option>
            <option value="playwright">Playwright Testing</option>
        </select>
        
        <label for="workflowInput">Paste workflow JSON/script:</label>
        <textarea id="workflowInput" rows="6" placeholder='e.g. {"name": "n8n", "type": "workflow", "steps": [{"action": "trigger"}, {"action": "http"}]}'></textarea>
        
        <label>&nbsp;</label>
        <button onclick="buildWorkflow()">Build Workflow</button>
        <button class="secondary" onclick="clearInput()">Clear</button>
        
        <output id="output">
            <strong>Click "Build Workflow" to generate your automated workflow call...</strong>
        </output>
    </div>
    
    <script>
        function buildWorkflow() {
            const toolType = document.getElementById('toolType').value;
            const workflowInput = document.getElementById('workflowInput').value.trim();
            const output = document.getElementById('output');
            
            let result = '🚀 ' + toolType.toUpperCase() + ' WORKFLOW CALL\n';
            result += '===============================\n\n';
            
            try {
                if (!workflowInput) {
                    result += '⚠️ Please enter a workflow JSON/script first.';
                } else {
                    result += '✅ Workflow validation: OK\n';
                    result += '\n📦 Generated call structure:\n';
                    result += toolType + ' -> ' + workflowInput.substring(0, 100) + (workflowInput.length > 100 ? '...' : '') + '\n';
                    result += '\n🔧 Ready to deploy to your automation platform.\n';
                }
            } catch (error) {
                result += '❌ Error: ' + error.message;
            }
            
            output.textContent = result;
        }
        
        function clearInput() {
            document.getElementById('workflowInput').value = '';
            document.getElementById('output').textContent = 'Input cleared. Ready for new workflow.';
        }
        
        // Auto-greet
        setTimeout(() => {
            document.getElementById('output').textContent = '👋 Welcome! Select a tool type and paste workflow JSON to get started.\n';
        }, 500);
    </script>
</body>
</html>
