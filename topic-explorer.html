<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button{margin:5px 0;background:#1a1a1a;color:#e4e4e4;border:1px solid #3a3a3a;padding:8px;border-radius:4px}
button{cursor:pointer}
a{color:#6366f1}
#result{margin-top:10px;background:#1a1a1a;padding:10px;border-radius:4px;min-height:50px}
</style>
</head>
<body>
<h2>Topic Explorer</h2>
<input type="text" id="query" placeholder="Enter GitHub topics or keywords" value="javascript">
<button onclick="searchTopics()">Search Topics</button>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<div id="result">Loading results...</div>
<script>
async function searchTopics(){
const query=document.getElementById('query').value;
document.getElementById('result').innerHTML='Searching for: '+query;
const res=['Topic: '+query,'Description: Popular topic with many repositories','Related: '+query.split('').reverse().join('')];
document.getElementById('result').innerHTML=res.join('<br>');
}
</script>
</body>
</html>
