<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Topic Explorer</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}
input,button{padding:8px;margin:5px 0;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1}
#result{background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:10px;height:150px;overflow-y:auto}
.repo-item{margin:10px 0;border-bottom:1px solid #333;padding-bottom:10px}
.repo-link{display:inline-block;margin:5px 0;color:#6366f1;text-decoration:none}
.repo-link:hover{text-decoration:underline}
.stats{font-size:12px;color:#888;margin:5px 0}
</style>
</head>
<body>
<h2>Topic Explorer</h2>
<input id="topic" placeholder="Enter GitHub topic">
<button onclick="explore()">Explore</button>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<div id="result"></div>
<script>
async function explore(){
const t=document.getElementById('topic').value;
const res=document.getElementById('result');
if(!t.trim()){res.innerHTML='Please enter a topic';return}
res.innerHTML='Loading...';
try{
const r=await fetch(`https://api.github.com/search/repositories?q=topics:${encodeURIComponent(t)}&sort=stars&order=desc&per_page=5`).json();
const items=r.items.map(x=>`<div class="repo-item"><a href="${x.html_url}" class="repo-link" target="_blank">${x.name}</a><div class="stats">⭐ ${x.stargazers_count} | 🍴 ${x.forks_count}</div><div>${x.description}</div></div>`).join('');
res.innerHTML=items||'No results';
}catch(e){res.innerHTML='Error: ' + e.message}
}
</script>
</body>
</html>
