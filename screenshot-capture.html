<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenshot Capturer</title>
<style>
*{box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,-apple-system,sans-serif;margin:0;padding:20px;min-height:100vh;display:flex;flex-direction:column;gap:15px}
.container{max-width:800px;margin:0 auto;width:100%}
h2{margin:0 0 10px;font-size:1.5rem;text-align:center;color:#6366f1}
input[type="text"]{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:8px;padding:12px 15px;font-size:1rem;width:100%;outline:none;transition:border-color 0.2s}
input[type="text"]:focus{border-color:#6366f1}
input[type="text"]::placeholder{color:#666}
button{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:1rem;cursor:pointer;transition:background 0.2s,transform 0.1s}
button:hover{background:#5558e6}
button:active{transform:scale(0.98)}
#output{background:#1a1a1a;padding:15px;border-radius:8px;border:1px solid #333;font-family:monospace;white-space:pre-wrap;min-height:100px}
a{color:#6366f1;text-decoration:none}
a:hover{text-decoration:underline}
@media(max-width:600px){body{padding:15px}input[type="text"],button{padding:10px 15px;font-size:0.9rem}}
</style>
</head>
<body>
<div class="container">
<h2>Screenshot Capturer</h2>
<input type="text" id="inputText" placeholder="Enter text for output area">
<button onclick="capture()">Capture Screenshot</button>
<div id="output"></div>
<a href="index.html">Back to Home</a>
</div>
<script>
function capture(){
var text=document.getElementById('inputText').value;
document.getElementById('output').innerHTML='<h3>Captured:</h3><pre>'+text+'</pre>';
}
</script>
</body>
</html>
