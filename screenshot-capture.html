<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screenshot Capturer</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}
input,button{margin:10px 0;padding:10px;border-radius:5px;border:1px solid #333}
button{background:#6366f1;color:#fff;border:none;cursor:pointer}
button:hover{background:#5558e6}
#output{background:#1a1a1a;padding:10px;border-radius:5px;border:1px solid #333}
</style>
</head>
<body>
<h2>Screenshot Capturer</h2>
<input type="text" id="inputText" placeholder="Enter text for output area">
<button onclick="capture()">Capture Screenshot</button>
<div id="output"></div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
function capture(){
var text=document.getElementById('inputText').value;
document.getElementById('output').innerHTML='<h3>Captured:</h3><pre>'+text+'</pre>';
}
</script>
</body>
</html>
