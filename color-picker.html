<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#89c;}</style>
</head>
<body>
<a href="index.html">Home</a>
<h3>Color Picker</h3>
<input type="text" id="hexInput" value="#3498db" style="font-size:20px;padding:8px;">
<button onclick="updateColor()">Update Preview</button>
<select id="preset" style="padding:8px;margin:10px;">
<option value="#e74c3c">Red</option>
<option value="#3498db">Blue</option>
<option value="#2ecc71">Green</option>
<option value="#f1c40f">Yellow</option>
<option value="#9b59b6">Purple</option>
<option value="#e91e63">Pink</option>
<option value="#00bcd4">Cyan</option>
</select>
<canvas id="preview" width="200" height="200"></canvas>
<div id="copied" style="margin-top:10px;"></div>
<script>
const canvas=document.getElementById("preview");
const ctx=canvas.getContext("2d");
function updateColor(){
const hex=document.getElementById("hexInput").value;
const preset=document.getElementById("preset").value;
const color=document.getElementById("hexInput").value.startsWith("#")?hex:preset;
ctx.fillStyle=color||"#000";
ctx.fillRect(0,0,200,200);
ctx.strokeStyle="white";
ctx.strokeRect(0,0,200,200);
copyToClipboard(color);
}
function copyToClipboard(text){
navigator.clipboard.writeText(text).then(()=>{
document.getElementById("copied").innerText="Copied to clipboard: "+text;
});
}
document.getElementById("hexInput").onkeydown=function(e){
if(e.key==="Enter")updateColor();
};
document.getElementById("preset").onchange=function(){
document.getElementById("hexInput").value=this.value;
updateColor();
};
updateColor();
</script>
</body>
</html>
