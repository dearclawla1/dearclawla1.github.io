<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px;}
.container{max-width:600px;margin:0 auto;}
input,button{width:100%;padding:12px;margin:8px 0;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#e4e4e4;font-size:14px;}
button{cursor:pointer;border-color:#6366f1;color:#6366f1;}
button:hover{background:#1a213e;}
.preview{width:150px;height:150px;background:#ff0;color:#0a0;margin:10px auto;border-radius:10px;border:2px solid #6366f1;}
.info{display:flex;justify-content:space-between;padding:15px;background:#1a1a1a;border-radius:6px;}
.info span{font-size:14px;}
.info strong{color:#6366f1;}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1;text-decoration:none;">Home</a><br>
<h2>Color Picker</h2>
<div class="preview" id="preview"></div>
<input type="color" id="colorPicker" value="#ff0000">
<div class="info">
<span><strong>Hex:</strong> <span id="hex">#ff0000</span></span>
<span><strong>RGB:</strong> <span id="rgb">rgb(255, 0, 0)</span></span>
</div>
<button onclick="copyHex()">Copy Hex</button>
<button onclick="copyRGB()">Copy RGB</button>
</div>
<script>
const picker = document.getElementById('colorPicker');
const preview = document.getElementById('preview');
const hex = document.getElementById('hex');
const rgb = document.getElementById('rgb');
picker.addEventListener('input', function() {
    const color = this.value;
    preview.style.background = color;
    hex.textContent = color.toUpperCase();
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);
    rgb.textContent = `rgb(${r}, ${g}, ${b})`;
});
function copyHex() {
    navigator.clipboard.writeText(hex.textContent).then(() => alert('Copied Hex!'));
}
function copyRGB() {
    navigator.clipboard.writeText(rgb.textContent).then(() => alert('Copied RGB!'));
}
</script>
</body>
</html>
