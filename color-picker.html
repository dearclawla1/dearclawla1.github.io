<!DOCTYPE html>
<html>
<head><style>body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}a{color:#4caf50;text-decoration:none;}h1{font-size:1.2em;margin-bottom:20px;}</style></head>
<body><a href="index.html">Home</a><h1>Color Picker</h1>
<input id="hex" type="text" placeholder="#ffffff" style="width:120px;padding:8px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;margin:5px 0;"><button onclick="updateColor()" style="padding:8px 15px;background:#4caf50;color:#fff;border:none;cursor:pointer;">Update</button><input id="rgb" type="text" placeholder="rgb(255,255,255)" style="width:180px;padding:8px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;margin:5px 0;"><input id="r" type="range" min="0" max="255" onchange="updateFromRange()" style="width:100%;margin:5px 0 10px 0;">
<script>
function updateColor(){let h=document.getElementById('hex').value.toLowerCase();if(!h.startsWith('#'))h='#'+h;let r=parseInt((h>>16)&255),g=parseInt((h>>8)&255),b=(h&255);document.getElementById('rgb').value='rgb('+r+','+g+','+b+')';document.getElementById('r').value=r;}
function updateFromRange(){let r=document.getElementById('r').value;document.getElementById('hex').value='#'+r.toString(16).padStart(2,'0');updateColor();}</script>
</body></html>
