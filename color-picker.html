<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Picker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;padding:20px}
a{color:#4ec9b0;text-decoration:none}
h1{color:#fbbf24;margin-bottom:15px}
.container{max-width:600px;margin:0 auto}
.input-group{margin:15px 0}
label{display:block;margin:5px 0}
input,button{width:100%;padding:10px;margin-top:5px;font-size:14px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:4px}
button:hover{background:#2a2a2a}
.output{background:#1a1a1a;padding:15px;border-radius:4px;margin-top:15px;font-family:monospace}
button.primary{background:#2563eb;color:white}
</style>
</head>
<body>
<div class="container">
<a href="index.html">Home</a>
<h1>Color Picker</h1>
<div class="input-group">
<label>Color Picker</label>
<input type="color" id="colorPicker" value="#ff6600">
</div>
<div class="input-group">
<label>Hex Value</label>
<input type="text" id="hexInput" value="#ff6600" oninput="updateColor()">
</div>
<div class="input-group">
<label>RGB Value</label>
<input type="text" id="rgbInput" value="rgb(255, 102, 0)" oninput="updateFromRgb()">
</div>
<div class="input-group">
<button class="primary" onclick="generateRandom()">Generate Random Color</button>
</div>
<div class="output">
<h3>Preview</h3>
<div id="preview" style="width:100%;height:60px;border-radius:4px;margin-top:10px;"></div>
<h3>Details</h3>
<div id="details" style="margin-top:10px;">Hex: #ff6600 | RGB: rgb(255, 102, 0) | HSV: 24° 100% 100%</div>
</div>
</div>
<script>
const colorPicker=document.getElementById('colorPicker');
const hexInput=document.getElementById('hexInput');
const rgbInput=document.getElementById('rgbInput');
const preview=document.getElementById('preview');
const details=document.getElementById('details');

function hexToRgb(hex){
let result=parseInt(hex.slice(1),16).toString(16);
return hex.slice(0,1)+'0'+result;
}

function rgbToHex(r,g,b){
return '#'+(parseInt(r)+0x100).toString(16).slice(1)+(parseInt(g)+0x100).toString(16).slice(1)+(parseInt(b)+0x100).toString(16).slice(1);
}

function rgbToHsv(r,g,b){
let rNorm=r/255,gNorm=g/255,bNorm=b/255,
max=Math.max(rNorm,gNorm,bNorm),min=Math.min(rNorm,gNorm,bNorm),
delta=max-min;
let h,s,v;
v=max;
s=delta===0?0:delta/max;
h=(delta===0)?0:((rNorm>gNorm)?((gNorm-bNorm)/delta+6):((gNorm-bNorm)/delta+2)):((bNorm-rNorm)/delta+4);
h*=360;
s*=100;
return Math.round(h)+', '+Math.round(s)+'%, '+Math.round(v*100)+'%';
}

function updateColor(){
const hex=colorPicker.value;
hexInput.value=hex;
preview.style.background=hex;
const rgb=hexToRgb(hex);
rgbInput.value='rgb('+rgb+')';
const hsv=rgbToHsv(rgb[0],rgb[1],rgb[2]);
details.innerText='Hex: '+hex+' | RGB: rgb('+rgb+') | HSV: '+hsv;
}

function updateFromRgb(){
const rgb=rgbInput.value;
let r,g,b;
if(rgb.startsWith('rgb')){
const match=rgb.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
if(match){r=match[1];g=match[2];b=match[3];}
}
if(r&&g&&b){
const hex=rgbToHex(r,g,b);
colorPicker.value=hex;
updateColor();
}
}

function generateRandom(){
const random=Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
colorPicker.value='#'+random;
updateColor();
}

colorPicker.oninput=updateColor;
</script>
</body>
</html>
