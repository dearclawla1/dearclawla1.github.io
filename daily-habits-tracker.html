<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Habits Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background: #0a0a0a; color: #e4e4e4; padding: 20px; min-height: 100vh; }
a { color: #6366f1; text-decoration: none; }
a:hover { text-decoration: underline; }
h1 { text-align: center; margin-bottom: 10px; font-size: 1.5em; }
h2 { color: #6366f1; margin: 15px 0 5px; font-size: 1.2em; }
p { margin: 5px 0; color: #a0a0a0; font-size: 0.9em; }
.container { max-width: 500px; margin: 0 auto; }
.input-group { margin: 10px 0; }
.input-group input { background: #1a1a1a; border: 1px solid #333; color: #e4e4e4; padding: 10px; width: 100%; border-radius: 5px; font-size: 1em; }
.input-group input:focus { outline: none; border-color: #6366f1; }
.checkbox-group { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
.checkbox-group input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
.checkbox-group label { flex: 1; font-size: 1em; }
.checkbox-group span.streak { color: #6366f1; font-weight: bold; font-size: 0.9em; }
.checkbox-group input[type="checkbox"]:checked + label { color: #6366f1; }
.checkbox-group input[type="checkbox"]:checked { accent-color: #6366f1; }
.stats { background: #1a1a1a; border-radius: 5px; padding: 15px; margin: 15px 0; }
.stats div { margin: 5px 0; font-size: 0.9em; }
.stats span { font-weight: bold; color: #6366f1; }
.buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
.btn { background: #1a1a1a; border: 1px solid #333; color: #e4e4e4; padding: 8px 15px; border-radius: 5px; cursor: pointer; flex: 1; min-width: 100px; }
.btn:hover { border-color: #6366f1; }
.btn-primary { background: #6366f1; border: none; }
.btn-primary:hover { background: #5558e0; }
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1">Home</a>
<h1>Daily Habits Tracker</h1>
<div class="stats">
<div>Completed: <span id="completed">0</span></div>
<div>Pending: <span id="pending">0</span></div>
<div>Total: <span id="total">0</span></div>
<div>Completion Rate: <span id="rate">0</span>%</div>
</div>
<div class="input-group">
<input type="text" id="newHabit" placeholder="Add a new habit (e.g., 'Drink Water')" />
</div>
<div class="buttons">
<button class="btn" onclick="addHabit()">Add Habit</button>
<button class="btn" onclick="loadHabits()">Load Habits</button>
<button class="btn" onclick="saveHabits()">Save Habits</button>
</div>
<div id="habitsList"></div>
</div>
<script>
let habits = [];
const STORAGE_KEY = 'habits';

function addHabit() {
  const input = document.getElementById('newHabit');
  const name = input.value.trim();
  if (!name) return alert('Please enter a habit name');
  habits.push({ name, streak: 0, completed: false, lastDate: null });
  save();
  input.value = '';
}

function loadHabits() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { habits = JSON.parse(saved); } catch (e) {}
  }
  render();
}

function saveHabits() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}

function save() { saveHabits(); }

function render() {
  const list = document.getElementById('habitsList');
  const total = habits.length;
  const completed = habits.filter(h => h.completed).length;
  const pending = total - completed;
  const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
  
  document.getElementById('total').textContent = total;
  document.getElementById('completed').textContent = completed;
  document.getElementById('pending').textContent = pending;
  document.getElementById('rate').textContent = rate;
  
  if (total === 0) {
    list.innerHTML = '<p>No habits yet. Add one above!</p>';
    return;
  }
  
  const today = new Date().toISOString().split('T')[0];
  const html = habits.map(h => {
    const date = h.lastDate || today;
    const isCompletedToday = h.completed && h.lastDate === today;
    return `<div class="input-group">
      <div class="checkbox-group">
        <input type="checkbox" id="chk-${h.name.replace(/\s+/g,'-')}" ${isCompletedToday ? 'checked' : ''} onchange="toggle('${h.name.replace(/\s+/g,'-')}')" />
        <label for="chk-${h.name.replace(/\s+/g,'-')}">${h.name}</label>
        <span class="streak">Streak: ${h.streak} 🔥</span>
      </div>
    </div>`;
  }).join('');
  list.innerHTML = html;
}

function toggle(name) {
  const h = habits.find(x => x.name.toLowerCase() === name.toLowerCase());
  if (h) {
    const today = new Date().toISOString().split('T')[0];
    h.completed = !h.completed;
    h.lastDate = h.completed ? today : null;
    if (h.completed && (h.lastDate === null || h.lastDate === today)) {
      h.streak = (h.streak || 0) + 1;
    } else if (!h.completed && h.lastDate === today) {
      h.streak = 0;
    }
    save();
    render();
  }
}
loadHabits();
</script>
</body>
</html>
