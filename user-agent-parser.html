<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Agent Parser</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem}
h1{color:#6366f1;margin-bottom:1rem}
.container{max-width:800px;margin:0 auto}
input,button,select{padding:0.5rem 1rem;margin:0.5rem;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button{cursor:pointer}
button:hover{background:#333}
#output{background:#1a1a1a;padding:1rem;border-radius:4px;margin-top:1rem;white-space:pre-wrap;font-family:monospace}
a{color:#6366f1}
</style>
</head>
<body>
<div class="container">
<h1>User Agent Parser</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<label>Enter User Agent:</label>
<input type="text" id="uaInput" placeholder="e.g. Mozilla/5.0 (Windows NT 10.0; Win64; x64)">
<button onclick="parseUA()">Parse</button>
<div id="output">Result will appear here...</div>
</div>
<script>
function parseUA(){
const ua=document.getElementById('uaInput').value;
const output=document.getElementById('output');
if(!ua){output.textContent='Please enter a user agent string.';return}
try{
const parser=new DOMParser();
const doc=parser.parseFromString(ua,'text/html');
// Basic parsing logic
const browser=/(?:MSIE|Trident|Edge)\s*\/\s*(\d+\.\d+)/i.exec(ua);
const os=/(?:Windows|Mac OS|Linux|Android|iOS)\s+([\d\.]+)/i.exec(ua);
const device=/(?:Mobile|Tablet|iPhone|iPad|Android|Windows Phone)/i.exec(ua);
const result={browser:browser?browser[1]:'Unknown',os:os?os[1]:'Unknown',device:device?device[0]:'Desktop'};
output.textContent=`Parsed User Agent:\n${ua}\n\nBrowser: ${result.browser}\nOS: ${result.os}\nDevice: ${result.device}`;
}catch(e){
output.textContent='Error parsing user agent. Please check the input.';
}
}
</script>
</body>
</html>
