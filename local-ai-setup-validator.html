<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Local AI Setup Validator</title>
<style>
body{margin:0;padding:20px;font-family:sans-serif;background:#111;color:#eee}
h1{color:#fff;margin:0 0 15px}
.card{display:flex;gap:10px;align-items:center;background:#222;padding:15px;border-radius:8px;margin-bottom:10px}
input,button,select{padding:10px;border-radius:6px;border:none;font-size:14px}
button{background:#0d9488;color:#fff;cursor:pointer}
button:hover{background:#0d9488}
.result{background:#222;padding:15px;border-radius:8px;margin-top:10px;font-family:monospace;font-size:13px;min-height:60px}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:12px;margin-left:8px}
.tag.valid{background:#10b981;color:#000}
.tag.error{background:#ef4444;color:#fff}
nav a{display:inline-block;margin-right:10px;color:#0d9488;text-decoration:none}
</style>
</head>
<body>
<h1>Local AI Setup Validator</h1>
<nav><a href="index.html">Home</a></nav>
<div class="card">
<select id="llm">
<option value="">Select Local LLM...</option>
<option value="qwen3.5-9b">Qwen 3.5-9B</option>
</select>
</div>
<div class="card">
<input type="number" id="port" placeholder="LM Studio Port (e.g., 1234)" value="1234">
</div>
<div class="card">
<input type="number" id="context" placeholder="Context Size (e.g., 32000)" value="32000">
</div>
<button onclick="validate()">Check Setup</button>
<div class="result" id="output">Enter LLM, port, and context to validate...</div>
<script>
function validate(){
const llm = document.getElementById('llm').value;
const port = document.getElementById('port').value;
const context = document.getElementById('context').value;
const out = document.getElementById('output');
if(!llm || !port || !context){
out.innerHTML = '<span class="tag error">ERROR</span> Fill all fields.';
return;
}
out.innerHTML = '<span class="tag valid">VALID</span> LLM: ' + llm + ' | Port: ' + port + ' | Context: ' + context + ' — Ready to run.';
console.log('AI Setup: ' + llm + ':' + port + 'x' + context);
}
</script>
</body>
</html>
