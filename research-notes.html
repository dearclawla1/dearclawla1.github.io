<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;padding:20px;}
input,button,select{padding:8px;margin:5px 0;border-radius:4px;border:1px solid #333;}
button{background:#6366f1;color:#fff;cursor:pointer;}
button:hover{background:#5558f0;}
#notes{min-height:100px;border:1px solid #333;padding:10px;margin:10px 0;}
#stats{font-size:14px;color:#888;}
a{color:#6366f1;text-decoration:none;}
</style>
</head>
<body>
<h1>Research Notes Organizer</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<label>Title:</label><input id="title" placeholder="Enter note title"><br>
<label>Content:</label><textarea id="content" placeholder="Write your research notes here..."></textarea><br>
<button onclick="saveNote()">Save Note</button>
<button onclick="deleteNote()">Delete Note</button>
<div id="notes"></div>
<div id="stats"></div>
<script>
const storageKey='researchNotes'+Date.now();
function loadNotes(){
const notes=JSON.parse(localStorage.getItem(storageKey)||'[]');
notes.forEach(n=>{
const div=document.createElement('div');
div.style.cssText='background:#111;padding:10px;margin:5px 0;border-radius:4px;border-left:4px solid #6366f1;';
div.innerHTML='<strong>'+n.title+'</strong><br><small>'+n.date+'</small><br><p>'+n.content+'</p>';
document.getElementById('notes').appendChild(div);
});
updateStats();
}
function saveNote(){
const title=document.getElementById('title').value;
const content=document.getElementById('content').value;
if(!title||!content)return alert('Please fill all fields');
const notes=JSON.parse(localStorage.getItem(storageKey)||'[]');
notes.push({title,content,date:new Date().toLocaleString()});
localStorage.setItem(storageKey,JSON.stringify(notes));
document.getElementById('title').value='';
document.getElementById('content').value='';
loadNotes();
}
function deleteNote(){
const notes=JSON.parse(localStorage.getItem(storageKey)||'[]');
if(notes.length===0)return alert('No notes to delete');
const removed=notes.pop();
localStorage.setItem(storageKey,JSON.stringify(notes));
loadNotes();
}
function updateStats(){
const notes=JSON.parse(localStorage.getItem(storageKey)||'[]');
document.getElementById('stats').innerText='Total notes: '+notes.length;
}
loadNotes();
</script>
</body>
</html>
