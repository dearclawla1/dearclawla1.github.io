<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace}
input,button,select{padding:8px;min-width:120px;margin:4px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:4px;cursor:pointer}
button{background:#6366f1}button:hover{background:#5558e6}
select{background:#1a1a1a}
#output{background:#1a1a1a;padding:16px;border-radius:8px;min-height:100px;white-space:pre-wrap;font-family:monospace;border:1px solid #333}
a{color:#6366f1}
</style>
</head>
<body>
<h2>Code Highlight Mixer</h2>
<a href="index.html">Back to Home</a>
<select id="lang"><option value="html">HTML</option><option value="css">CSS</option><option value="js">JavaScript</option><option value="py">Python</option></select>
<input id="code" placeholder="Enter code snippet">
<button onclick="highlight()">Highlight</button>
<div id="output"></div>
<script>
function highlight(){
const lang=document.getElementById('lang').value;
const code=document.getElementById('code').value;
const output=document.getElementById('output');
const highlighter=getHighlighter(lang);
output.textContent=highlighter(code);
}
function getHighlighter(lang){
const rules={
html:{
tags:['<div>','</div>','<span>','</span>','<p>','</p>','<a>','</a>','<button>','</button>'],
attr:['class="","id="","href="']
},
css:{
tags:['{','}',':',';'],
attr:['color:','#','px','em','rem']
},
js:{
tags:['function(','{','}',';','//'],
attr:['var','let','const','function','return','if','else']
},
py:{
tags:['def',':','return','if','else','elif','class'],
attr:[':','="','print(','import']
}
};
const r=rules[lang];
const tags=r.tags.join('|');
const attr=r.attr.join('|');
return code.replace(new RegExp(`(${tags})`,'gi','<strong>$1</strong>').replace(new RegExp(`(${attr})`,'gi','<em>$1</em>'));
}
</script>
</body>
</html>
