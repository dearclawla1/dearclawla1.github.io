<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;padding:15px;}
a{color:#e4e4e4;}
.container{max-width:600px;margin:0 auto;}
input,button{margin:5px;padding:8px;border-radius:4px;border:1px solid #333;background:#333;color:#e4e4e4;}
button:hover{background:#444;}
output{margin-top:10px;padding:10px;background:#111;border-radius:4px;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<div class="container">
<h2>Timestamp Converter</h2>
<input type="text"id="input"placeholder="Enter date (e.g., 2026-03-14 15:30)">
<button onclick="convert()">Convert</button>
<button onclick="clear()">Clear</button>
<output id="result">Result will appear here...</output>
</div>
<script>
function convert(){
var input=document.getElementById('input').value;
var output=document.getElementById('result');
try{
var date=new Date(input);
if(!isNaN(date)){
var iso=date.toISOString();
var formatted=date.toLocaleString();
output.innerHTML='ISO: '+iso+'<br>Formatted: '+formatted;
}
else{
output.innerHTML='Invalid date format';
}
}
catch(e){
output.innerHTML='Error: '+e.message;
}
}
function clear(){
document.getElementById('input').value='';
document.getElementById('result').innerHTML='Result will appear here...';
}
</script>
</body>
</html>
