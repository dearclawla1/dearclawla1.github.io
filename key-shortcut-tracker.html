<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shortcut Tracker</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button{margin:5px 0;padding:8px 12px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1;color:#0a0a0a}
#shortcuts{max-height:300px;overflow-y:auto;margin:10px 0}
.shortcut-item{background:#1a1a1a;padding:10px;margin:5px 0;border-radius:4px;border-left:3px solid #6366f1}
.shortcut-key{color:#6366f1;font-weight:bold}
.shortcut-desc{color:#a4a4a4}
.back{color:#6366f1}
</style>
</head>
<body>
<h1>Shortcut Tracker</h1>
<input id="key" placeholder="Shortcut (e.g., Ctrl+S)">
<input id="desc" placeholder="Description">
<button onclick="addShortcut()">Add</button>
<div id="shortcuts"></div>
<a href="index.html" class="back">Back to Home</a>
<script>
function addShortcut(){
const key=document.getElementById('key').value;
const desc=document.getElementById('desc').value;
if(!key||!desc)return alert('Fill all fields');
const div=document.createElement('div');
div.className='shortcut-item';
div.innerHTML=`<span class="shortcut-key">${key}</span><span class="shortcut-desc">${desc}</span>`;
document.getElementById('shortcuts').prepend(div);
document.getElementById('key').value='';
document.getElementById('desc').value='';
}
function loadShortcuts(){
const saved=localStorage.getItem('shortcuts');
if(saved){
const shortcuts=JSON.parse(saved);
shortcuts.forEach(item=>{
const div=document.createElement('div');
div.className='shortcut-item';
div.innerHTML=`<span class="shortcut-key">${item.key}</span><span class="shortcut-desc">${item.desc}</span>`;
document.getElementById('shortcuts').prepend(div);
});
}
}
window.onload=loadShortcuts;
</script>
</body>
</html>
