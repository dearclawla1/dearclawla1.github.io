<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROT13 Encoder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#e4e4e4;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{margin-bottom:20px;text-align:center;color:#6366f1}
a{color:#6366f1;text-decoration:none}
input{width:100%;padding:12px;font-size:16px;background:#1a1a1a;border:2px solid #333;border-radius:8px;color:#e4e4e4;margin-bottom:15px;transition:border-color 0.2s}
input:focus{outline:none;border-color:#6366f1}
input.error{border-color:#ef4444}
button{width:100%;padding:14px;font-size:16px;font-weight:600;background:#6366f1;border:none;border-radius:8px;color:white;cursor:pointer;transition:background 0.2s}
button:hover{background:#5558f0}
button:active{transform:scale(0.98)}
.output{background:#1a1a1a;border:2px solid #333;border-radius:8px;padding:15px;font-family:monospace;font-size:14px;min-height:80px;white-space:pre-wrap;word-break:break-word;transition:border-color 0.2s}
.results-section{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;margin-top:20px}
.result-box{background:#1a1a1a;border:2px solid #333;border-radius:8px;padding:15px;font-family:monospace;font-size:14px;min-height:80px;white-space:pre-wrap;word-break:break-word;transition:border-color 0.2s}
.results-section h2{margin-bottom:10px;color:#6366f1;text-align:center;font-size:18px}
.clear-btn{background:#ef4444;margin-top:15px}
.clear-btn:hover{background:#dc2626}
.loading{opacity:0.6;pointer-events:none}
.download-btn{background:#10b981;margin-top:10px}
.download-btn:hover{background:#059669}
.stats-box{background:#1a1a1a;border:2px solid #333;border-radius:8px;padding:15px;margin-top:15px;font-size:14px;color:#a0a0a0;transition:border-color 0.2s}
.stats-box h3{color:#6366f1;margin-bottom:8px;font-size:16px}
.error-message{background:#ef4444;color:white;padding:12px;border-radius:8px;margin-top:15px;display:none;font-size:14px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.output,.result-box,.stats-box{animation:fadeIn 0.3s ease}
</style>
</head>
<body>
<div class="container">
<h1>ROT13 Encoder/Decoder</h1>
<input type="text" id="inputText" placeholder="Type or paste text here..." autocomplete="off">
<button id="convertBtn">Convert</button>
<div class="output" id="output"></div>
<div class="results-section">
<div class="result-box" id="encoded"></div>
<div class="result-box" id="decoded"></div>
</div>
<div class="stats-box" id="statsBox" style="display:none">
<h3>Statistics</h3>
<div id="statsContent"></div>
</div>
<button class="clear-btn" id="clearBtn" style="display:none">Clear All</button>
<div style="margin-top:15px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px">
<button class="download-btn" id="downloadOutput">Download Output</button>
<button class="download-btn" id="downloadEncoded">Download Encoded</button>
<button class="download-btn" id="downloadDecoded">Download Decoded</button>
</div>
<div class="error-message" id="errorMessage"></div>
</div>
<script>
const inputText = document.getElementById('inputText');
const convertBtn = document.getElementById('convertBtn');
const output = document.getElementById('output');
const encoded = document.getElementById('encoded');
const decoded = document.getElementById('decoded');
const clearBtn = document.getElementById('clearBtn');
const downloadOutput = document.getElementById('downloadOutput');
const downloadEncoded = document.getElementById('downloadEncoded');
const downloadDecoded = document.getElementById('downloadDecoded');
const statsBox = document.getElementById('statsBox');
const statsContent = document.getElementById('statsContent');
const errorMessage = document.getElementById('errorMessage');

function rot13(str) {
try {
return str.replace(/[a-zA-Z]/g, function(c) {
const code = c.charCodeAt(0);
const base = c >= 'a' ? 97 : 65;
const offset = c >='a' && c<='z' ? code - 97 : code - 65;
return String.fromCharCode(((offset + 13) % 26) + base);
});
} catch(e) {
console.warn('ROT13 error:', e);
return str;
}
}

function validateInput() {
if(!inputText.value.trim()) {
output.textContent = '';
encoded.textContent = '';
decoded.textContent = '';
clearBtn.style.display = 'none';
statsBox.style.display = 'none';
errorMessage.style.display = 'none';
return false;
}
return true;
}

function convert() {
const text = inputText.value;
if(!validateInput()) {
return;
}
const encodedText = rot13(text);
const decodedText = rot13(encodedText);
output.textContent = encodedText;
encoded.textContent = encodedText;
decoded.textContent = text;
clearBtn.style.display = 'block';
statsBox.style.display = 'block';
errorMessage.style.display = 'none';
updateStats(encodedText);
}

function updateStats(text) {
const charCount = text.length;
const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
const uniqueChars = new Set(text.split('')).size;
statsContent.innerHTML = `
<div><strong>Characters:</strong> ${charCount}</div>
<div><strong>Words:</strong> ${wordCount}</div>
<div><strong>Unique Characters:</strong> ${uniqueChars}</div>
<div><strong>ROT13 Applied:</strong> Yes</div>
`;
}

function downloadText(text, filename) {
const blob = new Blob([text], {type: 'text/plain'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = filename;
a.click();
URL.revokeObjectURL(url);
}

function saveToLocalStorage() {
try {
localStorage.setItem('rot13_input', inputText.value);
localStorage.setItem('rot13_output', output.textContent);
localStorage.setItem('rot13_encoded', encoded.textContent);
localStorage.setItem('rot13_decoded', decoded.textContent);
} catch(e) {
console.warn('Could not save to localStorage:', e);
}
}

function loadFromLocalStorage() {
try {
const savedInput = localStorage.getItem('rot13_input');
if(savedInput) {
inputText.value = savedInput;
}
const savedOutput = localStorage.getItem('rot13_output');
if(savedOutput) {
output.textContent = savedOutput;
}
const savedEncoded = localStorage.getItem('rot13_encoded');
if(savedEncoded) {
encoded.textContent = savedEncoded;
}
const savedDecoded = localStorage.getItem('rot13_decoded');
if(savedDecoded) {
decoded.textContent = savedDecoded;
}
} catch(e) {
console.warn('Could not load from localStorage:', e);
}
}

convertBtn.addEventListener('click', convert);

inputText.addEventListener('keydown', function(e) {
if(e.key === 'Enter') {
convert();
}
});

clearBtn.addEventListener('click', function() {
inputText.value = '';
output.textContent = '';
encoded.textContent = '';
decoded.textContent = '';
clearBtn.style.display = 'none';
inputText.focus();
});

downloadOutput.addEventListener('click', function() {
const text = output.textContent;
if(text) {
downloadText(text, 'rot13-output.txt');
}
});

downloadEncoded.addEventListener('click', function() {
const text = encoded.textContent;
if(text) {
downloadText(text, 'rot13-encoded.txt');
}
});

downloadDecoded.addEventListener('click', function() {
const text = decoded.textContent;
if(text) {
downloadText(text, 'rot13-decoded.txt');
}
});

inputText.addEventListener('input', function() {
if(inputText.value === '') {
output.textContent = '';
encoded.textContent = '';
decoded.textContent = '';
clearBtn.style.display = 'none';
statsBox.style.display = 'none';
errorMessage.style.display = 'none';
}
});

inputText.addEventListener('keydown', function(e) {
if(e.key === 'Escape') {
inputText.value = '';
output.textContent = '';
encoded.textContent = '';
decoded.textContent = '';
clearBtn.style.display = 'none';
statsBox.style.display = 'none';
errorMessage.style.display = 'none';
inputText.focus();
}
});

inputText.addEventListener('input', function() {
inputText.classList.remove('error');
});

inputText.addEventListener('blur', function() {
if(!validateInput()) {
inputText.classList.add('error');
}
});

loadFromLocalStorage();
</script>
</body>
</html>
