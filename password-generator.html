<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;margin:20px 0}
a{color:#646cff}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.control{padding:12px;border:1px solid #333;border-radius:6px;font-size:14px}
#password{width:100%;padding:12px;font-size:18px;margin:20px 0;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#e4e4e4}
button{padding:12px 24px;background:#4caf50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:16px}
button:hover{background:#45a049}
#result{width:100%;min-height:80px;padding:15px;background:#1a1a1a;border:1px solid #333;border-radius:6px;margin:20px 0;font-family:monospace;font-size:14px}
.checks{display:flex;gap:15px;font-size:13px;color:#a0a0a0;margin:10px 0}
</style>
</head>
<body>
<div class="container">
<a href="index.html">Home</a><h1>Password Generator</h1>
<div class="controls">
<div class="control"><label>Length:</label><input type="number" id="length" value="12" min="4" max="64"></div>
<div class="control"><label>Include Symbols:</label><input type="checkbox" id="symbols" checked></div>
<div class="control"><label>Include Numbers:</label><input type="checkbox" id="numbers" checked></div>
<div class="control"><label>Include Uppercase:</label><input type="checkbox" id="uppercase" checked></div>
<div class="control"><label>Include Lowercase:</label><input type="checkbox" id="lowercase" checked></div>
</div>
<div id="password"></div>
<button onclick="generate()">Generate Password</button>
<div id="result"></div>
<div class="checks">
<div>Password Strength: <span id="strength">-</span></div>
<div>Copied: <span id="copied">Click generate then copy</span></div>
</div>
<script>
document.getElementById('password').onfocus = function(){this.select()}
function generate(){
var chars="abcdefghijklmnopqrstuvwxyz";
if(document.getElementById('uppercase').checked)chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
if(document.getElementById('numbers').checked)chars+="0123456789";
if(document.getElementById('symbols').checked)chars+="!@#$%^&*()_+-=[]{}|;':\",./<>?";
var len=document.getElementById('length').value;
var pass="";
for(var i=0;i<len;i++)pass+=chars.charAt(Math.floor(Math.random()*chars.length));
document.getElementById('password').value=pass;
document.getElementById('result').value=pass;
checkStrength(pass);
}
function checkStrength(p){
var score=0;
if(p.length>=8)score++;
if(p.length>=12)score+=2;
if(/[A-Z]/.test(p))score++;
if(/[0-9]/.test(p))score++;
if(/[^A-Za-z0-9]/.test(p))score++;
var colors={0:'#ff4444',1:'#ff6644',2:'#ff9944',3:'#ffff44',4:'#66ff44',5:'#44ff44'};
document.getElementById('strength').innerText=p.length>=8?'Good'+(p.length>=12?'':'')+''+(/[A-Z]/.test(p)?'':'')+''+(/[0-9]/.test(p)?'':'')+''+(/[^A-Za-z0-9]/.test(p)?'':'');
document.getElementById('strength').style.color=colors[score]||'#44ff44';
}
generate();
</script>
</div>
</body>
</html>
