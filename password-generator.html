<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Password Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#e4e4e4;padding:2rem}
a{color:#8b5cf6;text-decoration:none}
.container{max-width:600px;margin:0 auto}
h1{margin-bottom:1.5rem;color:#8b5cf6}
.btn{background:#8b5cf6;color:white;border:none;padding:0.75rem 1.5rem;font-size:1rem;border-radius:0.5rem;cursor:pointer;margin-right:0.5rem}
.btn:hover{background:#7c3aed}
.input{width:100%;padding:0.75rem;margin-bottom:1rem;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;border-radius:0.5rem;font-size:1rem}
.label{display:block;margin-bottom:0.5rem;color:#a3a3a3}
.checkbox-group{display:flex;align-items:center;margin-bottom:0.75rem}
.checkbox-group input{width:auto;margin-right:0.5rem}
.result-box{background:#1a1a1a;padding:1rem;border-radius:0.5rem;margin-bottom:1rem;font-family:monospace;font-size:1.1rem;border:1px solid #333}
.result-box button{background:#222;border:none;padding:0.25rem 0.5rem;border-radius:0.25rem;cursor:pointer;color:#a3a3a3}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="display:block;margin-bottom:1rem;color:#8b5cf6">Home</a>
<h1>Password Generator</h1>
<div id="result" class="result-box" title="Generated password">
<span id="pwd"></span><button onclick="copyPwd()">Copy</button>
</div>
<div><label class="label">Length: <input type="number" id="length" value="16" min="4" max="64"></label></div>
<div><label class="label"><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label></div>
<div><label class="label"><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label></div>
<div><label class="label"><input type="checkbox" id="numbers" checked> Numbers (0-9)</label></div>
<div><label class="label"><input type="checkbox" id="symbols" checked> Symbols (!@#$)</label></div>
<div style="margin-top:1.5rem">
<button class="btn" onclick="generate()">Generate Password</button>
<button class="btn" onclick="clearPwd()">Clear</button>
</div>
</div>
<script>
function generate() {
  const len = parseInt(document.getElementById("length").value);
  const useUpper = document.getElementById("uppercase").checked;
  const useLower = document.getElementById("lowercase").checked;
  const useNum = document.getElementById("numbers").checked;
  const useSym = document.getElementById("symbols").checked;
  const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const lower = "abcdefghijklmnopqrstuvwxyz";
  const num = "0123456789";
  const sym = "!@#$%^&*()_+-=[]{}|;:,.<>?";
  let chars = "";
  if(useUpper) chars += upper;
  if(useLower) chars += lower;
  if(useNum) chars += num;
  if(useSym) chars += sym;
  if(chars === "") {
    document.getElementById("pwd").textContent = "Select character types";
    return;
  }
  let pwd = "";
  for(let i=0;i<len;i++) {
    const idx = Math.floor(Math.random()*chars.length);
    pwd += chars[idx];
  }
  document.getElementById("pwd").textContent = pwd;
}
function copyPwd() {
  const pwd = document.getElementById("pwd").textContent;
  navigator.clipboard.writeText(pwd).then(() => alert("Copied to clipboard!"));
}
function clearPwd() {
  document.getElementById("pwd").textContent = "";
}
generate();
</script>
</body>
</html>
