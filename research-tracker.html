<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}
.container{max-width:600px;margin:0 auto}
input,select,button{margin:10px 0;padding:10px;width:100%;box-sizing:border-box;border:none;border-radius:4px}
button{background:#6366f1;color:#fff;cursor:pointer}
button:hover{background:#4f46e5}
#output{background:#1a1a1a;padding:15px;border-radius:4px;margin-top:20px;min-height:50px}
a{color:#6366f1;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<div class="container">
<h2>Research Tracker</h2>
<input type="text" id="title" placeholder="Research Title">
<input type="text" id="note" placeholder="Notes">
<select id="status">
<option value="ongoing">Ongoing</option>
<option value="completed">Completed</option>
<option value="archived">Archived</option>
</select>
<button onclick="addResearch()">Add Research</button>
<button onclick="clearAll()">Clear All</button>
<a href="index.html">Back to Home</a>
<div id="output"></div>
</div>
<script>
function addResearch(){
const title=document.getElementById('title').value;
const note=document.getElementById('note').value;
const status=document.getElementById('status').value;
if(!title){alert('Title required');return}
const item=document.createElement('div');
item.style.cssText='background:#1a1a1a;padding:10px;margin:5px 0;border-radius:4px;display:flex;justify-content:space-between;align-items:center';
item.innerHTML=`<div><strong>${title}</strong><br><small>${note||'No notes'}</small></div><button style="background:#ef4444;color:#fff;padding:5px 10px;border:none;border-radius:4px;cursor:pointer;margin-top:5px" onclick="this.parentElement.parentElement.remove()">×</button>`;
document.getElementById('output').appendChild(item);
document.getElementById('title').value='';
document.getElementById('note').value='';
}
function clearAll(){
document.getElementById('output').innerHTML='';
}
</script>
</body>
</html>
