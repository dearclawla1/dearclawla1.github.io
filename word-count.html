<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Count</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,-apple-system,sans-serif;margin:0;padding:2rem;min-height:100vh;display:flex;flex-direction:column;gap:1rem}
.container{max-width:900px;margin:0 auto;width:100%}
h1{margin:0;font-size:1.8rem;font-weight:600}
textarea{width:100%;height:200px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:8px;padding:1rem;font-size:1rem;resize:vertical;font-family:inherit;line-height:1.6;transition:border-color 0.2s}
textarea:focus{outline:none;border-color:#6366f1}
textarea::placeholder{color:#666}
.controls{display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:0.5rem}
button{padding:0.6rem 1rem;margin:0.5rem 0.25rem;min-width:120px;background:#6366f1;color:#fff;border:none;cursor:pointer;border-radius:6px;font-size:0.9rem;font-weight:500;transition:all 0.2s}
button:hover{background:#5558e6;transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.secondary{background:#333;color:#e4e4e4}
button.secondary:hover{background:#444}
.stats{background:#1a1a1a;border-radius:8px;padding:1.25rem;margin-top:0.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem}
.stat-item{background:#242424;padding:0.75rem;border-radius:6px}
.stat-label{font-size:0.75rem;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.25rem}
.stat-value{font-size:1.25rem;font-weight:600;color:#e4e4e4}
.stat-sub{font-size:0.75rem;color:#666;margin-top:0.25rem}
.copy-btn{position:relative;overflow:hidden}
.copy-btn::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.1);transform:translateX(-100%);transition:transform 0.3s}
.copy-btn.copied::after{transform:translateX(0)}
.copy-btn.copied{background:#10b981}
.copy-btn.copied:hover{background:#10b981}
.back-link{display:inline-flex;align-items:center;gap:0.5rem;color:#6366f1;text-decoration:none;font-size:0.9rem;margin-top:0.5rem}
.back-link:hover{text-decoration:underline}
.loading{opacity:0.7}
.error{background:#ef4444;color:#fff;border-radius:6px;padding:0.75rem;margin-top:0.5rem;font-size:0.9rem;display:none}
@media(max-width:600px){
textarea{height:180px}
button{min-width:100px;padding:0.5rem}
}
</style>
</head>
<body>
<div class="container">
<h1>Word Count Tool</h1>
<textarea id="inputText" placeholder="Type or paste text here... (Ctrl+Enter to count, Ctrl+Shift+C to copy)"></textarea>
<div class="controls">
<button class="copy-btn" onclick="copyText()" title="Copy text (Ctrl+Shift+C)">Copy Text</button>
<button onclick="countWords()" title="Count words (Ctrl+Enter)">Count Words</button>
<button class="secondary" onclick="clearText()" title="Clear all">Clear</button>
</div>
<div class="error" id="error"></div>
<div class="stats" id="stats" style="display:none">
<div class="stats-grid">
<div class="stat-item">
<div class="stat-label">Words</div>
<div class="stat-value" id="wordCount">0</div>
<div class="stat-sub">Total words in text</div>
</div>
<div class="stat-item">
<div class="stat-label">Characters</div>
<div class="stat-value" id="charCount">0</div>
<div class="stat-sub">Total characters</div>
</div>
<div class="stat-item">
<div class="stat-label">Unique Words</div>
<div class="stat-value" id="uniqueWords">0</div>
<div class="stat-sub">Distinct words</div>
</div>
<div class="stat-item">
<div class="stat-label">Lines</div>
<div class="stat-value" id="lineCount">0</div>
<div class="stat-sub">Total lines</div>
</div>
<div class="stat-item">
<div class="stat-label">Paragraphs</div>
<div class="stat-value" id="paraCount">0</div>
<div class="stat-sub">Total paragraphs</div>
</div>
<div class="stat-item">
<div class="stat-label">Reading Time</div>
<div class="stat-value" id="readTime">0s</div>
<div class="stat-sub">At 200 wpm</div>
</div>
</div>
</div>
<a href="index.html" class="back-link">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M19 12H5M12 19l-7-7 7-7"/>
</svg>
Back to Home
</a>
</div>
<script>
const inputText=document.getElementById("inputText");
const stats=document.getElementById("stats");
const wordCountEl=document.getElementById("wordCount");
const charCountEl=document.getElementById("charCount");
const uniqueWordsEl=document.getElementById("uniqueWords");
const lineCountEl=document.getElementById("lineCount");
const paraCountEl=document.getElementById("paraCount");
const readTimeEl=document.getElementById("readTime");
const errorEl=document.getElementById("error");

function countWords(){
const text=inputText.value;
if(!text.trim()){
showError("Please enter some text first.");
return;
}
try{
const words=text.trim().split(/\s+/).filter(w=>w);
const unique=new Set(words);
const chars=text.length;
const lines=text.split("\n").length;
const paragraphs=text.split(/\s{2,}/g).length;
const readTime=Math.ceil(words.length/2);
stats.style.display="block";
wordCountEl.textContent=words.length;
charCountEl.textContent=chars;
uniqueWordsEl.textContent=unique.size;
lineCountEl.textContent=lines;
paraCountEl.textContent=paragraphs;
readTimeEl.textContent=readTime+"s";
errorEl.style.display="none";
}catch(e){
showError("Error processing text: "+e.message);
}
}

function clearText(){
inputText.value="";
stats.style.display="none";
errorEl.style.display="none";
}

function copyText(){
const text=inputText.value;
if(!text){
showError("No text to copy.");
return;
}
navigator.clipboard.writeText(text).then(()=>{
const btn=document.querySelector(".copy-btn");
btn.classList.add("copied");
setTimeout(()=>btn.classList.remove("copied"),1500);
}).catch(err=>{
showError("Failed to copy: "+err.message);
});
}

function showError(msg){
errorEl.textContent=msg;
errorEl.style.display="block";
stats.style.display="none";
}

// Auto-count on typing (debounced)
let debounce;
inputText.addEventListener("input",()=>{
clearTimeout(debounce);
debounce=setTimeout(countWords,300);
});

// Keyboard shortcuts
document.addEventListener("keydown",e=>{
if(e.ctrlKey&&e.key==="Enter"){
e.preventDefault();
countWords();
}
if(e.ctrlKey&&e.shiftKey&&e.key==="C"){
e.preventDefault();
copyText();
}
});

// Count on paste
inputText.addEventListener("paste",()=>{
setTimeout(countWords,100);
});

// Initial count
countWords();
</script>
</body>
</html>
