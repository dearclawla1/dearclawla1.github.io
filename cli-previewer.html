<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLI Previewer</title>
<style>
:root{--bg:#0a0a0a;--text:#e4e4e4;--primary:#6366f1;--secondary:#1e1e2e;--accent:#a5b4fc}
body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:2rem}
.container{max-width:800px;margin:0 auto}
h1{color:var(--primary);margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
input,button,select{padding:0.75rem;border-radius:8px;border:1px solid #333;background:var(--secondary);color:var(--text)}
input{width:100%;box-sizing:border-box}
button{cursor:pointer;background:var(--primary);font-weight:600}
button:hover{opacity:0.9}
select{width:100%;box-sizing:border-box}
#preview{background:var(--secondary);padding:1rem;border-radius:8px;min-height:100px;font-family:monospace;white-space:pre-wrap}
.back-link{display:block;margin-top:2rem;text-align:center}
</style>
</head>
<body>
<div class="container">
<h1>CLI Previewer</h1>
<div class="grid">
<input id="cmd" type="text" placeholder="Enter command (e.g., echo Hello)" style="margin-bottom:0.5rem">
<select id="format">
<option value="bash">Bash</option>
<option value="powershell">PowerShell</option>
<option value="python">Python</option>
<option value="javascript">JavaScript</option>
</select>
<button id="run">Preview</button>
<select id="theme">
<option value="dark">Dark</option>
<option value="light">Light</option>
</select>
</div>
<div id="preview">Enter a command above and select a format to preview...</div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
</div>
<script>
const preview=document.getElementById('preview');
const cmd=document.getElementById('cmd');
const format=document.getElementById('format');
const theme=document.getElementById('theme');
const run=document.getElementById('run');
const previewCode=(cmdText,lang)=>{
try{
const code=new Function(`return (function(){${cmdText}})()`);
const res=eval(code)();
return String(res||'');
}catch(e){return e.message;}}
run.onclick=()=>{const t=format.value;const c=cmd.value;if(!c){preview.textContent='Enter a command...';return}
const output=previewCode(c,t)
preview.textContent=output||'Preview failed';
};
theme.onclick=()=>{const t=theme.value;document.documentElement.style.setProperty('--bg',t==='light'?'#f5f5f5':'#0a0a0a');
document.documentElement.style.setProperty('--text',t==='light'?'#0a0a0a':'#e4e4e4');
document.documentElement.style.setProperty('--primary',t==='light'?'#6366f1':'#6366f1');
document.documentElement.style.setProperty('--secondary',t==='light'?'#e0e0e0':'#1e1e2e');}
</script>
</body>
</html>
