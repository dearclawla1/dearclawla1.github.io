<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
input,select,button{margin:5px 0;padding:8px 12px;border:1px solid #333;border-radius:4px}
button{background:#6366f1;color:#0a0a0a;cursor:pointer;font-weight:bold}
#result{background:#111;padding:15px;margin:10px 0;border-radius:4px;border-left:3px solid #6366f1}
</style>
</head>
<body>
<h2>Viewport Simulator</h2>
<label>Screen Width: <input type="number" id="width" value="375" min="100" max="1920"></label>
<label>Screen Height: <input type="number" id="height" value="667" min="100" max="2160"></label>
<label>Resolution: <select id="preset">
<option value="375x667">iPhone SE (375x667)</option>
<option value="390x844">iPhone 12/13 (390x844)</option>
<option value="390x844">iPhone 12 Pro (390x844)</option>
<option value="414x896">iPhone 12 Pro Max (414x896)</option>
<option value="428x926">iPhone 14 Pro Max (428x926)</option>
<option value="768x1024">iPad (768x1024)</option>
<option value="1024x768">iPad Portrait (1024x768)</option>
<option value="1440x2560">iPad Pro (1440x2560)</option>
</select></label>
<button onclick="simulate()">Simulate</button>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<div id="result">Enter dimensions and click Simulate</div>
<script>
function simulate(){
let w=document.getElementById('width').value;
let h=document.getElementById('height').value;
let p=document.getElementById('preset').value;
let r=document.getElementById('result');
let dims=w+'x'+h;
let ratio=(h/w).toFixed(2);
r.innerHTML='<strong>Viewport:</strong> '+dims+'<br><strong>Aspect Ratio:</strong> '+(w+':'+h)+' ('+ratio+')<br><strong>Status:</strong> ✅ Simulating responsive design for '+dims;
}
</script>
</body>
</html>
