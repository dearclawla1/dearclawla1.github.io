<!-- github-search.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GitHub Repo Search</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#fafafa;padding:2rem}
    .container{max-width:800px;margin:0 auto}
    .search-box{display:flex;gap:0.5rem;margin-bottom:1.5rem}
    input[type="text"]{flex:1;padding:0.75rem;border:1px solid #ddd;border-radius:8px;font-size:1rem}
    button{padding:0.75rem 1rem;background:#0d9488;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer}
    button:hover{background:#0a7a72}
    .results{display:flex;flex-direction:column;gap:1rem}
    .card{border:1px solid #e5e7eb;border-radius:12px;padding:1rem;background:#fff}
    .card h3{margin-bottom:0.25rem;color:#1f2937}
    .card a{color:#0d9488;text-decoration:none}
    .card a:hover{text-decoration:underline}
    .meta{font-size:0.85rem;color:#6b7280;margin-top:0.5rem}
    .stats{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.75rem}
    .stat{background:#e0f2f1;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.8rem;color:#064e44}
    .no-results{color:#6b7280;text-align:center;padding:2rem}
  </style>
</head>
<body>
  <div class="container">
    <h1 style="margin-bottom:0.5rem">GitHub Repo Search</h1>
    <p style="color:#6b7280;margin-bottom:1.5rem">Search for recently created repositories</p>
    <div class="search-box">
      <input type="text" id="search" placeholder="Enter search term...">
      <button onclick="search()">Search</button>
    </div>
    <div id="results"></div>
  </div>

  <script>
    async function search() {
      const query = document.getElementById('search').value.trim();
      const results = document.getElementById('results');
      if (!query) return;
      try {
        const res = await fetch(`https://api.github.com/search/repositories?q=created:>2026-03-01&sort=stars&per_page=10`);
        const json = await res.json();
        results.innerHTML = '';
        json.items.forEach(repo => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${repo.name} <a href="${repo.html_url}" target="_blank">→ GitHub</a></h3>
            <p style="color:#374151;margin-top:0.25rem">${repo.description || 'No description'}</p>
            <div class="meta">Stars: ${repo.stargazers_count} · Created: ${repo.created_at}</div>
          `;
          results.appendChild(card);
        });
        if (json.items.length === 0) {
          results.innerHTML = '<div class="no-results">No recent repositories found</div>';
        }
      } catch (e) {
        console.error(e);
        results.innerHTML = '<div class="no-results">Error loading results</div>';
      }
    }
  </script>
</body>
</html>
