<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Timer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{max-width:400px;width:100%}
h1{text-align:center;margin-bottom:20px;font-size:1.8rem}
input,select{width:100%;padding:12px;margin:8px 0;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#e4e4e4;font-size:1rem}
button{width:100%;padding:12px;margin:8px 0;background:#6366f1;border:none;border-radius:6px;color:#fff;font-size:1rem;cursor:pointer;transition:background .2s}
button:hover{background:#5558e3}
.timer{font-size:3rem;text-align:center;margin:20px 0;font-weight:bold}
.controls{display:flex;gap:10px}
.info{font-size:0.9rem;color:#888;text-align:center;margin-top:15px}
a{display:block;text-align:center;margin-top:15px;font-size:0.9rem}
</style>
</head>
<body>
<div class="container">
<h1>Focus Timer</h1>
<input type="number" id="minutes" placeholder="Minutes" min="1" max="120" value="25">
<select id="mode">
<option value="focus">Focus</option>
<option value="short">Short Break</option>
<option value="long">Long Break</option>
</select>
<div class="timer" id="display">00:00</div>
<div class="controls">
<button id="start">Start</button>
<button id="pause">Pause</button>
<button id="reset">Reset</button>
</div>
<div class="info" id="status">Ready</div>
<a href="https://gwen-api.dearclawla1.workers.dev/api/store/timers" target="_blank" rel="noopener">Export Timer Data</a>
<script>
(function(){
const minutesInput = document.getElementById('minutes');
const modeSelect = document.getElementById('mode');
const display = document.getElementById('display');
const startBtn = document.getElementById('start');
const pauseBtn = document.getElementById('pause');
const resetBtn = document.getElementById('reset');
const statusEl = document.getElementById('status');

let timerInterval = null;
let totalSeconds = 0;
let remainingSeconds = 0;
let isRunning = false;

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function updateDisplay() {
    display.textContent = formatTime(remainingSeconds);
}

function startTimer() {
    if (isRunning) return;
    
    const mins = parseInt(minutesInput.value) || 25;
    const mode = modeSelect.value;
    
    let secondsPerMode = {
        focus: mins * 60,
        short: 5 * 60,
        long: 15 * 60
    };
    
    totalSeconds = secondsPerMode[mode];
    remainingSeconds = totalSeconds;
    isRunning = true;
    
    statusEl.textContent = 'Running';
    updateDisplay();
    
    timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
            remainingSeconds--;
            updateDisplay();
        } else {
            clearInterval(timerInterval);
            isRunning = false;
            statusEl.textContent = 'Completed!';
        }
    }, 1000);
}

function pauseTimer() {
    if (!isRunning) return;
    
    clearInterval(timerInterval);
    isRunning = false;
    statusEl.textContent = 'Paused';
}

function resetTimer() {
    clearInterval(timerInterval);
    isRunning = false;
    
    const mins = parseInt(minutesInput.value) || 25;
    const mode = modeSelect.value;
    let secondsPerMode = {
        focus: mins * 60,
        short: 5 * 60,
        long: 15 * 60
    };
    
    remainingSeconds = secondsPerMode[mode];
    totalSeconds = remainingSeconds;
    
    statusEl.textContent = 'Ready';
    updateDisplay();
}

startBtn.addEventListener('click', startTimer);
pauseBtn.addEventListener('click', pauseTimer);
resetBtn.addEventListener('click', resetTimer);

// Save timer data to localStorage for persistence
function saveTimerData() {
    const timerData = {
        minutes: minutesInput.value,
        mode: modeSelect.value,
        remainingSeconds: remainingSeconds,
        totalSeconds: totalSeconds,
        isRunning: isRunning,
        timestamp: new Date().toISOString()
    };
    localStorage.setItem('focus-timer-data', JSON.stringify(timerData));
}

// Load saved timer data on page load
function loadTimerData() {
    const saved = localStorage.getItem('focus-timer-data');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            minutesInput.value = data.minutes || '25';
            modeSelect.value = data.mode || 'focus';
            remainingSeconds = data.remainingSeconds || 0;
            totalSeconds = data.totalSeconds || 0;
            isRunning = data.isRunning || false;
            statusEl.textContent = data.isRunning ? 'Running' : 'Ready';
            updateDisplay();
        } catch (e) {
            console.error('Failed to load timer data:', e);
        }
    }
}

loadTimerData();
saveTimerData();
})();
</script>
</body>
</html>
