<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#e4e4e4;font-family:'Segoe UI',Tahoma,sans-serif;padding:20px;min-height:100vh;}
h2{color:#6366f1;margin-bottom:15px;font-size:1.5rem;}
.container{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:15px;}
@media(min-width:768px){.container{grid-template-columns:1fr 1fr;}}
input,button,select{background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;padding:10px 15px;border-radius:6px;font-size:1rem;cursor:pointer;}
input:focus,button:focus,select:focus{outline:2px solid #6366f1;outline-offset:2px;}
input::placeholder{color:#6366f1;opacity:0.6;}
textarea{background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;padding:10px 15px;border-radius:6px;font-size:1rem;width:100%;height:300px;resize:vertical;font-family:'Consolas',monospace;}
#output{background:#0f0f0f;border:1px solid #6366f1;padding:15px;border-radius:6px;height:300px;overflow:auto;font-family:'Consolas',monospace;}
button{font-weight:600;transition:all 0.2s;}
button:hover{background:#6366f1;color:#0a0a0a;}
button:active{transform:scale(0.98);}
.link{color:#6366f1;text-decoration:none;font-size:1rem;}
.link:hover{text-decoration:underline;}
.copy-btn{background:#2a2a2a;border-color:#4a4a4a;font-size:0.9rem;padding:8px 12px;}
.copy-btn:hover{background:#3a3a3a;}
.copy-btn.copied{background:#6366f1;color:#0a0a0a;}
</style>
</head>
<body>
<h2>CSS Previewer</h2>
<div class="container">
<div>
<label for="css" style="display:block;margin-bottom:8px;font-weight:500;">Enter CSS:</label>
<input type="text" id="css" placeholder="Enter your CSS styles here...">
<button onclick="preview()">Preview</button>
<button class="copy-btn" onclick="copyCSS()">Copy CSS</button>
<a href="index.html" class="link" style="display:inline-block;margin-top:10px;">Back to Home</a>
</div>
<div>
<textarea id="output" readonly></textarea>
</div>
</div>
<script>
function preview(){
var css=document.getElementById('css').value;
var output=document.getElementById('output');
if(css.trim()){
output.innerHTML='<style>'+css+'</style>';
}
}
function copyCSS(){
var css=document.getElementById('css').value;
if(css.trim()){
navigator.clipboard.writeText(css).then(function(){
var btn=document.querySelector('.copy-btn');
btn.textContent='Copied!';
btn.classList.add('copied');
setTimeout(function(){
btn.textContent='Copy CSS';
btn.classList.remove('copied');
},2000);
},function(){
alert('Failed to copy CSS to clipboard');
});
}else{
alert('Please enter CSS first');
}
}
// Live preview on input change
document.getElementById('css').addEventListener('input',function(){
preview();
});
// Keyboard shortcut: Ctrl+Enter to preview
document.addEventListener('keydown',function(e){
if(e.ctrlKey && e.key==='Enter'){
preview();
}
});
</script>
</body>
</html>
