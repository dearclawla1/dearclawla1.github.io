<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;padding:10px;}
input,button,select{background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;padding:5px;margin:5px;}
textarea{background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;padding:5px;width:100%;height:100px;}
#output{background:#0f0f0f;border:1px solid #6366f1;padding:10px;height:300px;overflow:auto;}
</style>
</head>
<body>
<h2>CSS Previewer</h2>
<input type="text" id="css" placeholder="Enter CSS...">
<button onclick="preview()">Preview</button>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<textarea id="output"></textarea>
<script>
function preview(){
var css=document.getElementById('css').value;
var output=document.getElementById('output');
output.innerHTML='<style>'+css+'</style>';
}
</script>
</body>
</html>
