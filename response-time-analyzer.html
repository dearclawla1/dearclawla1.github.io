<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Response Time Analyzer</title><style>body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}h1{color:#6366f1}input,button{padding:8px 12px;margin:5px 0;border:none;border-radius:4px;font-size:14px}input{background:#1a1a1a;color:#e4e4e4;border:1px solid #333}.btn-primary{background:#6366f1;color:white}.btn-secondary{background:#333;color:#e4e4e4}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:8px;border-bottom:1px solid #333;text-align:left}th{background:#1a1a1a}</style></head><body><h1>Response Time Analyzer</h1><div><a href="index.html" style="color:#6366f1">Back to Home</a></div><input type="number"id="latency"id="latency"placeholder="Latency (ms)">
<button class="btn-primary" onclick="analyze()">Analyze</button><div id="output" style="margin-top:15px"></div><table id="results" style="display:none"></table><script>function analyze(){const lat=document.getElementById('latency').value;if(!lat||lat<0){document.getElementById('output').innerHTML='<span style="color:#ff6b6b">Please enter a valid latency (ms).</span>';return}const r=(lat<100?'Excellent (sub-100ms)':'Good (100-300ms)');const status=lat<100?'green':lat<300?'yellow':'red';document.getElementById('output').innerHTML=`<span style="color:${status}">Status: ${r}</span><br><small>Latency: ${lat}ms</small>`;document.getElementById('results').style.display='none';}function addRow(lat){const t=document.getElementById('results'),row=document.createElement('tr');row.innerHTML=`<td>${lat}</td><td>${lat<100?'Excellent (sub-100ms)':lat<300?'Good (100-300ms)':'Needs Optimization'}</td>`;t.appendChild(row);}</script></body></html>
