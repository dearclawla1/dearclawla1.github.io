<!DOCTYPE html>
<html>
<head>
<title>Box Shadow Generator</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
h1{font-size:18px;margin-bottom:10px;}
a{color:#6366f1;}
.container{max-width:600px;margin:0 auto;}
input[type="text"],input[type="number"],button{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:8px;margin:5px 0;width:100%;}
button{background:#6366f1;color:#0a0a0a;border:none;font-weight:bold;}
#preview{background:#0a0a0a;border:2px solid #333;height:200px;margin:10px 0;position:relative;}
#box{width:100px;height:100px;background:#6366f1;position:absolute;}
</style>
</head>
<body>
<h1>Box Shadow Generator</h1>
<div class="container">
<a href="index.html" style="color:#6366f1">Back to Home</a>
<input type="text" id="shadow" placeholder="Enter shadow (e.g. 4px 4px 4px rgba(0,0,0,0.5))">
<button onclick="update()">Update</button>
<div id="preview">
<div id="box"></div>
</div>
</div>
<script>
function update(){
document.getElementById('shadow').value = '4px 4px 4px rgba(0,0,0,0.5)';
}
</script>
</body>
</html>
