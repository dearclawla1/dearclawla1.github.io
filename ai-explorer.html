<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#e4e4e4;text-decoration:none;}
h1{color:#2196f3;}
#projects{margin-top:20px;}
.project{background:#1a1a1a;border:1px solid #333;padding:15px;margin:10px 0;border-radius:5px;}
.category{margin-top:20px;}
select{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:8px;border-radius:3px;}
input{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:8px;border-radius:3px;}
</style>
</head>
<body>
<a href="index.html">Home</a><h1>AI Project Explorer</h1>
<div class="category">Select Category:</div>
<select id="categoryFilter" onchange="filterProjects()">
<option value="all">All</option>
<option value="machine-learning">Machine Learning</option>
<option value="natural-language">Natural Language</option>
<option value="computer-vision">Computer Vision</option>
<option value="robotics">Robotics</option>
</select>
<div id="projects"></div>
<script>
async function fetchProjects() {
try{
let res = await fetch('https://api.github.com/search/repositories?q=topic:ai+topic:open-source&sort=stars&per_page=50');
let data = await res.json();
data.items.forEach(p => {
let div = document.createElement('div');
div.className = 'project';
div.innerHTML = '<a href="' + p.html_url + '" target="_blank"><strong>' + p.name + '</strong></a><br><small>' + p.description + '</small><br><br><small>Stars: ' + p.stargazers_count + ' | Languages: ' + p.language + '</small>';
document.getElementById('projects').appendChild(div);
});
filterProjects();
}catch(e){console.error(e);}
}
function filterProjects() {
let filter = document.getElementById('categoryFilter').value;
let projects = document.getElementById('projects');
projects.innerHTML = '';
if(filter === 'all'){fetchProjects();return;}
fetch('https://api.github.com/search/repositories?q=topic:' + filter + '+ai&sort=stars&per_page=10').then(res => {
return res.json();
}).then(data => {
data.items.forEach(p => {
let div = document.createElement('div');
div.className = 'project';
div.innerHTML = '<a href="' + p.html_url + '" target="_blank"><strong>' + p.name + '</strong></a><br><small>' + p.description + '</small><br><br><small>Stars: ' + p.stargazers_count + '</small>';
projects.appendChild(div);
});
});
}
</script>
</body>
</html>
