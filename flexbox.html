<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
input,button,select{padding:8px;margin:5px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4;}
button{cursor:pointer;}
a{color:#6366f1;text-decoration:none;}
#preview{border:2px solid #6366f1;padding:10px;margin-top:10px;min-height:100px;}
</style>
</head>
<body>
<h3>Flexbox Playground</h3>
<input type="text" id="flex" placeholder="Flex items (space separated)" value="box1 box2 box3">
<select id="dir">
<option value="row">Row</option>
<option value="column">Column</option>
</select>
<select id="wrap">
<option value="nowrap">nowrap</option>
<option value="wrap">wrap</option>
</select>
<select id="align">
<option value="flex-start">flex-start</option>
<option value="center">center</option>
<option value="flex-end">flex-end</option>
<option value="space-between">space-between</option>
</select>
<button onclick="update()">Update</button>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<div id="preview"></div>
<script>
function update(){
const flex=document.getElementById('flex').value.split(' ').filter(Boolean);
const dir=document.getElementById('dir').value;
const wrap=document.getElementById('wrap').value;
const align=document.getElementById('align').value;
let html='<style>flex-container{display:flex;flex-direction:'+dir+';flex-wrap:'+wrap+';align-items:'+align+';}</style>';
flex.forEach((item,i)=>{
html+='<div class="flex-item" style="background:#6366f1;color:#0a0a0a;padding:10px;margin:5px;border-radius:4px;">'+i+'-'+item+'</div>';
});
document.getElementById('preview').innerHTML=html;
}
update();
</script>
</body>
</html>
