<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e4;font-family:'Segoe UI',Tahoma,sans-serif;margin:0;padding:20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.container{width:100%;max-width:600px}
h3{margin:0 0 15px;text-align:center;color:#6366f1}
input,button,select{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:12px;margin:8px;border-radius:6px;font-size:14px;transition:border-color 0.2s}
input:focus,button:focus,select:focus{outline:none;border-color:#6366f1}
button:hover{border-color:#6366f1;background:#252525}
button.primary{background:#6366f1;color:white;border-color:#6366f1}
button.primary:hover{background:#5558e6}
#output{margin-top:20px;min-height:250px;background:#111;padding:15px;border-radius:8px;display:flex;justify-content:center;align-items:center;flex-direction:column;transition:all 0.3s ease}
#output img{max-width:100%;height:auto;animation:fadeIn 0.5s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
#output .placeholder{color:#666;font-size:14px;text-align:center;padding:20px}
#download-btn{display:none;margin-top:10px;background:#22c55e;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600;transition:all 0.2s}
#download-btn:hover{background:#16a34a;transform:translateY(-2px)}
a{font-size:13px;margin-top:15px;color:#6366f1;text-decoration:none}
a:hover{text-decoration:underline}
.form-group{margin-bottom:12px}
label{display:block;margin-bottom:5px;color:#888;font-size:13px}
input[type="text"],select{width:100%}
.error-message{background:#ff6b6b;color:white;padding:10px;border-radius:6px;margin:8px 0;font-size:13px;display:none;animation:shake 0.5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-5px)}20%,40%,60%,80%{transform:translateX(5px)}}
</style>
</head>
<body>
<div class="container">
<h3>QR Code Generator</h3>
<div class="form-group">
<label for="text">Enter text or URL</label>
<input id="text" placeholder="https://example.com or any text" type="text" style="width:100%">
</div>
<div class="form-group">
<label for="type">Type</label>
<select id="type"><option value="text">Text</option><option value="url">URL</option></select>
</div>
<button class="primary" onclick="generate()">Generate QR Code</button>
<div id="output"><div class="placeholder">Enter text and click Generate</div></div>
<button id="download-btn" onclick="downloadQR()">Download QR Code</button>
<a href="index.html">Back to Home</a>
</div>
<script>
let qrCodeInstance = null;
let debounceTimer;

// Load saved text on page load
document.addEventListener('DOMContentLoaded', () => {
const savedText = localStorage.getItem('qrText');
if(savedText){
document.getElementById('text').value = savedText;
}
});

// Save text on input change
document.getElementById('text').addEventListener('input', function(){
const text = this.value;
localStorage.setItem('qrText', text);
});

// Auto-generate on Enter key (Ctrl+Enter)
document.getElementById('text').addEventListener('keypress', function(e){
if(e.key === 'Enter'){
generate();
}
});

// Clear on Escape key
document.addEventListener('keydown', function(e){
if(e.key === 'Escape'){
document.getElementById('text').value = '';
document.getElementById('output').innerHTML = '<div class="placeholder">Enter text and click Generate</div>';
document.getElementById('download-btn').style.display = 'none';
clearQRCode();
localStorage.removeItem('qrText');
}
});

function clearQRCode(){
if(qrCodeInstance){
qrCodeInstance.clear();
qrCodeInstance = null;
}
};

function generate(){
const text=document.getElementById('text').value;
const type=document.getElementById('type').value;
const output=document.getElementById('output');
const downloadBtn=document.getElementById('download-btn');
const errorMessage = document.createElement('div');
errorMessage.className = 'error-message';
errorMessage.id = 'error-message';
errorMessage.style.display = 'none';

// Input validation
if(!text.trim()){
errorMessage.textContent = 'Please enter some text or URL!';
errorMessage.style.display = 'block';
setTimeout(() => {
errorMessage.style.display = 'none';
}, 3000);
return;
}

// Validate URL format if URL type selected
if(type === 'url'){
const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
if(!urlPattern.test(text)){
errorMessage.textContent = 'Please enter a valid URL (http:// or https://)!';
errorMessage.style.display = 'block';
setTimeout(() => {
errorMessage.style.display = 'none';
}, 3000);
return;
}
}

try{
// Clear previous QR code
output.innerHTML = '';
clearQRCode();

// Generate new QR code
qrCodeInstance = new QRCode(output, {
text: text,
width: 256,
height: 256,
colorDark : '#000000',
colorLight : '#ffffff',
correctLevel : QRCode.CorrectLevel.M
});

// Show download button after QR code is generated
setTimeout(() => {
downloadBtn.style.display = 'block';
}, 100);

// Update placeholder text
output.innerHTML = '<img src="" alt="QR Code">';
} catch(e){
output.innerHTML = '<div style="color:#ff6b6b;text-align:center;padding:20px">Error generating QR code. Please try again.</div>';
downloadBtn.style.display = 'none';
}
}

function downloadQR(){
const qrImage = document.querySelector('#output img');
if(!qrImage || !qrImage.src){
alert('No QR code to download. Generate one first!');
return;
}

const link = document.createElement('a');
link.href = qrImage.src;
link.download = 'qrcode.png';
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
}

// Auto-generate on input change (debounced)
document.getElementById('text').addEventListener('input', function(){
clearTimeout(debounceTimer);
debounceTimer = setTimeout(generate, 500);
});

// Generate on type change
document.getElementById('type').addEventListener('change', function(){
generate();
});
</script>
</body>
</html>
