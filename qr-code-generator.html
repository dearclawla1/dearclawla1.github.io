<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#ff6b6b;text-decoration:none;}
.container{max-width:600px;margin:0 auto;}
h1{margin:20px 0;text-align:center;}
input,button{width:100%;padding:12px;margin:8px 0;border:2px solid #333;border-radius:6px;font-size:16px;}
button{background:#3a3a3a;color:#e4e4e4;cursor:pointer;transition:0.2s;}
button:hover{background:#4a4a4a;}
#qr-container{margin:20px 0;text-align:center;padding:20px;border:3px dashed #333;}
#qr-text{font-size:24px;text-align:center;padding:10px;color:#e4e4e4;background:#1a1a1a;}
</style>
</head>
<body>
<a href="index.html" style="position:absolute;top:5px;left:10px;">Home</a>
<div class="container">
<h1>QR Code Generator</h1>
<input type="text" id="qr-input" placeholder="Enter text for QR code..." value="Hello World">
<button onclick="generateQR()">Generate QR Code</button>
<div id="qr-container"><div id="qr-text">Hello World</div></div>
</div>
<script>
function generateQR() {
  const text = document.getElementById('qr-input').value;
  document.getElementById('qr-text').textContent = text;
}
document.getElementById('qr-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') generateQR();
});
</script>
</body>
</html>
