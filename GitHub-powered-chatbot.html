<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM Chatbot - AI Tool Discovery</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 2rem; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; }
        h1 { color: #1a1a1a; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .chat-box { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 1rem; min-height: 200px; margin-bottom: 1rem; }
        .message { margin-bottom: 0.75rem; padding: 0.5rem; border-radius: 8px; max-width: 85%; }
        .message.ai { background: #e8f5e9; margin-right: auto; }
        .message.user { background: #e3f2fd; margin-left: auto; }
        .input-area { display: flex; gap: 0.5rem; }
        input[type="text"] { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { padding: 0.75rem 1.5rem; background: #1a1a1a; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #333; }
        .features { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .features h3 { font-size: 1rem; color: #333; margin-bottom: 0.5rem; }
        .features ul { list-style: none; }
        .features li { padding: 0.25rem 0; color: #666; font-size: 0.85rem; }
        .badge { display: inline-block; background: #e0f2e0; color: #1b5e20; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-right: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Local LLM Chatbot ⚡</h1>
        <p class="subtitle">Discover AI tools with your own local model</p>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask about AI tools..." />
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="features">
            <h3>Powered by Local LLM</h3>
            <ul>
                <li><span class="badge">🔒</span>Runs locally, no data leaves your machine</li>
                <li><span class="badge">⚡</span>Qwen 3.5-9B via LM Studio</li>
                <li><span class="badge">🎯</span>Specialized for AI tool discovery</li>
                <li><span class="badge">💰</span>Free forever, zero cost</li>
            </ul>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            // Simulate AI response
            setTimeout(() => {
                const responses = [
                    "I can help you find the best AI tools for your workflow!",
                    "Local LLMs are great - they run offline and respect your privacy.",
                    "Check out Qwen, Llama, or Mistral for local deployments.",
                    "AI tool discovery: look for tools that integrate well with your stack.",
                    "Remember: local runs are free and fast once set up."
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                appendMessage(randomResponse, 'ai');
            }, 500);
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
