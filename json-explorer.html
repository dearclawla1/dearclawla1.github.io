<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0a0a0a;color:#e4e4e4;padding:2rem}
input{width:100%;padding:0.5rem;margin:0.5rem 0;border:1px solid #333;background:#171717;color:#e4e4e4;border-radius:4px}
button{padding:0.5rem 1rem;margin:0.5rem;border:none;background:#6366f1;color:#0a0a0a;border-radius:4px;cursor:pointer}
#output{background:#171717;padding:1rem;border-radius:4px;min-height:100px;font-family:monospace;font-size:0.9rem;white-space:pre-wrap}
a{color:#6366f1;text-decoration:none}
</style>
</head>
<body>
<h2>JSON Explorer</h2>
<input type="text" id="jsonInput" placeholder="Enter or paste JSON here...">
<button onclick="parseJSON()">Parse JSON</button>
<button onclick="formatJSON()">Format JSON</button>
<div id="output"></div>
<a href="index.html">Back to Home</a>
<script>
function parseJSON(){
const input=document.getElementById('jsonInput').value;
const output=document.getElementById('output');
try{
const parsed=JSON.parse(input);
output.textContent=JSON.stringify(parsed,2);
}catch(e){
output.textContent='Invalid JSON: '+e.message;
}
}
function formatJSON(){
const input=document.getElementById('jsonInput').value;
const output=document.getElementById('output');
try{
output.textContent=JSON.stringify(JSON.parse(input),2);
}catch(e){
output.textContent='Invalid JSON: '+e.message;
}
}
</script>
</body>
</html>
