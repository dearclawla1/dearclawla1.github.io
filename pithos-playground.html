<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pithos Playground</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e4e4e4;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #6366f1;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 5px;
        }
        .tab {
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
        }
        .tab.active {
            background-color: #6366f1;
            color: #0a0a0a;
        }
        .tab-content {
            display: none;
            padding: 20px;
            border-radius: 5px;
            background-color: #1e1e1e;
            margin-top: 10px;
        }
        .tab-content.active {
            display: block;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: #2e2e2e;
            color: #e4e4e4;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #6366f1;
            color: #0a0a0a;
            cursor: pointer;
        }
        button:hover {
            background-color: #4c4c4c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pithos Playground</h1>
        <p>A versatile tool for quick data manipulation and API exploration.</p>
        <div class="tabs">
            <div class="tab active" onclick="showTab('currency')">Currency Converter</div>
            <div class="tab" onclick="showTab('crypto')">Crypto Price Checker</div>
            <div class="tab" onclick="showTab('weather')">Weather Forecast</div>
        </div>
        <div id="currency" class="tab-content active">
            <h2>Currency Converter</h2>
            <input type="text" id="amount" placeholder="Enter amount in USD" oninput="validateInput(this)">
            <button onclick="convertCurrency()">Convert</button>
            <p id="currencyResult"></p>
        </div>
        <div id="crypto" class="tab-content">
            <h2>Crypto Price Checker</h2>
            <button onclick="checkCryptoPrice()">Check Bitcoin Price</button>
            <p id="cryptoResult"></p>
        </div>
        <div id="weather" class="tab-content">
            <h2>Weather Forecast</h2>
            <input type="text" id="location" placeholder="Enter location (e.g., New York)">
            <button onclick="getWeather()">Get Weather</button>
            <p id="weatherResult"></p>
        </div>
    </div>
    <a href="index.html" style="color:#6366f1">Back to Home</a>
    <script>
        function showTab(tabName) {
            const tabs = document.querySelectorAll('.tab');
            const tabContents = document.querySelectorAll('.tab-content');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));
            
            document.querySelector(`#${tabName}`).classList.add('active');
            document.querySelector(`.tab[onclick="showTab('${tabName}')"]`).classList.add('active');
        }

        function validateInput(input) {
            input.value = input.value.replace(/[^0-9.]/g, '');
        }

        async function convertCurrency() {
            const amount = document.getElementById('amount').value;
            if (!amount) {
                alert('Please enter an amount in USD');
                return;
            }
            
            try {
                const response = await fetch('https://api.frankfurter.app/latest?from=USD&to=EUR');
                const data = await response.json();
                const rate = data.rates.EUR;
                const result = amount * rate;
                document.getElementById('currencyResult').innerText = `${amount} USD is ${result.toFixed(2)} EUR`;
            } catch (error) {
                console.error('Error fetching currency data:', error);
                alert('Failed to fetch currency data. Please try again later.');
            }
        }

        async function checkCryptoPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await response.json();
                const price = data.bitcoin.usd;
                document.getElementById('cryptoResult').innerText = `Bitcoin Price: $${price}`;
            } catch (error) {
                console.error('Error fetching crypto data:', error);
                alert('Failed to fetch crypto data. Please try again later.');
            }
        }

        async function getWeather() {
            const location = document.getElementById('location').value;
            if (!location) {
                alert('Please enter a location');
                return;
            }
            
            try {
                const geoResponse = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}&limit=1`);
                const geoData = await geoResponse.json();
                if (geoData.length === 0) {
                    alert('Location not found. Please try again.');
                    return;
                }
                
                const { lat, lon } = geoData[0];
                const weatherResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const weatherData = await weatherResponse.json();
                const temperature = weatherData.current_weather.temperature;
                document.getElementById('weatherResult').innerText = `Current Temperature in ${location}: ${temperature}°C`;
            } catch (error) {
                console.error('Error fetching weather data:', error);
                alert('Failed to fetch weather data. Please try again later.');
            }
        }

        // Usage tracking
        fetch('https://gwen-api.dearclawla1.workers.dev/db/exec', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                sql: 'INSERT INTO tool_usage (tool, action, timestamp) VALUES (?, ?, ?)',
                params: [location.pathname.split('/').pop(), 'load', new Date().toISOString()]
            })
        }).catch(() => {});
    </script>
</body>
</html>
