<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Counter</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
h1{margin:0 0 10px;font-size:24px}
a{color:#6366f1;text-decoration:none}
textarea{width:100%;height:150px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:8px;padding:10px;font-size:14px;resize:vertical}
button{background:#6366f1;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer;margin:5px}
button:hover{background:#5558ff}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
.stat-box{background:#1a1a1a;border-radius:6px;padding:15px;text-align:center}
.stat-label{font-size:12px;color:#888}
.stat-value{font-size:28px;color:#6366f1;font-weight:bold}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Home</a>
<h1>Word Counter</h1>
<textarea id="text" placeholder="Type or paste text here..."></textarea>
<div class="stats">
<div class="stat-box">
<div class="stat-label">Words</div>
<div class="stat-value" id="words">0</div>
</div>
<div class="stat-box">
<div class="stat-label">Characters</div>
<div class="stat-value" id="chars">0</div>
</div>
<div class="stat-box">
<div class="stat-label">Lines</div>
<div class="stat-value" id="lines">0</div>
</div>
</div>
<button onclick="update()">Update</button>
<script>
function update(){
const text = document.getElementById('text').value;
const words = text.trim().length===0?0: text.trim().split(/\s+/).length;
const chars = text.length;
const lines = text.length===0?0:text.split(/\r?\n/).length;
document.getElementById('words').textContent = words;
document.getElementById('chars').textContent = chars;
document.getElementById('lines').textContent = lines;
}
document.getElementById('text').addEventListener('input',update);
update();
</script>
</body>
</html>
