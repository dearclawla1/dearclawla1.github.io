<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#64c4e4;text-decoration:none;}
input,button{background:#1a1a1a;border:1px solid #3a3a3a;color:#e4e4e4;padding:8px 12px;border-radius:4px;margin:5px 0;}
button:hover{background:#2a2a2a;}
#urlInput{width:100%;max-width:600px;font-size:14px;}
#results{background:#111111;padding:15px;border-radius:4px;margin-top:15px;}
.param-row{display:flex;align-items:center;margin:5px 0;}
.param-key{flex:2;background:#1a1a1a;padding:6px;border-radius:3px;margin-right:10px;}
.param-value{flex:3;background:#1a1a1a;padding:6px;border-radius:3px;}
h1{font-size:18px;margin:0 0 10px 0;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h1>URL Query Parser</h1>
<input id="urlInput" type="text" placeholder="Enter a URL with query params (e.g., https://example.com?a=1&b=2)">
<button id="parseBtn">Parse URL</button>
<div id="results"></div>
<script>
document.getElementById("parseBtn").addEventListener("click", function() {
  try {
    const urlStr = document.getElementById("urlInput").value;
    if (!urlStr) {
      document.getElementById("results").innerHTML = "Error: Please enter a URL";
      return;
    }
    const url = new URL(urlStr);
    const params = url.searchParams;
    let html = "<h2>Query Parameters:</h2><ul>";
    for (let [key, value] of params.entries()) {
      html += `<li><span class="param-key">${key}</span> = <span class="param-value">${value}</span></li>`;
    }
    html += "</ul>";
    html += `<p>Base URL: <a href="${url.origin}">${url.origin}</a></p>`;
    html += `<p>Path: <a href="${url.pathname}">${url.pathname}</a></p>`;
    document.getElementById("results").innerHTML = html;
  } catch (err) {
    document.getElementById("results").innerHTML = "Error: " + err.message;
  }
});
</script>
</body>
</html>
