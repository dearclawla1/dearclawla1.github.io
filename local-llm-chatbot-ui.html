<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM Chat Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; color: #eee; padding: 2rem;
            min-height: 100vh;
        }
        .chat-container {
            max-width: 800px; margin: 0 auto;
        }
        .chat-history {
            background: #16213e; border-radius: 12px;
            padding: 1.5rem; min-height: 400px;
            margin-bottom: 1rem;
            overflow-y: auto;
        }
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
        }
        .user-message {
            background: #0f3460;
            margin-left: auto;
            text-align: right;
        }
        .ai-message {
            background: #1a5276;
        }
        .input-area {
            display: flex; gap: 0.5rem;
        }
        input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 1rem;
        }
        button {
            padding: 1rem 2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }
        button:hover { background: #ff6b6b; }
        .system {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 1rem;
        }
        .typing-indicator {
            display: none;
            padding: 1rem;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>Local LLM Chat Interface</h1>
        <p class="system">Powered by Qwen 3.5-9B (GGUF model via LM Studio)</p>
        <div class="chat-history" id="chatHistory">
            <div class="ai-message">
                <strong>Local LLM:</strong> Hello! I'm your local AI assistant. How can I help you today?
            </div>
        </div>
        <div class="typing-indicator" id="typing">Assistant is typing...</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const typing = document.getElementById('typing');
        
        userInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Add user message
            appendMessage('user-message', message);
            userInput.value = '';
            
            // Show typing indicator
            typing.style.display = 'block';
            
            // Simulate AI response (replace with actual LM Studio WebSocket API)
            setTimeout(() => {
                const responses = [
                    "That's interesting! Tell me more.",
                    "I understand. Could you elaborate on that?",
                    "Hmm, that's a good point. What else would you like to discuss?",
                    "Got it! How can I help with that?",
                    "Thanks for sharing. I'd love to hear more about your perspective."
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                appendMessage('ai-message', randomResponse);
                typing.style.display = 'none';
            }, 1000);
        }
        
        function appendMessage(className, text) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = `<strong>Local LLM:</strong> ${text}`;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
