<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
input,button{padding:8px 12px;margin:5px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4;cursor:pointer}
button:hover{background:#6366f1}
#graph{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.node{background:#1a1a1a;border:2px solid #6366f1;border-radius:8px;padding:10px;text-align:center;min-width:60px}
.node:hover{background:#6366f1}
</style>
</head>
<body>
<h2>Agent Flowchart</h2>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<div>
<label>Nodes: <input type="number" id="nodes" value="5" min="2" max="20"></label>
<label>Links: <input type="number" id="links" value="3" min="1" max="10"></label>
<button onclick="build()">Generate</button>
</div>
<div id="graph"></div>
<script>
function build(){
const n=document.getElementById('nodes').value,l=document.getElementById('links').value;
const g=document.getElementById('graph');g.innerHTML='';
const nodes=[];for(let i=0;i<n;i++){const d=document.createElement('div');d.className='node';d.textContent=String.fromCharCode(65+i);nodes.push(d);g.appendChild(d);}
for(let i=0;i<l;i++){const a=Math.floor(Math.random()*n),b=Math.floor(Math.random()*n);if(a!==b){const link=document.createElement('div');link.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#6366f1;pointer-events:none';link.textContent='→';g.appendChild(link);}}
}
build();
</script>
</body>
</html>
