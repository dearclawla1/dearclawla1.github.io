<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px;}
h1{text-align:center;margin-bottom:20px;}
.stats{background:#1a1a1a;padding:15px;border-radius:8px;width:100%;max-width:400px;text-align:center;margin:20px 0;}
.stats h2{margin:10px 0 5px 0;}
.container{width:100%;max-width:500px;}
.habit{display:flex;align-items:center;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.habit input[type="checkbox"]{transform:scale(1.5);}
.habit button{padding:8px 12px;border:none;border-radius:4px;background:#6366f1;color:white;cursor:pointer;}
.habit button.complete{background:#10b981;}
.habit button.reset{background:#ef4444;}
.habit select{padding:8px;border-radius:4px;}
.add-form{display:flex;flex-direction:column;margin-top:20px;}
.add-form input, .add-form select{padding:10px;margin:5px 0;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#e4e4e4;}
.add-form button{padding:12px;background:#6366f1;border:none;border-radius:4px;color:white;cursor:pointer;margin-top:10px;}
.progress-bar{background:#1a1a1a;height:20px;border-radius:10px;overflow:hidden;margin:20px 0;}
.progress-fill{background:#6366f1;height:100%;transition:width 0.3s;}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Home</a>
<h1>🎯 Habit Tracker</h1>
<div id="stats" class="stats">
<h2>Completion Rate</h2>
<p id="rate">0%</p>
</div>
<div class="container" id="habits"></div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
<form class="add-form">
<input id="newHabit" placeholder="Enter habit name" required>
<select id="newFreq"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select>
<button type="submit">Add Habit</button>
</form>
<button onclick="clearHabits()" style="padding:10px;background:#ef4444;border:none;border-radius:4px;color:white;cursor:pointer;margin-top:10px;">Clear All</button>
<script>
let habits={};
loadHabits();
function loadHabits(){
const saved=localStorage.getItem('habitTracker');
if(saved){habits=JSON.parse(saved);}
render();
}
function render(){
const container=document.getElementById('habits');
container.innerHTML=Object.keys(habits).map(name=>{
const h=habits[name];
return '<div class="habit"><input type="checkbox" onclick="toggle(this)" checked> '+name+' <span>('+h.freq+')<\/span> <button onclick="complete(\''+name+'\')">✓<\/button> <button class="reset" onclick="reset(\''+name+'\')">✕<\/button><select onchange="changeFreq(\''+name+'\',this.value)"><option value="daily"'+(h.freq==='daily'?'':' selected')+'>Daily<\/option><option value="weekly"'+(h.freq==='weekly'?'':' selected')+'>Weekly<\/option><option value="monthly"'+(h.freq==='monthly'?'':' selected')+'>Monthly<\/option><\/select><\/div>';
}).join('');
updateStats();
}
function toggle(cb){
cb.checked=!cb.checked;updateStats();}
function complete(name){habits[name].complete=true;save();render();updateStats();}
function reset(name){habits[name].complete=false;save();render();updateStats();}
function changeFreq(name,val){habits[name].freq=val;save();render();}
function updateStats(){
const total=Object.keys(habits).length;
const completed=Object.values(habits).filter(h=>h.complete).length;
document.getElementById('rate').textContent=total?Math.round(completed/total*100)+'%':'0%';
document.getElementById('progress').style.width=total?completed/total*100+'%':'0%';
}
function save(){localStorage.setItem('habitTracker',JSON.stringify(habits));}
function clearHabits(){habits={};save();render();updateStats();}
loadHabits();
</script>
</body>
</html>
