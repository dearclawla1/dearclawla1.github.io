<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px;}
.container{max-width:600px;margin:0 auto;}
h1{text-align:center;color:#6366f1;margin-bottom:20px;}
.stats{background:#1a1a1a;padding:15px;border-radius:8px;margin-bottom:20px;text-align:center;}
.stats span{display:inline-block;margin:0 10px;}
h3{color:#e4e4e4;margin:15px 0 10px;font-size:14px;text-transform:uppercase;}
.check-item{background:#1a1a1a;padding:12px;border-radius:6px;margin:8px 0;display:flex;align-items:center;}
.checkbox{width:20px;height:20px;margin-right:10px;accent-color:#6366f1;}
label{cursor:pointer;}
.back-link{text-align:center;display:block;margin:20px 0;}
.back-link a{color:#6366f1;text-decoration:none;}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">< Home</a>
<h1>Habit Tracker</h1>
<div class="stats">
<span>Streak: <b id="streak">0</b> days</span>
<span>Total Done: <b id="total">0</b></span>
<span>Completion: <b id="percent">0</b>%</span>
</div>
<h3>Your Daily Habits</h3>
<div id="habits"></div>
<div class="stats">
<button onclick="resetTrainer()" style="background:#6366f1;border:none;padding:8px 16px;border-radius:4px;color:#fff;cursor:pointer;">Reset Tracker</button>
</div>
</div>
<script>
const habits = ['Drink Water', 'Exercise', 'Read', 'Sleep Early', 'Meditate', 'Plan Day'];
let done = new Set();
let streak = 0;
let lastDate = null;
document.getElementById('habits').innerHTML = habits.map(h => `
<div class="check-item">
<input type="checkbox" class="checkbox" id="${h.toLowerCase().replace(/\s/g,'-')}" onchange="toggle('${h}')" ${done.has(h) ? 'checked' : ''}>
<label for="${h.toLowerCase().replace(/\s/g,'-')}">${h}</label>
</div>`).join('');
function toggle(habit){done.has(habit) ? done.delete(habit) : done.add(habit);updateStats();}
function updateStats(){let n=habits.length;document.getElementById('streak').textContent=streak;document.getElementById('total').textContent=done.size;document.getElementById('percent').textContent=Math.round(done.size/n*100);}
function resetTrainer(){done.clear();streak=0;done=new Set();updateStats();}
</script>
</body>
</html>
