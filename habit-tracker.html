<!DOCTYPE html><html><head><style>body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}h1{color:#6366f1}input,select{display:block;margin:10px 0;padding:8px;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4}button{display:block;margin:10px 0;padding:12px;border:none;border-radius:4px;background:#6366f1;color:#fff;cursor:pointer}a{color:#6366f1;text-decoration:none}stats{background:#1a1a1a;padding:15px;border-radius:8px;margin-top:15px;border:1px solid #333}</style></head><body><a href="index.html" style="color:#6366f1">Home</a><h1>Habit Tracker</h1><input type="text" id="habitName" placeholder="Enter any habit..."><select id="frequency"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select><button onclick="trackHabit()">Track Habit</button><div id="habitList"></div><div class="stats"><h3>Statistics</h3><div id="totalTracked">Total Tracked: 0</div><div id="completionRate">Completion Rate: 0%</div><div id="consecutive">Current Streak: 0</div></div><script>let habits=[];const today=new Date().toISOString().split("T")[0];function trackHabit(){const name=document.getElementById("habitName").value||"Habit";const freq=document.getElementById("frequency").value;habits.push({name,name,freq,date:today});save();render();}function save(){localStorage.setItem("habits",JSON.stringify(habits));}function render(){const list=document.getElementById("habitList");list.innerHTML="";habits.forEach((h,idx)=>{const div=document.createElement("div");div.style.cssText="background:#1a1a1a;padding:12px;margin:8px 0;border-radius:6px;border-left:4px solid #6366f1";div.innerHTML=`<strong>${h.name}</strong><span style="color:#888">(${h.freq})</span><div style="font-size:12px;color:#666">Last: ${h.date}</div>`;list.appendChild(div);});document.getElementById("totalTracked").innerText=`Total Tracked: ${habits.length}`;}}habitList.innerHTML=JSON.parse(localStorage.getItem("habits")||"[]").map(h=>`<div style="background:#1a1a1a;padding:12px;margin:8px 0;border-radius:6px;border-left:4px solid #6366f1"><strong>${h.name}</strong><span style="color:#888">(${h.freq})</span><div style="font-size:12px;color:#666">Last: ${h.date}</div></div>`).join("");render();trackHabit();</script></body></html>
