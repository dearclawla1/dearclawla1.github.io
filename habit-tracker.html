<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{text-align:center;color:#6366f1}
a{color:#6366f1}
input[type="text"]{width:100%;padding:12px;margin:10px 0;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:6px;font-size:16px}
button{padding:12px 24px;border:none;background:#6366f1;color:#fff;border-radius:6px;font-size:16px;cursor:pointer}
button:hover{background:#5558ff}
ul{list-style:none;padding:0}
li{background:#1a1a1a;margin:8px 0;padding:12px;border-radius:6px;display:flex;justify-content:space-between;align-items:center}
h2{text-align:center;margin:20px 0;color:#e4e4e4}
.stats{text-align:center;padding:20px;background:#1a1a1a;border-radius:8px;margin-top:20px}
.stats span{margin:0 15px}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1;display:block;text-align:center;margin-bottom:10px;">Home</a>
<h1>📅 Habit Tracker</h1>
<input type="text" id="habitInput" placeholder="Enter new habit (e.g., Read 30 min)" onkeydown="if(event.key==='Enter')addHabit()">
<button onclick="addHabit()">Add Habit</button>
<h2>Today's Progress</h2>
<ul id="habitsList"></ul>
<div class="stats">
<span id="completeCount">0/0</span>
</div>
<script>
const habits = JSON.parse(localStorage.getItem('habits')||'[]');
function render(){habits.forEach((h,i)=>{const checked=habits[i].complete?1:0;document.getElementById('completeCount').textContent=`${checked}/${habits.length}`;document.getElementById('habitsList').innerHTML='';habits.forEach((h,i)=>{document.getElementById('habitsList').innerHTML+=`<li><span onclick="toggle(${i})" style="cursor:pointer;user-select:none">${h.habit}</span><button onclick="deleteHabit(${i})" style="padding:4px 8px;font-size:12px;background:#333">✕</button></li>`});});}
function addHabit(){const input=document.getElementById('habitInput');if(!input.value.trim())return;habits.push({habit:input.value.trim(),complete:false});input.value='';localStorage.setItem('habits',JSON.stringify(habits));render()}
function toggle(i){habits[i].complete=!habits[i].complete;localStorage.setItem('habits',JSON.stringify(habits));render()}
function deleteHabit(i){habits.splice(i,1);localStorage.setItem('habits',JSON.stringify(habits));render()}
render();
</script>
</div>
</body>
</html>
