<!DOCTYPE html>
<html>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
a{color:#6366f1}
h1{margin:0 0 20px;color:#6366f1}
input[type=text]{background:#0a0a0a;color:#e4e4e4;border:2px solid #6366f1;padding:10px;font-size:16px;border-radius:8px;width:100%;max-width:300px}
button{background:#6366f1;color:#fff;border:none;padding:12px 20px;font-size:16px;border-radius:8px;cursor:pointer;margin-top:10px}
button:hover{background:#5558ff}
h2{color:#e4e4e4;margin:20px 0 10px;font-size:18px}
.streak{color:#6366f1;font-weight:bold}
#status{background:#0a0a0a;border:1px solid #6366f1;padding:10px;border-radius:8px;margin-top:15px;font-size:14px}
</style>
<a href="index.html" style="color:#6366f1">Home</a>
<h1>Habit Tracker</h1>
<input type=text id=name placeholder="Enter a new habit...">
<button onclick="addHabit()">+ Add Habit</button>
<div id="habits"></div>
<h2>Quick Stats</h2>
<div id="status"></div>
<script>
let habits=[]
function addHabit(){
let name=document.getElementById("name").value.trim()
if(!name)return
habits.push({name:name,completions:0})
render()
}
function render(){
let container=document.getElementById("habits")
let html=''
let totalCompletions=0
let activeHabits=habits.length
habits.forEach((h)=>{
html+=`<h2>${h.name} <span class="streak">${h.completions} streak</span></h2>`
})
container.innerHTML=html
document.getElementById("status").innerHTML=`Active habits: ${activeHabits}`
}
render()
</script>
</html>
