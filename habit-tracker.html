<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0}
.container{max-width:600px;margin:40px auto;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
a{color:#6366f1;font-size:12px}
input{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;width:100%;border-radius:4px;margin-bottom:10px;font-size:14px}
h2{margin:30px 0 15px;color:#949494;font-size:18px}
h3{margin:20px 0 10px;color:#a4a4a4;font-size:16px}
.save-btn{background:#6366f1;color:#fff;border:none;padding:12px 24px;border-radius:4px;cursor:pointer;font-size:14px;margin-bottom:20px}
.save-btn:hover{background:#5558f5}
h2 label{margin-left:10px;font-weight:normal;color:#b4b4b4}
h2 label input{margin:0;background:transparent;border:none;color:#e4e4e4;cursor:pointer}
.stats{background:#151515;padding:15px;border-radius:4px;margin-top:30px}
.stats h3{margin:0 0 10px}
.stats div{display:flex;justify-content:space-between;margin:8px 0;border-bottom:1px solid #2a2a2a;padding-bottom:5px}
.stats div span{color:#949494}
.stats div div strong{color:#6366f1}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1">Home</a>
<h1>Habit Tracker</h1>
<div id="habits"></div>
<button class="save-btn" onclick="save()">Save Changes</button>
<div class="stats" id="stats" style="display:none"></div>
</div>
<script>
let habits=[],count=0,total=0;
function renderHabits() {
const container=document.getElementById("habits"),div=habits.map(h=>
`<div style="margin:10px 0;padding:10px;background:#151515;border-radius:4px;border-left:3px solid #6366f1">
<strong>${h.name}</strong>
<h2 label>${count}${h.completed?'\u2713':'\u2716'}
<input type="checkbox" ${h.completed?'':'checked'} ${h.target?`onclick="mark('${h.name}',${h.target})"`:''}
${h.target?`target="${h.target}"`:''}></h2>
</div>`
).join(""),stats=habits.map(h=>
`<div><span>${h.name}</span><div><span>Completed:</span><strong>${h.completed?count:0}</strong></div></div>`
).join("");
container.innerHTML=div;document.getElementById("stats").innerHTML=stats;
document.getElementById("stats").style.display=habits.length>0?'block':'none';
}
function mark(name,el) {
const target=parseFloat(el.target.split('#')[1]);
if(habits.find(h=>h.name===name).completed)habits.find(h=>h.name===name).completed=false;
else{habits.find(h=>h.name===name).completed=true;count++;total++;}
renderHabits();
}
function save() {
localStorage.setItem("habits",JSON.stringify(habits));
alert("Habits saved!");
}
function load() {
habits=JSON.parse(localStorage.getItem("habits")||"[]");
count=0;total=0;
const done=habits.filter(h=>h.completed);
done.forEach(h=>{count++;if(h.target){total++;const el=document.querySelector(`[target="${h.target}"]`);
if(el)el.checked=true;}});
renderHabits();
}
load();
</script>
</body>
</html>
