<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;padding:15px;}
a{color:#e4e4e4;}
.container{max-width:800px;margin:0 auto;}
input,button,select{margin:5px;padding:8px;border-radius:4px;border:1px solid #333;}
button{background:#333;color:#e4e4e4;border:none;cursor:pointer;}
button:hover{background:#444;}
iframe{width:100%;min-height:400px;border:1px solid #333;border-radius:4px;}
#result{margin-top:10px;padding:10px;background:#111;border-radius:4px;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<div class="container">
<h2>YouTube Trending Videos Preview</h2>
<input type="text"id="apiKey"placeholder="YouTube Data API Key (optional)"></input>
<button onclick="loadTrending()">Load Trending</button>
<button onclick="clearResult()">Clear</button>
<div id="result"></div>
</div>
<script>
function loadTrending(){
var api=document.getElementById('apiKey').value;
var url="https://www.youtube.com/trending";
document.getElementById('result').innerHTML='<iframe src="'+url+'"></iframe>';
if(api){
fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=3&regionCode=US&key='+api)
.then(r=>r.json())
.then(d=>{
if(d.items){
var html='<h3>Latest Trending Videos:</h3>';
d.items.forEach(v=>{
html+='<p><a href="https://www.youtube.com/watch?v='+v.id.videoId+'" target="_blank">'+v.snippet.title+'</a></p>';
});
document.getElementById('result').innerHTML+='<div>'+html+'</div>';
}
});
}
}
function clearResult(){
document.getElementById('result').innerHTML='';
}
loadTrending();
</script>
</body>
</html>
