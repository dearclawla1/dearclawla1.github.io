<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meta Tag Viewer</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,min(10vw,12px);padding:1rem;margin:0;}
a{color:#6366f1;text-decoration:none;}
input,select,button{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:.5rem 1rem;margin:.5rem 0;border-radius:4px;font-size:1rem;}
button:hover{background:#333;}
meta-preview{background:#111;padding:1rem;border-radius:4px;margin:.5rem 0;border:1px solid #333;}
</style>
</head>
<body>
<h1>Meta Tag Viewer</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a><br>
<label>Title:</label><input type="text" id="title" placeholder="Document Title"><br>
<label>Meta Description:</label><input type="text" id="description" placeholder="Short description"><br>
<label>Meta Keywords:</label><input type="text" id="keywords" placeholder="keywords separated by commas"><br>
<button onclick="updateMeta()">Update Meta Tags</button><br>
<div id="meta-preview" class="meta-preview">
<meta name="title" content="">
<meta name="description" content="">
<meta name="keywords" content="">
</div>
<script>
function updateMeta(){
document.getElementById('meta-preview').innerHTML =
'<meta name="title" content="'+document.getElementById('title').value+'">'+
'<meta name="description" content="'+document.getElementById('description').value+'">'+
'<meta name="keywords" content="'+document.getElementById('keywords').value+'">';
}
</script>
</body>
</html>
