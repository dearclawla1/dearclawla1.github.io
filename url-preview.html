<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>URL Previewer</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
input,button{margin:0.5rem;padding:0.75rem 1rem;border-radius:0.5rem;border:none;}
input{background:#1a1a1a;color:#e4e4e4;font-size:1rem;}
button{background:#6366f1;color:#fff;font-size:1rem;cursor:pointer;}
button:hover{background:#5558e3;}
#preview{background:#1a1a1a;padding:1rem;border-radius:0.5rem;margin-top:1rem;min-height:150px;max-width:600px;}
a{color:#6366f1;}
</style>
</head>
<body>
<h2>URL Previewer</h2>
<input type="url" id="urlInput" placeholder="Enter URL (e.g., https://example.com)" required>
<button onclick="preview()">Preview</button>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<div id="preview"><em>Preview will appear here...</em></div>
<script>
async function preview() {
  const url = document.getElementById('urlInput').value;
  const preview = document.getElementById('preview');
  try {
    const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    const data = await response.json();
    if (data.contents) {
      const doc = new DOMParser().parseFromString(data.contents, 'text/html');
      const title = doc.querySelector('title')?.textContent || 'No Title';
      const desc = doc.querySelector('meta[name=description]')?.getAttribute('content') || 'No Description';
      const img = doc.querySelector('meta[property=og:image]')?.getAttribute('content') || 'No Image';
      preview.innerHTML = `<h3>${title}</h3><p>${desc}</p>` + (img ? `<img src="${img}" style="max-width:100%;height:auto;border-radius:0.25rem;">` : '');
    } else {
      preview.innerHTML = 'Could not fetch preview.';
    }
  } catch (e) {
    preview.innerHTML = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
