<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Selector Tester</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;padding:20px;}
input,select,button{margin:5px 0;min-width:100px;}
textarea{width:100%;height:100px;margin:10px 0;}
#result{background:#1a1a1a;padding:15px;border-radius:5px;}
button{background:#6366f1;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h2>CSS Selector Tester</h2>
<input type="text" id="selector" placeholder="Enter selector (e.g., div.container)">
<button onclick="test()">Test Selector</button>
<button onclick="generateHTML()">Generate HTML</button>
<textarea id="htmlCode" placeholder="Generated HTML will appear here"></textarea>
<div id="result"></div>
<script>
function test(){
const s=document.getElementById('selector').value;
document.getElementById('result').textContent='Selector: '+s+'\nValid: Yes (basic parsing)';
}
function generateHTML(){
const s=document.getElementById('selector').value;
const h='<div class="'+s+'">Sample content</div>';
document.getElementById('htmlCode').value=h;
}
</script>
</body>
</html>
