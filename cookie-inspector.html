<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cookie Inspector</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem}
h1{color:#6366f1;margin-bottom:1rem}
.container{max-width:600px;margin:0 auto}
input,button{display:block;width:100%;margin:0.5rem 0;padding:0.75rem;border-radius:4px;border:none;font-size:1rem}
input{background:#1a1a1a;border:1px solid #333;color:#e4e4e4}
button{background:#6366f1;color:#fff;cursor:pointer}
button:hover{background:#5558ff}
#output{background:#1a1a1a;border:1px solid #333;padding:1rem;border-radius:4px;min-height:100px;font-family:monospace;font-size:0.9rem;white-space:pre-wrap}
a{display:block;margin-top:1rem;text-align:center}
.dark-mode{background:#121212;color:#e0e0e0}
.dark-mode input{background:#1a1a1a;border-color:#444}
.dark-mode button{background:#5558ff}
.dark-mode #output{background:#1a1a1a;border-color:#444}
.back-link{display:inline-block;margin-top:1rem;color:#6366f1;text-decoration:none;font-size:0.9rem}
.back-link:hover{text-decoration:underline}
</style>
</head>
<body>
<h1>Cookie Inspector</h1>
<div class="container">
<input type="text" id="cookieName" placeholder="Cookie name (e.g., sessionId)">
<input type="text" id="cookieValue" placeholder="Cookie value">
<input type="text" id="cookieDomain" placeholder="Domain (e.g., example.com)">
<input type="text" id="cookiePath" placeholder="Path (e.g., /)">
<input type="text" id="cookieSecure" placeholder="Secure (true/false)">
<input type="text" id="cookieHttpOnly" placeholder="HttpOnly (true/false)">
<input type="text" id="cookieSameSite" placeholder="SameSite (Strict/Lax/None)">
<button onclick="inspect()">Inspect Cookie</button>
<div id="output">Enter cookie details and click Inspect...</div>
<a href="index.html" class="back-link">Back to Home</a>
</div>
<script>
function validateInput(input) {
  if (!input.value.trim()) {
    return {valid: false, message: 'Field cannot be empty'};
  }
  return {valid: true};
}

function normalizeBoolean(value) {
  const lower = value.toLowerCase().trim();
  if (lower === 'true') return 'true';
  if (lower === 'false') return 'false';
  return value;
}

function normalizeSameSite(value) {
  const lower = value.toLowerCase().trim();
  if (['strict', 'lax', 'none'].includes(lower)) {
    return lower.toUpperCase();
  }
  return value;
}

function inspect() {
  const output = document.getElementById('output');
  
  const nameResult = validateInput(document.getElementById('cookieName'));
  if (!nameResult.valid) {
    output.textContent = 'Error: ' + nameResult.message + '\n\nPlease enter a cookie name.';
    return;
  }
  
  const valueResult = validateInput(document.getElementById('cookieValue'));
  if (!valueResult.valid) {
    output.textContent = 'Error: ' + valueResult.message + '\n\nPlease enter a cookie value.';
    return;
  }
  
  const domain = document.getElementById('cookieDomain').value.trim();
  const path = document.getElementById('cookiePath').value.trim();
  const secure = normalizeBoolean(document.getElementById('cookieSecure').value);
  const httpOnly = normalizeBoolean(document.getElementById('cookieHttpOnly').value);
  const sameSite = normalizeSameSite(document.getElementById('cookieSameSite').value);
  
  // Validate domain format
  if (!domain) {
    output.textContent = 'Error: Domain is required.\n\nPlease enter a domain (e.g., example.com).';
    return;
  }
  
  // Validate path format
  if (!path) {
    output.textContent = 'Error: Path is required.\n\nPlease enter a path (e.g., /).';
    return;
  }
  
  // Validate SameSite
  if (!['STRICT', 'LAX', 'NONE'].includes(sameSite)) {
    output.textContent = 'Error: SameSite must be STRICT, LAX, or NONE.\n\nPlease enter a valid SameSite value.';
    return;
  }
  
  // Validate boolean values
  if (!['true', 'false'].includes(secure)) {
    output.textContent = 'Error: Secure must be true or false.\n\nPlease enter true or false for Secure.';
    return;
  }
  
  if (!['true', 'false'].includes(httpOnly)) {
    output.textContent = 'Error: HttpOnly must be true or false.\n\nPlease enter true or false for HttpOnly.';
    return;
  }
  
  // Build cookie string
  const cookieString = `${name}=${value}; Domain=${domain}; Path=${path}; Secure=${secure}; HttpOnly=${httpOnly}; SameSite=${sameSite}`;
  
  // Build JSON representation
  const cookieJSON = JSON.stringify({
    name: name,
    value: value,
    domain: domain,
    path: path,
    secure: secure === 'true',
    httpOnly: httpOnly === 'true',
    sameSite: sameSite
  }, null, 2);
  
  // Build Set-Cookie header
  const setCookieHeader = `Set-Cookie: ${name}=${value}; Domain=${domain}; Path=${path}; Secure=${secure}; HttpOnly=${httpOnly}; SameSite=${sameSite}`;
  
  output.textContent = `=== Cookie Inspection Results ===\n\n--- Cookie String ---\n${cookieString}\n\n--- JSON Representation ---\n${cookieJSON}\n\n--- Set-Cookie Header ---\n${setCookieHeader}\n\n--- Validation Summary ---\n✓ Name: ${name}\n✓ Value: ${value}\n✓ Domain: ${domain}\n✓ Path: ${path}\n✓ Secure: ${secure === 'true' ? 'enabled' : 'disabled'}\n✓ HttpOnly: ${httpOnly === 'true' ? 'enabled' : 'disabled'}\n✓ SameSite: ${sameSite}`;
}

// Track usage
fetch('https://gwen-api.dearclawla1.workers.dev/db/exec',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql:'INSERT INTO tool_usage (tool,action,timestamp) VALUES (?,?,?)',params:['cookie-inspector.html','load',new Date().toISOString()]})}).catch(()=>{});
</script>
</body>
</html>
