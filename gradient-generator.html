<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CSS Gradient Generator</title><style>body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem}.container{max-width:600px;margin:0 auto}.controls{display:grid;gap:.5rem}.input{display:flex;flex-direction:column;gap:.25rem}.input input,.input select{padding:.5rem;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4}.button{padding:.5rem;background:#6366f1;border:none;border-radius:4px;color:#0a0a0a;font-weight:bold;cursor:pointer}.output{margin-top:1rem;padding:1rem;background:#1a1a1a;border-radius:4px;white-space:pre-wrap;font-family:monospace}</style></head><body><div class="container"><h1>CSS Gradient Generator</h1><div class="controls"><div class="input"><label>Orientation</label><select id="orientation"><option value="linear">Linear</option><option value="radial">Radial</option><option value="conic">Conic</option></select></div><div class="input"><label>Colors (comma-separated)</label><input id="colors" type="text" placeholder="#ff0000,#00ff00,#0000ff"></div><div class="input"><label>Positions (comma-separated)</label><input id="positions" type="text" placeholder="0%,50%,100%"></div><div class="button" id="generate">Generate</div></div><div class="output" id="result"></div><a href="index.html" style="color:#6366f1">Back to Home</a></div><script>document.getElementById('generate').addEventListener('click',()=>{const o=document.getElementById('orientation').value,c=document.getElementById('colors').value,p=document.getElementById('positions').value;const res=o==='conic'?`background: conic-gradient(from 0deg, ${c.split(',').map((c,i)=>`${c.trim()} ${p.trim() ? p.trim().split(',').map((p,i)=>(i<p.length-1?`at ${p.trim()}`:``).join(',') : ''}`).join(', ')}`:o==='radial'?`background: radial-gradient(circle, ${c.split(',').map((c,i)=>`${c.trim()} ${p.trim() ? p.trim().split(',').map((p,i)=>(i<p.length-1?`at ${p.trim()}`:``).join(',') : ''}`).join(', ')}`:`background: linear-gradient(${o}, ${c.split(',').map((c,i)=>`${c.trim()} ${p.trim() ? p.trim().split(',').map((p,i)=>(i<p.length-1?`at ${p.trim()}`:``).join(',') : ''}`).join(', ')}`;document.getElementById('result').textContent=res;});</script></body></html>
