<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button,select{margin:5px;padding:8px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1}
a{color:#6366f1;text-decoration:none}
#output{margin-top:15px;padding:10px;background:#1a1a1a;border-radius:4px;min-height:50px}
#endpoints{width:100%}
</style>
</head>
<body>
<h2>API Status Checker</h2>
<select id="endpoints">
  <option value="https://api.github.com">GitHub API</option>
  <option value="https://api.githubstatus.com">GitHub Status API</option>
  <option value="https://api.github.com/contents/:path">GitHub Contents API</option>
</select>
<br>
<button id="check">Check Status</button>
<br>
<div id="output">Loading...</div>
</body>
<script>
document.getElementById('check').addEventListener('click', async () => {
  const endpoint = document.getElementById('endpoints').value;
  const output = document.getElementById('output');
  
  // Error handling for empty or invalid endpoint
  if (!endpoint || endpoint === ':path') {
    output.innerHTML = '<span style="color:#fbbf24">⚠ Warning: Please select a valid endpoint</span>';
    return;
  }
  
  try {
    const response = await fetch(endpoint);
    if (response.ok) {
      output.innerHTML = '<span style="color:#4ade80">✓ Success</span>';
    } else {
      output.innerHTML = '<span style="color:#f87171">✗ Error: ' + response.status + '</span>';
    }
  } catch (error) {
    output.innerHTML = '<span style="color:#f87171">✗ Network Error: ' + error.message + '</span>';
  }
});
</script>
</html>
