<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button,select{margin:5px;padding:8px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1}
a{color:#6366f1;text-decoration:none}
#output{margin-top:15px;padding:10px;background:#1a1a1a;border-radius:4px;min-height:50px}
#endpoints{width:100%}
</style>
</head>
<body>
<h2>API Status Checker</h2>
<select id="endpoints">
<option value="https://api.github.com">GitHub API</option>
<option value="https://jsonplaceholder.typicode.com">JSON Placeholder API</option>
<option value="https://httpbin.org">HTTPBin API</option>
</select>
<button onclick="check()">Check Status</button>
<div id="output"></div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
async function check(){
const url=document.getElementById('endpoints').value;
const output=document.getElementById('output');
try{
const res=await fetch(url);
output.innerHTML=`Endpoint: ${url}<br>Status: ${res.status}<br>Response: ${res.statusText}<br><small>${res.text().substring(0,100)}...</small>`;
}catch(e){
output.innerHTML=`Error: ${e.message}`;
}
}
</script>
</body>
</html>
