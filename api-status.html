<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button,select{margin:5px;padding:8px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1}
a{color:#6366f1;text-decoration:none}
#output{margin-top:15px;padding:10px;background:#1a1a1a;border-radius:4px;min-height:50px}
#endpoints{width:100%}
</style>
</head>
<body>
<h2>API Status Checker</h2>
<select id="endpoints">
<option value="https://api.github.com">GitHub API</option>
<option value="https://api.gitlab.com">GitLab API</option>
</select>
<button onclick="checkStatus()">Check</button>
<div id="output">Waiting for input...</div>
<script>
function checkStatus() {
    try {
        var endpoint = document.getElementById("endpoints").value;
        if (!endpoint) {
            throw new Error("No endpoint selected");
        }
        fetch(endpoint)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                document.getElementById("output").innerHTML = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                document.getElementById("output").innerHTML = "Error: " + error.message;
            });
    } catch (error) {
        document.getElementById("output").innerHTML = "Error: " + error.message;
    }
}
</script>
</body>
</html>
