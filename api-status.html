<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button,select{margin:5px;padding:8px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1}
a{color:#6366f1;text-decoration:none}
#output{margin-top:15px;padding:10px;background:#1a1a1a;border-radius:4px;min-height:50px}
#endpoints{width:100%}
</style>
</head>
<body>
<h2>API Status Checker</h2>
<select id="endpoints" onchange="checkEndpoints()">
  <option value="">Select API Endpoint...</option>
  <option value="/api/health">/api/health</option>
  <option value="/api/status">/api/status</option>
  <option value="/api/version">/api/version</option>
</select>
<button onclick="checkEndpoints()">Check Status</button>
<button onclick="clearOutput()">Clear</button>
<div id="output"></div>
<script>
function checkEndpoints() {
  const endpoint = document.getElementById('endpoints').value;
  const output = document.getElementById('output');
  
  if (!endpoint) {
    output.innerHTML = '<span style="color:#e4e4e4">Please select an endpoint first.</span>';
    return;
  }
  
  output.innerHTML = '<span style="color:#6366f1">Checking ' + endpoint + '...</span>';
  
  fetch(endpoint)
    .then(response => {
      if (response.ok) {
        return response.json();
      } else {
        throw new Error('Status: ' + response.status);
      }
    })
    .then(data => {
      output.innerHTML = '<span style="color:#e4e4e4">Response: ' + JSON.stringify(data) + '</span>';
    })
    .catch(error => {
      output.innerHTML = '<span style="color:#ff6b6b">Error: ' + error.message + '</span>';
    });
}

function clearOutput() {
  document.getElementById('output').innerHTML = '';
}

document.addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    checkEndpoints();
  }
});
</script>
</body>
</html>
