<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Formatter/Validator</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{margin:0 0 15px;font-size:24px}
a{color:#8be9fd;text-decoration:none}
textarea{width:100%;height:200px;background:#111;color:#e4e4e4;border:1px solid #333;padding:10px;box-sizing:border-box;font-family:monospace;font-size:13px;resize:vertical}
button{background:#5e63ff;color:#fff;border:none;padding:10 20px;border-radius:6px;font-size:14px;cursor:pointer;margin:5px}
button:hover{background:#4a4ecb}
#error{color:#ff6b6b;margin:10px 0;padding:10px;background:#2a1a1a;border-radius:6px;display:none}
#result{background:#1a2a1a;padding:10px;border-radius:6px;display:none;font-family:monospace;font-size:13px}
</style>
</head>
<body>
<div class="container">
<h1><a href="index.html">Home</a> - JSON Formatter/Validator</h1>
<textarea id="input" placeholder="Paste your JSON here..."></textarea>
<div id="error"></div>
<div id="result"></div>
<button onclick="format()">Format</button>
<button onclick="minify()">Minify</button>
<button onclick="validate()">Validate</button>
</div>
<script>
const input=document.getElementById('input'), error=document.getElementById('error'), result=document.getElementById('result');
function format(){let t=input.value;try{let o=JSON.parse(t);input.value=JSON.stringify(o,null,2);error.style.display='none';result.style.display='none'}catch(e){error.textContent='Error: '+e.message;error.style.display='block';result.style.display='none'}}
function minify(){let t=input.value;try{let o=JSON.parse(t);input.value=JSON.stringify(o);error.style.display='none';result.style.display='none'}catch(e){error.textContent='Error: '+e.message;error.style.display='block';result.style.display='none'}}
function validate(){let t=input.value;try{JSON.parse(t);result.textContent='Valid JSON ✓';result.style.display='block';error.style.display='none'}catch(e){result.style.display='none';error.textContent='Invalid JSON: '+e.message;error.style.display='block'}}
</script>
</body>
</html>
