<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#818cf8;text-decoration:none;}
a:hover{text-decoration:underline;}
.container{display:grid;grid-template-columns:1fr 1fr;gap:10px;height:400px;}
textarea{width:100%;height:100%;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:10px;border-radius:5px;resize:none;font-family:monospace;font-size:13px;}
button{background:#4c4c9c;color:#fff;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;}
button:hover{background:#5c5cb5;}
.error{color:#f38ba8;border:1px solid #f38ba8;}
.success{color:#94e7ff;border:1px solid #94e7ff;}
.pre{white-space:pre-wrap;font-size:13px;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h2>JSON Formatter</h2>
<div class="container">
<textarea id="input" placeholder='{"name":"Gwen","active":true}'></textarea>
<div class="output" id="output"></div>
</div>
<div style="margin-top:10px;">
<button onclick="format()">Format</button>
<button onclick="validate()">Validate</button>
<button onclick="clear()">Clear</button>
</div>
<script>
const output = document.getElementById('output');
const input = document.getElementById('input');
const formatBtn = document.querySelector('button[onclick="format()"]');
const clearBtn = document.querySelector('button[onclick="clear()"]');
function escapeHtml(str) {return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function format() {
try {
const json = JSON.parse(input.value);
const formatted = JSON.stringify(json, null, 2);
output.innerHTML = '<pre class="success">' + escapeHtml(formatted) + '</pre>';
output.classList.add('success');
output.classList.remove('error');
formatBtn.disabled = true;
formatBtn.textContent = 'Formatted';
} catch(e) {
output.innerHTML = '<pre class="error">Parse error: ' + escapeHtml(e.message) + '</pre>';
output.classList.add('error');
output.classList.remove('success');
formatBtn.disabled = false;
formatBtn.textContent = 'Format';
}
}
function validate() {
try {
JSON.parse(input.value);
output.innerHTML = '<pre class="success">Valid JSON</pre>';
} catch(e) {
output.innerHTML = '<pre class="error">Invalid JSON: ' + escapeHtml(e.message) + '</pre>';
}
}
function clear() {
input.value = '';
output.innerHTML = '';
formatBtn.disabled = false;
formatBtn.textContent = 'Format';
}
input.addEventListener('input', function() {
formatBtn.disabled = false;
formatBtn.textContent = 'Format';
});
</script>
</body>
</html>
