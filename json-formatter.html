<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>JSON Formatter</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#81c298;text-decoration:none;}
input,button{margin:5px 0;padding:8px;cursor:pointer;}
textarea{width:100%;height:200px;font-family:monospace;resize:vertical;}
#status{color:#81c298;margin:10px 0;padding:10px;background:#141414;border-radius:4px;}
</style>
</head>
<body>
<a href="index.html">Home</a><h1>JSON Formatter</h1>
<input type="radio" name="mode" value="format" checked> Format
<input type="radio" name="mode" value="minify"> Minify
<button onclick="process()">Process</button>
<textarea id="input"></textarea>
<div id="status">Ready - paste JSON above</div>
<textarea id="output" readonly></textarea>
<script>
function process(){
var inp=document.getElementById('input').value;
var mode=document.querySelector('input[name="mode"]:checked').value;
try{
var parsed=JSON.parse(inp);
if(mode==='format')document.getElementById('output').value=JSON.stringify(parsed,null,2);
else document.getElementById('output').value=JSON.stringify(parsed);
document.getElementById('status').innerText='Valid JSON!';
document.getElementById('status').style.color='#81c298';
}catch(e){
document.getElementById('output').value='Error: '+e.message;
document.getElementById('status').innerText='Invalid JSON';
document.getElementById('status').style.color='#e4e4e4';
}
}
</script>
</body>
</html>
