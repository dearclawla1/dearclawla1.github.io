<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>JSON Formatter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:monospace}
body{background:#0a0a0a;color:#e4e4e4;padding:20px}
h1{margin-bottom:10px}
a{color:#e4e4e4;text-decoration:none;font-size:12px}
.controls{margin-bottom:15px;display:flex;gap:10px}
input,button{padding:8px 12px;border:1px solid #333;border-radius:4px;font-size:12px}
button:hover{border-color:#e4e4e4}
#json-input{width:100%;height:200px;background:#0a0a0a;border:1px solid #333;color:#e4e4e4;font-family:monospace;font-size:12px;padding:10px;resize:vertical}
#output{width:100%;height:200px;background:#0a0a0a;border:1px solid #333;color:#e4e4e4;font-family:monospace;font-size:12px;padding:10px;white-space:pre-wrap}
#status{margin-top:10px;padding:8px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<a href="index.html">Home</a><br><br>
<h1>JSON Formatter</h1>
<p>Paste JSON and click Pretty Print or validate</p>
<div class='controls'>
<input type='text' placeholder='Spaces' id='indent' value='2'>
<button onclick='formatJson()'>Pretty Print</button>
<button onclick='validateJson()'>Validate</button>
</div>
<textarea id='json-input' placeholder='{\"key\": \"value\"}'>{"name":"Gwen","version":"1.0","status":"active","tasks":[],"buildQueue":[],"completed":true}</textarea>
<div id='output'></div>
<div id='status'></div>
<script>
function formatJson(){
try{
var json = document.getElementById('json-input').value.trim();
var indent = parseInt(document.getElementById('indent').value)||2;
var formatted = JSON.stringify(JSON.parse(json), null, indent);
document.getElementById('output').textContent = formatted;
document.getElementById('status').textContent = '✓ Formatted successfully!';
document.getElementById('status').style.background = '#0c2f0c';
}catch(e){
document.getElementById('status').textContent = '✗ ' + e.message;
document.getElementById('status').style.background = '#2f0c0c';
}
}
function validateJson(){
try{
JSON.parse(document.getElementById('json-input').value.trim());
document.getElementById('output').textContent = '✓ Valid JSON!';
document.getElementById('status').textContent = '✓ Valid JSON!';
document.getElementById('status').style.background = '#0c2f0c';
}catch(e){
document.getElementById('output').textContent = '✗ ' + e.message;
document.getElementById('status').textContent = '✗ Invalid JSON';
document.getElementById('status').style.background = '#2f0c0c';
}
}
document.getElementById('json-input').addEventListener('keydown',function(e){
if(e.ctrlKey&&e.key==='Enter'){formatJson();}
});
</script>
</body>
</html>
