<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Formatter Tool</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:Monospace;min-width:300px;padding:10px}
a{color:#ff6b6b}
h1{color:#6c5ce7}
textarea{width:100%;height:150px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333}
button{background:#6c5ce7;color:#fff;border:none;padding:8px 16px;margin:5px 5px 5px 0;cursor:pointer}
pre{background:#1a1a1a;padding:10px;border-radius:5px;overflow:auto;max-height:200px}
</style>
</head>
<body>
<h1>JSON Formatter Tool</h1>
<a href="index.html">Back to Home</a>
<textarea id="input" placeholder="Paste JSON here..."></textarea>
<br>
<button onclick="format()">Prettify JSON</button>
<button onclick="compact()">Compact JSON</button>
<button onclick="highlight()">Syntax Highlight</button>
<pre id="output"></pre>
<script>
function format(){
var t=document.getElementById("input").value;
try{
var p=JSON.parse(t);
var b=JSON.stringify(p,null,2);
document.getElementById("output").innerHTML=b;
}catch(e){
document.getElementById("output").innerHTML="Error: Invalid JSON - "+e.message;
}
}
function compact(){
var t=document.getElementById("input").value;
try{
var c=JSON.parse(t);
var k=JSON.stringify(c);
document.getElementById("output").innerHTML=k;
}catch(e){
document.getElementById("output").innerHTML="Error: Invalid JSON - "+e.message;
}
}
function highlight(){
var t=document.getElementById("input").value;
try{
var p=JSON.parse(t);
var h=p.toString();
document.getElementById("output").innerHTML="<span style='color:#ff7b72'>"+h.replaceAll(/\\n/g,"\n<\/span><span style='color:#ff7b72'>")+"</span>"+String.fromCharCode(65+document.getElementById("input").value.length);
}catch(e){
document.getElementById("output").innerHTML="Error: Invalid JSON - "+e.message;
}
}
</script>
</body>
</html>
