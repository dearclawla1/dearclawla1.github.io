<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JSON Formatter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0a0a0a;color:#e4e4e4;padding:20px}
.container{max-width:800px;margin:0 auto}
a{color:#e4e4e4;text-decoration:underline}
input,textarea{width:100%;padding:12px;margin:10px 0;border:1px solid #333;background:#1a1a1a;color:#e4e4e4;border-radius:4px;font-family:monospace;font-size:13px}
textarea{min-height:200px;resize:vertical}
input::placeholder{color:#888}
button{width:100%;padding:12px;margin:8px 0;border:none;background:#333;color:#e4e4e4;border-radius:4px;cursor:pointer;font-size:14px}
button:hover{background:#444}
#formatBtn{background:#4C7AF3}
#formatBtn:hover{background:#5A8CFD}
#formatBtn:active{background:#3A6ACB}
#outputArea{min-height:150px;font-size:12px;line-height:1.6;background:#111}
#statusArea{padding:10px;margin:10px 0;background:#1a1a1a;border-radius:4px;font-size:13px;color:#aaa;display:none}
#clearBtn{background:#e44c4c}
#clearBtn:hover{background:#f45c5c}
.loading{text-align:center;padding:20px;color:#888}
.error{color:#e44c4c}
.success{color:#4caf50}
@media(max-width:600px){
.container{max-width:100%;padding:10px}
button{font-size:13px;padding:10px}
textarea{min-height:180px}
}
</style>
</head>
<body>
<div class="container">
<h1>JSON Formatter</h1>
<p>Paste your JSON below to format, validate, and minify.</p>
<div id="statusArea"></div>
<div id="placeholderText" style="color:#666;font-style:italic;margin-bottom:10px;">
  Paste your JSON here...
  <br>
  <small>Supports: format, validate, minify</small>
</div>
<textarea id="inputArea" placeholder="Paste your JSON here...&#10;Features: format pretty print, validate syntax, minify compact" rows="12"></textarea>
<div style="display:flex;gap:10px;flex-wrap:wrap">
<button id="formatBtn" onclick="formatJSON()">Format JSON</button>
<button id="minifyBtn" onclick="minifyJSON()">Minify JSON</button>
<button id="validateBtn" onclick="validateJSON()">Validate JSON</button>
<button id="clearBtn" onclick="clearAll()">Clear All</button>
</div>
<div style="margin-top:15px;color:#666;font-size:13px;text-align:center">
  <small>⌨️ Press <strong>Enter</strong> in input area to format • <strong>Ctrl+Enter</strong> to minify • <strong>Shift+Enter</strong> to validate</small>
</div>
<textarea id="outputArea" placeholder="Formatted JSON will appear here...&#10;Output is read-only to prevent accidental edits" readonly rows="10"></textarea>
<div style="margin-top:10px;font-size:13px;color:#666;text-align:center">
  <small>💡 Tip: Select all text (Ctrl+A) then press Enter to format the entire output</small>
</div>
</div>
<script>
(function(){
// Element references
const inputArea = document.getElementById('inputArea');
const outputArea = document.getElementById('outputArea');
const statusArea = document.getElementById('statusArea');
const placeholderText = document.getElementById('placeholderText');

// Show/hide placeholder based on input
function togglePlaceholder(show) {
  if (show) {
    placeholderText.style.display = 'block';
    inputArea.placeholder = 'Paste your JSON here...';
  } else {
    placeholderText.style.display = 'none';
    inputArea.placeholder = '';
  }
}

// Format JSON pretty print
function formatJSON() {
  try {
    const input = inputArea.value.trim();
    if (!input) {
      showStatus('error', 'Please paste JSON first');
      return;
    }
    const data = JSON.parse(input);
    const formatted = JSON.stringify(data, null, 2);
    outputArea.value = formatted;
    showStatus('success', 'JSON formatted successfully');
    togglePlaceholder(false);
  } catch (e) {
    showStatus('error', 'Invalid JSON: ' + e.message);
  }
}

// Minify JSON compact
function minifyJSON() {
  try {
    const input = inputArea.value.trim();
    if (!input) {
      showStatus('error', 'Please paste JSON first');
      return;
    }
    const data = JSON.parse(input);
    const minified = JSON.stringify(data);
    outputArea.value = minified;
    showStatus('success', 'JSON minified successfully');
    togglePlaceholder(false);
  } catch (e) {
    showStatus('error', 'Invalid JSON: ' + e.message);
  }
}

// Validate JSON syntax
function validateJSON() {
  try {
    const input = inputArea.value.trim();
    if (!input) {
      showStatus('error', 'Please paste JSON first');
      return;
    }
    JSON.parse(input);
    outputArea.value = '✅ Valid JSON\n\nOriginal: ' + input.length + ' bytes\nValidated: Syntax OK\n\nFormatted view:\n' + JSON.stringify(JSON.parse(input), null, 2);
    showStatus('success', 'JSON validated successfully');
    togglePlaceholder(false);
  } catch (e) {
    outputArea.value = '❌ Invalid JSON\n\nError: ' + e.message + '\n\nInput: ' + input.substring(0, 200) + '...';
    showStatus('error', 'Validation failed: ' + e.message);
  }
}

// Clear all inputs and output
function clearAll() {
  inputArea.value = '';
  outputArea.value = '';
  showStatus('', '');
  togglePlaceholder(true);
}

// Show status message
function showStatus(type, message) {
  statusArea.style.display = 'block';
  statusArea.className = type;
  statusArea.textContent = message;
  setTimeout(() => {
    if (!inputArea.value && !outputArea.value) {
      statusArea.style.display = 'none';
    }
  }, 3000);
}

// Keyboard shortcuts
inputArea.addEventListener('keydown', function(e) {
  // Enter to format
  if (e.key === 'Enter' && e.ctrlKey === false && e.shiftKey === false) {
    e.preventDefault();
    formatJSON();
  }
  // Ctrl+Enter to minify
  else if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    minifyJSON();
  }
  // Shift+Enter to validate
  else if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    validateJSON();
  }
  // Ctrl+Enter+C to clear (with confirmation)
  else if (e.key === 'c' && e.ctrlKey && e.metaKey === false) {
    e.preventDefault();
    if (confirm('Clear all?')) {
      clearAll();
    }
  }
});

// Auto-format when pasting valid JSON
inputArea.addEventListener('paste', function() {
  const pasted = inputArea.value;
  try {
    JSON.parse(pasted);
    showStatus('success', 'Pasted JSON is valid');
  } catch (e) {
    // Ignore invalid JSON paste
  }
});

// Auto-clear output when input is cleared
inputArea.addEventListener('input', function() {
  if (this.value.length < 3) {
    outputArea.value = '';
    showStatus('', '');
  }
});

// Load any existing content (simulated)
// In production, you might load from localStorage
// if (localStorage.getItem('jsonInput')) {
//   inputArea.value = localStorage.getItem('jsonInput');
// }

// Initialize
togglePlaceholder(true);

})();
</script>
</body>
</html>
