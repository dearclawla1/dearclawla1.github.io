<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px}
a{color:#88cc88}
h1{margin:0 0 10px;font-size:22px}
input,textarea{background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;width:100%}
button{background:#333;color:#e4e4e4;border:none;padding:10px 15px;cursor:pointer;margin:5px}
button:hover{background:#444}.container{max-width:800px;margin:0 auto}
.output{background:#1a1a1a;border:1px solid #333;padding:10px;min-height:100px;white-space:pre-wrap}
.collapsed{overflow:hidden}
.syntax{color:#e4e4e4;background:#222;padding:2px}
.syntax.str{color:#9ec89e}
.syntax.num{color:#f9c540}
.syntax.key{color:#c58ec5}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h1>JSON Formatter</h1>
<div class="container">
<textarea id="input" placeholder='{"name":"John","age":30}'>{"name":"Alice","age":32,"city":"Wonderland","skills":["coding","building"],"active":true}</textarea>
<button onclick="format()">Format</button>
<button onclick="minify()">Minify</button>
<button onclick="validate()">Validate</button>
<button onclick="copy()">Copy</button>
<button onclick="toggle()">Toggle Collapse</button>
</div>
<div id="output" class="output collapsed"></div>
<script>
const o=document.getElementById('output');
function escapeHtml(s){return s.replace(/&/,'&amp;').replace(/</,'&lt;').replace(/>/,'&gt;').replace(/"/,'&quot;').replace(/\n/,'<br>')}
function highlight(json){
let out='<span class="syntax">';
json.match(/"[^"\\]*(\\.[^"\\]*)*"[^,]*|: ?[0-9]+\.?[0-9]*|: true|: false|: null/gi).forEach(t=>{
if(t.startsWith('":"')) out+='<span class="syntax.str">'+t.replace(/"/g,'&quot;')+'</span>';
else if(t.includes('.')) out+='<span class="syntax.num">'+t+'</span>';
else out+='<span class="syntax.key">'+t+'</span>';
});
const rest=json.match(/[^:]+/g).join('');
rest.split('').forEach((c,i)=>{
if(c==='{')out+='<span class="syntax key">{</span>';
else if(c==='}')out+='<span class="syntax key">}</span>';
else if(c==='"')out+='<span class="syntax str">"</span>';
else if(c===',')out+='<span class="syntax key">,</span>';
else out+=c;
});
return out+'</span>';
}
function format(){o.classList.remove('collapsed');o.innerHTML=highlight(JSON.stringify(JSON.parse(document.getElementById('input').value),null,2))}
function minify(){try{o.classList.remove('collapsed');o.innerHTML=highlight(JSON.stringify(JSON.parse(document.getElementById('input').value)))}catch(e){o.innerHTML='<span style="color:#f55">Invalid JSON</span>'}}
function validate(){try{JSON.parse(document.getElementById('input').value);o.innerHTML='<span style="color:#8f8">Valid JSON</span>'}catch(e){o.innerHTML='<span style="color:#f55">'+escapeHtml(e.message)+'</span>'}}
function toggle(){o.classList.toggle('collapsed')}
function copy(){navigator.clipboard.writeText(document.getElementById('input').value)}
</script>
</body>
</html>
