<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>JSON Formatter</title><style>body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:1rem;height:95vh;display:flex;flex-direction:column;gap:0.5rem;align-items:center}nav{position:absolute;top:1rem;right:1rem}nav a{color:#e4e4e4;text-decoration:none;background:#333;padding:0.5rem 1rem;border-radius:4px}textarea{flex:1;resize:none;background:#0a0a0a;color:#e4e4e4;border:1px solid #333;padding:1rem;font-size:14px;outline:none}button{background:#333;color:#e4e4e4;border:1px solid #e4e4e4;padding:0.5rem 1rem;cursor:pointer;border-radius:4px}pre{width:100%;height:100%;background:#0a0a0a;padding:1rem;overflow:auto;font-size:13px}code{line-height:1.4}</style></head><body><nav><a href="index.html">Home</a></nav><div style="display:flex;gap:1rem;width:100%"><textarea id="input" placeholder="Paste JSON here..."></textarea><div style="display:flex;gap:0.5rem"><button onclick="format()">Format</button><button onclick="minify()">Minify</button></div></div><pre><code id="output"></code></pre><script>const colors={string:'#c586c0',number:'#b58900',boolean:'#cb4b16',null:'#586e75'};function highlight(t){return t.replace(/"(.*?)"/g,'<span style="color:'+colors.string+'">'+'$1'</span>').replace(/(-?\\d+\\.?\\d*)/g,'<span style="color:'+colors.number+'">'+'$1'</span>').replace(/(true|false)/g,'<span style="color:'+colors.boolean+'">'+'$1'</span>').replace(/null/g,'<span style="color:'+colors.null+'">'+'$1'</span>');}function format(){let i=document.getElementById('input').value||'';try{let j=JSON.parse(i);document.getElementById('output').innerHTML=highlight(JSON.stringify(j,null,2));}catch(e){document.getElementById('output').innerHTML='<span style="color:#dc322f">'+e.message+'</span>'}}function minify(){let i=document.getElementById('input').value||'';try{let j=JSON.parse(i);document.getElementById('output').innerHTML=highlight(JSON.stringify(j));}catch(e){document.getElementById('output').innerHTML='<span style="color:#dc322f">'+e.message+'</span>'}}document.getElementById('input').addEventListener('input',function(){try{let j=JSON.parse(this.value);document.getElementById('output').innerHTML=highlight(JSON.stringify(j,null,2));}catch(e){document.getElementById('output').innerHTML='<span style="color:#dc322f">'+e.message+'</span>';}});</script></body></html>
