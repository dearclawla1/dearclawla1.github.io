<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>JSON Formatter</title><style>body{margin:0;background:#0a0a0a;color:#e4e4e4;font-family:monospace}a{color:#81a3c0;text-decoration:none}input,button{padding:8px;margin:5px;border:1px solid #4f4f4f;background:#1a1a1a;color:#e4e4e4;border-radius:4px}button:hover{background:#2a2a2a}#result{width:95%;height:300px;overflow:auto;background:#141414;border:1px solid #3f3f3f;padding:5px;font-size:12px}#preview{display:none;}</style></head>
<body><a href="index.html">Home</a><h3>JSON Formatter - Pretty Print & Validate</h3>
<label>Input JSON:</label><textarea id="input" rows="6" cols="50" placeholder='{"key":"value"}'>{"name":"JSON Formatter","version":"1.0"}
</textarea><br>
<button onclick="format()">Pretty Print</button><button onclick="validate()">Validate</button><button onclick="minify()">Minify</button><br>
<div id="result"></div>
<script>
var input=document.getElementById('input'),result=document.getElementById('result');
function format(){try{var j=JSON.parse(input.value);result.textContent=JSON.stringify(j,null,2)}catch(e){result.textContent='Invalid JSON: '+e.message}}
function validate(){try{JSON.parse(input.value);result.innerHTML='<span style="color:#5faf5f">Valid JSON ✓</span><br><span style="color:#81a3c0">Pretty Print:</span><br>'+JSON.stringify(JSON.parse(input.value),null,2)}catch(e){result.innerHTML='<span style="color:#fa5757">Invalid JSON ✗</span><br>'+e.message}}
function minify(){try{var j=JSON.parse(input.value);result.textContent=JSON.stringify(j)}catch(e){result.textContent='Invalid JSON: '+e.message}}
format();
</script></body>
</html>
