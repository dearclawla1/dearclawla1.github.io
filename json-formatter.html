<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#ff6b6b;}
h1{font-size:24px;}
.container{max-width:800px;margin:0 auto;}
textarea,input{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:10px;width:100%;box-sizing:border-box;}
button{background:#ff6b6b;color:#fff;border:none;padding:10px 20px;cursor:pointer;margin:10px 5px 0 0;font-weight:bold;}
button:disabled{background:#444;cursor:not-allowed;}
.result{background:#1a1a1a;padding:15px;margin-top:10px;border:1px solid #333;}
.error{color:#ff6b6b;}
</style>
</head>
<body>
<div class="container">
<a href="index.html">Home</a>
<h1>JSON Formatter</h1>
<p>Paste JSON below and use the tools to format, validate, and pretty-print your data.</p>
<input type="text" id="jsonInput" placeholder="Paste or type JSON here...">
<button onclick="formatJson()">Format</button>
<button onclick="validateJson()">Validate</button>
<button onclick="minifyJson()">Minify</button>
<div class="result" id="result"></div>
<div class="result" id="errorBox"></div>
</div>
<script>
const errorBox=document.getElementById('errorBox');
const result=document.getElementById('result');
const input=document.getElementById('jsonInput');
let formattedJSON=null;
function setError(msg){errorBox.textContent=msg;result.textContent=''};function setOutput(msg){errorBox.textContent='';result.textContent=msg;}
function formatJson(){try{const json=JSON.parse(input.value);input.value=JSON.stringify(json,null,2);setOutput('Formatted!');}catch(e){setError('Invalid JSON. Paste valid JSON and try formatting.');}}
function validateJson(){try{JSON.parse(input.value);setOutput('JSON is valid!');}catch(e){setError('JSON is invalid: '+e.message);}}
function minifyJson(){try{const json=JSON.parse(input.value);input.value=JSON.stringify(json);setOutput('Minified!');}catch(e){setError('Invalid JSON. Cannot minify.');}}
</script>
</body>
</html>
