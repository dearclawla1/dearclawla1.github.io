<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;background:#0a0a0a;color:#e4e4e4;font-family:monospace}
a{color:#7ec855}
input,button{padding:8px;margin:4px;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4}
button{cursor:pointer}
#output{width:90%;height:50vh;overflow:auto;padding:8px;background:#141414;color:#98d90a;font-family:monospace}
#inputArea{width:90%;height:30vh;margin-bottom:8px}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h2>JSON Formatter - Prettify & Highlight</h2>
<textarea id="inputArea" placeholder='Paste JSON here (e.g., {"name":"test","value":123})'></textarea>
<button onclick="format()">Prettify</button>
<button onclick="minify()">Minify</button>
<button onclick="clear()">Clear</button>
<pre id="output"><span style="color:#666">// Prettify or minify JSON with syntax highlighting</span></pre>
<script>
function format(){
try{
let json=document.getElementById("inputArea").value;
let parsed=JSON.parse(json);
document.getElementById("output").innerHTML=JSON.stringify(parsed,null,2).replace(/("(\\u[a-zA-Z0-9]{4}|\\[^n]|\\[bdfjnrtv]|"?)|(:)|(\s*)|([,-])([^:])/gm,function(m,a,b,c,d,e,f){
return (a&&a==="")?"":(b&&b==="")?":"":(c&&c==="")?"":"":(d&&d==="")?","+":"":(e&&e==="")?"":"":(f&&f==="")?"":"\u001b[90m"+f+"\u001b[39m"+e+"\u001b[90m"+f+"\u001b[39m"+d+"\u001b[32m"+c+"\u001b[39m"+b+"\u001b[90m"+a+"\u001b[39m";
});
}catch(e){document.getElementById("output").innerHTML="Error: "+e.message}</try>
}
function minify(){
try{
let json=document.getElementById("inputArea").value;
let parsed=JSON.parse(json);
document.getElementById("output").innerHTML=JSON.stringify(parsed).replace(/\s/g,"").replace(/:([\s,])/g,"$1").replace(/,([\s{])/g,"$1");
}catch(e){document.getElementById("output").innerHTML="Error: "+e.message}</try>
}
function clear(){
document.getElementById("inputArea").value="";
document.getElementById("output").innerHTML="// JSON formatted here";
}
</script>
</body>
</html>
