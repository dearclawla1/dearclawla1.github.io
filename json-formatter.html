<!DOCTYPE html>
<html lang="en" theme="dark">
<head><meta charset="UTF-8"><title>JSON Formatter/Validator</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:sans-serif;margin:0;padding:20px;}
a{color:#81a1c1;text-decoration:none;}
input,button,select{width:100%;padding:10px;margin:10px 0;font-size:14px;}
textarea{width:100%;min-height:150px;font-family:monospace;font-size:13px;padding:10px;box-sizing:border-box;}
#output{background:#1f1f1f;border:1px solid #3a3a3a;padding:10px;margin-top:10px;}
h1{margin:0 0 10px;font-size:18px;}
</style></head>
<body><a href="index.html">Home</a><h1>JSON Formatter/Validator</h1>
<input type="file" id="file" accept=".json"><textarea id="input"></textarea>
<button onclick="format()">Format</button>
<button onclick="validate()">Validate</button>
<button onclick="minify()">Minify</button>
<button onclick="clear()">Clear</button>
<div id="output"></div><script>
function format(){const t=document.getElementById('input').value,o=JSON.parse(t||'{}');
document.getElementById('output').innerHTML='<pre style="color:#c4a7e7;">'+JSON.stringify(o,null,2)+'</pre>'}
function validate(){const t=document.getElementById('input').value;try{JSON.parse(t);
document.getElementById('output').innerHTML='<div style="color:#50fa7b;">✔ Valid JSON</div>'}catch{
document.getElementById('output').innerHTML='<div style="color:#ff5555;">✖ Invalid JSON</div>'}}
function minify(){const t=document.getElementById('input').value,o=JSON.parse(t||'{}');
document.getElementById('output').innerHTML='<pre style="color:#608b4c;">'+JSON.stringify(o)+'</pre>'}
function clear(){document.getElementById('input').value='';document.getElementById('output').innerHTML=''}</script>
</body></html>
