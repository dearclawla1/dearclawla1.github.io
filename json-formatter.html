<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JSON Formatter</title>
<style>
:root{--bg:#0a0a0a;--text:#e4e4e4;--accent:#4caf50;--error:#ff5252}
body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:900px;margin:0 auto}
a{color:var(--text);text-decoration:none}
a:hover{text-decoration:underline}
textarea{width:100%;min-height:200px;background:#1a1a1a;color:var(--text);border:1px solid #333;resize:vertical;font-family:monospace;padding:10px;border-radius:4px;font-size:13px}
button{background:var(--accent);color:#fff;border:none;padding:10px 16px;border-radius:4px;cursor:pointer;font-size:13px;margin-right:8px;transition:opacity 0.2s}
button:hover{opacity:0.9}
button.secondary{background:#333}
button.danger{background:#ff5252}
#output{margin-top:20px;display:none}
.error{color:var(--error);background:#2a1010;padding:10px;border-radius:4px;margin-top:10px}
.meta{font-size:11px;color:#666;margin-top:5px}
</style>
</head>
<body>
<div class="container">
<a href="index.html">Home</a>
<h1>JSON Formatter</h1>
<label for="jsonInput">Paste JSON to format/validate:</label>
<textarea id="jsonInput" placeholder='{"key": "value"}' onchange="updateOutput()"></textarea>
<div style="margin-top:10px;">
<button onclick="format()">Format</button>
<button onclick="minify()">Minify</button>
<button onclick="validate()">Validate</button>
<button onclick="clearAll()" class="secondary">Clear</button>
</div>
<div id="meta"></div>
<div id="output"><pre id="outputJson"></pre></div>
<div id="error" class="error"></div>
<script>
const input=document.getElementById('jsonInput'), outputDiv=document.getElementById('output'), outJson=document.getElementById('outputJson'), err=document.getElementById('error'), meta=document.getElementById('meta');
let raw=input.value;
function updateOutput(){raw=input.value;meta.textContent='Original chars: '+(raw?raw.length:0)+' | Lines: '+(raw.split('\n').length)};
function format(){let trimmed=raw.trim();try{outDiv.style.display='block';outJson.textContent=JSON.stringify(JSON.parse(trimmed),null,2);err.textContent=''}catch(e){outDiv.style.display='none';err.textContent=e.message}};
function minify(){let trimmed=raw.trim();try{outDiv.style.display='block';outJson.textContent=JSON.stringify(JSON.parse(trimmed));err.textContent=''}catch(e){outDiv.style.display='none';err.textContent=e.message}};
function validate(){let trimmed=raw.trim();try{JSON.parse(trimmed);outDiv.style.display='block';outJson.textContent='JSON is valid';err.textContent=''}catch(e){outDiv.style.display='block';outJson.textContent='JSON is invalid';err.textContent=e.message}};
function clearAll(){input.value='';outputDiv.style.display='none';err.textContent='';raw='';meta.textContent=''}
updateOutput();
</script>
</body>
</html>
