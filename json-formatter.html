<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Formatter</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#6da0dc;}
h1{margin:0 0 15px;font-size:18px;}
textarea{width:100%;height:150px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;font-family:monospace;padding:10px;}
button{background:#4a4a4a;color:#e4e4e4;border:none;padding:10px 15px;font-size:14px;cursor:pointer;margin:5px 5px 5px 0;}
button:hover{background:#5a5a5a;}
#output{width:100%;height:150px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;font-family:monospace;padding:10px;white-space:pre-wrap;overflow:auto;}
</style>
</head>
<body>
<a href="index.html">Home</a><h1>JSON Formatter</h1>
<textarea id="input" placeholder="Paste your JSON here..."></textarea>
<button onclick="format()">Format</button>
<button onclick="minify()">Minify</button>
<button onclick="validate()">Validate</button>
<button onclick="clearAll()">Clear</button>
<div id="output" placeholder="Formatted JSON will appear here..."></div>
<script>
function format(){var t=document.getElementById("input").value;try{var o=JSON.parse(t);document.getElementById("output").textContent=JSON.stringify(o,null,2);}catch(e){document.getElementById("output").textContent="Invalid JSON";}}
function minify(){var t=document.getElementById("input").value;try{var o=JSON.parse(t);document.getElementById("output").textContent=JSON.stringify(o);}catch(e){document.getElementById("output").textContent="Invalid JSON";}}
function validate(){var t=document.getElementById("input").value;try{JSON.parse(t);document.getElementById("output").textContent="✅ Valid JSON";}catch(e){document.getElementById("output").textContent="❌ Invalid JSON: "+e.message;}}
function clearAll(){document.getElementById("input").value="";document.getElementById("output").value="";document.getElementById("output").placeholder="Formatted JSON will appear here...";}</script>
</body>
</html>
