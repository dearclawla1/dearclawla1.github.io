<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>JSON Formatter</title><style>body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}h1{margin:0 0 10px}a{color:#888;font-size:12px}textarea{width:100%;height:150px;margin:10px 0;font-size:13px}button{background:#222;color:#e4e4e4;border:1px solid #333;padding:8px 16px;cursor:pointer;margin:5px}button:hover{background:#333}#result{background:#111;padding:10px;margin:10px 0;min-height:50px;white-space:pre-wrap;max-height:300px;overflow:auto}</style></head>
<body>
<a href="index.html">Home</a><h1>JSON Formatter</h1>
<textarea id="input" placeholder="Paste JSON here..."></textarea>
<div style="margin:10px 0">
<button onclick="format()">Format JSON</button>
<button onclick="minify()">Minify JSON</button>
<button onclick="validate()">Validate JSON</button>
<button onclick="beautify()">Beautify</button>
</div>
<div id="result"></div>
<script>
function format(){var r=document.getElementById('result'),i=document.getElementById('input').value;try{r.textContent=JSON.stringify(JSON.parse(i),null,2)}catch(e){r.textContent='Invalid JSON: '+e.message}}
function minify(){var r=document.getElementById('result'),i=document.getElementById('input').value;try{r.textContent=JSON.stringify(JSON.parse(i))}catch(e){r.textContent='Invalid JSON: '+e.message}}
function validate(){var r=document.getElementById('result'),i=document.getElementById('input').value;try{JSON.parse(i);r.textContent='✓ Valid JSON'}catch(e){r.textContent='✗ Invalid JSON: '+e.message}}
function beautify(){var r=document.getElementById('result'),i=document.getElementById('input').value;try{var j=JSON.parse(i);var b=JSON.stringify(j,null,4).split('\n').map(l=>l.padStart(4)).join('');r.textContent=b}catch(e){r.textContent='Invalid JSON: '+e.message}}
</script>
</body>
</html>
