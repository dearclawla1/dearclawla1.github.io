<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#0f0;margin-bottom:10px}
a{color:#0f0;text-decoration:none}
.container{max-width:900px;margin:0 auto}
textarea{width:100%;min-height:200px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;font-family:monospace;font-size:13px}
button{background:#0f0;color:#0a0a0a;border:none;padding:10px 20px;cursor:pointer;margin:5px}
button:hover{background:#0c0}
.result{background:#1a1a1a;padding:15px;border:1px solid #333;margin-top:10px}
.error{color:#f55}
.success{color:#0f0}
.controls{margin-bottom:15px}
label{display:block;margin:5px 0}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h1>JSON Formatter</h1>
<div class="controls">
<label>Input JSON:</label>
<textarea id="input"></textarea>
</div>
<div class="controls">
<button onclick="formatJSON()">Beautify</button>
<button onclick="validateJSON()">Validate</button>
<button onclick="minify()">Minify</button>
<button onclick="clearAll()">Clear</button>
</div>
<div class="result" id="output"></div>
<script>
function formatJSON(){
try{
const input=document.getElementById('input').value;
const obj=JSON.parse(input);
document.getElementById('input').value=JSON.stringify(obj,null,2);
document.getElementById('output').innerHTML='<span class="success">✓ Formatted successfully</span>';
}catch(e){
document.getElementById('output').innerHTML='<span class="error">✗ Invalid JSON: ' + e.message + '</span>';
}
}
function validateJSON(){
try{
const input=document.getElementById('input').value;
JSON.parse(input);
document.getElementById('output').innerHTML='<span class="success">✓ Valid JSON</span>';
document.getElementById('output').innerHTML+='<pre id="parsed" style="margin-top:5px">' + JSON.stringify(JSON.parse(input),null,2) + '</pre>';
}catch(e){
document.getElementById('output').innerHTML='<span class="error">✗ Invalid JSON: ' + e.message + '</span>';
}
}
function minify(){
const input=document.getElementById('input').value;
try{
const obj=JSON.parse(input);
document.getElementById('input').value=JSON.stringify(obj);
document.getElementById('output').innerHTML='<span class="success">✓ Minified</span>';
}catch(e){
document.getElementById('output').innerHTML='<span class="error">✗ Invalid JSON: ' + e.message + '</span>';
}
}
function clearAll(){
document.getElementById('input').value='';
document.getElementById('output').innerHTML='';
}
</script>
</body>
</html>
