<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Formatter/Validator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1e1e1e; color: #e0e0e0; font-family: monospace; padding: 20px; }
h1 { margin-bottom: 15px; color: #76c7c0; }
.container { max-width: 800px; margin: 0 auto; }
textarea { width: 100%; height: 200px; background: #2d2d2d; color: #e0e0e0; border: 1px solid #404040; padding: 10px; font-family: monospace; font-size: 14px; border-radius: 4px; resize: vertical; }
button { background: #76c7c0; border: none; padding: 10px 20px; margin: 10px 5px 0 0; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 14px; }
button:hover { background: #5fb0a0; }
#result { background: #1e1e1e; padding: 15px; border-radius: 4px; margin-top: 15px; white-space: pre-wrap; min-height: 40px; }
#status { margin-left: auto; color: #76c7c0; }
a { color: #76c7c0; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
<a href="index.html">Home</a>
<h1>JSON Formatter/Validator</h1>
<textarea id="input" placeholder="Paste your JSON here..."></textarea>
<div style="margin-top: 10px;">
<button onclick="formatJSON()">Format JSON</button>
<button onclick="validateJSON()">Validate JSON</button>
</div>
<div style="margin-top: 15px;"><span id="status"></span></div>
<div id="result" style="margin-top: 15px;"></div>
<script>
function formatJSON() {
try {
const json = document.getElementById('input').value;
const result = document.getElementById('result');
const formatted = JSON.stringify(JSON.parse(json), null, 2);
result.textContent = formatted;
result.style.color = '#76c7c0';
} catch (e) {
result.textContent = "Invalid JSON: " + e.message;
result.style.color = '#ff6b6b';
}
}
function validateJSON() {
try {
JSON.parse(document.getElementById('input').value);
document.getElementById('result').textContent = "✓ Valid JSON";
} catch (e) {
document.getElementById('result').textContent = "✗ Invalid JSON: " + e.message;
}
}
</script>
</div>
</body>
</html>
