<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CSS Box Model Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,sans-serif;padding:20px}
h1{color:#6366f1;margin-bottom:10px}
a{color:#6366f1;text-decoration:none}
.container{display:flex;gap:20px;flex-wrap:wrap}
.controls{flex:1;min-width:250px}
.visualizer{flex:2;min-width:300px}
.box{position:relative;border:2px solid #6366f1;border-radius:4px;overflow:hidden}
.content{background:#e4e4e4;color:#0a0a0a;padding:10px;font-weight:bold}
.padding{background:#6366f1;color:#e4e4e4}
.border{background:#4f46e5}
.margin{background:#1e1e1e;border:1px dashed #6366f1}
input,select{width:100%;padding:8px;margin:5px 0;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;border-radius:4px}
button{width:100%;padding:10px;margin:5px 0;background:#6366f1;border:none;color:#e4e4e4;border-radius:4px;cursor:pointer;font-weight:bold}
button:hover{background:#4f46e5}
.stats{background:#1a1a1a;padding:10px;border-radius:4px;margin-top:10px;font-size:12px}
</style>
</head>
<body>
<h1>CSS Box Model Visualizer</h1>
<div class="container">
<div class="controls">
<label>Content Width: <input type="number" id="contentW" value="100" min="10" max="200"></label>
<label>Padding: <input type="number" id="padding" value="10" min="0" max="50"></label>
<label>Border Width: <input type="number" id="borderW" value="5" min="0" max="30"></label>
<label>Margin: <input type="number" id="margin" value="15" min="0" max="50"></label>
<button id="resetBtn">Reset Values</button>
<button id="exportBtn">Export CSS</button>
</div>
<div class="visualizer">
<div class="box">
<div class="margin" id="marginBox"></div>
<div class="border" id="borderBox"></div>
<div class="padding" id="paddingBox"></div>
<div class="content" id="contentBox">Content</div>
</div>
<div class="stats">
<div>Total Width: <span id="totalWidth">130</span>px</div>
<div>Content: <span id="contentWidth">100</span>px</div>
<div>Padding: <span id="paddingTotal">20</span>px</div>
<div>Border: <span id="borderTotal">10</span>px</div>
<div>Margin: <span id="marginTotal">30</span>px</div>
</div>
</div>
</div>
<script>
(function(){
const inputs = {
contentW: document.getElementById('contentW'),
padding: document.getElementById('padding'),
borderW: document.getElementById('borderW'),
margin: document.getElementById('margin')
};
const displays = {
totalWidth: document.getElementById('totalWidth'),
contentWidth: document.getElementById('contentWidth'),
paddingTotal: document.getElementById('paddingTotal'),
borderTotal: document.getElementById('borderTotal'),
marginTotal: document.getElementById('marginTotal')
};
const boxes = {
margin: document.getElementById('marginBox'),
border: document.getElementById('borderBox'),
padding: document.getElementById('paddingBox'),
content: document.getElementById('contentBox')
};
function update(){
const cw = parseInt(inputs.contentW.value) || 100;
const pad = parseInt(inputs.padding.value) || 10;
const bord = parseInt(inputs.borderW.value) || 5;
const marg = parseInt(inputs.margin.value) || 15;
const totalW = marg + bord + cw + pad + bord + marg;
boxes.margin.style.width = (marg * 2 + cw + pad * 2 + bord * 2) + 'px';
boxes.border.style.width = (cw + pad * 2) + 'px';
boxes.padding.style.width = cw + 'px';
boxes.content.style.width = cw + 'px';
displays.totalWidth.textContent = totalW;
displays.contentWidth.textContent = cw;
displays.paddingTotal.textContent = (pad * 2).toString();
displays.borderTotal.textContent = (bord * 2).toString();
displays.marginTotal.textContent = (marg * 2).toString();
}
Object.keys(inputs).forEach(id => {
inputs[id].addEventListener('input', update);
});
document.getElementById('resetBtn').addEventListener('click', () => {
inputs.contentW.value = 100;
inputs.padding.value = 10;
inputs.borderW.value = 5;
inputs.margin.value = 15;
update();
});
document.getElementById('exportBtn').addEventListener('click', () => {
const cw = parseInt(inputs.contentW.value) || 100;
const pad = parseInt(inputs.padding.value) || 10;
const bord = parseInt(inputs.borderW.value) || 5;
const marg = parseInt(inputs.margin.value) || 15;
const css = `.box{
  width: ${cw}px;
  padding: ${pad}px;
  border: ${bord}px solid #4f46e5;
  margin: ${marg}px;
  box-sizing: border-box;
}
`;
const blob = new Blob([css], {type: 'text/css'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'box-model.css';
a.click();
URL.revokeObjectURL(url);
});
update();
})();
</script>
</body>
</html>
