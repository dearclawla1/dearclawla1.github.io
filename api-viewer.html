<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>API Response Viewer</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
input,button{margin:5px;padding:8px 12px;border:1px solid #6366f1;border-radius:4px;background:#1a1a1a;color:#e4e4e4}
button:hover{background:#6366f1;color:#0a0a0a}
#output{width:100%;height:200px;background:#1a1a1a;border:1px solid #6366f1;border-radius:4px;overflow:auto;font-size:12px;padding:10px}
a{color:#6366f1}
</style>
</head>
<body>
<h2>API Response Viewer</h2>
<p>Paste your API response JSON below:</p>
<textarea id="input" style="width:100%;height:120px;background:#1a1a1a;color:#e4e4e4;border:1px solid #6366f1;border-radius:4px;padding:10px;font-family:monospace;font-size:12px"></textarea>
<br><br>
<button onclick="parse()">Parse JSON</button>
<button onclick="format()">Format JSON</button>
<button onclick="validate()">Validate Structure</button>
<br><br>
<div id="output"></div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
function parse(){
try{
var input=document.getElementById("input").value;
var data=JSON.parse(input);
document.getElementById("output").innerHTML="Parsed: <pre>"+JSON.stringify(data,0,2)+"</pre>";
}catch(e){
document.getElementById("output").innerHTML="Error: "+e.message;
}
}
function format(){
try{
var input=document.getElementById("input").value;
var data=JSON.parse(input);
var formatted=JSON.stringify(data,0,2);
document.getElementById("input").value=formatted;
document.getElementById("output").innerHTML="Formatted JSON:<pre>"+formatted+"</pre>";
}catch(e){
document.getElementById("output").innerHTML="Error: "+e.message;
}
}
function validate(){
var input=document.getElementById("input").value;
if(!input){
document.getElementById("output").innerHTML="No input to validate.";
return;
}
try{
var data=JSON.parse(input);
var keys=Object.keys(data).join(", ");
document.getElementById("output").innerHTML="Valid JSON. Keys: <strong>"+keys+"</strong>";
}catch(e){
document.getElementById("output").innerHTML="Invalid JSON: "+e.message;
}
}
</script>
</body>
</html>
