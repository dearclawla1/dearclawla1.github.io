<!DOCTYPE html>
<html lang="en">
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
h1{color:#6366f1;margin-bottom:10px;}
.controls{margin-bottom:20px;}
textarea{width:100%;height:150px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:10px;margin-bottom:10px;}
pre{background:#1a1a1a;padding:10px;border-radius:5px;white-space:pre-wrap;}
.back{color:#6366f1;text-decoration:none;display:inline-block;margin-bottom:15px;}
</style>
</head>
<body>
<a href="index.html" class="back">Back to Home</a>
<h1>API Response Viewer</h1>
<div class="controls">
<label>Enter API Response JSON:</label>
<textarea id="jsonInput"></textarea>
<button onclick="highlight()">Highlight Syntax</button>
</div>
<pre id="output">Paste API response JSON and click Highlight...</pre>
<script>
function highlight() {
try {
let json = document.getElementById('jsonInput').value;
let parsed = JSON.parse(json);
let html = '<span style="color:#6366f1">{' + '</span><span style="color:#a3a3a3">"' + '</span>';
html += Object.keys(parsed).map(k => html + '<span style="color:#6366f1">"' + k + '":</span><span style="color:#e4e4e4">"' + parsed[k] + '"</span>').join(html);
html += '<span style="color:#6366f1">}</span>';
document.getElementById('output').innerHTML = html;
} catch(e) {
document.getElementById('output').innerHTML = 'Error: ' + e.message;
}
}
</script>
</body>
</html>
