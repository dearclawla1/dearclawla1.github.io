<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Regex Tester</title>
  <style>
    body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:16px;}
    a{color:#8cf;display:inline-block;margin-bottom:8px;}
    .container{max-width:800px;margin:0 auto;}
    input,button,select{width:100%;padding:10px;margin:8px 0;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:4px;}
    textarea{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:4px;width:100%;min-height:100px;}
    #result{background:#1a1a1a;padding:12px;border-radius:4px;min-height:50px;}
    .match{background:#2a5a2a;border-radius:2px;}
    button:hover{background:#2a2a2a;}
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html">Back to Home</a>
    <h2>Regex Tester</h2>
    <textarea id="input" placeholder="Enter text to search..."></textarea>
    <input id="regex" placeholder="Enter regex pattern...">
    <select id="flags"><option value="g"><i>g</i> Global</option><option value="i"><i>i</i> Case-Insensitive</option><option value="m"><i>m</i> Multiline</option></select>
    <button onclick="test()">Test</button>
    <div id="result">Results will appear here...</div>
  </div>
  <script>
    function test(){
      const text = document.getElementById('input').value;
      const pattern = document.getElementById('regex').value;
      const flags = document.getElementById('flags').value;
      const result = document.getElementById('result');
      if(!pattern){result.textContent='Enter a regex pattern...';return;}
      try{
        const regex = new RegExp(pattern, flags);
        const matches = text.match(regex);
        let html = text.replace(regex, '<span class="match">$&</span>');
        if(matches)html += `<br><br>Found: ${matches.join(', ')}${regex.global ? ` (${matches.length} total)` : ''}` : '<br><br>No matches found.';
        result.innerHTML = html;
      }catch(e){result.textContent='Error: ' + e.message;}
    }
  </script>
</body>
</html>
