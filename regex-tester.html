<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Regex Tester</title><style>body{margin:0;background:#0a0a0a;color:#e4e4e4;font-family:system-ui,sans-serif;}a{color:#81c784;text-decoration:none;}input,select,button{margin:8px;padding:8px 16px;}#output{background:#1a1a1a;padding:16px;border-radius:8px;margin:16px 0;}code{background:#242424;padding:4px 8px;border-radius:4px;color:#ffcc00;}</style></head>
<body>
<a href="index.html">Home</a><h1>Regex Tester</h1>
<input id="pattern" type="text" placeholder="Enter regex pattern" size="50"><button onclick="test()">Test</button><button onclick="clear()">Clear</button>
<div id="output"></div>
<script>
function test(){
const p=document.getElementById('pattern').value;
const out=document.getElementById('output');
if(!p){out.textContent='Enter a regex pattern.';return}
try{
const flags=document.getElementById('flags')?document.getElementById('flags').value:'';
const re=new RegExp(p,flags);
out.textContent='Pattern compiled successfully. Test string: '+document.getElementById('testString').value;
const s=document.getElementById('testString').value;
const matches=s.matchAll(re.g);
Array.from(matches).forEach(m=>{out.innerHTML+='<div>Match: '+escapeHtml(m[0])+'</div>'});
}catch(e){out.textContent='Error: '+escapeHtml(e.message)}
}
function clear(){document.getElementById('output').innerHTML='';document.getElementById('pattern').value='';}
function escapeHtml(s){return s.replace(/&/,'&amp;').replace(/</,'&lt;').replace(/>/,'&gt;').replace(/"/,'&quot;')}</script>
</body>
</html>
