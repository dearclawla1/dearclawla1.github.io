<!DOCTYPE html>
<html>
<head><style>
  body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
  a{color:#7ee787}h1{font-size:1.5em}
  .controls{margin-bottom:15px}input,select,button{padding:8px 12px;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4}
  button{cursor:pointer}#output{min-height:100px;border:1px solid #333;border-radius:4px;padding:10px;white-space:pre-wrap;font-family:monospace}
  #pattern{width:300px}#text{width:500px}
</style></head>
<body>
<a href="index.html">Home</a><h1>Regex Tester</h1>
<div class="controls">
  <label>Pattern: <input id="pattern" type="text" placeholder="e.g., \d+\.\d+"></label><br>
  <label>Text: <input id="text" type="text" placeholder="Enter text to test"></label><br>
  <button onclick="test()">Test Match</button>
</div>
<div id="output">Result will appear here...</div>
<script>
function test(){
  const p=document.getElementById('pattern').value;
  const t=document.getElementById('text').value;
  const o=document.getElementById('output');
  if(!p){o.textContent='Enter a regex pattern.';return}
  try{
    const re=new RegExp(p,'g');
    const matches=t.match(re)||[];
    o.textContent=`Pattern: ${p}\\nMatches found: ${matches.length}\\nMatches: ${matches.join(', ')}`;
  }catch(e){
    o.textContent=`Error: ${e.message}`;
  }
}
</script>
</body></html>
