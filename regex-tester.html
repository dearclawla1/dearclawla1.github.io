<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Regex Tester</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#8b5cf6;}
.container{max-width:800px;margin:0 auto;}
h1{font-size:1.5em;margin-bottom:20px;}
input,button,select{padding:10px;width:100%;margin:10px 0;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4;}
textarea{width:100%;min-height:100px;margin:10px 0;padding:10px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:4px;}
button:hover{background:#333;}
#output{background:#1a1a1a;padding:15px;border-radius:4px;margin:10px 0;}
.match{background:#2d5a2d;color:#8f8;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<div class="container">
<h1>Regex Tester</h1>
<label>Pattern:</label>
<input type="text" id="pattern" placeholder="e.g., \d+">
<label>Test String:</label>
<textarea id="testString" placeholder="Enter text to test">Hello World 12345</textarea>
<button onclick="testRegex()">Test Regex</button>
<button onclick="clearAll()">Clear</button>
<div id="output"></div>
</div>
<script>
function testRegex() {
    const pattern = escapeRegex(document.getElementById('pattern').value);
    const text = document.getElementById('testString').value;
    const output = document.getElementById('output');
    if (!pattern) { output.innerHTML = 'Enter a pattern first!'; return; }
    try {
        const regex = new RegExp(pattern);
        const match = text.match(regex);
        const matches = text.match(new RegExp(pattern, 'g')) || [];
        output.innerHTML = 'Pattern: ' + pattern + '<br>Found: ' + (match ? match[0] : 'No match') + '<br>Matches: ' + matches.join(', ') + '<br>' + text.replace(new RegExp(pattern, 'g'), '<span class="match">~~~</span>');
    } catch (e) { output.innerHTML = 'Invalid regex: ' + e.message; }
}
function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function clearAll() {
    document.getElementById('pattern').value = '';
    document.getElementById('testString').value = 'Hello World 12345';
    document.getElementById('output').innerHTML = '';
}
</script>
</body>
</html>
