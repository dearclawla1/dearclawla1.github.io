<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Tester - Test Regular Expressions with Highlighting</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #e4e4e4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    .input-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #e4e4e4;
      font-size: 14px;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: #0a0a0a;
    }
    textarea::placeholder { color: #666; }
    .btn {
      padding: 10px 20px;
      background: #0a0a0a;
      color: #e4e4e4;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 10px;
      margin-top: 10px;
    }
    .btn:hover { background: #1a1a1a; }
    .results {
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 8px;
      min-height: 100px;
      font-family: 'Consolas', 'Monaco', monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #888;
    }
    .error { color: #ff6b6b; }
    .success { color: #4ade80; }
    .stats {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: #1a1a1a;
      padding: 10px 15px;
      border-radius: 6px;
      min-width: 120px;
    }
    .stat-label { color: #666; font-size: 12px; }
    .stat-value { color: #e4e4e4; font-weight: 500; }
    .highlight {
      background: #0a0a0a;
      color: #4ade80;
      border-radius: 3px;
    }
    .match-count {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
    }
    @media (max-width: 768px) {
      body { padding: 10px; }
      .stats { gap: 10px; }
      .stat-box { min-width: 80px; padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Regex Tester</h1>
    
    <div class="input-group">
      <label for="regex">Pattern:</label>
      <input type="text" id="regex" placeholder="e.g., \d+|abc" value="">
    </div>
    
    <div class="input-group">
      <label for="test-string">Test String:</label>
      <textarea id="test-string" rows="3" placeholder="Enter text to test against the regex..."></textarea>
    </div>
    
    <div style="margin-top: 10px;">
      <button class="btn" id="test-btn">Test Pattern</button>
      <button class="btn" id="clear-btn">Clear</button>
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Flags</div>
        <div class="stat-value" id="flags">None</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Pattern Length</div>
        <div class="stat-value" id="pattern-length">0</div>
      </div>
    </div>
    
    <div class="match-count" id="match-count"></div>
    
    <div class="results" id="results">
      <div class="loading">Enter a regex pattern and test string...</div>
    </div>
  </div>

  <script>
    const regexInput = document.getElementById('regex');
    const testStringInput = document.getElementById('test-string');
    const testBtn = document.getElementById('test-btn');
    const clearBtn = document.getElementById('clear-btn');
    const resultsDiv = document.getElementById('results');
    const flagsDiv = document.getElementById('flags');
    const patternLengthDiv = document.getElementById('pattern-length');
    const matchCountDiv = document.getElementById('match-count');

    function testRegex() {
      try {
        const pattern = regexInput.value;
        const testString = testStringInput.value;

        if (!pattern.trim()) {
          resultsDiv.innerHTML = '<div class="error">Please enter a regex pattern.</div>';
          return;
        }

        if (!testString.trim()) {
          resultsDiv.innerHTML = '<div class="error">Please enter a test string.</div>';
          return;
        }

        let regex;
        try {
          const flags = regexInput.dataset.flags || 'g';
          regex = new RegExp(pattern, flags);
        } catch (e) {
          resultsDiv.innerHTML = `<div class="error">Invalid regex pattern: ${e.message}</div>`;
          return;
        }

        flagsDiv.textContent = regexInput.dataset.flags || 'None';
        patternLengthDiv.textContent = pattern.length;

        const matches = [];
        let match;
        while ((match = regex.exec(testString)) !== null) {
          if (match.index === regex.lastIndex) {
            regex.lastIndex++;
          }
          matches.push({
            text: match[0],
            index: match.index,
            groups: match.groups || {},
            namedGroups: match.namedGroups || {}
          });
        }

        if (regex.lastIndex > 0 && regex.lastIndex < regex.input.length) {
          resultsDiv.innerHTML = `<div class="error">Incomplete match at index ${regex.lastIndex}</div>`;
          return;
        }

        const highlightedString = testString
          .replace(/[\\^$.*+?()[\]{}|\\<>/-]/g, '\\$&')
          .split(/(?=(\d+)|[^\\])/).map(part => {
            const num = part.match(/^\d+/);
            if (num) {
              return `<span class="highlight">${testString[num[0] - 1]}${part.substring(num[0].length)}</span>`;
            }
            return part;
          }).join('');

        resultsDiv.innerHTML = `<div class="success">${highlightedString}</div>`;

        if (matches.length > 0) {
          matchCountDiv.textContent = `Found ${matches.length} match${matches.length !== 1 ? 'es' : ''}`;
        } else {
          matchCountDiv.textContent = 'No matches found';
        }
      } catch (e) {
        resultsDiv.innerHTML = `<div class="error">Error: ${e.message}</div>`;
      }
    }

    function clearAll() {
      regexInput.value = '';
      testStringInput.value = '';
      flagsDiv.textContent = 'None';
      patternLengthDiv.textContent = '0';
      matchCountDiv.textContent = '';
      resultsDiv.innerHTML = '<div class="loading">Enter a regex pattern and test string...</div>';
    }

    // Event listeners
    testBtn.addEventListener('click', testRegex);
    clearBtn.addEventListener('click', clearAll);
    regexInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        testRegex();
      }
    });
    testStringInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        testRegex();
      }
    });

    // Save regex pattern
    regexInput.addEventListener('input', () => {
      if (regexInput.dataset.flags) {
        return;
      }
      const currentFlags = regexInput.dataset.flags || 'g';
      if (currentFlags === 'i') {
        regexInput.dataset.flags = 'i';
      } else if (currentFlags === 'm') {
        regexInput.dataset.flags = 'm';
      } else if (currentFlags === 's') {
        regexInput.dataset.flags = 's';
      } else {
        regexInput.dataset.flags = 'g';
      }
    });

    // Initialize
    regexInput.dataset.flags = 'g';
  </script>
</body>
</html>
