<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;}
a{color:#8ab4f8;text-decoration:none;}
h1{margin:0 0 10px;font-size:1.5em;}
input,button{padding:8px 12px;margin:5px 0;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#e4e4e4;}
input:focus{outline:2px solid #8ab4f8;}
textarea{width:100%;height:80px;background:#1a1a1a;color:#e4e4e4;border:1px solid #333;border-radius:4px;font-family:monospace;}
#result{background:#1a1a1a;padding:10px;border-radius:4px;margin-top:10px;white-space:pre-wrap;}
</style>
</head>
<body>
<a href="index.html">Home</a>
<h1>Regex Tester</h1>
<input type="text" id="pattern" placeholder="Enter regex pattern">
<input type="text" id="testString" placeholder="Enter test string">
<button onclick="testRegex()">Test Match</button>
<textarea id="input" placeholder="Enter text to test"></textarea>
<button onclick="testRegex()">Test Input</button>
<div id="result"></div>
<script>
function testRegex() {
var pattern = document.getElementById('pattern').value;
var testString = document.getElementById('testString').value || document.getElementById('input').value;
var result = document.getElementById('result');
if (!pattern) {
result.textContent = 'Please enter a pattern';
return;
}
try {
var regex = new RegExp(pattern);
var match = regex.exec(testString);
result.textContent = match ? 'Match found: ' + match[0] : 'No match';
} catch (e) {
result.textContent = 'Invalid regex: ' + e.message;
}
}
</script>
</body>
</html>
