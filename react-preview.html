<!DOCTYPE html><html><head><style>body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:2rem;display:grid;grid-template-columns:1fr;gap:1rem;}</style></head><body><a href="index.html" style="color:#6366f1">Back to Home</a><h1>React Component Previewer</h1><div style="display:grid;grid-template-columns:1fr;gap:1rem"><label><b>Component Code:</b><textarea id="code" style="width:100%;height:100px;font-family:monospace"></textarea></label><button onclick="render()">Preview</button><div id="output" style="background:#111;padding:1rem;border:1px solid #333;border-radius:4px;min-height:100px"></div></div><script>function render(){const code=document.getElementById('code').value;document.getElementById('output').innerHTML='<pre style="margin:0;font-family:monospace;font-size:0.9rem">'+escapeHtml(code)+'</pre>'}function escapeHtml(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}</script></body></html>
