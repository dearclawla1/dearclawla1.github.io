<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>React Component Previewer</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
a{color:#6366f1;text-decoration:none}
input,select,button{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:8px;margin:5px 0;border-radius:4px}
button:hover{border-color:#6366f1}
textarea{background:#1a1a1a;color:#e4e4e4;border:1px solid #333;padding:10px;width:90%;height:150px;margin:5px 0}
#output{background:#1a1a1a;border:1px solid #333;padding:10px;min-height:100px;white-space:pre-wrap}
label{display:block;margin:5px 0 2px}
</style>
</head>
<body>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h1>React Component Previewer</h1>
<label>Input Component Code:</label>
<textarea id="code"></textarea>
<label>Component Name:</label>
<input type="text" id="name" placeholder="MyComponent">
<button id="previewBtn">Preview</button>
<div id="output"></div>
<script>
document.getElementById('previewBtn').addEventListener('click',function(){
const code=document.getElementById('code').value;
const name=document.getElementById('name').value||'Anonymous';
const output=document.getElementById('output');
if(!code.trim()){output.textContent='Please enter component code.';return}
output.textContent=`// Preview: ${name}\\n${code}\\n// Component ready for React integration`;
});
</script>
</body>
</html>
