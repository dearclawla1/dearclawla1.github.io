<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
input,select{background:#0a0a0a;color:#e4e4e4;border:1px solid #333;padding:8px;border-radius:4px;min-width:150px;}
button{background:#6366f1;color:#fff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;}
button:hover{background:#5558f1;}
a{color:#6366f1;text-decoration:none;}
h1{color:#6366f1;}
.task-item{background:#111;border:1px solid #333;padding:12px;margin:8px 0;border-radius:4px;display:flex;align-items:center;gap:10px;}
.task-item.completed{opacity:0.6;}
.task-item.completed .task-name{text-decoration:line-through;color:#888;}
.task-actions{display:flex;gap:8px;}
.edit-btn{background:#333;color:#e4e4e4;padding:6px 10px;border-radius:4px;border:none;cursor:pointer;font-size:12px;}
.edit-btn:hover{background:#444;}
.delete-btn{background:#ef4444;color:#fff;padding:6px 10px;border-radius:4px;border:none;cursor:pointer;font-size:12px;}
.delete-btn:hover{background:#dc2626;}
.export-btn{background:#10b981;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:10px;}
.export-btn:hover{background:#059669;}
#tasks{max-width:600px;}
#taskForm{display:flex;gap:10px;flex-wrap:wrap;}
#taskForm input,#taskForm select{min-width:120px;}
#taskForm button{min-width:100px;}
</style>
</head>
<body>
<a href='index.html' style='color:#6366f1'>Back to Home</a>
<h1>Research Planner</h1>
<div id='taskForm'>
<select id='researchType'>
<option value='academic'>Academic Research</option>
<option value='market'>Market Research</option>
<option value='product'>Product Development</option>
</select>
<input id='taskName' placeholder='Enter task name'>
<input id='priority' placeholder='Priority (1-10)' type='number' min='1' max='10'>
<button onclick='addTask()'>Add Task</button>
<button class='export-btn' onclick='exportTasks()'>Export JSON</button>
</div>
<div id='tasks'></div>
<script>
let tasks = JSON.parse(localStorage.getItem('researchTasks')) || [];

function saveTasks(){
localStorage.setItem('researchTasks', JSON.stringify(tasks));
renderTasks();
}

function renderTasks(){
const container = document.getElementById('tasks');
container.innerHTML = '';
tasks.forEach((task, index) => {
const div = document.createElement('div');
div.className = 'task-item' + (task.completed ? ' completed' : '');
div.innerHTML = `
<div style="flex:1">
<strong>${task.name}</strong>
<span style="color:#6366f1; margin-left:10px;">(Priority: ${task.priority})</span>
<span style="color:#888; margin-left:10px;">Type: ${task.type}</span>
</div>
<div class='task-actions'>
<button class='edit-btn' onclick='editTask(${index})'>Edit</button>
<input type='checkbox' ${task.completed ? 'checked' : ''} onchange='toggleComplete(${index})'>
<button class='delete-btn' onclick='deleteTask(${index})'>X</button>
</div>
`;
container.appendChild(div);
});
}

function addTask(){
let type = document.getElementById('researchType').value;
let task = document.getElementById('taskName').value;
let prio = document.getElementById('priority').value;
if(!task || !prio){
alert('Please fill in all fields');
return;
}
tasks.push({name: task, priority: prio, type: type, completed: false});
saveTasks();
document.getElementById('taskName').value = '';
document.getElementById('priority').value = '';
}

function editTask(index){
let newName = prompt('Edit task name:', tasks[index].name);
if(newName){
tasks[index].name = newName;
saveTasks();
}
}

function toggleComplete(index){
tasks[index].completed = !tasks[index].completed;
saveTasks();
}

function deleteTask(index){
tasks.splice(index, 1);
saveTasks();
}

function exportTasks(){
const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tasks, null, 2));
const downloadAnchorNode = document.createElement('a');
downloadAnchorNode.setAttribute("href", dataStr);
downloadAnchorNode.setAttribute("download", "research_tasks.json");
document.body.appendChild(downloadAnchorNode);
downloadAnchorNode.click();
document.body.removeChild(downloadAnchorNode);
}

renderTasks();
</script>
</body>
</html>
