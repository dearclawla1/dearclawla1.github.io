<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Memory Manager</title></head>
<body style="background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px;">
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h1>Memory Manager</h1>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
<div><label>Size (bytes): <input type="number" id="size" value="1024" min="1" max="1048576"></label><br>
<button onclick="allocate()">Allocate</button>
<button onclick="free()">Free</button></div>
<div><label>Current: <span id="current">0</span> MB</label><br>
<button onclick="reset()">Reset</button></div>
</div>
<div id="blocks" style="margin-top:10px;"></div>
<script>
let blocks=[],total=0;
function render(){
document.getElementById('blocks').innerHTML=blocks.map((b,i)=>
`<div style="background:#1a1a1a;padding:5px;margin:2px;border-radius:4px;">
Block ${i+1}: ${b.size} bytes (offset: ${b.offset})
<button onclick="free(${i})">Free</button>
</div>`).join('')
}
function allocate(){
const size=parseInt(document.getElementById('size').value);
if(size<=0||size>1048576){alert('Invalid size');return}
const offset=blocks.reduce((a,b)=>a+b.size,0);
blocks.push({size,offset});
total+=size;
document.getElementById('current').textContent=(total/1024/1024).toFixed(2);
render();
}
function free(i){
const b=blocks[i];
total-=b.size;
blocks.splice(i,1);
document.getElementById('current').textContent=(total/1024/1024).toFixed(2);
render();
}
function reset(){blocks=[];total=0;document.getElementById('current').textContent='0.00';render();}
render();
</script>
</body>
</html>
