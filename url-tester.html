<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Tester</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui;margin:0;padding:20px}
input,button,select,textarea{padding:8px;margin:5px;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#e4e4e4}
button{background:#6366f1;color:#fff;border:none;cursor:pointer}
button:hover{background:#5558e6}
a{color:#6366f1;text-decoration:none}
textarea{width:100%;min-height:60px;font-family:monospace;font-size:12px}
.result-box{background:#1a1a1a;border:1px solid #333;padding:10px;border-radius:4px;min-height:100px;font-family:monospace;font-size:12px;white-space:pre-wrap;transition:all 0.3s ease}
.method-select{width:120px}
.error-message{background:#3a1a1a;border:1px solid #631a1a;color:#ff6b6b;padding:10px;border-radius:4px;margin:10px 0;font-size:14px}
.download-btn{background:#10b981;color:#fff;border:none;cursor:pointer;margin:5px}
.download-btn:hover{background:#059669}
.history-box{background:#1a1a1a;border:1px solid #333;padding:10px;border-radius:4px;margin:10px 0;min-height:100px;font-family:monospace;font-size:12px;white-space:pre-wrap;transition:all 0.3s ease}
.history-item{padding:8px;margin:5px 0;border-radius:4px;background:#2a2a2a;cursor:pointer;transition:all 0.2s ease}
.history-item:hover{background:#3a3a3a}
.history-item .method{color:#6366f1;font-weight:bold}
.history-item .url{color:#e4e4e4}
.history-item .status{color:#10b981}
.history-item .time{color:#888;font-size:11px}
.history-item .action{color:#ff6b6b;font-size:11px;margin-left:5px}
</style>
</head>
<body>
<h1>URL Tester</h1>
<p>Enter a URL to test:</p>
<input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off">
<select id="methodSelect" class="method-select">
  <option value="GET">GET</option>
  <option value="POST">POST</option>
  <option value="PUT">PUT</option>
  <option value="DELETE">DELETE</option>
  <option value="PATCH">PATCH</option>
</select>
<textarea id="bodyInput" placeholder="Request body (JSON, form data, etc.) - only for POST/PUT/PATCH"></textarea>
<button onclick="testUrl()">Test</button>
<button class="download-btn" onclick="downloadResult()">Download Result</button>
<div id="result"></div>
<div id="history" class="history-box"></div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
// Load saved URL from localStorage
document.addEventListener('DOMContentLoaded', () => {
  const savedUrl = localStorage.getItem('urlTester_urlInput');
  if (savedUrl) {
    document.getElementById('urlInput').value = savedUrl;
  }
  
  // Load history from localStorage
  const savedHistory = localStorage.getItem('urlTester_history');
  if (savedHistory) {
    document.getElementById('history').innerHTML = savedHistory;
  }
});

// Save URL to localStorage on input change
document.getElementById('urlInput').addEventListener('input', () => {
  localStorage.setItem('urlTester_urlInput', document.getElementById('urlInput').value);
});

// Save history to localStorage
function saveHistory() {
  const history = document.getElementById('history').innerHTML;
  localStorage.setItem('urlTester_history', history);
}

async function testUrl() {
  const urlInput = document.getElementById('urlInput');
  const url = urlInput.value.trim();
  const method = document.getElementById('methodSelect').value;
  const bodyInput = document.getElementById('bodyInput');
  const body = bodyInput.value.trim();
  const result = document.getElementById('result');
  
  // Input validation
  if (!url) {
    showError('Please enter a URL to test');
    return;
  }
  
  // Validate URL format
  try {
    new URL(url);
  } catch (e) {
    showError('Invalid URL format. Please check your URL (e.g., https://example.com)');
    return;
  }
  
  // Only allow body for methods that support it
  if (method === 'GET' || method === 'DELETE' || method === 'HEAD') {
    bodyInput.disabled = true;
  } else {
    bodyInput.disabled = false;
  }
  
  // Clear previous error
  hideError();
  
  try {
    const startTime = performance.now();
    const response = await fetch(url, {
      method: method,
      headers: {
        'Content-Type': 'application/json',
      },
      body: method === 'GET' || method === 'DELETE' || method === 'HEAD' ? null : body
    });
    const endTime = performance.now();
    const duration = (endTime - startTime).toFixed(2);
    
    const statusText = response.statusText;
    const status = response.status;
    const contentType = response.headers.get('Content-Type') || 'N/A';
    const location = response.headers.get('Location') || 'N/A';
    
    let resultHtml = `<strong>Status:</strong> ${status} ${statusText} | <strong>Time:</strong> ${duration}ms<br>`;
    resultHtml += `<strong>Content-Type:</strong> ${contentType}<br>`;
    
    if (location !== 'N/A') {
      resultHtml += `<strong>Redirects to:</strong> ${location}<br>`;
    }
    
    // Try to read response body
    try {
      const text = await response.text();
      resultHtml += `<strong>Response Body:</strong> ${text.substring(0, 500)}${text.length > 500 ? '...' : ''}`;
    } catch (e) {
      resultHtml += `<strong>Response Body:</strong> (empty or binary)`;
    }
    
    result.innerHTML = resultHtml;
    
    // Save result to localStorage
    localStorage.setItem('urlTester_lastResult', resultHtml);
    
    // Add to history
    addToHistory(url, method, status, duration);
    
  } catch (e) {
    showError(`Error: ${e.message}`);
  }
}

function addToHistory(url, method, status, duration) {
  const history = document.getElementById('history');
  const historyItem = document.createElement('div');
  historyItem.className = 'history-item';
  historyItem.innerHTML = `<span class="method">${method}</span> <span class="url">${url}</span> <span class="status">${status}</span> <span class="time">${duration}ms</span> <span class="action">↩</span>`;
  historyItem.onclick = () => {
    document.getElementById('urlInput').value = url;
    document.getElementById('methodSelect').value = method;
    saveHistory();
  };
  history.appendChild(historyItem);
  saveHistory();
}

function showError(message) {
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error-message';
  errorDiv.textContent = message;
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '';
  resultDiv.appendChild(errorDiv);
}

function hideError() {
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '';
}

function downloadResult() {
  const result = document.getElementById('result');
  const content = result.innerHTML;
  const blob = new Blob([content], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'url-tester-result.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    testUrl();
  }
});
</script>
</body>
</html>
