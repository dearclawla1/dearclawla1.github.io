<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
h1{color:#6366f1;margin-bottom:20px}
input,button{padding:8px;margin:5px 0;background:#1a1a1a;border:1px solid #6366f1;color:#e4e4e4;border-radius:4px}
input{width:120px}
button{width:100px;cursor:pointer}
.result{margin-top:20px;padding:10px;background:#1a1a1a;border-radius:4px}
a{color:#6366f1}
</style>
</head>
<body>
<h1>Hex Color Mixer</h1>
<label>Color 1:</label><input id="c1" type="text" value="#ff0000"><br>
<label>Color 2:</label><input id="c2" type="text" value="#00ff00"><br>
<button onclick="mix()">Mix Colors</button><br>
<label>Blend:</label><select id="blend">
<option value="50">50%</option><option value="75">75%</option><option value="25">25%</option>
</select><br>
<div class="result" id="result">Result: #____________</div>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
function mix(){
var c1=hexToRgb(document.getElementById('c1').value);
var c2=hexToRgb(document.getElementById('c2').value);
var blend=document.getElementById('blend').value/100;
var r=Math.round(c1.r*blend+c2.r*(1-blend));
var g=Math.round(c1.g*blend+c2.g*(1-blend));
var b=Math.round(c1.b*blend+c2.b*(1-blend));
document.getElementById('result').innerHTML='Result: #'+rgbToHex(r,g,b);
}
function hexToRgb(hex){
var h=hex.replace('#','');
return {r:parseInt(h.substring(0,2),16),g:parseInt(h.substring(2,4),16),b:parseInt(h.substring(4,6),16)};
}
function rgbToHex(r,g,b){
return '#'+(r<16?'0': '')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}
mix();
</script>
</body>
</html>
