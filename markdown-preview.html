<!DOCTYPE html>
<html>
<head>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:monospace;margin:0;padding:20px}
#editor{width:100%;height:300px;background:#1a1a1a;border:1px solid #333;padding:10px;resize:both}
#preview{background:#1a1a1a;padding:10px;border:1px solid #333;min-height:300px}
input,button{margin:5px 0}
a{color:#6366f1}
</style>
</head>
<body>
<h1>Markdown Previewer</h1>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<br>
<textarea id="editor" placeholder="Type markdown here..."></textarea><br>
<button onclick="update()">Update Preview</button>
<div id="preview"></div>
<script>
function update(){
let md=document.getElementById('editor').value;
let preview=document.getElementById('preview');
try{
let lines=md.split('\n');
let html='';
lines.forEach(line=>{
if(/^#{1,3}\s/.test(line)){let h=line.replace(/^#+\s?/,'').trim();html+='<h'+(line.match(/^#{1,3}/)[0].length)+'>'+h+'</h'+line.match(/^#{1,3}/)[0].length+'>'}
else if(line.startsWith('- ')){let items=line.replace('- ','').split(/;\s?\n/);html+='<ul>'+items.map(i=>'<li>'+i.trim()+'</li>').join('')+'</ul>'}
else if(/^\*\s/.test(line)){let items=line.replace(/^\*\s?/,'').split(';').map(i=>i.trim());html+='<ol>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ol>'}
else if(/^> /.test(line)){html+='<blockquote>'+line.replace(/^> /,'')+'</blockquote>'}
else if(/`[^`]+`/.test(line)){html=line.replace(/`([^`]+)`/g,'<code>$1</code>')}
else if(/\*\*([^*]+)\*\*/.test(line)){html=line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}
else if(/~~([^~]+)~~/.test(line)){html=line.replace(/~~([^~]+)~~/g,'<del>$1</del>')}
else if(/\[([^\]]+)\]\(([^)]+)\)/.test(line)){html=line.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')}
else html+='<p>'+line+'</p>'
});
preview.innerHTML=html;
}catch(e){preview.innerHTML='<p>Error: '+e.message+'</p>'}
}
update();
</script>
</body>
</html>
