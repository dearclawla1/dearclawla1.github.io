<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Preview Tool</title>
  <style>
    :root { --bg: #1e1e1e; --fg: #d4d4d4; --accent: #007acc; --border: #3c3c3c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); display: flex; min-height: 100vh; }
    .editor { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    .preview { flex: 1; padding: 2rem; overflow-y: auto; }
    textarea, .markdown-body { flex: 1; padding: 1rem; resize: none; border: none; outline: none; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; }
    textarea { background: #2d2d2d; color: #9cdcfe; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .markdown-body { white-space: pre-wrap; word-wrap: break-word; }
    h1, h2, h3 { color: #4ec9b0; margin-top: 1rem; margin-bottom: 0.5rem; }
    p { margin-bottom: 1rem; }
    code { background: #3c3c3c; padding: 0.2rem 0.4rem; border-radius: 3px; font-family: 'Consolas', monospace; }
    pre { background: #2d2d2d; padding: 1rem; border-radius: 5px; overflow-x: auto; }
    img { max-width: 100%; border-radius: 5px; }
    blockquote { border-left: 3px solid var(--accent); margin-left: 0.5rem; padding-left: 1rem; color: #888; }
    ul, ol { margin-left: 1.5rem; margin-bottom: 1rem; }
    .toolbar { padding: 0.5rem 1rem; background: #2d2d2d; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
    button { padding: 0.5rem 1rem; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:hover { filter: brightness(1.1); }
    .back { position: fixed; top: 1rem; left: 1rem; z-index: 100; }
  </style>
</head>
<body>
  <a href="index.html" class="back">Home</a>
  <div class="editor">
    <div class="toolbar">
      <button onclick="exportHTML()">Export HTML</button>
      <button onclick="exportPDF()">Export PDF</button>
      <button onclick="clearEditor()">Clear</button>
    </div>
    <textarea id="editor" placeholder="Type your markdown here..."></textarea>
  </div>
  <div class="preview"><div id="preview" class="markdown-body"></div></div>
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    let raw = '';
    
    function updatePreview() {
      const md = raw || editor.value;
      preview.innerHTML = marked(md);
    }
    
    function marked(md) {
      let html = md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/^\d\. (.+)$/gm, '<li>$1</li>')
        .replace(/```(\w*)\n(.+?)```/gs, '<pre><code>$2</code></pre>')
        .replace(/!?\[(.+?)\]\(.+?\)/g, '<a href="$2">$1</a>')
        .replace(/\n/g, '<br>')
        .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
        .replace(/^\s*$/g, '');
      
      if (md.includes('[') && !md.match(/\[(.+?)\]\(.+?\)/)) {
        const textOnly = md.split(']').map(t => t.replace(/^[\d.]* ?/,'')).join(']');
        html = textOnly;
      }
      return html;
    }
    
    editor.addEventListener('input', () => { raw = editor.value; updatePreview(); });
    updatePreview();
    
    function exportHTML() {
      const blob = new Blob(['<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;line-height:1.6;}h1,h2,h3{color:#4ec9b0;}code{background:#3c3c3c;padding:0.2rem 0.4rem;border-radius:3px;}pre{background:#2d2d2d;padding:1rem;border-radius:5px;}</style></head><body>' + preview.innerHTML + '</body></html>'], {type:'text/html'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'markdown-export.html';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function exportPDF() {
      const html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><script src="https://cdn.jsdelivr.net/npm/html2pdf.js@latest/dist/html2pdf.min.js"><\/script></head><body>' + preview.innerHTML + '</body></html>';
      const win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
      win.onload = () => { html2pdf().from(win.document.body).save(); };
    }
    
    function clearEditor() {
      editor.value = '';
      raw = '';
      updatePreview();
    }
  <\/script>
</body>
</html>
