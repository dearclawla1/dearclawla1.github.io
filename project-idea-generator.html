<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Idea Generator</title>
<style>
body{margin:0;background:#0a0a0a;color:#e4e4e4;font-family:system-ui,sans-serif}
a{color:#6366f1;text-decoration:none}
.container{max-width:600px;margin:40px auto;padding:20px}
h1{text-align:center;margin-bottom:30px}
label{display:block;margin:15px 0 5px;font-weight:600}
input,select{width:100%;padding:10px;margin-bottom:15px;border:1px solid #333;border-radius:4px;background:#111;color:#e4e4e4}
button{width:100%;padding:12px;background:#6366f1;border:none;border-radius:4px;color:white;font-weight:600;cursor:pointer}
button:hover{background:#5558ff}
#output{margin-top:20px;padding:15px;background:#111;border-radius:4px;border:1px solid #333;min-height:100px}
#download-btn{margin-top:15px;background:#10b981}
#download-btn:hover{background:#059669}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h1>Project Idea Generator</h1>
<label>Domain</label>
<select id="domain">
<option value="">Select Domain</option>
<option value="AI">Artificial Intelligence</option>
<option value="Space">Space Exploration</option>
<option value="Health">Healthcare</option>
<option value="Education">Education</option>
<option value="Finance">Finance</option>
</select>
<label>Target Audience</label>
<select id="audience">
<option value="">Select Audience</option>
<option value="Beginners">Beginners</option>
<option value="Experts">Experts</option>
<option value="Students">Students</option>
</select>
<button id="generate">Generate Project Idea</button>
<div id="output"></div>
<button id="download-btn" style="display:none">Download as .txt</button>
<script>
document.getElementById('generate').addEventListener('click', function() {
  const domain = document.getElementById('domain').value;
  const audience = document.getElementById('audience').value;
  const output = document.getElementById('output');
  
  if (!domain || !audience) {
    output.innerHTML = '<span style="color:#ff6b6b">Please select both a domain and target audience.</span>';
    return;
  }
  
  const ideas = {
    AI: {
      Beginners: "AI-Powered Personal Budget Tracker: A simple app that uses machine learning to categorize expenses and predict future spending patterns.",
      Experts: "Federated Learning Platform for Healthcare: Build a distributed ML system that trains models across multiple hospitals while keeping patient data local.",
      Students: "Smart Study Companion: An AI chatbot that helps students understand complex topics by breaking them down into simple explanations with examples."
    },
    Space: {
      Beginners: "Space Mission Planner: A web app that helps beginners plan simple space missions with visual timelines and resource tracking.",
      Experts: "Real-Time Satellite Data Pipeline: Build a system that processes and visualizes live satellite imagery for environmental monitoring.",
      Students: "Astronomy Data Explorer: An interactive tool that lets students visualize and analyze real astronomical data from NASA archives."
    },
    Health: {
      Beginners: "Mental Health Check-in App: A simple daily mood tracker with gentle reminders and basic mindfulness exercises.",
      Experts: "Predictive Readmission System: Build ML models that predict patient readmission risk using electronic health records.",
      Students: "Medication Reminder with AI: A smart app that learns from user habits and sends personalized medication reminders."
    },
    Education: {
      Beginners: "Interactive Vocabulary Builder: A flashcard app that uses spaced repetition to help beginners learn new words efficiently.",
      Experts: "Adaptive Learning Platform: Build an AI system that customizes curriculum difficulty based on student performance in real-time.",
      Students: "Collaborative Research Assistant: A tool that helps students find, organize, and cite academic sources for their projects."
    },
    Finance: {
      Beginners: "Investment Portfolio Visualizer: A simple app that shows portfolio performance with interactive charts and basic analytics.",
      Experts: "Algorithmic Trading Simulator: Build a platform that simulates trading strategies using historical market data.",
      Students: "Financial Literacy Game: An interactive web app that teaches basic financial concepts through gamified scenarios."
    }
  };
  
  const domainIdeas = ideas[domain];
  const selectedIdea = domainIdeas[audience];
  
  output.innerHTML = `<span style="color:#6366f1;font-weight:600">Project Idea:</span>
    <p style="margin-top:10px;line-height:1.6">${selectedIdea}</p>
    <p style="margin-top:15px;font-size:14px;color:#888">Domain: ${domain} | Audience: ${audience}</p>`;
  
  document.getElementById('download-btn').style.display = 'block';
});

document.getElementById('download-btn').addEventListener('click', function() {
  const domain = document.getElementById('domain').value;
  const audience = document.getElementById('audience').value;
  const output = document.getElementById('output');
  
  const content = output.innerHTML;
  const blob = new Blob([content], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `project-idea-${domain}-${audience}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
</div>
</body>
</html>
