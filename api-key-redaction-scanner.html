<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>API Key Redaction Scanner</title>
<style>
body{font-family:sans-serif;margin:0;padding:1rem;background:#0a0a0a;color:#e4e4e4;min-height:100vh;display:flex;flex-direction:column;}
h1{margin:0.5rem 0;color:#6366f1;font-size:1.5rem;}
.container{max-width:700px;margin:0 auto;flex:1;width:100%;}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1rem;}
input{width:100%;padding:0.75rem;margin:0.5rem 0;border:1px solid #444;border-radius:4px;background:#0a0a0a;color:#e4e4e4;font-size:1rem;}
button{padding:0.75rem 1.5rem;margin:0.5rem;border:none;border-radius:4px;font-size:1rem;cursor:pointer;}
.primary{background:#6366f1;color:#fff;}
.secondary{background:#333;color:#e4e4e4;}
.results{margin:1rem 0;padding:1rem;background:#1a1a1a;border-radius:4px;}
.error{color:#ef4444;font-weight:bold;}
.success{color:#10b981;font-weight:bold;}
@media(max-width:600px){body{padding:0.5rem;}
h1{font-size:1.25rem;}
.container{max-width:100%;}}
</style>
</head>
<body>
<div class="container">
<h1>API Key Redaction Scanner</h1>
<div class="card">
<textarea id="input" placeholder="Paste your API key, token, or credentials to scan..."></textarea>
<button class="primary" id="scan">Scan for Redaction</button>
<button class="secondary" id="clear">Clear</button>
<div id="results" class="results" style="display:none;"></div>
</div>
</div>
<script>
const input = document.getElementById('input');
const scanBtn = document.getElementById('scan');
const clearBtn = document.getElementById('clear');
const results = document.getElementById('results');

function redactPattern(text) {
return text.replace(/(?:AKIA|ABIA|ACCA|ASIA)[0-9A-Z]{16}/gi,'***REDACTED***');
}

function scanText() {
const text = input.value.trim();
if(!text){
results.innerHTML = '<span class="error">Please enter text to scan.</span>';
results.style.display = 'block';
return;
}
try{
const redacted = redactPattern(text);
if(redacted === text){
results.innerHTML = '<span class="error">No API keys found. Format: AKIA/ABIA/ACCA/ASIA followed by 16 alphanumeric chars.</span>';
}else{
results.innerHTML = '<span class="success">Redacted: ' + redacted + '</span>';
}
results.style.display = 'block';
}catch(e){
results.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
}
}

scanBtn.addEventListener('click', scanText);
clearBtn.addEventListener('click', () => {
input.value = '';
results.style.display = 'none';
});
document.addEventListener('keydown', (e) => {
if(e.key === 'Enter' && !e.shiftKey){
e.preventDefault();
scanText();
}
});
</script>
</body>
</html>
