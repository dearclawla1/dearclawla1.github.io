<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>API Key Redaction Scanner</title>
<style>
body{font-family:sans-serif;margin:0;padding:1rem;background:#0a0a0a;color:#e4e4e4;min-height:100vh;display:flex;flex-direction:column;}
h1{margin:0.5rem 0;color:#6366f1;font-size:1.5rem;}
.container{max-width:700px;margin:0 auto;flex:1;width:100%;}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1.5rem;}
textarea{width:100%;min-height:150px;margin-bottom:1rem;padding:0.75rem;border:1px solid #333;border-radius:4px;background:#0f0f0f;color:#e4e4e4;font-size:0.9rem;}
button{padding:0.75rem 1.5rem;margin-right:0.5rem;margin-bottom:0.5rem;background:#6366f1;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem;}
button:hover{background:#5558e6;}
button:disabled{background:#333;color:#666;cursor:not-allowed;}
.result{margin-top:1.5rem;padding:1rem;background:#0f0f0f;border-radius:4px;font-size:0.9rem;}
.result.success{border-left:4px solid #10b981;}
.result.error{border-left:4px solid #ef4444;}
.placeholder{color:#666;font-style:italic;}
</style>
</head>
<body>
<div class="container">
<h1>🔍 API Key Redaction Scanner</h1>
<div class="card">
<textarea id="input" placeholder="Paste your API keys, configuration files, or logs to scan for exposed credentials..."></textarea>
<button id="scan">Scan for Redaction Issues</button>
<button id="clear" disabled>Clear</button>
<div id="result" class="result" style="display:none;"></div>
</div>
</div>
<script>
const input = document.getElementById('input');
const scanBtn = document.getElementById('scan');
const clearBtn = document.getElementById('clear');
const resultDiv = document.getElementById('result');

scanBtn.addEventListener('click', async () => {
  const text = input.value.trim();
  if (!text) {
    resultDiv.textContent = '⚠️ Please enter text to scan.';
    resultDiv.className = 'result error';
    resultDiv.style.display = 'block';
    return;
  }
  
  resultDiv.style.display = 'none';
  
  // Simulate scanning
  setTimeout(() => {
    const patterns = [
      /sk-[a-zA-Z0-9]{36,}/, // Stripe keys
      /pk_live_[a-zA-Z0-9]{24,}/, // Stripe live keys
      /ghp_[a-zA-Z0-9]{36}/, // GitHub personal access tokens
      /AKIA[0-9A-Z]{16}/, // AWS access keys
      /api_key\s*=\s*['"]?[a-zA-Z0-9]{20,}/i
    ];
    
    let issues = [];
    patterns.forEach(pattern => {
      const matches = text.match(pattern);
      if (matches) {
        matches.forEach(match => {
          issues.push({ type: 'Exposed', value: match });
        });
      }
    });
    
    if (issues.length > 0) {
      resultDiv.innerHTML = `<strong>${issues.length} potential credential exposure(s) detected:</strong><br>` +
        issues.slice(0, 5).map((i, idx) => `<div>${idx+1}. <span class="placeholder">${i.value}</span></div>`).join('');
      resultDiv.className = 'result error';
    } else {
      resultDiv.textContent = '✅ No obvious credential patterns detected in this text.';
      resultDiv.className = 'result success';
    }
    resultDiv.style.display = 'block';
    clearBtn.disabled = false;
  }, 300);
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  input.focus();
  resultDiv.style.display = 'none';
  clearBtn.disabled = true;
});

// Enter key to scan
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    scanBtn.click();
  }
});
</script>
</body>
</html>
