<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>API Key Redaction Scanner</title>
<style>
body{font-family:sans-serif;margin:0;padding:1rem;background:#0a0a0a;color:#e4e4e4;min-height:100vh;display:flex;flex-direction:column;}
h1{margin:0.5rem 0;color:#6366f1;font-size:1.5rem;}
.container{max-width:700px;margin:0 auto;flex:1;width:100%;}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1.5rem;}
textarea{width:100%;min-height:150px;padding:0.75rem;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#e4e4e4;font-family:monospace;font-size:0.9rem;resize:vertical;}
button{padding:0.75rem 1.5rem;background:#6366f1;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:1rem;margin-top:rem;}
button:hover{background:#5558e6;}
.result-box{margin-top:1rem;padding:1rem;background:#1a1a1a;border:1px solid #333;border-radius:6px;font-family:monospace;font-size:0.9rem;}
.result-box.success{border-color:#10b981;}
.result-box.error{border-color:#ef4444;}
.status-text{margin-top:0.5rem;font-size:0.9rem;color:#e4e4e4;}
.empty-state{color:#888;font-style:italic;font-size:0.9rem;text-align:center;padding:2rem;}
@media (max-width: 600px) {
  .card { padding: 1rem; }
  button { width: 100%; }
}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>API Key Redaction Scanner</h1>
<textarea id="apiInput" placeholder="Paste your API keys or configuration files here..."></textarea>
<div id="emptyState" class="empty-state">
  <p>Enter API keys or configuration content to scan for potential redaction needs.</p>
</div>
<button id="scanBtn">Scan for Redactions</button>
<div id="resultBox" style="display:none;"></div>
<div id="statusText" class="status-text"></div>
</div>
</div>
<script>
const apiInput = document.getElementById('apiInput');
const scanBtn = document.getElementById('scanBtn');
const resultBox = document.getElementById('resultBox');
const statusText = document.getElementById('statusText');
const emptyState = document.getElementById('emptyState');

let isScanning = false;

function showResult(message, type) {
  resultBox.style.display = 'block';
  resultBox.className = 'result-box ' + type;
  resultBox.textContent = message;
}

function showError(message) {
  showResult(message, 'error');
}

function showSuccess(message) {
  showResult(message, 'success');
}

function hideEmptyState() {
  emptyState.style.display = 'none';
}

function scanForRedactions() {
  if (isScanning) return;
  
  const input = apiInput.value;
  
  if (!input.trim()) {
    showError('Please enter some content to scan.');
    return;
  }
  
  isScanning = true;
  scanBtn.disabled = true;
  statusText.textContent = 'Scanning...';
  
  // Simulate scanning delay for UX
  setTimeout(() => {
    const patterns = [
      {name: 'AWS Access Key', pattern: /AKIA[0-9A-Z]{16}/gi},
      {name: 'AWS Secret Key', pattern: /[0-9a-zA-Z\/+]{40}/gi},
      {name: 'GitHub Token', pattern: /ghp_[0-9a-zA-Z]{36}/gi},
      {name: 'Bearer Token', pattern: /Bearer [0-9a-zA-Z\-_]{20,}/gi},
      {name: 'Generic API Key', pattern: /api[_-]?key[=:][0-9a-zA-Z\-_]{20,}/gi}
    ];

    let found = false;
    let results = [];

    patterns.forEach(pattern => {
      const matches = input.match(pattern.pattern);
      if (matches) {
        found = true;
        matches.forEach(match => {
          results.push({pattern: pattern.name, value: match, redacted: pattern.pattern.replace(/([0-9a-zA-Z\-_]{20,})/, '[REDACTED]')});
        });
      }
    });

    if (found) {
      statusText.textContent = 'Found ' + results.length + ' potential redaction(s)';
      showSuccess('Scanned ' + input.length + ' characters.\n\n' + results.map(r => '- ' + r.pattern + ': ' + r.redacted).join('\n'));
    } else {
      statusText.textContent = 'Scan complete';
      showSuccess('No common API key patterns detected in ' + input.length + ' characters.');
    }

    isScanning = false;
    scanBtn.disabled = false;
  }, 1000);
}

scanBtn.addEventListener('click', scanForRedactions);

// Error handling: Add clear/reset functionality
apiInput.addEventListener('input', () => {
  if (apiInput.value.trim() === '') {
    emptyState.style.display = 'block';
    resultBox.style.display = 'none';
    statusText.textContent = '';
  } else {
    hideEmptyState();
  }
});

// Better UX: Keyboard shortcut (Enter to submit)
apiInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    scanForRedactions();
  }
});
</script>
</body>
</html>
