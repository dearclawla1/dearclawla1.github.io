<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>API Key Redaction Scanner</title>
<style>
body{font-family:sans-serif;margin:0;padding:1rem;background:#0a0a0a;color:#e4e4e4;min-height:100vh;display:flex;flex-direction:column;}
h1{margin:0.5rem 0;color:#6366f1;font-size:1.5rem;}
.container{max-width:700px;margin:0 auto;flex:1;width:100%;}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:1rem;margin:1rem 0;box-shadow:0 4px 8px rgba(0,0,0,0.3);}
input,button,select{width:100%;padding:0.5rem;margin:0.5rem 0;font-size:1rem;border-radius:4px;border:1px solid #333;}
input:focus,button:focus,select:focus{outline:2px solid #6366f1;outline-offset:2px;}
textarea{width:100%;padding:0.5rem;margin:0.5rem 0;font-size:1rem;border-radius:4px;border:1px solid #333;min-height:200px;resize:vertical;}
button{cursor:pointer;font-weight:500;transition:all 0.2s;}
button:hover{background:#333;border-color:#444;transform:translateY(-1px);}
.results{margin-top:1rem;}
.result-item{padding:1rem;border-radius:6px;margin-bottom:0.5rem;font-size:0.9rem;}
.result-item.key{background:#312e81;border:1px solid #4c1d95;}
.result-item.safe{background:#064e3b;border:1px solid #047857;}
.status{display:inline-block;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.8rem;font-weight:600;}
.status.key{background:#312e81;color:#e4e4e4;}
.status.safe{background:#064e3b;color:#e4e4e4;}
.tag{display:inline-block;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.8rem;font-weight:600;}
.tag.key{background:#312e81;color:#e4e4e4;}
.tag.safe{background:#064e3b;color:#e4e4e4;}
.placeholder{color:#666;font-style:italic;}
.clear-btn{background:#dc2626;border-color:#dc2626;margin-top:1rem;}
.clear-btn:hover{background:#b91c1c;border-color:#b91c1c;}
@media(max-width:600px){.container{padding:0.5rem;}.card{padding:0.75rem;}}
</style>
</head>
<body>
<div class="container">
<h1>API Key Redaction Scanner</h1>
<div class="card">
<textarea id="content" placeholder="Paste your code, logs, or configuration files here to scan for exposed API keys..."></textarea>
<div class="results"></div>
<button onclick="scan()">Scan for API Keys</button>
<button class="clear-btn" onclick="clearContent()">Clear All</button>
</div>
</div>
<script>
function scan(){
    const content = document.getElementById('content').value;
    const results = document.querySelector('.results');
    results.innerHTML = '<div class="card"><span class="status key">Scanning...</span></div>';
    
    setTimeout(() => {
        const found = contentMatch(content);
        if(found) {
            results.innerHTML = '<div class="card"><span class="status key">⚠️ Found exposed API keys in your content.</span><span class="tag">Danger</span></div>';
        } else {
            results.innerHTML = '<div class="card"><span class="status safe">✓ No exposed API keys detected.</span><span class="tag">Safe</span></div>';
        }
    }, 800);
}

function contentMatch(content){
    return content.includes('api_key') || content.includes('API_KEY') || content.includes('apikey') || content.includes('APIKEY');
}

function clearContent(){
    document.getElementById('content').value = '';
    document.querySelector('.results').innerHTML = '';
}
</script>
</body>
</html>
