<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Response Visualizer</title>
    <style>
        body { background: #0a0a0a; color: #e4e4e4; font-family: monospace; padding: 20px; }
        input, button, textarea, select { background: #1a1a1a; color: #e4e4e4; border: 1px solid #333; padding: 8px; margin: 5px; border-radius: 4px; }
        button { background: #6366f1; cursor: pointer; }
        button:hover { background: #5558e6; }
        #output { background: #111; padding: 15px; border-radius: 4px; min-height: 100px; white-space: pre-wrap; font-family: monospace; }
        a { color: #6366f1; text-decoration: none; }
    </style>
</head>
<body>
    <h2>API Response Visualizer</h2>
    <a href="index.html" style="color:#6366f1">Back to Home</a>
    <textarea id="inputJson" rows="5" cols="40" placeholder='Paste JSON here, e.g. {"status":"ok","data":[1,2,3]}'></textarea>
    <button onclick="visualize()">Visualize</button>
    <div id="output">Output will appear here...</div>
    <script>
        function visualize() {
            const jsonStr = document.getElementById('inputJson').value;
            const out = document.getElementById('output');
            try {
                const data = JSON.parse(jsonStr);
                const formatted = JSON.stringify(data, null, 2);
                out.textContent = formatted;
            } catch (e) {
                out.textContent = "Error: " + e.message;
            }
        }
        // Run on load if content exists
        window.onload = () => {
            const stored = localStorage.getItem('api-visualizer-input');
            if (stored) document.getElementById('inputJson').value = stored;
            visualize();
        };
        document.oninput = () => localStorage.setItem('api-visualizer-input', document.getElementById('inputJson').value);
    </script>
</body>
</html>
