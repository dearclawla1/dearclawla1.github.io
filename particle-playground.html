<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parti - Interactive Particle Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #e4e4e4;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #6366f1;
        }
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        .canvas-container {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            position: relative;
        }
        #particleCanvas {
            width: 100%;
            height: 500px;
            background: #0a0a0a;
            border-radius: 8px;
            cursor: crosshair;
        }
        .controls {
            background: #111;
            border-radius: 12px;
            padding: 20px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #ccc;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #6366f1;
            color: white;
        }
        .btn-primary:hover {
            background: #5558e3;
        }
        .btn-secondary {
            background: #333;
            color: #e4e4e4;
            border: 1px solid #444;
        }
        .btn-secondary:hover {
            background: #444;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .stats {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .stat-row:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: #888;
        }
        .stat-value {
            color: #e4e4e4;
            font-family: monospace;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #6366f1;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #6366f1;
        }
        .hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Parti</h1>
            <p class="subtitle">Interactive Particle Physics Playground</p>
        </header>

        <div class="main-content">
            <div class="canvas-container">
                <canvas id="particleCanvas" width="800" height="500"></canvas>
                <div id="loading" class="loading" style="display: none;">Initializing...</div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="particleCount">Particle Count: <span id="countValue">100</span></label>
                    <input type="range" id="particleCount" min="10" max="500" value="100">
                </div>

                <div class="control-group">
                    <label for="speed">Simulation Speed</label>
                    <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1">
                </div>

                <div class="control-group">
                    <label for="friction">Friction</label>
                    <input type="range" id="friction" min="0" max="0.1" step="0.001" value="0.01">
                </div>

                <div class="control-group">
                    <label for="colorPicker">Particle Color</label>
                    <input type="color" id="colorPicker" value="#6366f1">
                </div>

                <div class="control-group">
                    <label for="trailLength">Trail Length</label>
                    <input type="range" id="trailLength" min="0" max="50" value="20">
                </div>

                <div class="btn-group">
                    <button class="btn-primary" id="addParticles">Add Particles</button>
                    <button class="btn-secondary" id="clearParticles">Clear All</button>
                    <button class="btn-secondary" id="resetPhysics">Reset Physics</button>
                    <button class="btn-secondary" id="randomize">Randomize</button>
                </div>

                <p class="hint">Click and drag on canvas to create particles manually!</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-row">
                <span class="stat-label">Active Particles:</span>
                <span class="stat-value" id="activeCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total Trails:</span>
                <span class="stat-value" id="trailCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Memory Usage:</span>
                <span class="stat-value" id="memoryUsage">0 KB</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">FPS:</span>
                <span class="stat-value" id="fps">0</span>
            </div>
        </div>

        <a href="index.html" style="color:#6366f1">Back to Home</a>
    </div>

    <script>
        // Particle Playground - Physics Simulation
        (function() {
            'use strict';

            // DOM Elements
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            const loading = document.getElementById('loading');
            const particleCountSlider = document.getElementById('particleCount');
            const countValue = document.getElementById('countValue');
            const speedSlider = document.getElementById('speed');
            const frictionSlider = document.getElementById('friction');
            const colorPicker = document.getElementById('colorPicker');
            const trailLengthSlider = document.getElementById('trailLength');
            const addParticlesBtn = document.getElementById('addParticles');
            const clearParticlesBtn = document.getElementById('clearParticles');
            const resetPhysicsBtn = document.getElementById('resetPhysics');
            const randomizeBtn = document.getElementById('randomize');
            const activeCountEl = document.getElementById('activeCount');
            const trailCountEl = document.getElementById('trailCount');
            const memoryUsageEl = document.getElementById('memoryUsage');
            const fpsEl = document.getElementById('fps');

            // State
            let particles = [];
            let trails = [];
            let animationId = null;
            let lastTime = 0;
            let fpsTimer = 0;
            let frameCount = 0;
            let fps = 0;

            // Configuration
            const config = {
                particleCount: parseInt(particleCountSlider.value),
                speed: parseFloat(speedSlider.value),
                friction: parseFloat(frictionSlider.value),
                color: colorPicker.value,
                trailLength: parseInt(trailLengthSlider.value),
                mouseDown: false,
                mousePos: { x: 0, y: 0 }
            };

            // Mouse tracking
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                config.mousePos.x = e.clientX - rect.left;
                config.mousePos.y = e.clientY - rect.top;
            });

            canvas.addEventListener('mousedown', () => {
                config.mouseDown = true;
                addParticles();
            });

            canvas.addEventListener('mouseup', () => {
                config.mouseDown = false;
            });

            canvas.addEventListener('mouseleave', () => {
                config.mouseDown = false;
            });

            // Particle Class
            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 4 * config.speed;
                    this.vy = (Math.random() - 0.5) * 4 * config.speed;
                    this.radius = Math.random() * 3 + 2;
                    this.color = color;
                    this.trail = [];
                    this.maxTrail = config.trailLength;
                }

                update() {
                    // Apply friction
                    this.vx *= (1 - config.friction);
                    this.vy *= (1 - config.friction);

                    // Update position
                    this.x += this.vx;
                    this.y += this.vy;

                    // Bounce off walls
                    if (this.x - this.radius < 0) {
                        this.x = this.radius;
                        this.vx *= -1;
                    }
                    if (this.x + this.radius > canvas.width) {
                        this.x = canvas.width - this.radius;
                        this.vx *= -1;
                    }
                    if (this.y - this.radius < 0) {
                        this.y = this.radius;
                        this.vy *= -1;
                    }
                    if (this.y + this.radius > canvas.height) {
                        this.y = canvas.height - this.radius;
                        this.vy *= -1;
                    }

                    // Update trail
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > this.maxTrail) {
                        this.trail.shift();
                    }
                }

                draw() {
                    // Draw trail
                    if (this.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.trail[0].x, this.trail[0].y);
                        for (let i = 1; i < this.trail.length; i++) {
                            ctx.lineTo(this.trail[i].x, this.trail[i].y);
                        }
                        ctx.strokeStyle = this.color;
                        ctx.lineWidth = 1;
                        ctx.globalAlpha = 0.3;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }

                    // Draw particle
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
            }

            // Initialize particles
            function initParticles() {
                particles = [];
                for (let i = 0; i < config.particleCount; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    particles.push(new Particle(x, y, config.color));
                }
                updateStats();
            }

            // Add particles
            function addParticles() {
                const count = Math.min(50, config.particleCount + 20);
                for (let i = 0; i < count; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    particles.push(new Particle(x, y, config.color));
                }
                updateStats();
            }

            // Clear all particles
            function clearParticles() {
                particles = [];
                trails = [];
                updateStats();
            }

            // Reset physics
            function resetPhysics() {
                particles.forEach(p => {
                    p.vx = (Math.random() - 0.5) * 4 * config.speed;
                    p.vy = (Math.random() - 0.5) * 4 * config.speed;
                    p.trail = [];
                });
            }

            // Randomize everything
            function randomize() {
                config.particleCount = Math.floor(Math.random() * 400) + 10;
                config.speed = parseFloat((Math.random() * 2.5 + 0.5).toFixed(1));
                config.friction = parseFloat((Math.random() * 0.1).toFixed(3));
                config.color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                config.trailLength = Math.floor(Math.random() * 50);
                
                particleCountSlider.value = config.particleCount;
                countValue.textContent = config.particleCount;
                speedSlider.value = config.speed;
                frictionSlider.value = config.friction;
                colorPicker.value = config.color;
                trailLengthSlider.value = config.trailLength;

                initParticles();
            }

            // Update stats
            function updateStats() {
                activeCountEl.textContent = particles.length;
                trailCountEl.textContent = trails.reduce((sum, t) => sum + t.length, 0);
                
                const memory = new Blob([JSON.stringify(particles)]).size / 1024;
                memoryUsageEl.textContent = memory.toFixed(2) + ' KB';
            }

            // Update slider values
            function updateFromSliders() {
                config.particleCount = parseInt(particleCountSlider.value);
                config.speed = parseFloat(speedSlider.value);
                config.friction = parseFloat(frictionSlider.value);
                config.color = colorPicker.value;
                config.trailLength = parseInt(trailLengthSlider.value);
                countValue.textContent = config.particleCount;
                initParticles();
            }

            // Animation loop
            function animate(timestamp) {
                if (!lastTime) lastTime = timestamp;
                const deltaTime = timestamp - lastTime;
                lastTime = timestamp;

                // FPS calculation
                frameCount++;
                fpsTimer += deltaTime;
                if (fpsTimer >= 1000) {
                    fps = Math.round((frameCount * 1000) / fpsTimer);
                    frameCount = 0;
                    fpsTimer = 0;
                    fpsEl.textContent = fps;
                }

                // Clear canvas
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Update and draw particles
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                animationId = requestAnimationFrame(animate);
            }

            // Event listeners
            particleCountSlider.addEventListener('input', () => {
                countValue.textContent = particleCountSlider.value;
                updateFromSliders();
            });

            speedSlider.addEventListener('input', () => {
                config.speed = parseFloat(speedSlider.value);
                updateFromSliders();
            });

            frictionSlider.addEventListener('input', () => {
                config.friction = parseFloat(frictionSlider.value);
                updateFromSliders();
            });

            colorPicker.addEventListener('input', () => {
                config.color = colorPicker.value;
                updateFromSliders();
            });

            trailLengthSlider.addEventListener('input', () => {
                config.trailLength = parseInt(trailLengthSlider.value);
                updateFromSliders();
            });

            addParticlesBtn.addEventListener('click', addParticles);
            clearParticlesBtn.addEventListener('click', clearParticles);
            resetPhysicsBtn.addEventListener('click', resetPhysics);
            randomizeBtn.addEventListener('click', randomize);

            // Initialize
            loading.style.display = 'block';
            setTimeout(() => {
                loading.style.display = 'none';
                initParticles();
                animate(0);
            }, 100);

            // Cleanup on unload
            window.addEventListener('beforeunload', () => {
                if (animationId) cancelAnimationFrame(animationId);
            });

            // Usage tracking
            fetch('https://gwen-api.dearclawla1.workers.dev/db/exec', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sql: 'INSERT INTO tool_usage (tool, action, timestamp) VALUES (?, ?, ?)',
                    params: ['particle-playground.html', 'load', new Date().toISOString()]
                })
            }).catch(() => {});
        })();
    </script>
</body>
</html>
