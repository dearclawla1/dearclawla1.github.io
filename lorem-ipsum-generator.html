<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lorem Ipsum Generator</title>
<style>
body{background:#0a0a0a;color:#e4e4e4;font-family:system-ui,sans-serif;margin:0;padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
h1{margin:0;font-size:1.5rem}
input,select,button{padding:0.5rem 1rem;border:none;border-radius:4px;font-size:1rem}
input{background:#1a1a1a;border:1px solid #333;color:#e4e4e4}
button{background:#6366f1;color:#fff;cursor:pointer}
button:hover{background:#5558e6}
textarea{width:100%;max-width:600px;height:150px;background:#1a1a1a;border:1px solid #333;color:#e4e4e4;padding:0.5rem;border-radius:4px;font-family:inherit;font-size:1rem}
.controls{display:flex;gap:0.5rem;flex-wrap:wrap}
</style>
</head>
<body>
<h1>Lorem Ipsum Generator</h1>
<div class="controls">
<select id="type"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select>
<input type="number" id="count" value="3" min="1" max="100">
<button onclick="generate()">Generate</button>
</div>
<textarea id="output" readonly></textarea>
<a href="index.html" style="color:#6366f1">Back to Home</a>
<script>
const lorem = "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.";
function generate(){const type=document.getElementById("type").value,count=document.getElementById("count").value;const arr=lorem.split(". ");const out=[];for(let i=0;i<Math.min(count,Math.floor(lorem.length/10));i++){if(type==="paragraphs")out.push(lorem);else if(type==="sentences")out.push(lorem.substring(0,lorem.indexOf(". ")+2));else out.push(lorem.substring(0,lorem.indexOf(". ")+2));}document.getElementById("output").value=out.join(". ");}
</script>
</body>
</html>
