<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lorem Ipsum Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#e4e4e4;padding:2rem}
.container{max-width:600px;margin:0 auto}
h1{margin-bottom:1.5rem;color:#6366f1}

.controls{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem}
.controls label{font-size:0.9rem;color:#a0a0a0}

button{padding:0.75rem 1.5rem;border:none;border-radius:4px;background:#6366f1;color:#fff;font-size:1rem;cursor:pointer;transition:background 0.2s}
button:hover{background:#5558f5}
#output{background:#1a1a1a;padding:1.5rem;border-radius:8px;border:1px solid #333;min-height:150px;font-size:1rem;line-height:1.6;white-space:pre-wrap}
.copy-btn{margin-top:1rem;background:#333;color:#e4e4e4;border:1px solid #444}
.copy-btn:hover{background:#444}
</style>
</head>
<body>
<div class="container">
<a href="index.html" style="color:#6366f1">Back to Home</a>
<h1>Lorem Ipsum Generator</h1>
<div class="controls">
<label>Words per paragraph: <input type="number" id="words" value="100" min="10" max="500"></label>
<label>Style: <select id="style"><option value="standard">Standard Lorem Ipsum</option><option value="classy">Classy Lorem Ipsum</option><option value="random">Random Words</option></select></label>

</div>

<script>

function generate(){
const w=document.getElementById('words').value||100;
const s=document.getElementById('style').value;
let text='';
if(s==='standard'){
for(let i=0;i<w;i++){text+=words[i%words.length]+' ';}
}
else if(s==='classy'){
const classy=['Lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','ut','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','dolor','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum','class','att','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','ut','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','dolor','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum','class','att','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','ut','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','dolor','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'];
for(let i=0;i<w;i++){text+=classy[i%classy.length]+' ';}
}
else{

}
document.getElementById('generate').addEventListener('click',generate);
document.getElementById('copy').addEventListener('click',async()=>{
const text=document.getElementById('output').textContent;
try{await navigator.clipboard.writeText(text);alert('Copied!');}catch(e){alert('Copy failed');}});

</script>
</body>
</html>
